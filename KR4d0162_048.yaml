body:
  text: 苕溪集卷四十八宋劉一止撰墓碑宋故武功大夫貴州刺史永興軍路馬步軍副都總管特贈右武大夫光州防禦使纍贈太師魏國公楊公墓碑楊氏出姬姓晉大夫羊舌氏至叔向食邑於楊其子食我以邑為氏食我黨於祈盈得罪於晉子孫或逃居華隂山谷中戰國時有名章者出焉實始為華隂人族望至漢乃大魏晉隋唐冠冕蟬聨代不乏人在唐為尤盛其任於朝者居第列於三坊曰靖恭曰修行曰新昌子孫分為四院曰關西曰蜀中曰淮南曰浙中今散居麟府鴈門等郡都皆關西院子孫也在江南閩越者皆浙中院子孫也名卿才大夫將帥相臣以勳德著見於史名字不可疏舉公諱宗閔字景賢代州崞縣人也曽大夫倍以儒學稱於鄉值五季亂晦迹不仕大父日新明經上第仕至承奉郎賜五品服父仲臣舉明法科仕至宣德郎贈中大夫纍贈太師代國公公少而氣節嘗語人曰丈夫處世要以功名自見不能為章句儒豐鬛長身以絶倫科試藝殿庭與衛士較騎射皆莫及奏功第一進秩二等敵復謀大入朝廷知之以鄜延路副總管劉延慶為都統制搗其腹心以麟府路軍馬來承慶為河東路統制折可求副之延慶深入失道息於叢薄沮洳之間賊盡得其幟立之公時為統領殿後距二里餘疑不進遣騎往覘果賊也伏旗誓師以短兵力戰曰吾為爾先縱馬趨阜堆見於橫掉賊十餘騎呼而下公躍馬上手殺數人士卒爭奮大破之斬首十餘獲牛蓄十餘萬計其後李遇昌又以兵二十萬北一道將圍府州且盡略河西諸城公􅀈知之曰虜畜死矣乃以槖駝二千運糧於塞令骨雄駐兵以待曰寇必出此既而果來公命他將運之獨提輕騎一萬由石州監軍路攻夏州且入蔑武境遇昌日夜馳驅百里奔救其國公設伏橫擊之斬獲不可計後二嵗戎王命遇昌以數萬騎再入寇且大言曰可持四鐡環舁神堂寨來公預知之詭逺遊獵伐木盡塞其所當出之路才通單騎賊果入至魚貫度隘公乘其未定擊之四戰四克一日神堂奏報賊至公不介而出秦人呼噪曰將便先擊賊矣踰城越塹從公者萬餘賊遁去或問之公曰寇已薄城待擐甲整軍而出且孫而去後當復來彼猝至兵必不多時神宗皇帝特授三班借職調鴈門縣巡教傑甲演習孫吳兵法星宿孤虛之書且喜閲史熟古今方略尋置通逺軍茶場改授兼通逺軍鎮公事州薦升湟川管界巡檢嘗會獵野食公兵不滿百夏人騎千餘奄至公連射三騎皆仆賊阻却乘勝擊之斬獲甚衆解圍湟部以多受賞崇寧初朝廷復以湟賜青唐羌改授岢嵐軍兵馬都監再録前功進秩三等任滿徙濵判管界沿河淪水陸巡檢再調慶州兵馬都監改知環州興平城未幾擢為河東第四副將駐汾州公請易極邊自效移涇原第七將就遷河東第三副將駐烏龍寨夏人叛盟寇麟府御筆特遷第三將護大和神堂惠銀寧城等寨及靜塞城宣和初夏人寇西邊有旨麟府路軍馬黨萬知府州事折可求為之牽制率步騎三萬自右廂軍道入寨二百餘里無所遇二帥結營自固獨命公以萬騎深入又百餘里見空寨二公曰是不可復進會大風塵沙蔽野公意賊且至退據福慶川二澗以待之賊騎二萬餘將涉澗薄我公乘其半渡鳴鼓鏖戰斬首千餘級比還二帥府出勞公公請自左廂監軍道以歸地雖逺無掩代之虞既歸聞賊帥李遇昌來以鐡騎數萬扼故道可擊而走也聞者欽服朝廷以極邊不可無公就升太原府路兵馬都監歷三任不徙其後議興無山之役以公統領麟路軍馬駐兵武州之偏頭獨建獨建者契丹梟將小護虜之故居也護虜極力以爭屢矣後復以契丹騎八千步二萬據釡竈山以書約戰公遣二部將以兵當之二將敗還公知其堅命曵柴以進揚塵亘天以徑卒由山背蟻登直下護虜驚逸潰亂公夾擊斬首甚衆護虜奔於西戎招集散亡西北雜胡羌後二年以衆三萬復至圖報釡竈之役公再命部將往擊戒曰賊少則擊多則避公登樓望之謂其下曰吾料賊且置獨建直出蜴蜥川趨西寨巳設伏待之語未卒塵埃坌起蜴蜥川賊果悉衆超西寨伏兵迅發賊首尾斷絶追擊三十餘里斬首二千級可求以公數勝護虜西北千里貼然奏乞不次賞之未報淵聖皇帝登極特加貴州刺史徙知豐州未赴移知麟州時金人破我圍太原朝廷命折可求節制麟府路軍馬往救公告可求曰朝廷命公解圍顧安出耳今由汾陽進以步兵當突騎不見其利願節制建上將之旗鼓行而東聲言救晉假我精騎二萬攻其必救之所則太原之圍自解論祕不傳可求雖心善之卒不能用以至失律僅以身勉可求以便宜升公為前軍統制軍馬河東路兵馬鈐轄靖康初載西戎乘間攻取諸城無援而降者半長子震時知麟州建寧寨虜攻其城公聞之曰吾子忠勤類我必不免已而果然自是朝廷遣聶山再割三鎮金人以麟府豐啖西夏可求命公之保德訓議尋葉城由河西入晉寧公至保德傳舍悟可求紿已亟走晉寧四日不火食既至誚責可求且勸合勤王可求以公為河東路統制軍馬中道為鄜延經略使張深所止令保境上駐軍南頭平為鄜延中路統制軍馬今上即位南京除京兆府路軍馬鈐轄尋升兵馬副總管公始至與經略使唐重謀曰今河東諸州皆非吾有距此才一水而本路兵弱宜急繕城塹為守禦計以待外援捨此無䇿重以秦氏驕不欲擾之公退語所親曰事危矣建炎元年冬十二月金人大軍乘水渡河西騎數萬趨永興永興無避或勸公去公曰我結髮從戎蒙國厚恩行年六十有七惟有死耳他非所知明年正月十日公血戰而死公自三班借職以平勞賞功及徽宗皇帝登極八寶恩赦等前后官至武功大夫以死節聞特贈左武大夫光州防禦使官其孫三人以孫存中貴纍贈太師魏國公母宜人檀氏雍氏俱贈秦國夫人娶賈氏繼室劉氏皆贈秦國夫人公四男子震敦武郎即死事建寧寨者也霖鄉貢進士雲承信郎霆承節郎皆早卒女三人適同郡鄉貢進士王仲舉靳亮何充孫七人存中見任少傅寧逺軍節度使兼領殿前都指揮使職事居中執中皆早卒師中右奉議郎新添差通判嚴州軍州事彥中未仕安中右儒林郎添差充兩浙西路安撫使司幹辦公事守中右從事郎添差充兩浙西路安撫使司差備差遣孫女二人長適鄉貢進士王公宏次未行曽孫男三人偰登紹興十五年進士第任左奉議郎知大宗正丞倓右承奉郎㒜右承事郎曽孫女五人尚幼公天性純孝事繼母雍氏如事檀氏及死不食者數日持身清約疾惡如仇歷事五朝忠勤一節料敵應變智略縱橫出入數等御下有恩士卒樂為之死故能以少擊衆轉敗為功勇於為義不見所難劉延慶之衄公既勝虜而還行並茂林聞號呼聲執事皆以栁貫其體枝運數人皆以槖馳之上殆千餘蓋延安綏德軍米脂城人也公駐師命脫之將士以去我境尚二百餘里有難色公護卒以歸他日道過延安綏德郡人皆出迎炷香遮拜曰此楊髯耶非阿父我輩安得生其急人之難類此帥守部使者薦公凡五十餘人以謂有古良將之風及其歿也識與不識咸嗟惜之公平居教子孫未嘗不以忠孝兩言為軌軸故子孫遵行之弗失公既殁若干年少傅公以某年某月某日葬公於某郡縣某鄉某山之原以某昔者嘗銘先秦國劉夫人墓更以見屬某雖不敏既不獲命則退而思之自昔忠孝之家子孫相承以功名始終無愧者百不一二栁宗元作平淮西雅美李訴之功曰西平有子朕亦有臣於是知世濟其美為時焜耀匪直其家繄國是賴今少傅公翊衛天子備殫忠勤忠肅孝恭克紹家法上所眷禮隱然為中興名臣位望之隆於前有光然而功成不矜寵厚益誠獨拳拳焉以先世名節不白於將來是懼某雖陋其何敢卒辭銘曰楊為顯姓世澤以滋由漢及唐别派分枝公家鴈門奕奕有聞儒學相授位微德尊公曰大夫志尚各異我必以功自見於世維時夏童跳梁於紀躪我西陲幾無寧嵗公初即戎氣已蓋衆雙帶兩鞬射則命中鏖戰腥羶罙踐邱鹵固敵是求計不返顧公身居先將士內激凡師所臨當百以一料敵制勝不愧古人機變橫出捷若鬼神晚佐永興遭時艱虞連城不守援絶勢孤人或謂公子盍去諸公曰國恩必報以軀帝為嗟悼告第疏榮孰慰忠魂公有孝孫孝孫翼翼位在九棘勳名孔昭恭順靡忒先大厥家未見窮已天其賚公孫又有子宋故敦武郎知麟州建寧寨纍贈太師秦國公楊公墓碑楊氏望於關西由漢魏隋唐以至國朝世胄聫延列第分坊博龜襲紫人物門第之盛莫與比倫支分派别散居四方自公曽髙而上皆葬代郡遂為代之崞縣人公諱震字某以明經上第歷保定清源二縣主簿已而踰冠恬飬邱園終承武郎賜五品服諱日新者公之曽大父也年少有聲九上禮部再舉明法中第歷臨晉孟太谷三縣主簿賢而有吏能為忠宣范公所器以宣德郎致仕纍贈太師代國公諱付臣者公之大父也公之考諱宗閔少讀書有志者嘗曰吾祖居鄉閭嵗飢發倉粟粒價速售俾糴者自揀斗斛不問相陽闢邑牽延鄉先生教授邑子論者以為功利及人宜自有後吾意丈夫當以功名自見章句之學不足以發身成業既而以材武絶倫試藝殿廷出衛士右仁宗皇帝偉之補三班借職歷事五朝名聞西北二邊建炎中金人犯長安守節以死終武功大夫貴州刺史永興軍路馬步軍副都總管纍贈太師魏國公公勵於學能文善書精騎射質貌魁偉沈塞有謀魏公在諸子中特竒之既冠從戎以斬馘功補三班差使調河東經略司指教遇其下有恩且誨且勉閲世中程者多部刺史交薦之秩滿改授慶州監酒繼授安邊城巡檢太原帥薛嗣昌遣將自豐州寧逺保寧等寨進討西夏公𨽻嵐石路軍馬來承慶至爬沙流遇敵斬首三百餘級進至傾吳堆盤生擒酋長屈閙復斬級二百以功轉三班借職官制行改承信郎人有致饋於公者公謝之饋者曰我輩願效之何嫌公曰始吾父命之名實慕漢安平侯公以清白遺子孫且曰爾勉之無爽四知之戒自是我守此言如護頭目今爾以無名之賜加吾其可乎及代城或裒金以贐曰微公我輩無噍類公一無所受政和中朝廷議復減底河命河東師任熙明會合諸軍自晉寧綏德兩界分諸將校驍勇者咸在公居遷中賊據山為城下瞰我師動息輒為所得諸將三却尋募能土工者六城師再進角樓自墮公率數輩拔劍先登斬擊千百人大軍乘勝平其城上功第一遷成忠郎宣和初河東帥奏公充平定軍訓練軍馬三年方臘盜據杭睦朝廷姚平仲為都統制征之公從折可存自浙東追擊至三界河鎮與賊遇斬首八千餘級追襲至剡上虞天台樂清四縣取韋羌朝賢六逺三洞至黃岩賊帥吕師囊據斷頭山扼險拒我前輒下石死傷者衆纍日不能進可存問計安出公以輕兵緣山背上乘髙鼓噪矢石交發賊大驚潰復縱火自衛公曰機不可失也乃被重鎧及袴褶與敢死士履火突入生得師囊乃斬賊首三千餘人復有號余大翁者以萬衆圍永嘉踰月公從平付可存兼驛真宗朝久宿衛五邊功一日以偏裨從大將北征會天晦冥失道至北海有老人持舟渡之且授以乳香云服此可不食皇祐中從狄武襄公征儂智髙有功遷澶州總管卒贈太保勑葬開封之沙臺號喫香劉太保父居易守欣州終供備庫副使母王氏封夀安縣君夫人供備之長女也自幼淑惠供備鍾愛難其配永興路步軍副總管楊公宗閔初任為三班借職供備一見與語竒之曰將帥才也以夫人歸焉夫人之歸楊氏事姑檀夫人甚謹侍疾不解帶不頃刻去左右輯睦宗族遇其下有恩喜愠不見於色而家事井井皆有條理總管公以忠義自將躬冒矢石聞命引道或不介而驅視骨月如路人不少牽制居無事時夫人率勉之赴公不以私事一毫纍其心故堅決若此夫人早遍通羣書及內典得其大旨敏識絶人義所當為斷然不惑朝廷之復燕山也總管以河東第三將駐軍靜寨城且沿檄武州時常勝軍五百人實散從留靜寨官吏失職廩無見糧至貿衣以食夫人語其子霆曰燕人陷夷踰二百年今始歸朝而郡縣無以給其食至凍餓豈人情也哉命捐私藏數百解濟之悉賴以全活自是夫人之譽溢於邊境逺徼出征決䇿取勝其功居多志在立名不茍求富貴浙東賊平所師竒其材欲以子女通婚公謝之或曰折氏求子非子求折氏公曰不然吾祖皆以器業自奮安能倚姻家幸進取非偶之譏嘗自謂吾平時所為未嘗有一事不可語人者其刻勵堅正若此建寧之禍公之子存中從征河朔獨免於難今為少傅寧逺軍節度使兼領殿前都指揮使職事秦國公纍贈公之太師秦國公祖妣檀氏雍氏妣賈氏劉氏配董氏繼室張氏俱贈秦國夫人男四人少傅其長也居中執中從父戰殁彥中未仕女二人長適鄉貢進士王公宏次未行孫男三人偰左奉議郎知太宗正丞倓左承奉郎㒜右承事郎孫女六人長曰洞元嘗適右宣教郎直祕閣通判湖州軍州事劉正卒夫殁棄俗為道士年十九卒詔贈沖妙鍊師餘在室少傅以某年某月某甲子葬公於吳興武康縣崇仁鄉楊村翔鳯山之麓張夫人祔焉一日偰以少傅公嘗來請銘某得公行實讀之三復慨嘆嘗觀韓愈為田洪正作廟銘載志語曰維洪正父子繼忠孝豫維寵嘉之是以命汝愈銘文辭至今焜耀簡册今魏公與公挺身許國出萬死一生之計英烈凜然精爽如在與日月爭光可也豈田氏父子所得比耶宜得一世名儒發揚遺懿閎大俊傑與韓子相後先而少傅屬銘乃逮不敏非理所宜既辭謝不獲則又惟念少傅身衛社稷為世寶臣南渡以來首挫強敵以寬主憂幽閨婦女皆能道之祖孫三世勳德之茂前古所無及兹升平帝眷有加位列九棘寵數優異蓋事之稱抑又知天之所以報公父子者在兹也降及諸孫俱勵於學偰以藝文取髙第兄弟彬彬以切以磋以光其宗光大未艾豈人力也哉豈人力也哉某誠固陋然此而不銘尚誰銘銘曰嶽嶽惟公慷慨即戎沈毅偉傑益習文業急病遜夷不見所難與敵周旋人後身先爬沙減底摧鋒陷堅義勇冠軍威名乃宣東南承平驟罹寇警既蹂杭睦連城巷哭公佐主帥往靖東浙披山剔洞破其蟻結維時黃巖别酋固拒慿髙下石士卒反顧公以輕騎出賊之背揚雄噪呼賊大驚潰乃被重鎧蹈火突入生致渠魁窘不得逸逮居建寧虜銜宿寃摶虛麕至叩城有言爾父迫我掩我骨月亟以城降尚貸爾僇公曰此身惟國是許不以膏血為爾釁鼓於時寨兵僅餘老稚感激聽命有死無二人誰不死公死何尤有臣若斯不為國羞天監在下報爾子孫世公世師有耀其門我作銘詩大書深刻用侈厥慶詔於罔極宋故恩平郡夫人劉氏墓碑紹興八年冬某待罪史官執筆螭陛而殿帥楊公每相遇於東廡下意色欵欵不相配夷明年春見語曰存中逮事祖母恩平郡夫人蒙教育之恩甚厚葬十年矣而碑銘未立私心恧焉敢以纍子某曰公家世忠孝聞於三晉而公復以勳績被寵遇致位通顯益大厥家其繼述先懿宜有人顧安取此然不得辭既而觀夫人行實而感周南之詩婦人能勉其君子以正字應書法謹敘而銘之夫人姓劉氏其先居相臺後徙開封遂為封人祖斌事闕星馳斛之且曰太師貸脅從無知之民不可以數計師還諸將請優加褒異特進五階至修武郎敘遷敦武郎知麟州建寧户雜畨漢嚚訟難以理曉公剖決曲當上下悅服主不忍欺初契丹驍將小護虜奔於西戎居清肅河清軍招集散亡雜西北胡羌衆十數萬破豐州攻麟府城寨魏公統領麟府路軍馬屢摧敗之盡得其父母妻子靖康初金人圍太原冬十月驅幽燕叛亡與夏人奚人等與大至建寧既合圍護虜叩城語公曰爾久奪吾偏頭獨建之居又敗釡竈山掩我骨肉吾忍死至今爾舉城降我全汝軀命不然皆韲粉矣時寨兵精鋭悉從折可求死於交城之戰所餘才老弱百數衆守勿堅公毅然曉衆曰汝等父兄俱死於敵於汝為仇不待吾言而後喻也上報國恩下雪親寃在此時矣衆乃聽命日夜奮勵縋城撓賊斬獲甚衆賊怒濟師急攻閲旬城中矢盡公嚮麟府再拜訣曰兒報國以身不得復為考子矣左右皆泣下不忍仰視頃之城陷公揮短兵力戰殁於闤闠時十有八日也年四十有四二子死之闔門俱陷於城初魏公聞圍建寧曰吾兒死矣其忠徑類我巳而果然公熟古將方略能洞敵情每從魏公初總管為承典副師金人長驅河東郡以城降者過豫永兵河虜俾夫人擕家之屬夫人執義不從總管曰吾效死於此然不可以無後以百口纍夫人夫人泣涕訣曰百口責在我君無顧家受國深恩無臨難茍免永興陷總管以死節聞夫人號慟不自勝既而曰我夫得其死矣未亡人復何憾時道梗多剽敓行次成州奧亭縣尉郭先將夫人所齎厚與盜劉敢戰以兵圜之敢戰騎卒有嘗𨽻總管麾下者語其徒曰此長安楊總管家屬無輒犯也衆皆竦然夫人抗聲呼敢戰曰劉侯爾名將家子今舉義當為上帥無久在草路隤其家聲敢戰蓋太尉劉發之辟從也感夫人之言流涕再拜請姑事夫人且願因夫人求受節制於成州夫人遣建以其情告成守曰必許之外可無寇內益勝兵一舉而兩得成守以為然既而僚屬屬曰楊夫人果免於難雖古智謀之士何以加至興元聞孫存中扈駕南巡屢立戰名喜曰我孫幼不凡固宜有此我當犯鋒鏑趨行在所冀一見而死願畢矣明年冬發二蜀閲半嵗會存中於建康是秋遽以疾終實建炎三年八月二日也享年六十有三纍封至宜人以存中追贈恩平郡夫人存中以其年九月十日葬夫人於建康蔣山西草堂之原男四人曰震敦武郎靖康初知麟州建寧寨夏人與契丹將小護虜寇河東死于賊追贈太師次曰霖鄉貢進士次曰雲承信郎皆早卒次曰霆承節郎後夫人一月卒女三人適鄉貢進士王仲舉靳亮何充孫男七人長曰存中殿前副虞候保成軍節度使主管殿前司公事武功郡開國侯食邑一千戶實封二百戶次曰居中執中皆從其父死難曰師中秉義郎曰彥中安中守中皆承信郎孫女三人長適鄉貢進士王公宏次未行曽孫三人曰偰成忠郎閣門祗候曰倓曰㒜曽孫女四人在室嗚呼恩義相勝平時士夫處之稱以為難而夫人判之於倉猝擾攘之間不失其正名到於今伉儷俱榮斯亦竒矣論者以是深數之至孫鼎貴間關東來僅如其志不克久受鍾鼎之飬事為可矜豈為善之報不於其身於其後人兹可信耶銘曰夫人之德式是嬪則恭順且直以嚴其身有彛有倫壼政以振允毅楊公秉心恪志國爾忘躬聞命引途不介以驅何有厥拿夫人亹亹克相君子惟義所止生死之決雖古猛烈志義或蹶曽是閨門謂此斷恩慷慨以論聲實播聞縉紳云云有苾其芬夫人來東孝孫之從受飬則豐惟時孝孫日侍帝閽帝顧為溫車服煒煒歸奉燕喜惟其有此曽未更時壑舟巳移孝孫孔悲惟積也厚厥報未究以溢我後迤迤新岡川流泱泱慶如許長苕溪集卷四十八
