body:
  text: 苕溪集巻五十五宋劉一止撰告詞除監察御史紹興元年十月六日程俱行勅奉議郎秘書省校書郎劉某御史臺屬皆朕耳目之官也自元豐肇新官制於是尚書諸曹分𨽻六察雖非言責之地然尚書萬機本天下之事無不總焉而御史得以紏六曹之愆違則其任亦不輕矣以爾問學之美推於流輩才術之施宜無不可選自讐校維持朝綱尚體懋思以祗厥職可特授依前官守監察御史除起居郎紹興二年七月十五日陳與義行勅左奉議郎守監察御史劉其朕於干戈多故之辰崇奬文士人物凋喪之後選擇近班庶㡬朝廷之光以副天下之望四方所得不次命之以爾儒服退然執義甚固文聲籍甚進官晚成比繇中秘之聨稍與南臺之選載稽公議有簡朕心遂錫贊書俾司史事進直螭陛退居鸞臺極於儒者一時之榮以為多士稽古之勸往哉祗服益勵爾修可特授依前官試起居郎除宫祠紹興二年八月三十日下陳與義行勅左奉議郎試起居郎劉某朕於艱難之際雖暴衣露盖不敢康寧而旁招四方之才與之治天職食天禄延見訪問禮貎加焉惟恐失士大夫心可謂無負矣茍或負朕其可不懲爾自少史列耳目之官又親擢之以為柱史冀爾助朕以成中興之績今乃不然朋比奸回更相借譽竊㺯威權漸不可長抑而不揚何以為政其罷所任往食祠宫尚體寛恩無忘循省可罷起居郎特授依前官主管台州崇道觀除祠部員外郎奉祠溫州紹興四年四月七日下張綱行勅左奉議郎劉某朕方舉羣䇿以收中興之功顧天下士有一善可取猶將簡㧞任用而况已試之才為朕所知之者乎以爾行義文辭搢紳推仰蚤膺器使入直殿坳嘉其乆即退閑益自堅於氣節以充郎選還寘本朝朕之用人不以官職崇卑而為輕重往祗厥服以茂逺圖嗣有褒遷毋虚朕意可特授依前官守尚書祠部員外郎奉祠溫州神主除浙東提刑紹興四年十一月一日下王居正行勅左承議郎新差權發遣袁州軍州事劉某鄉者國家承平日乆朝廷尊榮士大夫雅意本朝而以任子外為失職故部使者之任寖輕而州縣之奸弊百姓之疾苦甚至於不可勝救朕方念及此其間非出於甚不得巳而付之以事必求端良正直之士以充外臺耳目之寄庻幾治道之興或由於此爾修潔博習直諒而文周旋臺省聲實甚休夫明允平反使四方典獄聞風皆厚類非俗吏之所能為也爾往欽哉其識朕意可特授依前官權發遣兩浙東路提㸃刑獄公事兼本路勸農提舉河渠公事兼提舉本路常平等事除直顯謨閣紹興五年閏二月二十四日下周綱行勅左承議郎新差權發遣兩浙東路提㸃刑獄公事兼本路勸農提舉河渠公事兼提舉本路常平等事劉某朕躬行毖祀加惠羣工爰因甄叙之常式示褒揚之寵以爾蘊髙明之性而輔以中庸挺變通之才而守以静正惟嗜淵源之學素髙亷退之風念去朝廷屢更嵗月肆廣合宫之霈用陞延閣之班豈獨彛章兹為異數益思報稱祗服寵休可特授依前官直顯謨閣差遣如故除秘書少監紹興八年九月二十一日下吕本中行勅左朝奉郎直顯謨閣劉某爾頃者擢自稠人寘之左右所以自立者固嘗有聞於人矣乆留於外士論惜之圖書之府英俊所萃以爾之耆徳宿望而富於藝文故使往為之長至於傳史之得失邪正之是非非爾之純静以正則不足以有所辨别也爾其勉之可特授依前官試秘書少監再除起居郎紹興八年十一月二十七日下勾龍如淵行勅左朝奉郎試秘書少監劉某自起居注行而著作之官遂分自時政記作而二史之職幾廢允惟賢哲昭示典刑禇遂良知人臣之當守官規模逺矣魏謩不敢䧟人主於非法論諫兼之我得其人可追二子爾威儀有則悃愊無華談子房季札之聞兼彦輔安仁之美蔚辭章於正體奬議論於醇風自去闕廷屢更嵗月幾條善政下轉而上聞一部諫書朝奏而暮召遂從蓬觀仍侍螭坳稔白璧之無瑕覺青氊之有舊爾惟善惡必記是非自明因以告猷兹惟朕志可特授依前官守起居郎除中書舍人紹興九年正月五日下蘇符行勅天以雷風鼓舞萬物后以書命號令四方俾代予言是為重任不有君子孰能厥官左朝奉郎守起居郎劉某文字雍容老於儒學議論博雅達於古今迴翔中外之聫稔熟聲光之美用演綸告足為國華且侍臣職在於論思而中書基本於政事彌縫庻績協贊治功斯有賴於圖回况匪專於潤色其推素尚以副簡知可特授依前官試中書舍人除兼侍講紹興九年二月二十四日下李誼行勅朕惟唐虞三代之世載於詩書禮樂之文者尚或可攷也悦聞其風庻幾所為故博延鴻儒宿學入侍左右與之探討其原而敷繹其㫖盖以廣朕之忠焉左朝奉郎試中書舍人賜紫金魚袋劉某以忠厚之性純一之徳而輔之以廣大精㣲之學儒林藝苑兼出搢紳自登詞掖實代予言溫厚爾雅比儷西京朕甚嘉之朕永念古今治亂之端思得直諒多聞之益朝夕幃幄以備顧問疇咨在位莫如老成肆以是命爾夫啟乃心沃朕心爾之職也其勉之哉可特授依前官試中書舍人兼侍講賜如故除給事中紹興九年九月十四日下林待聘行勅朕惟基命令於西省謹出納於東臺責任雖同恩章則異曰疇望實之懿俾專論駁之司匪以叙遷其惟徳進左朝奉郎試中書舍人兼侍講賜紫金魚袋劉某資涵懿粹學造深醇峻節清規蚤著士林之譽英詞麗藻蔚為文苑之華暨曲領於贊書擅聲稱於手筆回翔滋乆褒擢是宜其自綸闈進居𤨏闥益致盡規之義無慚批勅之風尚懋乃猷以服予訓可特授依前官試給事中兼侍講賜如故罷給事中宫祠紹興九年十二月二十九日下程克俊行勅比詔從臣咸舉其類庻幾得士協濟康功倘所舉非所知頋有阿狥之私安所逃罪哉具官劉某蚤由推擇進服通聨謂宜事君以人副兹簡㧞之意而乃䧟朋附之迹乖論薦之公清議靡容彈章具在其亟鐫於荷槖尚退食於琳宫服我寛恩無忘自訟可罷給事中特授依前官提舉江州太平觀任便居住賜如故復秘閣修撰紹興十年十二月二十八日下張嵲行勅左朝奉郎提舉江州太平觀賜紫金魚袋劉某朕稱禋合宫肆眚象魏開棄咎之路既一灑於庻尤閔負罪之臣宜稍遷於故秩矧乃甘泉之舊嘗詔刑史之書共霈恩榮以除苛嬈以爾操行堅正文辭深純爰以修能遂躋從列自干物議用致煩言顧閲嵗之已多諒思愆之既乆兹因霈宥肆舉彛章爰升論撰之華庸示甄收之渥廣仁恩之意朕方厚於臣工復玷缺之艱爾毋忘於飭勵可特授依前官充秘閣修撰差遣賜如故落修撰宫祠紹興十五年十二月八日下段拂行勅左朝奉郎充秘閣修撰提舉江州太平觀劉某無禮於君衆所忿疾犯此不韙義其可容爾資性回邪專事朋附妄作弗靖自致煩言念嘗齒於邇聫俾參榮之次對殊昧省循之意敢形怨懟之辭輿論未平因難但已宜鐫中秘論撰之職尚畀真祠禄秩之優體我寛恩毋重尤悔可特落秘閣修撰依前官差遣賜如故再除秘閣修撰致仕紹興二十二年七月十四日下周麟之行勅左朝奉郎提舉江州太平興國宫劉某大夫七十致君事禮也睠乃舊臣乞身以疾賁之寵命歸老於家以爾夙負雋才累膺簡拔晚陪從槖備罄論思繇自蹈於悔尤致乆棲於閑退比陳衰疾浸迫桑榆投紱自頥當從所欲升之圖書之府列在論撰之官勉服吾恩益綏爾祉可特授依前官充秘閣修撰致仕賜如故除敷文閣待制紹興二十二年十月八日下周麟之行勅朕閲清風之誦喜周道之復興采鹿鳴之歌思漢儒之間作念獲成於大業敢自眩於成功有嘉侍從之臣能繼聲詩之體左朝奉郎充秘閣修撰賜紫金魚袋致仕劉某學而筮仕老不廢文雖乆服於林丘實舊聫於簮槖脱冠謝朝列方自樂於餘年摛藻掞天庭猶未忘於夙習比覽奏篇之善益知歸美之誠此盛徳之事其何足以當之庻一代之文有可傳於來者爰升次對用賁褒章尚保令名以光晚節可特授依前官充敷文閣待制致仕賜如故落致仕召赴行在紹興二十五年十二月二十三日下王綸行勅君子雖乞身而去未始忘君王者以好賢為先固難拘法方羣材之並取豈舊徳之獨遺左朝奉郎充敷文閣待制致仕長興縣開國男食邑三百户賜紫金魚袋劉某氣大且剛學全而粹略徧青華之選薦分屏翰之憂持槖甘泉既竭論思之効掛冠神武尤髙止足之風深居而徳不孤暮年而文益壮韓愈之鋪張聖徳相與並名陸賈之從容諸公未忘經世亟就安車之聘尚分宣室之釐可落致仕依前官充敷文閣待制封賜如故除敷文閣直學士紹興二十六年四月十八日下王綸行勅安車就聘甫及都門延閣陞華再還隠舍特厚老成之眷用敦靜退之風左朝奉郎充敷文閣待制長興縣開國子食邑五百戶賜紫金魚袋劉某早擅聲名晚多述作紫垣青瑣嘗雍容於禁中緑水蒼烟旋逍遥於物外比招舊徳共輯丕圖雖巳掛於衣冠聞命而起果尚困於藥石以疾而辭具悉誠懇之言俾遂休閑之養其祗渙渥以介夀康可特授依前官充敷文閣直學士封賜如故贈四官朝散大夫紹興三十一年三月二十八日下楊邦弼行勅朕眷優侍從惠及初終於其存也寵遇之禮無不至其既歿也褒贈之恩無不隆盖明為國之經而極忠厚之道也故敷文閣直學士左朝奉郎長興縣開國伯食邑八百户賜紫金魚袋致仕劉某慈祥毓性文藝名家綸闈嘉潤色之工瑣闥賴論思之益去朝雖乆屢陞延閣之華知分甚明早遂安車之適奄從淪謝良用怛傷爰峻陟于文階用追榮於幽穸諒惟㝠漠亦克有知可特贈左朝散大夫餘如故苕溪集巻五十五
