body:
  text: 苕溪集卷四十九宋劉一止撰墓銘吳亦虛墓志銘故將仕郎監秀州華亭縣市舶務吳君諱槖字亦虛世為吳興安吉之梅溪人贈尚書都官郎中諱集之曽孫贈通議大夫諱某之孫刑部員外郎諱某之子也丱角警敏博辨父客異之稱竒童既冠遊太學試選屢優兩薦不第以刑部致仕恩符筮調歙州縣主簿未赴用薦者監明州茶場半嵗負省授江寧府上元縣尉秩滿辟今任君遇事明果雖未官所至不茍上元民佃官田出租嵗久會有獻言者下郡邑賣其直歸縣官府帥委君君曰是奪民田也恐非朝廷意公近臣宜有建明未幾果罷民負財結怨或以老幼死相誣陷君為條畫禁止華亭妄男子稱得天書蘄上聞部使者遣吏至邑令已下端委聽受君獨却立不拜發緘果謬聞者咨賞以政和六年七月十二日卒於官享年四十六妻臧氏一子曰道衡一女在室將以明年某月甲子葬於梅溪某山之原其叔父某以君名位不振無以蘄知世之達人大官屬同郡士劉一止敘次為之銘一止與君俱受室於臧知君宜詳嗚呼亦虛俊才如王褒論議如賈生風度夷曠如晉宋間人物於文無所不能於百家諸子之書靡不涉其流而獵其英尤工為詩引類托興氣質髙妙配古作者凡其志與能視古今聞達者無所愧焉而止於是耶余非特哀君為天下惜此士也悲夫銘曰岡迤迤川靡靡君已矣尚有子吳君平墓志銘府君諱槩字君平其先事吳越錢氏闕後徙居烏程曽大父琰以其子通議大夫知幾纍封尚書都官郎中大父惟幾考景元皆不仕君年七十有九紹興十年十月某甲子以疾終於隱居之廬葬有日其子宥屬余志其墓余先君吳出也其為世姻義不得辭始君之考有潛德隱行名於鄉曰居士獨喜交四方之名卿賢大夫舉酒賦詩樂以終其身君與昆弟奉觚牘治觴豆無虛日郡東北距城五里曰毗山下臨大澤耕者得斷碑蓋唐天寶中隱人吳筠所居居士以為兹山復歸吳氏我豈其後身意樂之會嵗大飢流亡相踵富人匿財公私之役皆廢而遊手不得以力食居士命築館於山之麓焉以食數千指初莫喻其意君蒞役以財飲食之不加程督居士喜曰惟汝知吾節成以授子孫俾肄業其間居士泛舟往來勞勉學者余幼學與遊處焉知君之篤於事親自兹始也君少慕祿仕讀書甚苦忘寒暑飢渴至得疾母夫人憂之見於言色自是少間昏定之餘猶夜諷不輟既丁內外艱則慨然有棲遁之志吳氏故饒於財宗族居城西華屋相望嵗時燕飲列肆歌舞君弗好也曰吾知山棲之安而已有先君子之築廬所嘗賑飢者在焉他日移家往居之益剃榛莽廣室宇崇壯宏逺則加於昔名其堂曰手澤刻居士遺墨壁於左右朝夕對之植香草名木其下又以為幽間靚麗之觀閲居十年而後殁其志不巳得乎自奉甚約一錢不妄費赴人之急惟恐居後宗族無親疏其貧不能衣食婚姻與其孤甥之無以自存者稱多寡周之至供塋域祭祀之田有不給釋氏之宫先世所建立而刓缺頺廢不克扶持者則身任之不少靳里人貸錢數十萬而死其孤存焉折劵不問故人之喪二十年不葬或者以告則往弔之且遺之金他皆類此宥以明年某月某甲子葬君於梅溪之東五里考居士之旁相距二百步室徐氏姑蘇人朝奉郎瑗之子先君十年卒至是合袝初葬徐氏日者卜以不吉將求之他君曰近先隴我之志也吉孰加焉男三人定宥守女五人適先澤丞沈暉進士徐大鼎楊彭年周訴徐昌言孫男五人仲立仲經仲達仲述仲意孫女八人得壻者三曰張頥曰徐預曰莫大受皆進士曽孫男女各二人君三子皆克家且致志於學藝業可觀定三舉於禮部不幸死矣守未冠薦名鄉書其講習之暇佐治生産俾居安居享髙年之樂者宥也銘曰維士出處各異岐得志而樂古甚稀軒冕富貴孰不宜吾恐是中有駭機大澤之北山曰毗嵯峨上有吳筠碑吾先君子意所私慨念逸軌不可追益剃榛莽開寒扉要令全家居翠微髙堂突兀凌煙霏手澤足慰無窮思此生有同露朝晞身意兩適如君誰維君純儉孝且慈不肯俯仰受世譏有子十八能誦詩掇拾青紫當若遺流澤演迤行見之謂余不信稽此辭莫國華墓志銘君諱廷芬字國華湖州烏程人曽祖敵祖抑皆晦德不仕父侗右迪功郎封州司理參軍君自幼頴悟種學積文未冠入太學與一時俊彥爭名場屋間籍籍有稱政和六年賜上舍出身調單州成武主簿君初仕屬時承平久憲綱稍疏姦貪肆行上下相冒籍之會拱輔宗室子受賄覺尋竄匿部使者委君治既而有所觀望欲中輟君督捕益峻竟獄乃止金郎令不法為民所訟邑人以君能竟拱獄乞委君問狀辭連部使者且見禱君笑曰吾豈可私撓哉卒以實聞任滿升從政郎授黃州黃岡縣丞以父憂去官哀毁盡禮鄉里稱焉既免喪十年不赴調或勉之則曰仕本為親吾忍死至是尚何求族父大卿公哀其志以澤逮泉壤感之君免出調平江府録事參軍因自喜曰此吾盡心之所也夫獄人命所繫死者不可復生事至重也而典獄之官貪者顧金錢巧者弄文法至其謹厚亷潔者又常患不通事情混然無章聽以一律甚者權移吏胥攬成案書名而已嚮我攝治某事頗自謂無愧今真為獄官矣其不敢不盡心每夜分録囚事無巨細躬自訊鞫有葛十者盜葛亮告身至三遷其官犯法下吏更二獄不承廷尉檄君治一見得情叩頭伏罪君明敏絶人而濟之以恕視食飲之節不加楚毒強盜因死二人將即刑謂獄吏曰令我謝録事而死其不寃可知朝廷遣使宣諭江浙使者以事屬君君條畫盡公不當其意怒見於色既乃省文書得君廉謹狀歎曰吾幾失此人車駕巡幸以應辦肅給遷文林郎終更用薦改宣教郎授常州宜興縣丞待次里間紹興九年某月甲子以疾終於正寢享年四十有九君初得疾遽乞致仕願以恩追賁其父不報諸孤以某年十一月甲子葬於歸安縣至孝鄉施渚方山之源娶吳氏先君七年卒男四人徹測濬潛徹早亡濬中八年進士第女一人適右迪功郎沈正邦孫男二人杞棣孫女二人君之在母司理夢異人授梵僧像既寤而君生生性沖淡於物無所甚好自居父喪多讀浮屠氏書一日得色空之説於夢寐間有契於心作為詩頌辭旨超詣不類疇昔屏嗜欲薄聲利官舍蕭條惟一僕自隨人知其宿值有異也然於世故所當為者未嘗不盡遇宗族以恩與人交以信平居慈祥嘗恐一語傷人至臨事毅然守正不隨俗俯仰軍興以來衣冠流離有急叩門無愛吝意資遣幼妹為擇良壻踰於巳女聞者義之晚教子甚篤所與習業必時之名士親戚子弟有來學者亦諄諄焉誨之濬遂以弱冠登科君雖不遇實有以慰其心者為善之報豈偶然也哉君於余為姻家而余與君遊始自鄉拔時余壯而君尚少也或謂余莫子循循寡笑子言則有當其重厚如老成人吾不憂其失德而懼其不克年也今不幸而信悲夫銘曰君自弱齡實富於藝於彼西雍得雋屢試仕不茍全志行砥礪姦貪病民橫肆囓噬墮於憲綱百不一二我豈忘怒覆出可畏惟法之公何憚大吏慘彼犴獄人命所繫鞫訊弗躬枉直倒置我心泓澄如水在器辭見情得曽莫骫骳惟君之生在母有異見色明空悉感夢寐眇現世間福不盈地謂生若浮何有聲利君雖位卑其得超詣我作銘詩以詔來裔江仲宏墓志銘余從妹之夫江君寓字仲宏年六十有三紹興十八年七月某甲子卒於官舍以某年九月某甲子葬於湖州烏程縣登靜鄉鄭村某山之原再嵗其孤請銘所不得辭江氏世居衢之開化仲宏之裔髙祖諱銘任諫議大夫為時吏師曽祖樞祖闕又法皆以世祿得官母趙氏系出玉牒封宗城院君仲宏幼穎異有識趣數嵗而孤自念我母以已為命益致志於學未冠遊太學試選屢優見推輩行其文粹而雅實深於經纍舉於禮部乃不得志歸以所學教授弟子以飬其母且訓其子為孝為忠言皆可則初自太學聞東浙有寇難亟棄籍歸奉其母居儀真後遷居吳興嵗久益困以時恩試居前列授登仕郎調貴州推官廟堂故人以其母老難於逺適改除監通判支鹽倉處貪吏黷貨之地仲宏凜凜如氷霜囊無一錢之儲部使者列薦於朝尋以憂去服除升右從事調鎮江府之金壇縣尉位雖卑有憂民之心將受代得疾請致仕以卒恩遷右宣義郎自君之來吳興也余始獲拜宗城君於堂上初未知其為宗胄也吾妹在傍巨細必稟至米鹽靡密之事往復問語婦姑怡怡意色相授且順且慈察其服用飲食簡陋之狀雖窶人子有不堪者余心愕焉容貌加肅生於坐中既又察之仲宏之愛其親也篤而我妹奉以周旋故上下能相親且有禮也至其儉勤實出天性仲宏二子曰崌崍皆舉進士一女尚幼江之源出於岷山分以崌崍仲宏以命二子欲其不忘本始益疏而大之也余每見二甥清臞可憐言必道先訓誠有意於學者服母喪旦暮號泣血溢兩眥仲宏調官輦轂僅留千錢為二子韲鹽之費比其還也二子復歸之余以是歎仲宏之有子其必有君子之歸也嗚呼仲宏間遂敦龎積慶之源有如此江衍而流之逺而大哉我諗之銘以詔崌崍丁居中墓志銘君諱安議字居中湖州德清人丁氏之先散居濟陽清河陳譙等郡至漢名固者仕吳為司徒卒葬吳郡之武康子孫家焉武康至唐分為德清而丁其著姓云君之曽大父夢徽隱德不仕大父珙贈中奉大夫父雖以進士起家仕至中大夫歷守邠光二州以卒贈特進妣朱氏鄉先生祕書丞臨之女贈吳郡夫人君以特進任為從事郎監吉州酒稅歷淮西帥司屬官潭州南嶽廟用薦改右宣教郎知秀州海鹽縣丞通判韶州紹興二十一年正月壬辰終於家享年五十有五纍階右承議郎賜五品服以其年四月辛酉葬於烏程縣平山村裏搖塢之原君少警悟強記憶出入書傳喜論道古今既筮仕益習吏道心計絶人初為吉之管庫鈎校有方纍政所員不數月悉償之課更竒羡郡士以學舍庳陋請於郡欲更諸亢爽且屬君護作量功命日規制既定會淵聖皇帝踐祚詔罷土木之役君會挍官弟子語之曰聖天子愛民而息役懼有以傷之也而學之不建用為郡羞吾欲無勞民動衆而卒成之何如於長白郡以資富者十人為學職而屬役焉又記君市儈悉告之吾欲平直而貸爾手物之至於我手取償一不以委吏皆曰唯唯未幾材用豐辦學成壯偉為江右冠士大夫以是多之廬陵令闕委君攝治君質明坐堂上訟訴至千牘應聲剖決事皆得情未晡庭已空老吏畏服姦欺屏迹治以最稱其在海鹽也遇嵗大旱復民租十八而和糴尚存吾語令田嵗惡常賦且弗克不應復有和糶使上官怒吾身任之檄屢至君抗論反覆卒賴以免旁縣有積寃不伸往往請於上官丐從下君決之民信服類此邑有陶涇溉田數百頃嵗久湮塞旁大姓以隂陽家不利已則沮止不克濬治逮君蒞事莫敢有辭濬之如其舊自是並涇髙仰之田無旱嵗邑子作陶涇行以美其勤君歎曰興民之利而除其害以為巳當任者古之吏也矧陂澤廢興所繫甚重見於民謡鮮不由此若召父杜母與壞陂誰翟子威及覆乎陂當復至託言於黃鵠豈不以利害所繫為不輕耶吾位卑力微藉衆以成且為利不博何敢自功論者益嘉之君性鯁亮以氣節自許與人交一語道合握手出肺肝有不合雖巨人長者弗為屈異時廟堂故人數問君無恙不一往見之居家孝友周逺近親黨之不能婚姻喪葬者無所愛吝於教子尤力建家孰聚書萬卷館名士與子孫遊自罷官海鹽乃淡然無仕進意或勉之則有甚難之色愛平山川岩之勝築室曰蛻廬間與賔客嘯詠其上倘徉忘歸躬治竁域垂二十年是為君之域配莫氏封孺人男四人雄飛左從政郎泰州興化縣令時飛沖飛舉進士幼未名女六人適左承議郎主管台州崇道觀沈介左迪功郎新廬州學教授王彥舉登仕郎俞子陵餘在室孫男三人曰炳煜燁孫女一人君既葬雄飛伸書請銘於余辭言懇到既又出君壻尚書郎沈君之狀紀君行實有典則余三過讀之謝曰先大夫與余同里閈為姻家其相知宜詳然余老而心志耗昏目視貿貿遇時有小疏述命兒輩執筆牘占授首尾不相顧或遺落失次第尚何能發揚先德之懿雄飛請益堅所不得辭銘曰結駟飛車九軌之途未極所如有掣其驅截蛟斷犀太阿之利小見其割闕繄能者人不能者天君亦奚為有銜下泉流澤兹始其後必侈我言曷以君有才子吳公擇墓志銘紹興二年正月甲子吳君公擇以疾終於家明年四月月壬子葬於吳興之安吉曰銅山鄉俞塢之原君之子罕過余門纍然深墨拜且泣曰先子既克葬矣隧未有銘託子文為不朽且先子之未屬纊也馳書命罕卜歸葬之地曰必得艮山初不言有疾苦罕時攝官旁近私心駭異將請急以歸問所以然未行而訃至距遺書才十日云罕不敢即死者以窀穸之故屢卜而後得之則如先志焉獨潛德不白於後世是懼余於吳氏為彌甥從遊君父子間有年矣知君宜詳抑聞罕之葬其親蒙荆棘沭風雨躬窀穸廬舍之役其事良苦又閔閔焉懼其親之名不傳察其志為可哀余何敢以荒陋為解按吳氏之先事吳越錢氏家安吉之梅溪君大父徙烏程實始為烏程人君諱某公擇其字也曽大父琰以其子通議大夫知幾纍封尚書都官郎中大父惟幾父景元德行見推鄉里稱賢母夫人周氏居亡薄聲利樂燕間與賢士大夫遊治觴豆速客幾無虛日年踰七十以樂終君與昆弟奉承惟謹自始及終無纎介可恨宗族稱焉君性警敏少嗜書善屬文及冠走京師與吳俊並遊場屋雖不偶人以為能丁內外艱終喪如禮自是絶意科舉或勉之則曰祿不逮親矣尚何道教其子甚嚴朝暮課試不憚寒暑故罕自初及壯無他師藝業絶人有稱太學再以薦書餘子以屬罕曰吾惟汝之責其後次子冠亦肄業嘗與計偕士友歆艷以君為有子君素不喜植産當居士夫人無恙時謂不應有私財他日昆弟析異君不視劵不問多寡獨以所應得應易先世藏書且將以貽後人繼前業也既久生理稍艱家人輩以子孫為言君誦疏廣益過之語告之頗好客不倦以詩酒相娛樂晚嵗益篤人謂有居士之風享年六十有五平居未嘗有疾一日昧爽調護家人方進藥君曰少須之吾就寢焉語畢巳瞑目矣娶曹氏生四子宗以倍屬出疆授從事郎調臨川金溪縣尉次宜冠憲後君二十日卒女五人適奉議郎無為軍司録事關春進士袁安中莫才彥餘二人在室適關莫者前亡孫男三人曰述曰大同曰逮孫女五人皆幼君姿貌魁偉慷慨有氣節言識少所降屈往往忤物久自知之宣和間官吏訪求花石君所居有名木黃封其上且責守護君曰主上神聖寧復有此蓋幸臣所為遂伐去之銘曰靈之歸銅山隅曰艮岑鬱不孤視培塿皆僕奴前左澤下統廬靈所欣復當腴福而門大厥初誰云者古青烏叔父朝請墓志銘劉氏出自祁姓陶唐氏之子孫曰劉纍者以擾龍事夏孔甲為御龍氏自商歷周為豕韋唐為杜在晉為士在秦為劉後徙魏徙豐曰豐公者名仁漢髙帝祖也漢子孫多受封曰彭城曰中山曰京兆曰母陽與髙平東海長沙平原廣陵南康范陽宣城等郡皆所封之地子孫家焉惟彭城由髙祖六世孫宣帝之子曰楚孝王囂者實始受封後漢司空愷囂之四世孫也晉司𨽻校尉訥愷之六世孫也其裔孫德威為唐刑部尚書生審禮封彭城公子孫以文學政事名於時如知章知幾輩不可槩舉公之先實自彭城五代時避亂從吳興迹晦不傳其名稱有聞與墳墓存焉者諱權諱潤諱泰諱昈諱逢至公為六世云公諱拱字持道實為郡之歸安人祖以伯父雜端諱述纍贈至尚書刑部侍郎祖妣吳氏濮陽郡太君父任太子中允以兄朝議諱損及公前後纍贈至光祿大夫母吳氏新安郡夫人前母吳氏信安郡夫人公生五嵗而孤雜端公為擇師教焉嗜學自立不類兒童弱冠薦名鄉書鄉先生祕丞朱公臨見而異之諌大夫陳公瓘幼為郡從事教授諸生時郡學肄業數百人一小較藝以公為第一且相器重俾領袖學者凡與計偕者三試於禮部者六卒不得一第崇寧五年春以特奏名授汀州文學時年五十八大觀二年冬調漢陽軍漢陽縣尉任滿以捕寇賞改承務郎轉承事郎授密州髙密縣丞未幾就除通判饒州終更造朝除監明州船場未赴改授通判嚴州閲嵗乞間除主管亳州明道宫江州太平觀紹興五年公第三子寧止任權尚書戶部侍郎公自以再世服官率不過刺史郡守今子為侍從分當知足遂告老於朝自承仕郎以年老致仕及遇淵聖皇帝今皇帝即位霈澤序遷明堂禮成寧止初除徽猷閣直學士恩封幾八轉至右朝請郎賜五品服在漢陽時太守遊公酢雅聞公名禮遇甚厚且薦之於朝不果召髙密令黷貨紊法公數與爭民賴以不擾其後令以貪敗辭連僚佐公獨無所與鄙陽嵗潦榖貴流亡相望公攝郡事營屋廬發廩粟居飬之全活以萬計朝廷得民謡下使者問狀公數以職事忤使者匿勿以聞公未嘗有愠色時興崇老氏教其徒頗肆郡僧有得廢觀為寺者繕葺殆數十年至是奪之既又欲并得後所薤産使者以朝命屬公有顧望意公曰我不敢私卒沮止之後人更定無能易公議者其守道不回類此紹興九年二月某甲子終於嘉禾郡舍夀八十有五以其年九月丙午葬於烏程縣澄靜鄉郎村某山之原配真氏贈安人男四人恭止早亡勤止右從政郎江淮荆浙閩廣路經制發運司主管文宗寧止徽猷閣直學士左奉議郎提舉江州太平觀爰止右迪功郎監潭州南嶽廟女一人適右迪功郎監通州支鹽倉江寓孫男九人岩嵫嶷嶢嵎峻峋岹􅀈孫女八人長適右迪功郎臨安府臨安縣主簿范夀卿次適進士陳如雪餘尚幼公惟質直不為表暴樂道人之善若巳出於書無所不讀自始學至老且病未嘗一日廢卷所論著多尤工於詩後進經公指教者無慮數十輩皆能有聲政和間公三子賔於太學悉以文稱寧止射䇿廷中極論時政闕失無所諱避天子嘉之擢居甲科名聞天下由天祿閣尚書郎為監司郡守入居法從率迎公之官安輿往來左右就飬頥指無闕逺近歆艷以為教忠之報宜有此也晚嵗康寧視聽言動如中年時一日語家人曰吾大數垂盡自此不過兩旬浹耳守止方守嘉禾怪其語無從亟上疏乞奉祠以歸比得請則公疾革矣真氏楚之山陽人贈金紫光祿大夫鍇之曽孫贈通議大夫晃之孫故進士元矩之女以賢行聞於鄉閭奉祭祀教子孫率有規則相其夫以義先公十四年卒蓋靖康改元三月某甲子也享年六十有九公葬乃從安人之兆至是合祔云公於某為叔父某從叔父學粵自少時負笈遊京師與居里間自念其孤侍叔父之日為最多嵗時舉酒夀叔父喜溢於色巳而感焉則仰視悵悵惟恐泣之緣睫而墮也今叔父復棄諸孤某老矣茍生奚為哉勤止等見屬以銘所不敢辭銘曰嗚呼公乎學無愧於古之人自視曰不足任弗克償其志自分為有餘至於享報之豐雖當世所謂富貴利達者曽莫及其髣佛則夫身之遇與有子之禍孰少孰多吾不知為何如也宋故右朝奉郎致仕施府君墓志銘府君諱某字某姓施氏湖州武康人曽大父某大父某父某皆有潛德家素儒初未有大其門者府君教子益力子巨體府君志克勵於學藝業有聞丁年擢第蚤通朝籍為尚書郎三院御史未幾以御史出守括蒼奉府君之官優遊郡齋就養無闕士夫榮之閲嵗得微疾常膳少損遽謝醫且笑曰吾聞髙醫能已疾不聞能治老也既曰語家人吾欲靜念空王境以歸宿吾心毋怛我化遂瞑不復言實紹興十七年四月一日也時府君纍封至右朝奉郎年七十有六矣御史護喪歸鄉閭以明年某月某日葬於縣之東北大原鄉京子之原將葬見屬為之銘府君天性純孝篤於奉親自始及終茍可以順適其意者雖躬服勞不少懈遇鄉黨和而辨久而不偷雖復犯已不校如初沖淡寡欲一室蕭然不設屬鑰未嘗有姬妾之奉獨喜翻貝葉書偶方士語不則與賔客銜杯潄醪至一斗不亂襟抱怡怡人莫見其有憂愠之容振人之急囊無留資而鄉里言長者必歸焉配周氏先府君若干年卒至是合祔男三人長曰鑄實任家事不以毫髮纍府君巨其次也季曰藴恭為浮屠氏女二人適丁光祖陳繼孫男五曰良友良弼良臣良能良輔孫女三適吳經沈純臣張康皆名進士張為左迪功郎德清縣主簿曽孫男女二十五人曰沈康臣者曽孫壻也余與御史俱為鄉校諸生晚而同朝御史明粹簡默人也居家有曽閔之孝為吏有龔黃之政他日自見於世又有大焉者信乎府君之積慶在兹也銘曰靈曰歸與京子之原州演迤而紆餘若顧吾而欲留山周衛而叢集若旗旄之導乎前騎卒之擁於後與鄉坐而拜者兹青烏氏之卜與曰君所自擇也惟永寧以福於而子孫苕溪集卷四十九
