body:
  text: 苕溪集卷三十八宋劉一止撰外制鄭剛中祕書少監敕具官某中祕圖書之藏其屬皆一時人物之英朕所樂育以待用者也平居商確古今考稽得失論議切磨參錯後先非文行兼優過人數等朕不使為之長也爾志節端亮見於踐更強識博聞足以華國兹用命爾領袖衆俊優遊書史之間其自今闕焉可王次翁起居舍人敕具官某柱史之任其選甚髙進直殿坳職書言動綴兩禁近臣之列為一時儒者之榮匪曰能賢將焉稱此爾學通以博氣粹而剛蓄養亭涵不求近用天官之屬册府之二踐更未幾譽望已孚載錫命書俾司記注往其祗服益勵爾修可方庭實宗正少卿敕具官某自昔帝王施德于宗族厚矣抑有政焉在堯稱敦敘之仁于周有辨親迹之義政在司宗理當遴選以爾文行之懿咸有古風氣識之髙不求近用輟從六察擢二列卿爾其廣朕親睦之恩而謹其序録之事則為稱職尚勉之哉可右宣義郎丘奐等充二京淮北宣諭司屬官各先轉一資敕具官某朕惟二京生靈久隔謳吟之俗思見漢官爰授使指宣道至懷爾等從行皆以才選稍進官秩以示寵光尚其勉之可鄭諶差從郭仲荀前去東京特與橫行上轉行一官敕朕惟王略治及舊都委任近臣往司管籥惟時僚屬悉聼選掄具官某有位於軍見推忠孝肅持軍律式位其行序進橫階是為異數服我休命益勵爾修可李誼中書舍人兼直學士院兼侍講敕唐虞之制莫尚於坦明商周之書獨稱於灝噩蓋斯文之興替關治道之汙隆惟兹播告之修不匿厥指則若卜筮之事罔不是孚代言之難於斯為重具官某學探聖域文有古風頃以時髦薦更親擢肅憲綱於臺察盡規益於棘垣拳拳致主之忠表表濟時之略載稽公議益簡朕心用錫贊書就升辭掖兼禁林之典册侍經幃之深嚴非爾之能其誰有此尚思稱塞以對寵休可楊應誠落致仕差充提舉京城四壁檢察諸門兼節制軍馬司參議官敕大夫年髙則告老於朝不以官職之事纍焉古之制也至于精爽未衰忠義內激與國休戚獨能恝然如秦越人之相視哉具官某智識不羣親賢好義亷靖之操有如氷霜服在近班見稱忠謹挂冠神武亦復淹時屬中都之既寧委近臣而居守眷爾養恬之久起於得謝之餘俾贊軍謀往固封守魏公雖老尚堪一行馬援據鞍故可矍鑠體朕至意益恢逺圖可張浚復資政殿大學士充福建路安撫大使兼知福州敕朕當饋思賢劇安危之注意殿邦作牧賴文武之兼資乃眷邇臣實惟舊德肆頒名命庸示寵私具官某篤實思和剛明卓偉忠可貫于金石信自通于神明許國以來視身何有相朕艱難之際偹殫夙夜之勤功在王家事藏盟府慨念投間之久屬當謀帥之初惟長樂之奧區蓋七閩之重鎮耕桑阜盛民俗安恬欲並協於師虞宜莫如於宿望通籍祕殿增光元戎風物不殊曽是經行之舊旌麾所指共知條教之新勉為朕行徒得君重可勾龍如淵罷御史中丞提舉宫觀敕朕于廢置豫奪之命若天地之化春生秋殺未嘗有心至於子大夫自有罪朕亦不得而私焉具官某頃以時才儀於要路粵自詞掖執憲中司庶幾肅將紀綱以警有位而狂言之發乃在爾僚事既稽於上聞忿實由於交惡頗失近臣之體難逃不敏之愆免所居官奉祠真館其思循省毋重悔尤可故嗣濮王仲湜壻承節郎孟思恭可閣門祗候免供職敕具官某上閣之職號稱華要選擇惟遴不以假人爾以王邸之親獲膺是寵其思自飭以稱所蒙可右迪功郎張楹前任錢塘尉賣鹽增倍循一資宋林同此詞敕具官某爾奉職恪勤應於賞格進階之寵用勉後圖可左朝議大夫充祕閣修撰徐公裕因赦敘元降一官敕具官某爾坐纍貶秩名在丹書念頗閲於嵗時亦既更於蕩宥俾從甄敘兹乃彛章服寵惟新尚圖稱塞可侯公達暴露賞轉一官敕具官某曩者大將出師蕩平寇孽匽薄夙露爾亦良勤序進一官是為殊寵可周聿充陜西路宣諭使乞差蓋閎張致平充準備差使先次轉一官敕具官某我有使指往臨西秦惟時從行悉聼自擇進官之榮用勸爾勞留守辟則云留都之重我得信臣監進奏院羅萬楊適各降一官敕具官某爾等奉職不審事乖後先貶秩之愆蓋其自速尚知循省以勵后圖可承節郎陳仕澄詭詐圖利依斷降一官敕具官某爾率情忘行事由規利比從吏議罪涉己私故褫一官以戒不韙可右宣義郎張淡前知吉州萬安縣輟差弓手監欠稅人致阿陳等鎖索遺火燒死事依法寺斷降一官衝替敕具官某爾為縣大夫視民如寇至遣鄉兵程督賦人事生意外職汝之由免所居官貶秩一等是為寬典其務省循可李綱知潭州兼安撫大使改除宫祠敕入總百揆作股肱耳目之臣出殿大邦號禮樂詩書之帥任是安危之責孰踰耆舊之賢具官某識洞幾微氣全英特修身自昔非孔孟之言不師許國以來惟伊吕之心是志屢展經綸之學實兼文武之資慷慨百為夷險一意方且辭功名而不有占藪澤之自娛未忘憂國之風忍袖濟時之手眷長沙之巨屏居南紀之上遊地控荆湘勢臨吳楚惟威聲之先暨姦慝自消矧條教之舊孚歌謡猶在淮揚之徒得君重其勿留行方叔之克壯其猷豈能無望祗服朕訓有光前聞可郭仲荀男武翼郎閣門宣贊舍人及之換授右通直郎敕具官某爾以文任得官升華上閣亦既榮矣時方右武爾獨慕文勉徇厥私是為異數可忠訓郎王穀乞改正轉官别給告命敕具官某爾昔者以勞進官有司過差致乖秩序兹從更定申以書命可秉義郎陸甫特除閣門祗候敕具官某上閣之職日侍禁嚴右選之華無以易此爾才能小異膺受寵榮宜勵厥修以圖稱塞可苕溪集卷三十八
