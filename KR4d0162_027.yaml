body:
  text: 苕溪集卷二十七宋劉一止撰請疏題跋一請承天文長老疏道人分上隨處縱橫佛氏門中臨時顯設而况開千年之祖席新一日之叢林頃是作家承當此事長老文公天僮嫡嗣黃龍諸孫久為道俗之宗師端是人天之眼目機鋒電掣棒喝風生惟承天道場蓋會稽名剎百衲之規繩久廢溈山之警策無聞近自琳宫復歸蘭若尺天寸地共知道化同流萬壑千巖請向要津坐斷當仁勿避正令須行請天章長老再入疏在在處處皆是道場剎剎塵塵無非佛土而况風篁絶景巖壑故棲修竹茂林有東晉羣賢之勝迹琅函鈿軸藏西清列聖之寶章惟此住持不同眇小長老某人機鋒獨出福慧雙行雲門宗支密傳心印蘭亭世襲自立家風此時無異彼時已住不妨再住直須化出善財彈指之閣再安維摩方丈之居是為末後神通為作當來利益僉言所屬仁者何辭請天寧覺長老疏越絶城中宫如化出窣堵坡下峯是飛來鐘鼓四聞煙雲環拱堪作人天眼目方可住持正當時節因緣不容放過長老覺公宗門先覺古佛後身誓不二于默然擲大千於方外全潮不露孤月現前雖云自已家風要是為人邊事臨時顯設在處神通無舉足下足之殊何彼方此方之擇再試金剛寶劒拈出古廟香爐尺地寸天同歸指掌千巖萬壑此是要津已屬當仁不妨坐斷請天台教院開闍黎疏一心三觀蓋從空假中求萬論千經不離言説邊事兼融此義須假通人闍黎開公威德嚴身清真拔俗遊戲三昧心筆力為神通和會兩家作儒書以術事惟天台淨剎據越絶要津自利利他正要㕓中之隱無説説法始名教外之傳僉曰當仁毋勞罔避請圓通教院如闍黎疏領略真機覺悟止緣一宿縱橫妙旨談説至於九旬有覺非真多談亦妙欲了此間勝義直須本分導師闍梨如公學道邃深辨才通敏支遁之善標宗會雅蒙謝傅之知道安之略遍羣書宜得習公之譽矧圓通之古剎號靈感之道場人于大士有緣食是諸天打供茍非宿望難服衆心舉步而識象王兹焉取法探穴而得虎子誰敢爭行教僧舊呼師為如虎子要恢東越之宗風無愧靈山之聼象請天長知觀蕭法師疏鑑湖一曲琳館百楹草木蔥蘢煙霞清潤賦詩載酒跋翰林外監之蹤騎氣御風有安期羡門之侣惟是勝士乃堪此居知觀法師挺拔俗之孤標秉棲巖之素志丹經石髓曽遇異人金母木公為傳真語主張道紀領袖羽流庶幾惠然肯來為成此假竒事請龍瑞知宫棲法師疏會稽鎮山陽明洞府齋宫宏啓羽帔四臻必等名流為扶道紀知宫法師神棲物表心拜帝關讀三洞之祕言受七真之妙訣飛符噀酒未忘救物之誠採术茹芝便作住山之計僉言所屬仁者何辭龍瑞宫開堂疏太上妙道體合自然三洞靈文言無韻麗欲開此祕必得其人知宫法師慕箕潁之高風有孫許之逸韻巖棲穴處不妨風馭之從遊心拜默朝自覺帝關之咫尺來從東秀坐鎮陽明傾耳蘂書浣心益衆祝君王之萬壽贊寶祚之中興題褚氏印施金光明經後會稽褚邦直印施大乘金光明經薦嚴二親用報罔極屬余題其後每得書問無恙外未嘗不以為言余謂孝子之于親無所不用其至以為親之德不可報者終於不報而已若曰必報在一念頃蓋以周遍十方於光明會王菩薩諸佛如一一親至其前承事供飬無空過者而况此經一句一偈一字一義了然在目其為莊嚴亦豈有量乎哉余之言無能加損也紹興五年十二月戊申吳興劉某題跋李尚書贈政上人三詩政上人擕尚書隴西公送行三詩見示將刻之石俾余跋其後隴西公胸中如水鑑所見外物不能以情遁師既經題品矣黃龍三關不足道也紹興五年三月日吳興劉某題題章致平丐父內徙表後故禮部章公刺血上疏丐父內徙懇到深切辭氣交盡既上半嵗而得請家人子弟鮮有知其事者後四十年而公之真迹乃存於一故時相之家公之次子今上饒使君實得之嗚呼豈偶然也哉豈偶然也哉使君不圖見請且使跋卷軸後某伏讀數過且喜且悲之悲公誠孝之實久埋而未耀喜公之有子能致之於流落艱難之中俾公行義略見於此書而世襲之美抑他日又有大焉者也紹興十四年六月某日吳興劉某記跋司業許公墨帖後司業許公在太學時某為諸生實相先後因獲從師德遊公行義文學一時宗師非但鄉里後進如某者知敬慕而已逮今逾五十年前輩軌迹既不可追師德又下世而得此卷軸於師德之令子展讀感歎謹識跋孫求仁運屬夢記石刻後求仁三嵗而孤又二嵗喪所恃寄飬外家世間可悲愍事無越於此當是時人其謂我能自奮身大其家風種學績文為多縉紳光賁泉壤如今日之懿乎成否有命雖求仁亦不敢自必抑其先德有以見符見於夢寐殆誠孝所感發云紹興二十九年六月辛丑吳興劉某書跋南宫唱和詩後太僕公最先得詩名後來宗英皆莫及計與東坡先生同官時距今七十年中間某居太學不敢以姓名纍典謁晚乃得此卷軸於公之曽孫師醇某年已八十矣追前輩事三歎而歸之紹興丁丑八月上浣吳興劉某題跋莫用之書藏經同郡莫用之未老而請老好間而得間豫甚喜之久不得靣一日持所書釋氏藏典曰寶積華嚴涅槃經及大智度論等纍四百五十餘卷通為四十八函見示以薦其親又於報本禪院創修輪藏以貯此經纍嵗而後辦嗚呼亦良苦矣豫真為之喜三歎而歸之曰用之於今志願已畢真得間矣真得老矣紹興二十九年七月丙戌劉行簡書題費校書被召書命軸後毗陵費懿恭校書之子錯為歸安丞一日過余出其先君同陳去非大參張彥實舍人召對書命於今三十年三君子皆一時名士士之畏服者也其後陳張二公位通顯懿恭僅居三館已而歸隱錫山再召不起蓋其志也世人以進退議得失余以謂士各有志亦有命焉茍遂其志均為得也何失之有獨喜懿恭有子能世其家若相乘除云紹興三十年正月闕吳興劉行簡書苕溪集卷二十七
