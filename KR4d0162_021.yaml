body:
  text: 苕溪集巻二十一宋劉一止撰啟答張狀元啟伏審造廷射䇿唱第居先榮動縉紳聲流華夏恭惟歡慶某官受才英特種學邃深㣲言造於六經卓行師乎百代當英主枕戈嘗膽之日正賢士竭精勵志之秋豈特求一日之長庶幾聞三道之要竊窺大對益致精忠意深切而有加言舒徐而不迫皆前日未聞之論興聖心見晚之嗟名盖出於顧期士同知其不獻念莫遑於修慶情過辱於騰牋内揆庸虛仰慙謙厚識弔古精思之作不敢謂能得為國逺慮之人兹為可賀眷言欣頌㒺既敷陳答特奏名狀元啟伏審祇奉臚傳趨登舉首得人之喜有識所同恭惟某官賦傑異之材藴深醇之學文辭少作已擢秀於士林聞譽老成乆推先於州里當英主枕戈嘗膽之日正賢士畢精極慮之秋側聞至言頗契大問向來伏櫪寧忘千里之思此日驚人未覺一鳴之晚既受知於親擢行濶歩於安途念修慶之莫遑辱騰牋之誤及眷言末契實倍歡悰上時相問候啟屈伸在道忍懐韓子之九遷志願有年莫遂荆州之一識足踆踆而欲進神忽忽而若馳念介紹之不先懼聴聞之或駭敢以堙㣲之迹仰通咫尺之書揣分自疑嚮風増慕伏惟信順之至天人所私導迎六氣之和膺受百祥之集恭以某官博大純懿疏通敏明才足以絶千人之英力足以任一世之重忠貫金石信通神明許國以來視身何有幹斗樞而獨運扶天歩於方艱徳在人心事書野史方且執謙自牧避寵弗居魏綘懐多功之嫌豈惟辭賞晏子守足欲之戒亦以矯時出分數路之優灼見累年之効吾圉既固我公盍歸迨兹入覲之初始副具瞻之舊九鼎大吕益増氣象之安烈日嚴霜自覺威明之逺惟帝所屬捨公疇依某末學空疎餘生么麽粤從廢黜自卜隠淪叨宸扆之矜憐賴朝廷之收拭俾使一道待次期年尚期受約束於相門故欲列姓名於記室悃愊所寓筆舌難周殘暑未衰清秋在候冀仰符於倚注宜加衛於寝興賀樞宻使啟伏審拜恩中禁正位元樞夷夏聳聞兵民溢喜竊惟地文天武所以妙生成之功右義左仁所以嚴威徳之用禮隆建使位等上公在周有師尚父之尊於漢實大司馬之任兹乃安危之寄是為心膂之臣恭惟某官學通天人識洞今古體方重而任大事抱純誠而經逺圖齊死生去就於胷中置富貴功名於物外頃廷登於揆路已屢罄於嘉猷汲直居中理應見嫉蕭公乆外帝曰遄歸總臨宥宻之司盖復祖宗之舊念天下之勢本若置器顧今日之事僅如奕棋在兹一着之間遽有千鈞之重得人無競舍公其誰某猥以孤生嘗叨謬眷聞絲綸之亟下覺舊觀之頓還欣抃之私名言罔既賀翰林承㫖啟伏審祗膺使命召拜禁林制書頒傳士類鼓舞竊以自古願治之主將觀逺圖必有視草之臣親承宻命豈特右文之事實參戡難之謀而况寓直北門對揚浴殿自開元之際浸隆學士之名逮章武之初加寵内庭之老禮秩増峻事任匪輕顧非其人不在此選恭惟某官養剛大之氣足以有為好深湛之思欲其自得風規邁往驚論議之非凡忠孝昔聞知典型之尚在召從孤外祥侍燕閒紬石室之書既𠂻信史進玉堂之直仍襲世官謬云天子之私人端是吾家之舊物然而國是所屬物論既孚兹為大用之階即副具瞻之望某年路無幾仕乃為貧自知後世之濶疎獨恨登門之較晚及兹賛喜深切知歸欣頌之私名言㒺既賀樞宻再入啟伏審寵拜殊恩還登近弼惟圖任舊人共政盖聖主所欲仰成克左右厥辟宅師抑明公以之自任絲綸甫下逺邇均懽恭惟某官篤厚深閎疎通博敏鈎貫百家之選沉涵六籍之醇自結上知偏儀要路筆墨畦逕爾雅无愧於西京師友淵源潤色似從於東里有言必盡遇事不辭亟參帷幄之籌協賛樞機之任出分憂顧曽未幾時汲黯去朝初言譽毁晉公當國實係重輕奉溫詔以遄歸罄嘉猷而入告條先帝之故事大王室之中興輿論所期斯言可必某棲遲末路零落寸心聞成命之載頒慶真賢之復用掃門雖逺賀厦知歸答交代謝少卿啟任浙東提刑司宦㳺相踵愧揚粃之在前王事有期顧及𤓰而當代静言事契燕及子孫夫何遲暮之年乃有因依之幸恭惟某官被文相徳可用為儀强識博文足以華國自結聖神之眷薦躋清近之班智略輳於上前風采聞於天下持槖簮筆謂當入侍於清光攬轡登車姑欲少償於素志豈容煖席即慶賜環某猥以庸才誤當使指閲時既乆責効無聞敢縁授受之私終被含容之賜懇旌麾之已戒罄履舄以非遙雖乏告新庶幾道故其為欣抃曷既叙陳賀湖州太守啟伏審拜恩中禁進職西清輟甘泉侍從之聫為近甸股肱之鎮先聲所暨輿論交歸恭惟某官國器宏深天才卓偉言動合君子之法出處有古人之風用實自於召還眷悉從於親擢備獻納論思之益罄朝夕夙夜之勤惟時吳興實望浙右山川清逺人物阜繁委長孺於淮陽徒得君重試蕭公於馮翃用考治功少須報政之期旋聴賜環之命寵榮未艾簡注方隆某跧伏窮簷伶俜暮景雖向風之有自曽望履以無階陪外庭末議之時顧相先後誦佳句百僚之上竊仰髙深聞綸綍之載頒想旌麾之既戒尚綴吏民之列往修桑梓之恭欣抃之私敷言罔既代答明州太守啟伏審政成請代詔下趣還行躋躐於近班益恢宏於達業恭惟某官智術輻輳論辯風生胷中負韜畧之竒事至有淵泉之慮出膺郡寄實簡上心駕折轅以告行執半符而入覲九里之潤幸見及於鄰封一年之留恨莫從於民借方圖修簡遽辱貽書感愧交深名言㒺既代賀秀州通判啟伏審祗膺明命出貳使藩理檝戒途蠲辰視印伏惟某官器全英特識洞幾㣲論議得於心成事業由於世濟休有聞譽見於踐更謂宜揖遜於熈朝尚爾馳驅於别駕昔者大鄭小鄭公以父子繼治大馮小馮君以兄弟相循並載民謠號為盛事今見二難之歩武未踰三載之星霜豈惟人望之知歸抑想風流之是似某江湖寒族天地畸人侵尋五十之年老之將至淟涊百寮之底拙亦宜然竊有所依敢後其喜代賀市舶提舉啟伏審寵拜眷恩再持使節明綸甫下輿論交歸恭惟某官才了十人身兼數器詩辭近古獨云蘇武吾師字法超今要使羲之北靣既更器使益試乃言幹南國之竒贏佐中都之調度雖云舊物實簡上心佇寵渥之使藩踐禁途之清切自惟孤拙尚竊藩符念芳借於餘光顧難勝於賀悃其為欣頌㒺既敷陳賀冬啟陽生而復物屈當伸屏隂類以潛通宜善人之有慶恭惟某官氣涵川嶽道濟幽明坐迎有永之年隂受鼎來之福方將奉十行之温詔詠四壮之還歸舉酒夀公莫與掃門之列援毫伸頌益増卿徳之勤賀正啟伏以嵗序更端星躔易次肇三陽而為泰正五始以書春矧社稷之元勲宜神人之交相恭惟某官忠貫白日道格皇天備文武之全才兼安危之大略功藏盟府澤在人心周公之征徂東巳見于歸之復吉甫之來自鎬式觀受祉之多俯履嘉辰茂膺純嘏某屬拘職守阻奉夀觴莫伸賀厦之誠徒切揺旌之念苕溪集巻二十一
