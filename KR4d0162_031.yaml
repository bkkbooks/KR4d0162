body:
  text: 苕溪集卷三十一宋劉一止撰外制田永年乞將父實為建州軍賊殺死恩澤補女夫許登承信郎敕具官某朕於死事之臣未嘗不惻焉動心恩其族類惟恐或失所以勸義士而羞叛人也爾其異姓之親與霑命秩宜知自節以稱所蒙可桂陽監司理李士權平陽縣令趙景韓推恩各合循一資敕具官某日者湖湘之寇負固阻險侵軼郡縣至煩王師僅乃克滅軍須辦給爾與有勞第賞進階國之常典可吳希祥降一官仍罷邵武軍通判敕具官某朕念大江之西俗習輕悍選擇能吏固將安之爾為州治中始聞潢池弄兵之警詭求避去便文自營朕何賴焉論者以聞罪其可逭貶秩一等免所居官自為寬典念恩循省可前辰州沅溪令王汲禦盜有功循一次敕具官某曩者鼎澧之間盜賊竊發迄於平定爾與有勞賞以懋功國之典也可宗亞昌云曩者荆江郡縣陳朴云狂寇弄兵侵軼旁近下詞同進武校尉張安道王正臣差齎文字過界各與轉一官敕具官某爾等傳命越疆咸以能選進官一等以為爾寵往其勉之可樞密副使左通議大夫王庶除資政殿學士知潭州朕緝熙庶政允資左右之良體貌大臣務極始終之遇雖進退之間或異而內外之勢惟均具官王某氣稟直方學兼文武夙負敢為之略獨髙應變之方草木知其威名夷狄問其年狀朕念兵民之大計求縉紳之實能召自逺方俾還近列旋授樞機之柄方須帷幄之籌何引疾之甚堅屢抗章而莫止眷湖湘襟帶之地連東南形勢之區疲氓未蘇鄰盜僅息是用開元戎之巨屏錫祕殿之隆名勉為朕行徒得君重勿謂長沙之地狹不足回旋當思隴右之風流尚在慷慨服我明命佇觀壯猷可中書舍人勾龍如淵除御史中丞御史列職皆朕耳目之官而中執法實為之長其任重矣茍非其人朕不虛授具官某藴經濟之術負絶特之才授自時髦薦更器使學通以博若賈誼之明治安論政而堅若陸贄之本仁義每獻可而替否不吐剛而茹柔逮其立言足以華國考稽公議益簡朕心是用命爾總持憲綱以肅在位俾中外士夫知朝廷之尊有簡書之畏則於汝嘉是曰稱職可遊損除太府寺丞敕具官某太府之職出納邦財丞於其間事任惟劇爾詳練通敏有稱於時往究乃心用觀來效可知洪州李光除吏部尚書朕憂勤在御當饋興嗟思得耆艾骨鯁謀國不二之臣獻納論思以裨豫治以表庶工俾四方萬里之逺聳聞而跂慕知朝廷之尊不待告令而民自化焉顧不偉哉具官某師古聖賢執義堅固志節之厲凛如秋霜被遇纍朝始終惟一出入中外險夷屢更朕熟察其所言又詳試之以事蓋有日矣是用召從藩屏還長天官激濁揚清惟爾之舊謀猷告后益罄厥忠使朕知人之明不愧於古爾則與有無窮之聞可郭師偉宋元換給付身敕具官某爾等往者奮於行陳嘗有顯勞賞不踰時既霑渙渥申以書命其益知榮可宋亮臣幹事回轉官兩資髙震轉官一資敕具官某服勤奔走嘗有顯勞序進一官以為爾寵且用以勸來者可王利用除祕書郎敕具官某圖書之府儲養英俊猶藝林於圃時而用之爾文學志行秀於士林所謂豫章楩柟者也承郎之職其選甚髙益勵爾修以俟採擇可吳世才世榮以父歿於王事各合得恩澤一資敕爾父董所兵部與賊決戰至於殞身朕心憫焉疏恩其孤以慰九泉以為爾寵可李珏贈官敕具官某昨者虜犯河朔逺近俶擾士大夫去職避難志求茍免者終不得免焉爾以州從事之卑奮厲捍敵與城俱亡可謂知所處矣自古有死爾亦何恨畀官二等升録其孤精爽如存尚克知享可髙承儀軍中起復張全同安岊同自昔名賢雖宰一邑而要絰從戎當世不議其非蓋知所急也况爾有位於軍服勤既久乃欲以家難去職其可乎哉孝有移忠禮有奪情爾無恨焉可曹璉除湖北路提刑宗樗除潼川府路提刑敕具官某朕惟荆湖巴蜀之北逺于朝廷刑之頗數獄之頗紛吏治之無良民情之多疚至有不得而聞者况得察治之乎則部使者之責固亦重矣爾等性資通明藝能果逹或選自郎省或擢從外官分畀一道之權以觀底績書曰欽哉欽哉惟刑之恤哉詩曰剛亦不吐柔亦不茹無從詭隨以謹罔極刺舉之能於是乎在其勉服古訓以副朕心可安邡除荆湖北路運判李倫清除淮南東路敕具官某朕念荆湖之北長淮之東民食尚艱兵儲未廣惟時漕計之臣非有機智絶人倣佛劉晏之流者豈足以當是任哉爾邡通於吏道譽處甚休爾倫清才髙識明動有可紀是用命爾分行一道其庶幾悉乃心力體朕至懷俾民不病斂士無飢色則惟爾能嗣有褒寵可苕溪集卷三十一
