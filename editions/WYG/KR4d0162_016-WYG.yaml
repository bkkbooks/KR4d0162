body:
  text: 苕溪集巻十六宋劉一止撰書見經制使書迪功郎監秀州在城都酒務劉某謹再拜上書經制龍學閣下某嘗謂天之生才地之生材一也不中道夭于斧斤未有不堪於用者非必鄧林數尋之栝栢千尺之豫章然後為材凡可以為杗為棟為欂櫨侏儒者皆材也夫才亦然不中道夭于聾盲跛蹇則亦思有無用於世者哉然其命則寄於匠氏所謂匠氏者以規矩為方圓以繩墨為曲直定規矩繩墨於器量大小長短而用之無廢材者天下之良工巧匠也以道義為規矩以行藝為繩墨量大小長短而用之無廢材者天下之宗工大匠也然則材與才者皆不可無所歸矣雖不可無所歸亦不可不審其所歸何者力之所任質之所處有衡縱燥濕之殊宜縱而衡任之宜燥而濕處之則所任所處皆不得乆焉物固有不幸失其所者此其所以為寄命於匠氏則非特匠氏擇材也材固有擇匠氏之理矣雖然何世而無才何地而不生材其輪囷􅄐竒棄委於道傍稿死於巖􅊤而不見録用者盖十五也幸見用則聴其所為而已又惡能有擇於其間哉是不然天下无真匠師則已使誠有之亦無惡於物之擇已也至於有擇焉而不見録則抑有命焉竊惟閣下受真主之知當數路之寄器使職官黜陟能否居宰相之功半於兹再嵗矣進則成規退則成矩若與人而為謀左以畫方右以畫圓盖以心而為匠凡其人之才所謂大小長短孰處孰任未有能以形逃者閣下之規矩繩墨誠先定於心也今有人焉讀聖賢之書求為古人之事氣盖甚篤淟涊學校周旋二紀而始得寸禄行年四十有五矣其所事則糟漿麴蘖甕盎薪米之間銖争而籥計自旦暮與屠沽小人為敵讎雖食其食不敢忘其事然非其性之所能則謂失其所矣昔者强令者憊昔者腴今者瘠豈端使然哉嗚呼其亦可憐也已某竊自思念生長於世幸未至聾盲跛蹇而其心事曲折粗能禆大賢君子之忽忽忘者今遇匠師而不能自竄於規矩繩墨之間尚安往而可某雖小物盖知審所擇矣獨未知閣下能無惡於物之擇已且哀其情而受之否耶若其大小長短與所處所任則某不能知也知歸焉而已矣至於求歸焉而不得則是真有命焉某也敢不知命干冐台嚴不勝悚懼之至不宣上執政書從政郎新差充越州州學教授劉某再拜上書尚書右丞閣下某嘗謂遇合之難古今所同非直其得之難也得其心之所趨鄉而歸焉者為尤難何者宰相大臣以進賢退不肖為職事之求歸焉者也然有其實者辭其名崇其名者或忘其實故士有幸不幸其幸焉者得其歸又得其心之所趨鄉而不流於非義其不幸則反是昔公孫丞相號為好士起客館開東閣以收賢俊而曽不知所収者何士當是時如主父偃軰宜在翹材之列矣顧棄不取又譛殺之遷董仲舒膠西皆丞相力然則丞相所收其無乃賔客故人而已耶若夫収賢則未也偃不見收於丞相而衛將軍乃薦之且衛將軍何為者而能知偃耶偃之遇丞相而從將軍固不繫幸不幸要非求用之本心焉耳栁宗元劉禹錫一時之傑而附離匪人以進在清議所不容然當是時丞相如杜佑盖嘗延集士類制通典而二子乃不在顧盼中何也嗚呼士之抱負志業而不見試用假人之力以推輓之其有甚於焚溺者之求拯也不幸不為當世顯人所録用則往往汨䘮亷恥為不義之歸身負惡名若腹心之抱癰疽首領之嬰木索嗚呼亦豈其初心然哉故曰得其心之所趨鄉而歸焉者為尤難某為太學生逾二十年仰閣下道徳讀其書與竊聴其論議非一日矣盖自昔者以古人之事望閣下獨愚不肖無以自奮發而取知當世大君子之門今老矣猶喋喋然動其心亦何為哉朅來京師問諸賢縉紳皆曰天下利疚人才陞黜頼閣下與一二公力持風裁盡鋸弊習且閔閔焉有憂國愛民之心士之欲伸其説而求其歸者莫先焉盖聞之審矣於是歎閣下真能為古人之事而不負其所學者也士歸焉而得其所趨鄉者也有其實而辭其名者也某雖愚且老亦惡能無意於斯時哉惟閣下稍進之賜之坐語顧心事曲折豈無以禆執事萬一者謹并録舊所為詩若干首藉手以見惟是逆旅手自繕寫不能謹好辱賜覽觀幸甚不宣寄提刑盧察院書吳興進士劉某再拜上書提刑察院閣下某聞天下之物不可以私求非不可求也求之實難豈其物之理然哉抑造物者不與其私也而隂奪之是何言也某無似生長於世三十有九年矣自少小讀書求為古人之事業盖甚篤齒浸長身名不列於搢紳而學為科舉之文與韋布士羣試有司决是非於蒙昧之中亦幸其有得亦可謂求之公矣然名六上於春官一賔興於學校卒不得志乃退而思之凡某所謂科舉之文率不量力務為表表異衆者為詭竊聲稱之計抑私也造物者弗與也又何怪乎不得其求也哉於是始作而歎曰物之不可以私取果如是乎今則已矣不復有求於世矣然宿習餘氣有不可逺遣者獨惓惓於言辭文字之間而求其嗜好之合者而折𠂻焉譬諸草木吾之臭味也則往而求之以益其所未聞信其所已得且將樂此以終其身富貴聲名之慕不存焉然則某之所求亦可謂易與也懷此以行於世既有年於兹閭巷之士其窮似已可得而友者固少而先達富貴某之願慕而請事者又無階而進焉則又退而思之我之於人不求於天下之同而求於嗜好之獨抑私也造物者弗與也又何怪乎不得其求也哉雖然某之自疑若此觀今天下之士馳騁衒鬻達於觀而敏於望者小足以釣聲名大足以致爵位身名泰然意氣横出視造物者如可自措氣使其定計豈盡出於公耶而某之區區乃獨私於言語文字之間與彼之所争不同轍也造物者又奪之不已甚乎是以忘其所自疑而不知止焉某故嵗聞諸士大夫東浙有雋人曰毛曰馮與執事而三異時獲識二公於京師獨不得一望執事之數竊以為恨而得二其文於科舉固已超絶時輩足以信其所聞然猶未也去嵗客雖旬又得執事一二詩文於宗族兄弟間一讀心醉不自知神忽忽而若馳足踆踆而欲進也未幾聞執事以御史出領外臺某竊自計倘得以私願請於門下是天假其便也日者執事按臨敝邑又屬有負薪之疾不得造前益自悵恨然某之願慕求進若不及者誠覬執事察其私而辱教之進其未能信其所疑而歸之於道然執事以文章道義公天下至則受之又何私之有哉而某之私則在是不識儻與之進乎如其不然是造物者真奪之矣不復望矣故先以是説卜焉庶幾執事他日不以其無謂而來也不宣見諌垣書吳興進士劉某再拜上書諫議閣下某嘗謂天下之事以為重則踰於泰山以為輕則等於鴻毛其重輕初無常也重外者輕内重内者輕外彼重則此輕此重則彼輕曽不知所謂真重輕者果安在哉老荘氏之説則以身為内以物為外清净寡欲不與事接視身之逐物猶以隋侯之珠彈千仭之雀其輕外而重内也如此而孔孟之説或以殺身而成仁舍生而取義審如是是身未必重也嗟乎此闕理者初若易定而怵於利害之間則其相去懸絶雖泰山鴻毛不足以喻此世之人所以毎猶豫而不能自决又况富貴爵賞之忻於前死生禍福之懼於後其不顛倒迷謬者幾希此無他處之不素故也宋人得玉獻諸子罕且曰以示玉人玉人以為寳也故敢獻之子罕曰爾以玉為寳我以不貪為寳若以與我皆䘮寳也不若人有其寳夫玉之為寳不待告而明矣而子罕謝以不貪是真以不貪之寳為重於玉故判之於立談之頃而無所惑焉由此論之則古聖賢之於重輕固先有以處之矣夫又安肯以茍異乎衆為心哉以其有重於此也雖殺身可也舍生可也况於玉乎非獨孔孟子罕也古之人皆然如其遺物離人退而從老荘氏之説則已茍有心於天下未有不出於是者矣某嘗以是觀人而有及於閣下惟閣下之道其精深奥妙固不可得而窺測然前日所説施著見之迹則夫人而知之也某私以為真有得於我孔孟之説故用事是以求質焉儻某之説誠有合於閣下之道則進而語其餘可也哀其誠而誘之使信於其説可也若城府深阻秘而勿示則非古聖賢之道亦非所望於閣下不宣見國信侍郎書迪功郎監秀州左城都酒務劉某再拜上書國信侍郎閣下某觀之士之懷才抱藝而不見試用猶病癢者而鉗其肘假人之爬搔以為快至其甚者若心腹之有隠痛非但假人以為快而已將旦暮大其聲而疾呼且祈人之哀已也以韓子之賢宜為一世所歸重方且自薦於時宰至於再上書而不通三及門而不報其説以謂古之士重於自進者以其於周不可則去之於魯於魯不可則去之於齊於齊不可則去之宋之鄭之秦之楚今天下一君四海一國舍乎此則夷狄矣去父母之邦矣嗚呼其辭亦可謂切矣某嘗哂之所謂士者讀古人之書行古人之道用則進不用則退用固可喜不用何傷雖天下一君四海一國非若戰國之士可以出彼而入此然為天子進退人才者宜非一人也執政大臣两禁要近皆可以薦賢於天子顧已之所挟誠足取知於人而用於世會當有所歸不得於甲則得於乙不得於乙則得於丙與之宋之鄭之秦之楚何有異哉若皆無所合則有命焉何至汲汲自售號呼乞憐若是其切耶持此以閲人盖有年於兹非特其身之不有合也又深計而熟思之然後知今之士與戰國之士異者抑其操術不侔何者戰國之士以詭譎權變取世資俯弔仰賀朝合暮離飾人之心易人之慮非秦之衡人則趙之從長也非談天衍則雕龍奭也甚是視富貴可唾手取雖受辱不恥曰吾舌在足矣商鞅以帝王霸道干其君而世謂之以三術鑚孝公彼三術者何術也究其用心乃今市道之人類能之曰傲惑佞是也以秦孝公而告之帝道是傲之也及其不合則更説以王道夫孝公之志豈在是哉抑帝王之道何擇焉是惑之也至於末説於霸道則佞而已矣前者之不合知後者之必合也盖侈其説以要其君蘄信用之篤也今士以君子之道律其身以仁義忠信之説加乎人而曰我必有合吾知其不可冀焉何者遇合誠難而操術未易用也脫或遇其人有其時是安得不恢恢於求售以韓子之賢而上書自薦類於祈哀無足深怪也某吳興闕生行年四十有六連遭於趨進之途徬徨於寂寞之濵不可謂不乆矣挟其術以行於世毎舉而毎不合嘗竊自念遭盛治之世非若戰國之士可以出入宋齊梁楚之間又不能用商鞅之術以肆其詭譎權變之説又受辱不能不恥而獨有意乎以君子之道仁義忠信之説僥幸萬有一者之合嗚呼其亦可謂不知量矣然而不能自已者亦豈有待乎哉某故嵗居學校服閣下重望而誦記其文以為矜式非一日與其操履論議得之縉紳之間為加詳而某之定計求歸焉者抑審矣特門牆之阻邈在天上曽不得趦趄其間迺者閣下以使事道二浙某始作而言曰是行也歸當復於吾君則必以人才為先此韓子自薦之時也天其假余便哉書不必再上足不必三及門一見於此决矣遇也有命抑自信其操術果足以求合也今遭其時遇其人矣否亦有命抑自悔其聞見之陋不足以取知於大君子之門也今遭其時遇其人而失之也二者非某之所敢必也謹録所為近詩雜文一編藉手以見惟閣下進退之不宣上越帥書從政郎充越州州學教授劉某再拜上書帥坐待制閣下某嘗聞言辭者感於情而後發喜怒哀樂之七者之謂情情也者随遇而感有感而發亦若金石絲竹之有待而鳴也其感發有淺深故其辭有工拙者人之論曰懽愉之辭難工窮苦之言易好是真有難易之辨乎哉詩之變風變雅也大抵皆循理之説故讀之想見乎其人如出乎其時有正人誼士憤切感激之氣也有遷客逐臣覊旅流落之歎也有室家思怨爾汝昵昵之私也有故國舊都凄凉綿綿之情也其言率有以感動人意而喜誦説焉杜少陵遭時亂離間闗陕蜀負薪採稆餔糒不給凡出處動息勞逸悲樂之事一見於詩盖窮而益工屈原憂愁幽思而作離騷庾信以悲哀為主然後知懽愉之動情者淺而窮苦之感情深也某無似生長於世五十有二年概其平生抱百憂而無一娛故流離辛苦之狀間見乎辭雖不能如古人之工而獨知所謂感於情者深而已矣又自更國難以来益復忽忽不自料理憫天歩之方艱恫大恥之未雪每一念至則中夜起坐當食失箸悲来填膺則揾下緑睫視曩之所謂流離辛苦盖又不足道焉乃者獲吏麾下侍坐席聆罄欬温然若將憐而教之退而自思顧無以借資受教於左右又平昔所為言語文字率皆愁憂無聊之辭獨可為其窮似已者道難與富貴利逹者言也既又思之閣下以道行聞於鄉以文學世其家以忠信勇决自見於時奮自臞儒亟登清近作鎮藩屏貎舒徐而不矜志刺促而當憂此其中非茍以富貴利達為榮故必有先天下之憂而憂者安知不有似於閭巷窮苦之士哉謹録新舊雜詩若干首併用藉手以請惟恕其僣率幸甚不宣寄中丞書某愚暗不通世務竊謂自古有國寧無緩急所頼以濟者人才而已夫天下多事無甚於唐而一時人才足以宏濟艱難抑何甚耶將相勛徳忠臣義士儒學文藝下逮醫巫星厯之流亦皆超越前後人才不競未有如今日者中丞亦嘗念之乎一日之警見大夫至無可使而朝廷之上論議莫知適從顛沛迷謬往往可笑聖主首起中丞於廢籍之中盖將任以天下之重伏計中丞所以復我君者宜以人才為急嘗謂由崇寧至今天下人才敗壞㡬盡任用私邪杜塞正路士大夫拘於俗學不知古今無能論一事者稍自激昂沮辱摧抑重以禍災故家遺俗無復在者風聲氣習悉從委靡前日號為忠孝家子孫類以父祖流離為鑒戒棄其所學後輩見聞悉出一途自是朝廷之上無君子矣願中丞力賛聖主飬成人才包容狂直以勵士氣忠義所激往往向風恢廓公道無使私邪之人尚得厠於其間古人云種藝蓄養不見其益有時而大惟留意幸察某陋儒無知因書覼縷不知其僣亦恃中丞忠厚宏達不以其愚加之罪也伏紙振怍不宣苕溪集巻十六
