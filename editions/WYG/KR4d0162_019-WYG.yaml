body:
  text: 苕溪集巻十九宋劉一止撰表代賀元旦表屬正月之始和載新治典眷拜揚之丕享大正縟儀慶浹神人懽騰逺邇臣中賀恭惟皇帝陛下聖由天縱道與時升御六氣隂陽之和受四海梯航之䞇百蠻冠帶悉歸王會之書萬里山河盡入職方之服著曠古未聞之偉績有異書不載之珍符方將鋪張奕世之宏規於以繡繪太平之熈事肆頒明詔益講弭文雕輦出房路朝喚仗九賔就列儼冠珮之鵷鸞五輅在庭建旂常之日月肅太㣲華盖之次警御史執法之嚴導迎至滋之休均錫履新之慶臣身縻符竹望逺宸楓上九行之觴莫與璁珩之列遇千嵗之日徒傾葵藿之心代賀斬獲四軍大王表天聲甫震醜類革心我武載揚凶渠授首盖威懐之两盡在古昔以罕聞臣中賀竊以虞舜舞干誕敷文徳周王受命有此武功雖云去殺以勝殘亦或侮亡而取亂惟燕雲十六州之聚沒犬羊二百年之間明時負固以偷安累聖包荒而不問遽易腥膻之舊來歸禮義之鄉威儀遂識於漢官冠帶悉同於王會天其或者事豈偶然寧容一夫尚假餘息恭惟皇帝陛下乾剛獨運神斷不疑擥故籍以開疆斬窮酋而獻馘功在漏刻勢如風霆納呼韓之降既増光於史諜傳郅支之首用垂戒於𦍑夷方將告清廟以彰奕世之勲御明堂以受四方之賀而臣身縻列郡望逺嚴宸庭設九賔莫與璁珩之列嵩呼萬嵗佇觀封禪之儀代賀正表青陽坐治布正月之始和庶國履新頼一人之有慶化均夷夏喜浹神民臣中賀恭惟皇帝陛下躬對天之宏休嗣無疆之大厯騐三正而用夏與萬物以為春多福鼎來配升恒於日月神基増固等髙厚於乾坤臣職在治中身縻補外周家告朔緬懐清廟之衣冠漢殿奉觴莫陪彤庭之鵷鷺仰雲霄而目逈傾葵藿以揺心代賀藉田表皇輿夙駕適協上春之期帝籍時開丕講累朝之制化行畿甸風動寰區臣中賀臣聞政之本在農禮之經惟祀教諸侯之飬事尤重於躬行契三神之歡物莫先於已出故因民力庸示親耕豈徒知稼穡之艱難盖欲奉粢盛之豐潔著為彛典號曰上儀恭惟皇帝陛下覆育羣生憂勤庶事開疆闢土共欣和氣之游振廩勸分自致豐年之應更道故事以勸多方歌載芟之詩田祖受職即思文之次甸師告成賛天地之全功備帝王之盛事臣方馳驛騎阻造闕庭想耒耜之載塗莫陪奔走冀倉箱之滿野庶採歌謡代賀道君皇帝表與天為徒方獨觀於衆妙自我作古乃退避於萬機乆隆儲貳之宫闈爰畀盈城之基業神靈咸仰華夏均懽臣中賀恭惟道君太上皇帝緯武經文體元用妙懐翼翼之心以昭事烈考躬乾乾之徳以臨御庶邦昩旦視朝齋居决政以跨軼商周為不足道以陶鑄堯舜為非難能夢受帝言力恢道運將自安於澹泊期罔釋於憂勤惟一索而得男故受之震俾重明以麗正盖取諸離及兹神器之有歸盡出睿謀之獨斷書傳之所不載今昔之所未聞豈惟重規叠矩之交榮抑亦内聖外王之两得臣身縻補外職在衆流念莫簉於班行徒交深於抃舞代賀淵聖皇帝登極表膺圖出震纂極承乾山川鬼神敢不祗告華夏蠻貊永有依歸臣中賀恭惟皇帝陛下以天縱之姿懋日新之徳緝熈聖學極經天緯地之文明察事機有冠古超今之識主器職存於長子問安孝備於寢門是宜協萬國之歡心膺三靈之眷佑受無疆之休命集丕享於庶邦盖將措天下於泰山之安於以増國勢於九鼎之重宅心寛大永思守位之仁體道冲虚自享消兵之福臣欣逢盛旦屬守偏州莫叅鵷鷺之行徒極雲霄之望代謝皇子封昭慶軍節度使勅牓告諭本州軍民表胙土苴茅肇隆於帝嗣建牙授鉞爰逮於吳邦民社知榮山川改觀臣中謝竊以並封同姓昔稱磐石之宗兼總价藩益壮維城之業眷惟元子尚闕徽章始將宏賁於我家必或申嚴於師閫豈伊列辟休有寵光此盖皇帝陛下當萬物見離之明應六龍建仁之會仁沾行葦澤被蓼蕭載敦胄緒之私丕講禮文之事臣敢不仰承典憲掲示吏民職本支百世之隆増夀考萬年之祝代謝除判宗表寵渥驟加省循靡稱逡巡拜貺俯仰甚慙臣中謝竊以堯帝徳明序莫先於睦族成周治盛禮特重於惇宗豈明倫善俗之是資抑强幹弱枝之相芘以今凖古踵事増華少長有分院之推官曹見列坊之盛餼廩既備教𨗳益嚴惟時董正之師必擇賢能之長而臣生非岐嶷學愧空疎託神明之系以叨恩處位望之尊而動色兹盖伏遇皇帝陛下天臨九有子育萬民治假有邦化行自内雖在艱難之日曲敦胄緒之私臣敢不仰體聖𠂻俯勤職守義不愆於㤙掩教必自於身先尚取寸尺之勞以答生成之施代謝囘授封贈先祖表抗章瀝懇仰干不測之誅出綍疏榮濫被曲成之賜寵蒹存歿愧動心顔臣中謝伏念臣以駑鈆無用之才受弓冶素傳之業初登黄甲實自白丁効官浸歴於使令政位遂塵於通顯重惟大父終老寒儒嘗為後學之楷模頗有古人之趣操推食以交游士捐金以訪異書韋賢雅志於遺經疏廣每虞於益過謂詩及禮愈於問舍而求田意子若孫庶或封侯而起第敢云無似乃副所期矧臣父垂七十之年㤙未忘於陟岵而臣身有千一之遇澤儻及於漏泉是用忘越分之愆竭叩閽之請不圖誤眷猥降俞音發原壌之幽光為里門之盛事豈惟為老父報親之念又以伸㣲臣飬志之私情事两全感銘何喻兹盖伏遇皇帝陛下功深覆載明並照臨御下一出於慈仁懋賞盖先於勸激遂令孱𤨏有此叨踰臣敢不念不世之遭逢荷殊恩之委曲誓兼忠孝用訓雲來代謝轉官表賜札十行仰窺深厚進官一列横被寵靈念成命之莫辭俯懦𠂻而知愧臣中謝伏念臣越從疎逖屢玷使令顧力不量徒欲狥朝廷之急揣分已過何敢饕恩施之蕃曩凶逆之弄權盖人神之同憤天聲有赫王旅如飛㒺愆係頸之期大正然臍之戮而臣職在分閫理應調兵時乃糗糧偶無餉餽之乏於彼原隰莫効馳驅之勞苐賞所加於臣何有兹盖伏遇皇帝陛下用人惟已以道觀能雖小善而弗遺靡一士之失職致此序遷之典亦為孤進之榮臣敢不益勉事功自矢報稱顧東隅之已逺尚末路之可圖代謝除禮部尚書表祇奉寵靈薦膺器使位㕘八座名視六卿念地近而秩優顧材㣲而植弱懇辭靡獲俯仰知慙臣中謝竊以在昔成周作新治典惟時宗伯號總要司豈惟侈太平黼藻之文兹實重稽古討論之事三代以䧏六經沒㣲叔孫髙堂之流本由於草創開元顯慶之制㒺見施行祝史乃得揖遜其間學者謂之迂濶於事眷兹盛節尤屬熈朝謂百年而後興固宜隆禮樂之用若三嵗而大比則必進賢能之書祭祀以交神人饗燕以昭慈惠具形時制仍有司存要非通儒不在兹選伏念臣親逢休旦奮自寒鄉以鋤耰固陋之姿歴翰墨清華之職濫竽芸省簉武蘭臺記言動於螭坳掌絲綸於鳯閣稔春官之貳政備朱邸之談經報稱蔑然叨踰甚矣方奉祠於真館將引迹於長林夫何罔功復玷異數兹盖伏遇皇帝陛下日新聖徳天縱睿謨遹駿有聲以緝熈乎先烈式序在位以陟䧏乎百工遇以始終使殫寸尺臣敢不勉尋問學深體眷私幸未迫於桑榆終少酬於造化代辭免除㕘政表弗堪重任將有近憂託命至仁籲天誠懇臣中謝伏念臣擢從冗散寢歴近嚴揣踰分之已叨念大恩之未報既無崇論宏議以禆廟畫又乏壮猷精識以折敵衝閲㓂戎之馳驅致宇縣之殘毁雖聖神罪已庸示曲全而天日鑒忱不敢自恕追愆尤而未冺驚寵數之無從曽是諛聞禆㕘大政非常之舉惟帝所難伏望皇帝陛下垂雨露之私發淵泉之慮謂兹事體大宜無反汗之嫌顧已試罔功當得循牆之請豈惟見公朝之難幸抑使知定命之可安區區之心拳拳於是代宰執以乆旱待罪表天道無私不爽災祥之應輔臣失職伏思譴咎之歸敢露忱辭仰干淵聴臣等中謝伏念臣等猥以庸妄寖冐寵榮位在近司日聞大政曽不能廣宣仁徳導迎至和坐閲五旬不霑寸澤驕陽肆虐旱氣如焚田半折而欲荒嵗向成而觖望受小民之咨怨貽上聖之焦勞桑林之禱雖堅雲漢之憂未解臣等負此愧恧何施面顔尚頼曲全兹容自劾伏望皇帝陛下乾剛獨斷威命顯行顧方厲銷變之圖莫若正黜幽之典庶囘協氣以福羣生代謝賜對衣金帶表衣裳出笥加博帶之兼金駔駿在庭被華廌之錯采逡巡拜貺欣躍交懐臣中謝伏念臣人地甚㣲才能居下浸更選任無補盛明毎惟弱植之不勝常恐㤙綸之誤及詎意便蕃之使仍叨服乗之良伏遇皇帝陛下以純儉履躬以慈仁接下甄陶庶類黼黻人文凡列職於禁嚴率加崇於褒賞臣敢不圖囘末路黽勉宿心攬袂起行雖愧九環之寵據鞍自誓冀殫十駕之勞苕溪集巻十九
