body:
  text: 苕溪集卷三十五宋劉一止撰外制禮部侍郎曾開除寳文閣待制提舉江州太平觀勅侍從之臣朕所倚重雖出處之事各異而禮遇之意不殊具官某早以文學志行受知先朝亟登要路淹留江海積有嵗時朕眷求名賢服在近列庻幾論思之益共濟中興曽閱日之幾何乃抗章而别去辭情懇至慨莫得留寵之延閣之華俾即真祠之秩忘爾身之在外惟我后之吿猷時乃之休抑朕所望可恭州壁山普澤廟神封威濟侯勅某神朕閔夫農夫之望嵗惴惴朝夕雨暘小愆籲天號呼若無所托命焉故於命祀之神有徳於民一方是頼則惕然動容不愛褒崇之典以寵靈之且俾其民知所報事有永而無替也今有司以爾神聪明正直未嘗出其靈響惟水旱疾苦之事有謁必獲聞於朕聼是用欽嘉錫之侯封以荅神貺其服我休命益相彼民毋俾嵗艱神亦與有飲食可右千牛衞將軍士渗依例合換武節郎勅具官某朕惇叙近属列處環衛厚其廩秩而不煩以官職之事至有欲自見其才願出補吏者亦所不拒焉爾寅恭造朝閱嵗既久因其有諳易畀官序俾之從政其率義蹈憲毋或惰偷以速官謗則予汝嘉可王倫除同簽書樞宻院事迎請梓宫太后交割地界使仍賜同進士出身勅朕搃攬羣工圖回萬務眷言宥宻實秉樞機體隆叅伍之聨位在凝丞之次亶惟用徳亦以勸功具官某宇量坦夷機神敏悟出先王名賢之徳有流風遺範之存事不擇難行不擇利奉萬里之使無以家爲道二國之言皆如意出卓爾傾河之辯毅然叱馭之忠酈生凴軾以下齊城毛遂定盟而重趙國揆其成效佈溢前聞朕念陵寢久荒梓宫未返東朝契濶星紀既周北道謳吟民心未改幸信書之來諗知永好之不渝爾其肅迓還轅就承故壤爰陟本兵之重仍兼賜第之榮惟既厥心毋乏吾事噫服文武之境朕将無愧於古人合晉楚之成爾乃増光於史册可藍公佐除宣州觀察使借保信軍節度使提舉萬壽觀充副使勅行人之選自古所難故叔向進子員於朝以為道二國之言無私周家遣使必曰周爰咨詢盖惟忠信之人而後可用信乎其不可不審也具官某淹練敏明習於故事服在近宻頗閲嵗時俾使殊鄰有嘉忠實是用命爾復爲朕行今通好息兵既有成約輿地將復梓宫将還母后宗親指期可俟往從而長益殫厥勤肅迓還轅就成故壤陟爾亷車之峻以為行色之光服我茂恩尚圖來效可傅嗣延等二十九人從使出疆有官人轉官無官人補授白身先補承信郎進士先補上州文學有官人先轉三官勅具官某朕選任近弼出使殊隣一時從行悉聼自擇惟川途之脩邈念王事之馳驅錫以典恩超進官秩初補官人云俾霑命秩尚思黽勉以稱寵榮可和安大夫惠州刺史李安仁特落致仕發赴之行在供職勅具官某爾以和綏之術歴事累朝績效著聞度越流輩雖吿老得謝而精爽未衰其服故官益修爾職可南劔州沙縣民兵首領樂輝親獲兇賊余勝等七人特與轉一官勅具官某爾以智能率衆捍㓂執俘獻馘嘗有顯勞懋賞進階以爲爾寵可劉錫知鼎州勅鼎為湖湘望郡異時創殘行旅蕭然今流亡既歸田野加闢惟是存勞安集之政属於守臣朕所遴擇具官某執憲蹈義飾以文雅頃侍殿岩識朕愛民之意剖分符竹往慰彼民惟既爾心無俟多訓可右承直郎楊抗特改次等合入官勅具官某乃者選任近列出使殊隣載嘉體國之忠抑有乃僚之助稱功第賞爾實居先并叙舊勞俾更秩序尚圖後效以答茂恩可觧潜罷軍職特除正仕承宣郎勅侍衞之臣朕所倚重雖出處之事各異而眷遇之意惟均具官某忠謹不浮沈深有斷屢著捍城之畧夙推經逺之才召自遐方再司軍政忽露章而引去諒雅志之莫回勉狥其私以均勞佚留務之職式寵其行惟爾以勲業自期見謂忼慨尚觀他日益展壯猷可韓世良特與轉行左武大夫遙郡防禦使勅朕制横列之官以待異能之士其選重矣茍非其人不以輕授具官某沈機服衆義勇冠軍屢立戰功不自矜伐典司軍政亦既淹時肆因慶賚之行陟此髙華之秩兼崇使號併示眷私爾其服我訓辭益殫夙夜要使旂常之績獨髙伯仲之間則予汝嘉是曰報稱可藍公佐父安石特贈節度使勅朕用心廣愛御于家邦厚往飭終存乎禮典具官某禔身有裕率禮不違祗事宫闈浸更嵗月死而未冺尚克教忠爰申追錫之恩懋建節旄之重神靈如在庶或知榮可右承直郎陳楊上書可採特與改合一官勅具官某朕不愛爵賞以求至言茍可施行則若已出爾以孤外忼慨獻書論議詳明有當朕心錫以渙恩俾更秩序其益勉勵以稱所䝉可忠訓郎閤門看班祗侯藍師稷換授右承務郎勅具官某朕申遣信使逺適殊隣被以寵光悉無所愛爾以從行之賞就易文階有榮耀焉其思稱此可將仕郎鍾離咸亨以昨充計議使属官循一資合入修職郎勅具官某向是委任信使通好殊隣休兵息民既有成約從行之賞朕何敢忘其服茂恩益思報稱可權同知閣門事何彦良特與落權同字除右武大夫勅爵賞之設用勸臣工凡官修其方吏宿其業所應褒進者朕無所愛焉具官某謹愿恪恭服在近宻更閲嵗月無改厥勤方将申九賔臚句之文候百辟㑹朝之禮簡求爾類無易舊人進秩横階正多上閤益思稱職以答茂恩可苕溪集卷三十五
