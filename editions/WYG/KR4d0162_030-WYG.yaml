body:
  text: 苕溪集巻三十宋劉一止撰祭文行狀代祭王廉訪文在昔成周化一内外則有行人誦道志意惟我國家與周匹休遣使自中分察九州惟公堂堂獨禀忠厚薦更使華績業滋茂惟時東南狂賊震驚來炤一方帝命老成自始拜公顔色温凊服誦先言實聳觀聽謂公早晚將復於王起仆植僵我民實望攝提之春服正里門奄忽變化奪此德人靈車則歸西指帝鄕公不能言我民盡傷一觴之獻故人所重千里長途式酬以送尚饗代祭李提舉文惟公昔官淮甸賊兵薄城堅守不屈朝廷嘉之擢部使者實治㑹稽某始見公温然而和厲然而莊緩而不䟱清而有容竊意其藴藉有大過人者而恨其未用未幾得疾遂病不起嗚呼其眞可痛者耶抑某之期公過也雖然公之節義既畧見於前日天不報其勤而奪之年悲哉尚饗代祭張提舉文昔者黠虜犯順樞察清河公以輔郡兵先入衛已而抗論虜營守正不撓扈從朔方方今皇帝嘉清河公之忠寵靈其家而錄其子惟使者以才能膺選任實刺浙郡凡属部之士民若吏聞使者之賢能世其家且將以惠我民也始至以疾吿未幾遂病以不起聞行路之人咨嗟惜之其縉紳士夫則竊有恨焉曰清河公忠孝若是而天勿祐其子吾勿知天道為何如也某承乏於兹與使者因王事曽未及識其生也而視其亡能不悲哉酒肴之薄匪以稱禮寓其悲也使者其聞之乎代祭吕丞相文維師尚父太岳之裔相彼武王于爕伐事光昭後人克紹厥懿惟公之生英特偉異心雄萬夫身兼數噐拳拳愛君曾靡敢易天固異之其必有意公實自以遭遇不世義所當爲九殉勿避帝嘉乃績社稷是利謂督不忘俾踐厥位再持魁柄埏埴品彚慨時艱難志等外内出入將相文武兼備命圭崇崇赤舄几几秉旄仗鉞富貴始終天子有命公實至止分陜之重將公自倚俄以病吿勿克入侍我時視公尚能强起顧瞻精爽何患不已詎公之歸閲日未幾遽聞訃音失聲嘆喟喬嶽峯摧壑舟夜逝我不意公而乃至是遡風永懐淚溢兩眦奠此一觴尚公不昧尚饗臧記室行狀曾祖祖父公諱詢字公獻湖州安吉人世居於梅溪少孤事母朱夫人以孝聞諸兄覔舉以公任家事公意不懌私取書讀之皆通其義經理内外不廢考飬諸兄憐而教焉始授之書淹貫如老成人未幾肄業大學聲稱籍甚及元豐二年進士第調歙州黟縣尉再調睦州桐廬縣令丁母夫人憂服除朝廷以公元豐舍選除汾州州學教授任滿改宣徳郎知淮陽軍下邳縣事遇今上登極轉奉議郎賜五品服授簽書廣信軍判官㕔公事未赴時相萬公有㫖召對除太僕寺丞踰年遷鴻臚丞坐太僕誤支馬事免所居官更二年始復除管勾元豐庫明年遷諸王府記室叅軍中間序進及經八寳赦恩至朝請郎大觀四年冬以疾請致仕卒於京師享年六十寔十一月壬辰也公性資警悟筮仕不習文法嘗曰儒者安事三尺顧理之所在何如耳事無鉅細應聲剖决徐質以法往往契合信道自將不憚强貴在桐廬時使者行部令而下斂板道左使者在輿仰視不降接公挽寮佐無得前揖使者怒麕縣事無所得復隂遣吏伺公短吏因縁擾民公呼治之以聞使者心嘉焉縣有兵官繩治卒伍差峻東南卒素驕至是銜怨連結謀入縣盗庫兵爲亂邑人大恐吿公公曰寧有是事翼日方攬訟牒卒百餘輩聨裾相属驟至於庭左右股慄不自持公若無覩徐呼前曰而輩遽至庭下顧令不揖且無所言豈令有負汝乎皆曰令無負我官兵實見虐公曰我以為令負汝也若官兵見虐令其為汝移半紙檄請於郡即黜之耳且吾聞邉陲士卒冐矢石忍凍餓至相腕藉以死而輩寒則索裘饑則命餉父母妻子嬉怡在前官家恩汝厚矣吾恐汝不能有此逸樂將自禍也公反覆諭以禍福卒衆相視觧裾羅拜既而猶偶語公謬為動其官狀及遣所親隂白諸郡郡識公意即日檄兵官公卒衆遂觧其後稍移易離其謀黨得渠魁十餘人治之邑人以謂非公機辯敏給變在漏朝矣同寮有坐累去官者累重不能歸京師至乞食於道公聞之出俸錢並拉僚佐得二十萬遣人訪之乃依古祠宇問方役人丐百錢活旦暮及得所贈涕泗交下貽書謝公并致弓矢且曰吾乞食寒陲寄此為命者將數十年以君能活我故用為報公反其弓而納其矢焉其周人之急類如此下邳郡民有所逋責之急縊死田間者其妻引富人爲仇公按問無狀即日出之已而果謬聞者歎伏曰是公明可及也果敢不可及也公家甚貧持身益亷収養孤甥及族黨之貧不能婚姻者以身任之無難色中間仕宦齟齬困於京師親戚仰給有不安者公喻曰業已托我雖飲冰不相捨也與人交握手出肺肝了不見畦畛抵掌談辯雜以詼笑聽之衮衮令人忘倦得酒輙醉萬事都捐便若超出世外其爲文章不蹈襲前輩一語落筆數千言淹頃可待尤喜爲詩辭藻雄麗士大夫往往傳誦有文集十卷藏於家公三娶初許氏封旌徳縣君次舒氏壽安縣君次裴氏南華縣君一子寧以公致仕補將仕郎明州奉化縣尉二女長適將仕郎江寧府上元縣尉呉槖次適從政郎劉某孫男一人曰協寧以明年某月某日葬公於某縣某鄕某山之原既葬五年而寧卒協以寧命属某狀公之行將匄名於一時鉅公且表之墓上嗚呼以公之噐業宏逺不大用於世而蹭蹬以死豈命也夫異時執政盖有知之者且将峻擢公出語勁直不能委曲伺人意用是中輟嘗曰吾以胸中介介者與言語文字卜知干人則是非所能也幸見用敢不勉不然姑已耳嗚呼其賢哉謹叙其事如左以俟擇採謹狀知樞宻院事沈公行狀曽祖原贈少保曾祖妣方氏贈榮國夫人祖渙贈太師嘉國公祖妣孫氏贈奉國夫人父彦修贈少師妣丁氏贈淑國夫人公諱與求字必先世爲呉興徳清人按沈氏之先於周爲子男之國其地即漢汝南平輿縣沈氏是也魯昭公二十二年為呉所㓕闕後見至定公四年又滅於蔡沈遂不祀其後子孫分散漢晉之世著名簡册者盖有其人至六朝而盛家於武原之臨溪唐天寳間析臨溪為邑是為徳清國初雖稍微而公之族祖暨諸父以儒學踵取名第至公乃大光顯望於呉興公自少穎異讀書属文不煩教督識慮辯詰已如成人未冠以藝業試鄕校流輩莫與争長公既丁少師公㐮憂自以家素貧乏母夫人以已為命相與致志於學律身益嚴未幾薦名鄕書尋爲太學生試選屢魁多士名稱蔚然及政和五年進士第授濮陽縣縣學教授以道逺不便親養改常州州學教授任滿授秀州司兵曹事兼推勘公事公治獄不以委吏事皆躬决多所平反再嵗丁母夫人憂服闋除太學録靖康改元至京師遷儒林郎除太學博士建炎初車駕幸廣陵公始赴官同薦改通直郎會罷太學除通判明州改兩浙路提舉市舶未赴御史薦公對便殿除監察御史上疏論執政過失遷兵部員外郎公自劾以爲言茍不當宜黜不應得遷上感寤行公言更除殿中侍御史被㫖鞠獄江外車駕廵海上公還趨行在所奏事尋扈從至㑹稽而敵㓂尚留江左公首陳追襲之計不果用是時江淛創殘之餘盗賊繼作民蠧未除吏奸滋甚憲網濶䟱追論同知樞宻院事兩浙西路宣撫使周望擁重兵於呉門不能扞蔽脱身先遁以至連城䧟没與諸郡以城降賊並縁爲奸掠取民財等事乞正典法時占象者言西北有赤氣蔽天中有白氣如練犯北斗文昌紫薇公極論時政得失宜遣使省陵寢定駐蹕之地宰相不可虛位及用祖宗數事令叅知政事與宰相輪日知印諸將兵各立軍額蠲租賦以寛民力信賞罰以明功罪凡十許事尋除侍御史宰相以年少驟進不更世務公上疏極陳恐誤國事上初難之㑹近臣李陵獻言宜詔宰執於罪戾中選擇實能付之以事仍諮臺諫為國擇人勿復冄言出榜朝堂公曰自古豈有禁臺諫不言者乎復論列其畧曰任賢使能人主之柄也獻可替否臺諫之職也任使失當則其禍移獻替失當則其職曠是以自古明哲之君開廣言路所以防蔽塞而杜私邪上下相須乃成治道今乃詔宰執用罪戾之人而令臺諫不言是必不識事體之人持淺狹自私之見文巧偽觀望之言以誤陛下使陛下虛負拒諫之名是何不忠之甚也且自古以來有責臺諫以不言者矣有旌臺諫以能言者矣未聞明揭榜使勿言也翌日上爲降㫖李陵身為侍從乃復疑誤朝廷上言乞詔宰執用蔡京王黼張邦昌苗傅劉正彦等一時罪戾之人箝閉臺諫使不得言欲收惡黨之恩遂陳迷國之計可罷侍郎與在外宫觀沈與求上疏乞明指獻言之人顯行黜責其論爲常至云變朱成墨指鹿爲馬言太深切使大臣不敢安位可罷侍御史除職與郡尋除直龍圖閣知台州待次累月上思公有㫖召還再除侍御史上嘗從容言王安石之罪在行新法公對曰王安石以已意變先帝法度誤國害民誠如聖訓然人臣立朝未論行事之是非先觀心術之邪正揚雄名世大儒主盟聖道新室之亂乃爲美新劇秦之文馮道左右賣國得罪萬世而安石於漢則取雄於五代則取道臣以是知其心術不正則奸偽百出僣亂之萌實由此起自熙寧元豐以來士皆宗安石之學沈溺其說節義彫喪馴致靖康之禍汚偽賣國一時叛逆尚逭典刑願陛下明正其罪以戒為臣不忠者先是上欲究僣偽事因公有言上大感悟公再居言路附麗前宰相用事者意公悉論出之公聞之曰近世朋黨習以成風凡人材不論賢否皆視宰相出處爲進退盖上之人驅之使然余待罪言路荷上知遇苐當分别人之邪正能否而公言之余之職也豈可謂一時所用皆不賢而使視宰相爲進退哉止擇一二明附稔惡者列於上羣情遂定明年春駕幸臨安遷御史中丞時軍儲窘乏公極陳屯田利害爲古今集議上下二卷上之上用其言始定營田之議禁衞單寡兵機不在朝廷公上言仰惟陛下移蹕東南將圖恢復之舉先務之急宜莫如兵漢有南北軍唐自府兵彍騎之法既壊猶内有禁兵外有諸鎮之兵上下維持使無偏重之勢其意逺矣今圖大舉而兵權不在朝廷雖有樞宻院及三省兵房尚書兵部但奉行文書而已願詔大臣講求利害而舉行之使人情不駭而兵政益修助成經理中興之志浙郡淫雨害稼穡公上疏云伏見中夏以來霪雨過度浙西數郡之田垂熟淹没者十七八民有饑饉之憂徽嚴州水泉暴湧浸城郭漂廬舍比者臨安火延民居無慮萬餘家甚於去嵗㑹稽之變豈小異哉仰惟陛下遭時多難厲精爲治宵衣旰食靡遑靡寧天地顧臨宜有福應然隂陽乖和灾異仍見陛下亦嘗於行事之際思所未至者乎茍未至焉則亦加之以誠而已矣子思曰誠則形形則著誠之至也参天地賛化育况於行事之際厥類章章靡有不著者也今九廟邱墟兩宫隔絶夷狄之禍未殄僣叛之黨未平下民嗷嗷厭亂思治以日爲嵗痛如焚灼覩此灾異心折骨驚而談者至謂澤國夏潦地氣使然火延民房救者不力宜不足勤聖慮臣恐此言日聞誠意日替臣是以泪流落而不自禁也陛下誠以臣言思之凡陛下所以畏天愛民用人聼言追祖宗之法惇骨肉之親薄閽寺之權正宫闈之化一出於誠有勉强而行之者耶畏天不以誠則工祝雖具近於致凟愛民不以誠則詔令雖繁終於失信用人不以誠則䜛間日進將以疑似而逺正人聼言不以誠則阿諛日聞將類忌諱而惡直士追祖宗之法而不以誠則不無背戾惇骨肉之親而不以誠則不無猜嫌薄閽寺之權而不以誠則雖名為裁抑而桀黠之輩不除正宫闈之化而不以誠則雖外示樸素而奢靡之習猶在凡陛下見於行事臣固知一出於誠而非勉强然臣所謂譊譊者願陛下加之意而已矣誠意既修則天地感格隂陽和平灾異之興轉爲福耳上嘉納焉兩浙轉運使徐康國自温州奏發宣和間所製間金鎻金屏障什物上命上之而康國已猝發至行在所公曰吾君勤儉徳侔大禹漢文帝以下不足道也異時駐蹕廣陵有進而用華靡者立命焚之通衢今康國不識事君之禮尚習故態欲以微物累盛徳乞用廣陵故事斥而焚之仍顯黜康國明示好惡且爲小人希指之戒上悉從之公在言路首尾四年凡所論列不避權要頗忤時宰意至是改除吏部尚書兼權翰林學士兼侍讀未幾除龍圖閣學士荆湖南路安撫使兼知潭州公以疾乞置閒散改除提舉江州太平觀明年除知鎮江府兼兩浙西路安撫使公到官招集流亡俾之復業異時士卒凴陵居民聞公威名重足屏迹無敢犯法威徳並行内外綏安秋八月仍復以吏部尚書召尋兼權翰林學士兼侍讀九月除叅知政事是時虜偽入㓂兵已壓境上决意親征訖有成功公居帷幄實與其事上親御翰墨書車攻詩賜焉再歳乞奉祠除資政殿學士知明州疏再上改提舉臨安府洞霄宫公之出也以在政府凡所議論皆出臆見無纎毫阿附督府治兵欲大舉公勿與聞公曰此大事也豈可身居近輔而獨不與哉數上疏求去上不得已而從之駕幸平江明年春以提舉萬壽觀兼侍讀尋召除同知樞密院事從駕至建康遷知樞密院事公首陳恢復之計練兵市馬積粟聚財分布将帥以待機㑹而同列不察疑公沮之且冒昧欲舉率不克就上憶公初言决意召公盖欲大用僅閱累月得小疾一夕薨實紹興八年六月甲子也上痛悼輟視朝一日贈左銀青光禄大夫賜水銀龍腦以斂又賜田十頃以恤其家以今年季秋之甲申葬於邑之永和鄉馬鞍山之原取同郡范氏贈吴興郡夫人夫人有美徳先公四年卒三子曰雲紀右從事郎曰雲章右承務郎曰雲卿未任以官息女三長適左從事郎兩浙路轉運司准備差遣元益餘在室公自被遇簡知歴御史三院於内外事知無不言前後論列凡四百奏其間如収攬主權愛惜名噐斥逐邪佞親近正人未嘗不反覆言之至于糾官邪劾贓吏将帥得失政事是非與州縣抑配擾民獄訟過差監司郡守選除不當軍興以来進戰退守之筞積穀訓兵之要不可概舉上以公論天下事淹練通達克已聼納言之切直自敵以下有不能堪者上不罪焉一時臺綱自公大振武將訓敕其下必曰汝不識沈中丞耶其見憚如此大将入覲有進繒帛方物者既分賜六宫公以謂此事雖㣲自政和宣和以來進獻稍侈今艱虞之時不宜有此乞斥還之時方暮夜上得公疏即命追取斥還仍降札諭公公感泣草謝自以不世遭遇䝉上聼納無愧古人顧未知效死地耳公自爲執政凡所規益雖家人莫得聞所薦人才至多受薦皆莫知也上毎以知人稱之自小官至宦達攻苦食淡處之晏然天性孝友所得俸禄以給宗族兄弟無難色於文無所不能晚嵗益工尤善爲詩引類托興有作者風氣凡人以為難者公熟視落筆便造壼奥有文集二十卷奏議三十卷藏於家一止從公游踰三十年自鄕校至立朝雖有出處契濶之異而相厚之意不少衰公嘗見薦爲御史属官初未嘗言心獨識之然知公莫詳焉竊嘗歎息以爲君臣之遇自古所難有聼諫之君又有能言之臣然後君臣俱榮名譽日彰不幸而無其臣則君雖有屈已聼納之誠而臣言不足以發之遂至於兩無稱焉可不惜哉若魏徵之遇太宗韓休之遇明皇包拯之遇仁祖公之遇主上盖所謂君臣俱榮者矣雲紀属一止狀公之行將求諸立言大君子誌公墓公名節之偉議論之懿縉紳所共知也一止不敢私謹狀苕溪集卷三十
