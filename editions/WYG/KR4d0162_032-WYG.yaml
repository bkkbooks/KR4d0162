body:
  text: 苕溪集卷三十二宋劉一止撰外制周祕知婺州續改紹興府朕修明庻政加惠黎元聿求法從之良増重蕃宣之寄矧惟婺女股肱行朝川壤相連俗習未逺顧所與共理俾無愁歎之聲則選任之門詎可不遴具官某沈毅而有斷踈通而不浮盡見古今之書周知事物之變粤從簡授屢罄忠嘉編為耳目之官寔任紀綱之責奉祠均佚閲日既多復畀名邦蔽自朕志爾其服我訓誥兼懋徳威綏厥善良鋤其蟊賊豈特一方之民安爾之政亦使列辟聞風而勸焉顧不韙哉可歐陽懋知平江府勅眷惟呉門宻邇王所今為重地雄視他州必得秉心有常之人任以與我共理之責具官某行義純固得於心成問學淵源寔由世濟頃從禁路出典輔藩不求赫赫之名綽有優優之政奉祠均佚閲嵗滋多爰錫命書再分符竹尚體丁寧之意毋忘豈弟之風俾潤澤及於京師愁歎消於田里是乃稱職則予汝嘉可魏良臣吏部郎中勅具官某銓衡之任雖號劇煩人無覬覦一本資格然而用非其人則吏得以持可否之似以見欺士或至懐抑厭之嗟而莫訴此朕所以遴選而不敢輕也爾頃以雋才嘗更任使秉心忠實不敢吿勞肆予命爾列職天官往究厥心以佐而長惟察惟法則庻幾焉可中書舍人蘓符磨勘轉官勅朕稽有虞考績之規叅成周計吏之法命秩有等率三嵗而聼遷資格既明乃一定而不易具官某砥名勵節見於身修種學績文自其家法召從孤外擢寘周行領中秘之英游訂曲臺之茂典旋躋禁路命演綸言豈特爾雅深厚之辭增光乎國體抑亦稽古禮文之事有益於前聞至於㑹課三遷進官一列報雖由於積日寵實自於知勞益懋乃猷以觀來效可張希亮國子監丞勅時廵以來監學之官與弟子員皆闕而不置惟學政之不可廢者属之於丞焉爾行能甚修見推朋輩往祗厥事毋或墮可梁汝嘉户部侍郎勅朕念軍興以来費出無蓺邦計之任付委匪輕博選一時之良莫如已試之可具官某智周於物用適其時左畫方而右畫圓從容不亂進成規而退成矩風猷可觀薦更劇煩迭處中外益信乃言之可績寧惟所至之有稱方今民食尚艱輿地未服户口之賦既狹山澤之利寖㣲官曹睨廩以指期師旅列屯而待哺惟爾得古人心計之妙知天下利源之歸觀厥盈虛制其出入倘生衆用寡而濟以通融之術則貫朽粟腐有同於全盛之時惟既厥心毋乏我事可孫叅政近封贈三代并妻曽祖吉甫可特贈太子少保勅朕眷求真賢置諸左右乃一徳一心共圖庻政既登進厥位爰錫渙恩追賁其父祖以及大王父於典禮舊矣具官某曽祖某抱負仁義含章不耀積善之慶燕及後人用能有此曽孫始大厥家東宫之孤正秩二品吿於幽泉尚克知享可曽祖母張氏可特贈昌元郡夫人勅國朝之典中外百執事秩通朝籍與法從之臣追賁其先大者僅及父祖惟執政之官寵逮三世其積深者其報逺其體重者其數優盖事之稱也具官某曽祖母張氏柔嘉之徳惠於宗工勤儉之風聞於里閈慶鍾其後是生曽孫為我碩輔故於登用之始爰加脂澤之封正位小君以光泉壤可祖珦可特贈太子太保勅盛徳之報古有成言不於其身於其孫子故髙門以俟廷尉植槐以望三公自是不疑應若影響而况苦心焦思種學績文不售於時齎志以殁則造物者愍焉啟其後人貽以祗福亦何足怪哉具官某祖某負絶特之義通古今之書四與計偕聲華作偉一命勿逮再世而昌厥有賢孫登貳柄政爲予腹心是宜疏恩寵賁私廟青宫亞傅禮秩兼優用侈爾有孫之榮亦昭我得賢之慶可祖母張氏可特贈徳陽郡夫人勅天之報施善人初若無意夷考其事實相後先譬彼服田是穮是蓘乃克有秋譬彼泉源是疏是鑿其流則長盖所謂䟱而不失者也具官某祖母張氏婉嬺徳行宜其家人報不及身溢於爾後惟時聞孫作朕良弼登用之始疏錫大邦尚其不亡服此光顯可父故贈光禄大夫擇可特贈太子太師勅士有砥名勵節見於身修沈伏下僚勿克施用以訓其子為時英賢光輔國家澤及庻類則褒崇之典賁其私廟盖理之宜而朕不敢有愛者也具官某父贈光禄大夫某學聖人之道為君子之儒孝友名於一鄕視古卓行而無愧惠愛存於兩邑方今循吏為加優位不稱德報不及身施於弼臣始大光耀謀猷入吿皆爾之餘詩曰惟其有之是以似之正位宫師申加愍典以顯教忠之效以寛陟岵之思可母金城郡夫人李氏可特贈博平郡夫人勅春秋之義母以子貴石窌之賜實始啓封視命數之等威為褒榮之隆殺至於忠孝克備名位兩崇自非德門其誰有此具官某母金城郡夫人李氏率憲蹈禮蔚爲婦師令則休稱益於女史是生賢息為朕實臣於其柄政之初載稽彞典錫爾名郡於前有光陟岵之思顧莫追於既往奉嘗之寵尚克詔於無窮可妻淑人鮑氏可特封永嘉郡夫人勅朕惟公侯之貴得位與時化刑于家澤逮其下豈特身修之效抑其内助之由故鵲巢采蘩之作見於國風其來久矣若其命之不淑弗克同其安榮在於人情有歉然者則追賁之典其可後哉具官某妻淑人鮑氏柔惠肅雍能執婦道克相君子以成其賢雖善行有加而福禄未究爰正小君之號仍開大郡之封禭服之華副珈之飾併爲爾寵尚克欽承可書令史嵇洪出職與叙右廸功郎勅具官某爾服勤職事閲嵗既多俾列文階往從補外其尚知勉稱以茂恩可陳惟忠以父陣亡恩澤補承信郎勅具官某昨者虜犯襄漢爾父抗敵至殞厥軀朕心憫焉疏恩其孤以勸義士以慰九泉可王縉直祕閣知常州勅具官某自昔良二千石未嘗不以奉法循理爲先而以畏嚴輔之鋤其强梗害民者而已今則不然以苛刻為吏能以惠愛為選懦鞭笞赤子以取辦給豈非為治之意初不在民茍欲自見其才者耶嗚呼兹非朕之所聞也毗陵近郡股肱行朝以闕遺補之舊慈惠明察識朕愛民之意不求知聞錫之左符重以中袐寓直之寵往其勉之可柴萃擬右宣義郎襲封崇義公監周陵廟勅具官某朕若稽前古於先代之後恩有加而不替焉禮也爾周之裔孫於次當封俾進文階以承祀事往其欽哉可苕溪集卷三十二
