body:
  text: 苕溪集巻二十四宋劉一止撰銘贊偈序湖州徳清縣慈相院新鐘銘鑄鍾疏附湖州徳清縣僧廬曰慈相居縣治之北巖壑低昂之間號為勝刹冶鐡為鐘有年數矣器小聲細不足為是邑朝昏之儆院僧用琳始欲改作而武康信士聞人譽施錢三十萬以為觀率範銅壺百三十三鈞三分鈞之一求募辛苦範成而琳亡道俗愍焉越再嵗長老僧道或與其儔道殊本立懐仁行輝惜功用之中廢悼前作之孔艱合力經營散募邑衆幾用錢四百萬始克周備匠胡元美其名者妙得於志知名浙江以紹興二十八年八月丁已一冶而就随叩響發鏗鍧雄渾溢於四境觀者疊足巷無居人咸謂宜有欵識以詔來者屬同郡太簡居士劉一止為之銘銘曰我佛如來方便㣲妙考鐘弗先謂失樞要惟者祇園具存典則大士圓通多從聞入聲徹幽途咸息苦趣問故以然罪性空故佳哉妙工一冶而就出以機軸鏗鍧随叩我願聞者了自聞聞聲念相發於彼朝昏六用既冺返流得源是聞與聲俱滿太千吁此氣寳作鎮山邑期億萬年與宋無極鑄鐘疏黒業現前㝠途長夜衆生自息罪性乃空惟鐘聲之逺聞發耳聞之深省豈獨脱苦趣於沈淪幽暗之域抑將囘净念於醉夢顛倒之中此是藏教苦口丁寧只要檀那甘心佈施共成兹事幸弗失時徳清乾元寺重修齋厨疏千嵗寳藍枕山臨水二時清衆洗鉢同堂上方之香積不來禪悦之珍羞難飽欲使食輪之先轉豈容庖舍之弗嚴恐有本分衲僧不曽嚼破一粒米便是古徳叢席也要生處三條椽惟大檀那與人安樂募財重脩孔侯廟疏山翠攢叢鵝屢鳴而表瑞浮流衍迤龜左顧以懐恩寧惟前代之美談兹乃一方之勝事惟新進之家鼎盛而故侯之廟獨隳棟宇前欹日星下徹矧豐年之洊至豈隂祐之敢忘毋事多言共興此役飛英寺縁化修塔疏溪城萬室錯居洲瀦之間宰堵一封髙出水雲之上號稱文筆又頻鎮山豈惟増氣槩之峥嶸實大係士民之休戚詎意百年之勝横罹半夕之災所冀檀那深詳利益阿育王之願力黙運胷中多寳佛之神通悉由筆下作興此事今正是時江山静疑院鐡磬老師通公真贊堂堂律師了無止乗律被役生約束如純我疑叩師師笑而嘻曰我無心法無所依以無心故説持説犯以無法故横竪鈎貫我知是師説本無説身心了然片雲孤月江山嵯峨宛在世外訪師遺蹤惟鐡磬在片雲出山孤月麗天鐡磬不鳴聲滿大千自作真贊枯木寒㣲形影相依禄食而臞孰與遯肥四十九年我知其非已往不諌來者庶幾又自贊居閑無所樂從仕無所愧忽作此两言自省過去事害性多矣晚乃安苦心至矣晚乃甘咄我無初終得喪兮又何乗除於其間黄草道衣贊吳人緝黄草若麻苧貧且賤者服之聞聞居士始用作道衣并為之贊云何草不黄誰其紡績持以售人得不償力居士少賤組麗是飾力貧作奢終愧於色居士老愚山澤放逸下澤有車登山著屐被此草衣相羊自適倦鵠依林野麋卧石雄此草黄不失土職不以本然随彼染習戒哉居士服之無斁餘年幾何以永厥徳任公子言其先君奉觀音大士有感供果不枯而長太簡居士劉某戲作此偈無根柢而生不雨露而澤是事云何誠意感格當知世間明暗空色種種形相從心地植我問公子承誰恩力若箇是空若箇是色公子不言一笑而答言箴余惟不言人或以我為簡余惟多言則懼取謗而招尤嗚呼其危矣哉余將處夫言與不言之間曰加思而已動箴輕動易舉事或失所利害在人怨汝詈汝擇焉而動動不失職君子是怙小人是疾則將奚處曰失得勿恤勸發大菩提心廣博荘嚴供飬會總録序蕭閑老人周嘉仲往在政和間两慕道俗於錢塘南山净慈禪寺建發大菩提心廣博荘嚴供飬勝會自製勸發心文及答白疏語詞㫖周盡懇到悲切意者以衆生背覺合塵攀縁善惡流轉生死為可哀愍於菩提中雖或今生見聞随喜中又畔違如隔日瘧以其未嘗知發大心心與境争力强者奪中又畔違無足怪者故為此勝會中人下成佛作祖種子嗚呼偉哉時釣臺先生諫議江公實為之記又為智炬白語精潔奥妙閎肆演迤讀其文知其致力於斯事非一日矣嘉仲以前後矩範及製文與釣臺之作合為一集屬余為之序余觀世間未有不由發心而能有所建立非特佛氏之言也所謂大心者槩而言之曰出世間心曰堅固心曰决定心以出世間心而行世間事且輔之以堅决則處成敗利害死生禍福之間初若無物當行則行當立則立視身世如浮雲視死生如晝夜視軒冕富貴如棄涕唾如其不然則顔子不能居陋巷而樂仲尼不能不畏匡而不憂夷齊不能重節義而死子房不能辭功名而去商山翁不能傲富貴而不來而况以出世間心而行出世間法者乎雖然是心豈有殊哉所謂出世間抑非两法也釣臺先生以清節直道仕於朝論議之偉士大夫能誦之而蕭閑老人者年踰耳順官不過下大夫職不越州縣纍然坐環堵靣有孺子之色而心苦作佛事心存救物其事為可哀故余論人必察其用心而不敢以窮達為重輕余既嘆蕭閑之勤而又喜釣臺之文為足以増重於斯事故并叙之紹興十三年四月乙酉吳興劉某序錢氏箕裘集序右錢氏箕裘集武肅王之六世孫名悦字稷臣者之所作也武肅以兵拒巢賊討劉漢宏誅董昌盡有吳越之地尊奉上國四傳至忠懿王武肅躬蹈忠孝又以訓子孫而忠懿奉承惟謹方太祖皇帝之下江南也忠懿提兵取常潤已而來朝京師太祖慰遣甚厚太宗登極卒以國入覲而吳越之民幾二百年不識兵革其隂徳之茂在人膺肺間至於今未忘也士大夫喜道其事而傳聞異辭或不審諦故稷臣累其祖宗建立傳序次苐以家世榮遇人才瑰傑有聞於時者若干人以為止集所附之家譜屬余序其後余嘗觀自昔門第之盛席勲舊姻戚世公世卿寵遇赫奕不為不多故獨以恩澤聞而人才輩出表儀搢紳如錢氏者未見其比豈其世徳所鍾與他異歟異時位孤棘秉旄鉞者余盖識其一二即之退然如窶人子論道古今考質疑義以自樂於名教其意豈肯與恩澤侯比其有挾冊覔舉與寒士較得失率攻苦食淡淬勵事業使余愛嘆之不已也况前輩碩儒所謂一門三學士三世四賢良與其政績行義超詣卓越余之所跂慕願見而不及者哉以是知人物門第事不两全錢氏既兼得之又何多耶如其不然雖金張之盛七葉珥貂亦無取云稷臣在宗族中為最不遇者客居異縣纍然坐空廬讀古書行古道靣有藜莧之色是余寂寞之友也紹興十七年十一月辛夘吳興劉某序慧和尚四會語録序師諱居慧吳興人俗姓吳早嵗習天台教已而更復入叢林從甘露長靈卓公得道尋出世為人閲四名刹曰天聖曰靈名山崇因曰何山宣化曰道塲山䕶國既示寂門人道樞集四會演暢語句成編俾信士刋行散施開悟後學屬余序之余嘗謂釋迦之親付飲光單傳心印不立文字謂之教外别傳是不容聲矣然從上祖師一時言言流傳世間已既甚多為有言耶為無言耶世尊良乆外道得入既不在言語有無之間亦不離言語有無之間或曰此有得焉則知從上祖師與師之心一也師住道塲最乆學徒四集觀其與人處傾囷倒廩無所盖藏老婆心且於是為至古徳云盡大地是解脱門把手拽不入師意直欲出一隻手一時拽入耶余恐得入者并門失之是乃師之意也歟紹興二十七年二月十日太簡老人劉某序苕溪集巻二十四
