body:
  text: 苕溪集巻八宋劉一止撰挽詩哭吴亦虚一首用方時數韻髯吴少年日輕居駕飛黄授簡千人中風流藹東梁梗植苦不牢一朝隕清商誰者不歸盡我獨哀此郎人物秀且美叔夜慙龍章眼看一坏土瘞此白璧光空餘百篇詩老語驚摧蔵孤兒將誰頼門戸如氷霜我非山巨源感念徒悲傷恨墨慰九泉別語尚微茫亦虛臨別属余為銘吴彦和朝散挽詩二首挂冠歸去何曽老賢達誰如此大夫白傅寧惟結香火季鷹初不為蓴鱸岸巾扶杖方行樂㝷壑經丘失歩趨惆悵眼中前輩少更憐鄉國後生孤又談經析理老逾工家學諸郎得馬融心逺自無流俗駕語真端有古人風每容晚進壺觴共尚許殘年杖履同悽斷松杉封馬鬛不堪持酒酹橋公吴公立承事一首脫蛻超然不可尋了知胸次未宏深智謀誰復如樗里緩急惟思扣季心驚見丹爐無宿火欲慿遼鶴間通音邦人豈識神仙事競挽䘮車淚滿襟徐仲常朝奉一首豈弟臨民契昔賢政成終是弛蒲鞭暮年三徑師元亮故國扁舟老計然北陌東阡遺杖履後岡前道鎖風烟郎君秀美如圭璧會有㤙光賁下泉魯居士二首臧否何曽挂心真語自真風波諳末俗金玉見斯人大厦方巢燕新岡巳卧麟死生知是夢灑落更誰倫又自忝知心舊常如識面初情親終近古識逺勝知書水宿同烟艇山行傍筍輿眼中無此老灑涕獨沾裾悼忠顯劉公二首將相開邉隙煙塵入帝州痛心惟主辱何意辨身謀義氣摧山岳髙居照斗牛天令光史册為洗百年羞又重義何難死知恩忍自欺豫生真國士南八是男兒天地一朝黒風霜千嵗悲至今瞻拱木人口勝豐碑㕘政大資張公二首遇合時多故風雲氣自强補天煩大筆醫國見名方惻怛憂民意殷勤薦士章可能遺一老誰復問穹蒼又塞壘烽初息留都倚重臣奸驕隂奪氣政化本如春得展中興具寧論獨病身空餘門下士悲恨不勝陳方祕監允迪二首聲名三紀在中州身到蓬山最上逰篤行豈惟今代少摛辭仍向古人求獨嗟宣室催歸晚不料漳濵卧病留慷慨嚴尤三䇿在暮年誰識子心憂又同舍西廱四十春亂離君我兩身存寧惟交道全金石罕見人間此弟昆雅志澤民終莫遂微言憂國豈堪論鸕鷀渡口千峰合悽斷西風淚睫昏方司業一首三紀飛騰近要津聲名磊落動朝紳當時薦士韓安國早嵗談經井大春芸省並逰今㡬在螭坳立處夢曽真蹣跚西望門生老悽斷雲山淚滿巾莫奉議一首五斗難堪志願違斜川寧與宿心期自持雪柏霜松操直到雞皮鶴髪時身世㡬畨驚懼夢功名一局半殘棋髙風獨與齊山並他日行人口是碑梅子漸朝議一首世事何曽有到頭此心安處便休休田園竟老陶元亮鄉里誰如馬少㳺樂施輕財知氣概飛觴舉白見風流吁嗟四十年前夢追愴經行泪莫收叔父朝請挽詩二首厲節氷霜似摛辭錦繡如誠心惟濟物老眼更便書備養今誰及辭榮計未疎郎君官巳貴門戸合關渠又四紀儒林譽談經我一門那知詩禮學晚失父師尊阡陌南陽舊松杉厚夜溫心推寒日落淚盡晚雲昏詹閣學持國二首元祐崇三舍詞塲次第開兩科踰萬士一日見連魁圭璧知難售鵷鸞獨晩陪亂離身巳老不復夢東台公元祐間為太學三舍魁是嵗秋試進士公又為魁同日掲榜聲喧都城又至行無瑕玷今人見古人傷時心獨切接物語能真丘壑尋春舊松杉堕淚新飄零一樽酒無復聴諄諄賈居仁侍郎一首禮樂三千字論思二十年聲名江夏愧志節祖生先閲世初何有安心晚更賢對棋無復日悲涙𣺌林泉少保左丞葉公二首翰墨餘千載哀榮付九原松杉倚幢節愁絶暮烟昏又文章千古事富貴百年身並世今餘㡬如公孰擬倫軒裳清夢破邱壑此心親歎息常編㫖無從舉似人李方叔侍郎一首論議當今聳外庭英英人物照丹青文章共道追千古訓誥曽看嫓六經疇昔鵷行今㡬在異鄉薤露不堪聼老成逺矣何嗟及聞說郎君有典型周元舉侍郎一首迴翔三紀到丹泉始覺深歸雨露邉黄霸聲名初不减吾邱智略孰居先勤勞再見雲横嶺志業空驚雪滿顛愁絶故山三徑晚不堪持酒醉風烟葛魯卿待制一首先皇隆教育師席重朝紳模楷歸元禮紛綸仰大椿壮猷初未究歸計乆逾真邱壑平生事何人得此身又論議超今昔文章適典彛老成嗟已逺後學欲誰師封域南陽舊交親北陌悲他年門弟子下馬闕鄭維心二首我懐谷口孫氣貌清而腴山潛三十年吐此百巻書又嗟哉谷口孫幻去何摧蔵骨冷歸九原古意堕渺茫恭人黄氏一首方允迪秘監之室半世安貧家自宜瀛洲進退本觀時随身况有居山服傍澗寧慙采藻詩案上鏡奩今寂寞林間風日倍凄悲山公取友先嵇阮永愧論才得誤知安人陳氏一首孕秀名卿族來賔吉士門夫從中嵗達家至暮年溫意淡如忘物身安只弄孫鏡奩今寂寞遺懿不勝論孺人張氏一首慈恵閨門浹清真意不私召臣有賢操毋得是我師家近青烏卜名傳黄絹碑馮勤終貴寵他日豈勝悲夫人趙氏三首疏沠天潢濶天孫賦錦裳佳祥來吉夢淑徳舊休光同室中興日唐家異姓王長人勛業茂恩澤未渠央又曽謂閨房奥忠誠意有加相夫惟以義體國乃如家天上期何近人間日易斜綸言知甚寵誰為寄雲霞又帝胄恩榮久夫人獨儉勤仁心見輿誦孝行溢前聞疇昔牛眠地而今鶴弔坆家聲應更好少長捴能文沈夫人二首婉娩閨門秀安貧六十春相夫惟禮義玩意獨清真蜀道靈歸逺吴山兆卜新哀聲傳北里悽感路傍人又盛徳髙門閥榮光動里間如符偕老願端闕此時慳幼婦辭新刻仙逰夢莫攀吁嗟褘翟貴不立内朝班俞居易閣學二首事業更中外論思契冕旒年雖瀕釣渭志不在封留慈愛平生念歡愉末路收遥知謝公客揮淚過西州又奕世論交地紅花巷陌春僕所居舊稱紅花園揚雄一居宅晏子百年隣逰倦歸相踵身閒意更親那知從此別老涙損天真苕溪集巻八
