body:
  text: 苕溪集卷二十七宋劉一止撰請䟽題䟦一請承天文長老䟽道人分上隨處縱横佛氏門中臨時顯設而况開千年之祖席新一日之叢林頃是作家承當此事長老文公天僮嫡嗣黄龍諸孫久為道俗之宗師端是人天之眼目機鋒電掣棒喝風生惟承天道塲盖㑹稽名刹百衲之規繩久廢溈山之警策無聞近自琳宫復歸蘭若尺天寸地共知道化同流萬壑千巖請向要津坐斷當仁勿避正令湏行請天章長老再入䟽在在處處皆是道塲刹刹塵塵無非佛土而况風篁絶景巖壑故棲修竹茂林有東晉羣賢之勝蹟琅凾鈿軸藏西清列聖之寳章惟此住持不同眇小長老某人機鋒獨出福慧䨇行雲門宗支密傳心印蘭亭世襲自立家風此時無異彼時已住不妨再住直湏化出善財彈指之閣再安維摩方丈之居是為末後神通為作當来利益僉言所属仁者何辭請天寧覺長老䟽越絶城中宫如化出􅌥堵坡下峯是飛来鐘鼓四聞烟雲環拱堪作人天眼目方可住持正當時節因縁不容放過長老覺公宗門先覺古佛後身誓不二于黙然擲大千於方外全潮不露孤月現前雖云自已家風要是為人邊事臨時顯設在處神通無舉足下足之殊何彼方此方之擇再試金剛寳劒拈出古廟香爐尺地寸天同歸指掌千巖萬壑此是要津已属當仁不妨坐斷請天台教院開闍黎疏一心三觀盖從空假中求萬論千經不離言說邊事兼融此義湏假通人闍黎開公威徳嚴身清真拔俗游戯三昧心筆力為神通和㑹兩家作儒書以術事惟天台净刹據越絶要津自利利他正要㕓中之隱無說説法始名教外之傳僉曰當仁毋勞㒺避請圓通教院如闍黎疏領畧真機覺悟止縁一宿縱横妙㫖談説至於九旬有覺非真多談亦妙欲了此間勝義直湏本分導師闍梨如公學道䆳深辨才通敏支遁之善標宗㑹雅䝉謝傅之知道安之畧徧羣書宜得習公之譽矧圓通之古刹號靈感之道塲人于大士有縁食是諸天打供茍非宿望難服衆心舉歩而識象王兹焉取法探穴而得虎子誰敢争行教僧舊呼師為如虎子要恢東越之宗風無愧靈山之聼象請天長知觀蕭法師疏鑑湖一曲琳館百楹草木葱蘢烟霞清潤賦詩載酒䟦翰林外監之蹤騎氣御風有安期羡門之侣惟是勝士乃堪此居知觀法師挺㧞俗之孤標秉棲巖之素志丹經石髓曽遇異人金母木公為傳真語主張道紀領袖羽流庻幾惠然肯来為成此叚竒事請龍瑞知宫棲法師疏㑹稽鎮山陽明洞府齋宫宏啟羽帔四臻必等名流為扶道紀知宫法師神棲物表心拜帝關讀三洞之秘言受七真之妙訣飛符噀酒未忘救物之誠採术茹芝便作住山之計僉言所属仁者何辭龍瑞宫開堂疏太上妙道體合自然三洞靈文言無韻麗欲開此祕必得其人知宫法師慕箕潁之高風有孫許之逸韻巖棲穴處不妨風馭之從游心拜黙朝自覺帝關之咫尺来從東秀坐鎮陽明傾耳蘂書浣心益衆祝君王之萬壽賛寳祚之中興題褚氏印施金光明經後㑹稽褚邦直印施大乘金光明經薦嚴二親用報㒺極属余題其後毎得書問無恙外未嘗不以為言余謂孝子之于親無所不用其至以為親之徳不可報者終於不報而已若曰必報在一念頃盖以周徧十方於光明㑹王菩薩諸佛如一一親至其前承事供飬無空過者而况此經一句一偈一字一義了然在目其為莊嚴亦豈有量乎哉余之言無能加損也紹興五年十二月戊申呉興劉某題䟦李尚書贈政上人三詩政上人擕尚書隴西公送行三詩見示将刻之石俾余䟦其後隴西公胸中如水鑑所見外物不能以情遁師既經題品矣黃龍三關不足道也紹興五年三月日呉興劉某題題章致平丐父内徙表後故禮部章公刺血上疏匄父内徙懇到深切辭氣交盡既上半嵗而得請家人子弟鮮有知其事者後四十年而公之真蹟乃存於一故時相之家公之次子今上饒使君實得之嗚呼豈偶然也哉豈偶然也哉使君不圖見請且使䟦卷軸後某伏讀數過且喜且悲之悲公誠孝之實久埋而未耀喜公之有子能致之於流落艱難之中俾公行義畧見於此書而世襲之美抑他日又有大焉者也紹興十四年六月某日呉興劉某記䟦司業許公墨帖後司業許公在太學時某為諸生實相先後因獲從師徳游公行義文學一時宗師非但鄉里後進如某者知敬慕而已逮今逾五十年前輩軌迹既不可追師徳又下世而得此卷軸於師徳之令子展讀感歎謹識䟦孫求仁運属夢記石刻後求仁三嵗而孤又二嵗喪所恃寄飬外家世間可悲愍事無越於此當是時人其謂我能自奮身大其家風種學績文為多縉紳光賁泉壤如今日之懿乎成否有命雖求仁亦不敢自必抑其先徳有以見符見於夢寐殆誠孝所感發云紹興二十九年六月辛丑呉興劉某書䟦南宫唱和詩後太僕公最先得詩名後来宗英皆莫及計與東坡先生同官時距今七十年中間某居太學不敢以姓名累典謁晚乃得此卷軸於公之曽孫師醇某年已八十矣追前軰事三歎而歸之紹興丁丑八月上澣吴興劉某題䟦莫用之書藏經同郡莫用之未老而請老好閒而得閒予甚喜之久不得靣一日持所書釋氏藏典曰寳積華嚴涅槃經及大智度論等累四百五十餘卷通為四十八函見示以薦其親又於報本禪院創修輪藏以貯此經累嵗而後辦嗚呼亦良苦矣予真為之喜三歎而歸之曰用之於今志願已畢真得閒矣真得老矣紹興二十九年七月丙戌劉行簡書題費校書被召書命軸後毗陵費懿恭校書之子錯為歸安丞一日過余出其先君同陳去非大叅張彦寔舍人召對書命於今三十年三君子皆一時名士士之畏服者也其後陳張二公位通顯懿恭僅居三館已而歸隱錫山再召不起盖其志也世人以進退議得失余以謂士各有志亦有命焉茍遂其志均為得也何失之有獨喜懿恭有子能世其家若相乘除云紹興三十年正月闕吴興劉行簡書苕溪集卷二十七
