body:
  text: 苕溪集巻十五宋劉一止撰故事漢武帝向儒術丞相竇嬰太尉田蚡亦俱好儒術推轂趙綰為御史大夫綰薦其師申公天子使使束帛加璧安車駟馬以迎申公既至天子問治亂之事申公年八十餘對曰為治者不在多言顧力行如何耳是時天子方好文辭見申公對黙然然已招致即以為太中大夫舍魯邸命議明堂事臣嘗謂申公之言天下之至言也自古好治之君未嘗不慷慨思見天下之賢士求天下之議論次第而施行之已而利害之實旣了了扵胷中則忍而不能决見利不克興知害不克除談有餘而實不足者往往皆然中庸曰好學近乎知力行近乎仁武帝之初盖未辨知此也故於申公之對有惑焉其後罷黜百家表章六經制禮樂易服色典章文物燦然大備意有所在皆力行之不見甚難安知非申公之言有以發之歟使其所行不改文景之恭儉向專在於愛民利物之間則後世必以為賢哲不世出之君矣然武帝席文景極治之後於天下之事尚謂猶不可不力行如此况多難之時乎臣故曰申公之言天下之至言也魏文侯與士大夫坐問曰寡人何如君也羣臣皆曰君仁君也次之翟璜曰君非仁君也曰子何以言之對曰君伐中山不以封君之弟而以封君之長子以此知君之非仁君也文侯怒而逐翟璜璜起而出次至任座文侯問寡人何如君也任座對曰君仁君也曰子何以言之對曰臣聞其君仁者其臣直向翟璜之言直是以知君仁也文侯曰善召翟璜入拜為大卿臣觀翟璜之諌近乎直任座之諫近乎諷諷諫為上直諌次之何也二子之諫同出於忠也任座能正其逐諌臣之過而翟璜不能救其封子之失是直不如諷明矣然則翟璜知直之可為而為之歟抑知其不可為而故為之歟曰如其不可為而故為之有恃者也然則何恃也曰恃同列之有君子也使同列有非君子者交鬭其間鬼神勿助之翟璜之禍豈特見逐而已哉然則任座謂文侯為仁君其出於誠耶其不出於誠茍以救其過耶曰是惡言也事君者可不以誠乎哉君子之諫其君量而後入不入而後量所謂任座者固恃其君之能改過而翟璜亦知其終見容也特先發後繼勢有不同而已然則如文侯者安得不謂之仁君乎嗚呼同列而無君子不可以立人之朝矣何獨翟璜古之人皆然要之朝多君子不問而知其君之為仁君矣魏武侯謀事而當羣臣莫能逮朝而有喜色吳起進曰今者有以楚莊王之語聞者乎武侯曰未也莊王之語奈何起曰莊王謀事而當羣臣莫敢逮朝而有憂色申公巫臣曰君朝而有憂色何也莊王曰吾聞之諸侯自擇師者王自擇友者霸是已而羣臣莫之若者亡今以不榖之不肖而議於朝羣臣莫敢逮吾國其幾於亡矣是以有憂色莊王之所以憂而君獨有喜色何也武侯逡巡而謝曰天使夫子振寡人之過也臣嘗謂人主之憂莫大乎國無謀臣茍無謀臣不可以為國矣故有為之君不以獨智先物為能而以衆智不足為憂懼事變之鼎來而謀不勝應也今羣臣之謀反不逮君謂之無謀臣可也楚莊王之所憂而魏武侯乃以為喜是何見之相戾耶晁錯謂五霸不及其臣故屬之以國任之以事使其臣之謀乃不逮君則臣知其不能霸矣漢髙帝嘗曰運籌帷幄之中决勝千里之外吾不如子房盖不以不如為恥此其所以能兼衆智屈羣䇿而成大功也書曰能自得師者王謂人莫已若者亡謂人莫已若者好自矜大而已然猶懼焉况其臣真莫及之將誰與謀臣故以國無謀臣為人主之大憂也魏文侯謂李克曰先生嘗有言曰家貧思良妻國亂思良相今所相非成則璜二子何如對曰卑不謀尊疎不謀戚臣在闕門之外不敢當命文侯曰先生臨事勿譲克曰君勿察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍吾之相定矣臣嘗聞前修之言以謂知人無法臣心疑之夫知人堯之所難也故皋陶為舜陳九徳之事曰寛而栗柔而立愿而恭亂而敬擾而毅直而溫簡而亷剛而塞强而義此知人之訣也而謂之無可乎及求之孔孟之書而得其説者有二曰視其所以觀其所由察其所安人焉廋哉一也聴其言也觀其眸子人焉廋哉二也然後知是道也不可以言可言者其迹而已至於曉然獨得於心者豈言之所能盡哉謂之所以也所由也所安也與夫言辭眸子之間不知何者為是何者為非何者為君子何者為小人皆未嘗言其狀而大佞似聖大智似愚亦未易以此辭辨察則知人之難也雖聖人不敢易言之然則知人之道非内明而無所蔽惑又惡能曉然獨得於心哉惟明也一見而得之眉睫之間為有餘如其不然則終日與之言而不知其人之心由是論之所謂知人者謂之無法可也皋陶之陳九徳特言其所可言者與其成徳之事而已其不可言者不在是焉魏文侯謀相而未定也問諸李克克以居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之文侯之意遂决其故何哉公子成與翟璜皆賢也文侯固知之深矣其得於所親所與所舉之間豈一日之積哉不然不如是之决也臣獨喜李克之言誠有助於後世知人之道雖所謂獨得於心者不在於是而於吾聖人之説亦無所戾云楚莊王問於孫叔敖曰寡人未得所以為國是也孫叔敖曰國之有是衆非之所惡也臣恐王之不能定也王曰不定獨在君乎亦在臣乎孫叔敖曰國君驕士曰士非吾無由貴富士驕君曰國非士無由安强人君或至失國而不悟士或至饑寒而不進君臣不合國是無由定矣夏桀商紂不定國是而以合其取舍者為是以不合其取舍者為非故致亡而不知莊王曰善哉願相國與諸侯士大夫共定國是寡人豈敢以禍國驕士民哉臣竊惟國是之説不聞於堯舜三代之時莊王之問叔敖之對不知何自而言其無乃為姦人之資乎天下之士一是一非寧有定哉君子之所是小人以為非小人之所是君子以為非雖一物之是非有不能定况於國乎君人者知任賢而巳任賢勿貳去邪勿疑君子進為小人退聴羣枉之門塞衆正之路開君不以已之取舍病民臣不以巳之愛憎㒺上如天地四時之化未嘗有心如是而天下不治者未之有也又烏取國是之名也哉如其反是所謂小人者亦將立國是之名闕天下刼持其君使必從之賊害善良植其徒黨而天下日趨於亂桀紂之主以合其取舍者為是以不合其取舍者為非則是私欲已勝無所適從尚何國是之有而叔敖乃曰由不定國是而亡豈不陋哉嗚呼名不可妄立也審矣名一立必有挟斯名以為奸如前所云者臣故曰其無乃為奸人之資乎李道裕於貞觀末為將作匠有告張亮反者詔百官皆言亮當誅獨道裕謂反形未具帝怒不暇省斬之嵗餘刑部侍郎闕宰相屢進不可帝曰朕得之矣是嘗議張亮反者朕時雖不從今尚悔之遂命道裕臣竊謂臣受知於君不以一時遇合為難而以知其心之所存為不易太宗之於道裕也始棄其言卒乃用之豈以疇昔之事為過而悔之歟曰不然太宗願治之主也其措心積慮未嘗不在於天下國家雖一事之疑必悔之况其平時欽恤用刑每决死罪必三覆五奏而後定意太宗之斷未必為疎而追悔不忘若是者豈恤刑之心誠有合耶嗚呼人主未嘗無願治之志然而不克有濟者誠不至而已矣茍出於誠則反覆念慮浸乆而不忘惟其當而後已故於聴用之際有合於其心者雖棄之於前而收之於後不以自慊也若徳宗之於陸贄則不然當危難時惟贄言是聴天下既定乃追仇盡言怫然以䜛悻逐猶棄梗焉以此一事足以觀人主之用心矣何必多耶苕溪集巻十五
