body:
  text: 苕溪集卷三十三宋劉一止撰外制崔邦弼朱中興叙復軍賞轉官勅具官某爾捐軀抗敵屢立戰多載疇昔勞申以書命益思勉勵以稱所䝉可汪藻修史成書陞顯謨閣學士勅朕任賢能而責實惟恐或遺懋爵賞以勸功不敢有愛矧禁林之舊徳著藝苑之殊勞可無渙恩以昭至意具官某學貫九淵之邃才絶千人之英昔膺使令服在近密崇論宏議有補於時大册髙文悉出其手悼念兩朝之故實曽無一字之遺餘出自爾心不煩朕訓緝文辭於斷簡問黜陟於故家逺近異同靡差嵗月品彚條貫燦若日星搜羅旁逮於測幽誦意不忘於寤寐左思作賦既殫十稔之勤馬遷成書自立一家之法此其闕深用歎嘉就陞延閣之華申錫賛書之寵豈惟今日見國體之増光抑使異時并爾名而不朽服我休命益勵厥修可鮑廷祖孟處義各轉一官勅具官某朕惟軍興以來典籍散逸兩朝故實㒺有遺餘肆命儒臣俾加纂集成書來上煥若日星載嘉積嵗之勞抑有乃僚之助爾等修潔博習富於藝文懋賞稱功就官一列服我休命其尚知榮可康順茍得以軍功各轉一官勅具官某爾鄕者奮身捍敵第功甚明懋賞進階以為爾寵其尚勉旃可曹芬循文林郎勅具官某向者南安近邑狐䑕嘯呼旋踵就擒爾與有力進官一等其尚勉之可張學換給付身補右從侍郎勅具官某爾以白丁從軍屢進官秩閲日既多朕方懋爵賞以勸功雖若爾者亦不遐棄申以書命其益知榮可李彪換給父陣亡恩澤付身勅具官某向者爾父奮身抗敵死於忠義恩逮其子既閱嵗時申錫命書以光存殁可夏侯旦捕㓂有功循右從事郎勅具官某海隅之民凴恃險阻殺掠人而奪之貨無嵗無之爾督捕俘獲厥職甚修朕心嘉焉懋賞進階其益知勸可王勝叙復敦武郎勅具官某爾以事貶秩在洗心前甄叙之恩務從優此宜知奮勵以寵榮可江端卿王琮劉居海並贈官與一子恩澤勅具官某爾等為督部之官捍賊殞身職也人孰不死冺然無稱與草木共腐者多矣爾何悵焉用錫愍章并錄其子以慰爾靈以為義士之勸可呉武陵獻更化論循兩資勅具官某昔漢文帝戒張釋之毋甚髙論令今可行朕於是知人主所求貴適於用非以甚髙難行之言不可企及之事為足說也爾獻書公車勉朕更化條陳部别粹然可觀詩曰無言不酬懋賞進階以為爾寵且爲能言者之勸可劉敦常向子昌祝師龍各降一官勅具官某大農之錢實國經費凡其出納各有司存爾等無所禀承果於移用章劾既至朕何敢私聊褫一官以戒来者可呉時澤降兩官勅具官某爾律身不嚴䧟於吏議比從閱實過惡暴陳服我寛恩毌忘自訟可韓昭叙復右中大夫勅具官某曩者命將授師列屯江右船粟往哺爾期積愆念頗閱於嵗時亦既經於蕩宥甄叙官秩以觀後圖可劉子翼上官瑛許克明蔡宰陳大輔並降一官勅具官某國之經費實在大農其郡邑賦租與户口登耗之數有不得不察乃者命取其凡上之省户稽其多寡而勸懲焉今部使者以爾過期不報劾章上聞罪其可逭貶秩一等以罰其偷且為來者之戒可趙俊等以戰功轉官勅具官某曩者瀕江郡邑羣盗肆行爾等擐甲先登屢見俊獲有嘉忠勇序進官聨服我茂恩尚圖来效可左修職郎陳最改左承事郎勅具官某爾以儒生習於韜畧論議根據靡靡不窮沈伏下僚莫克施用以功自見朕用汝嘉錫之渙恩俾階京秩其思勉勵以稱所蒙可魏堯臣等起復補官勅具官某朕得忠賢授以使指俾其考度自擇乃僚爾等起自奪情就加命秩是為異數往服厥勤可淮西叅議官李健叙復左朝散大夫勅具官某爾向者坐累貶秩在洗心前更閲嵗時復見錄用甄叙一等滌爾丹書服我茂恩尚圖来效可李回追復資政殿學士依條與遺表恩澤勅朕禮遇故臣事存懿典極哀榮之終始憚生死之乖暌爰錫賛書用昭至意具官某早登膴仕被遇累朝踐更使令出入中外輔朕艱難之際粗殫夙夜之勤繼綰兵符出臨方面属毁言之坐至顧顯狀之未聞方從眞館之游遽有重泉之恨念既經於蕩宥亦頗閱於嵗時憫爾沈寃假之異數正隆名於祗殿衍餘澤於後人朕無愧於昭天爾尚圖於結草可苕溪集卷三十三
