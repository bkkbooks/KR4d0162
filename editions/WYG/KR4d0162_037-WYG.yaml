body:
  text: 苕溪集卷三十七宋劉一止撰外制蘇符除給事中勅朕敷求俊乂協濟事功惟東臺封騐之司在禁闥樞宻之地出納所係付委實艱有非其人不在此選具官某學窮壼奥業茂經綸躬古人品行之醇有先世流風之似頃從識㧞偹見猷為旋陞法從之崇遂掌綸言之重文章體裁累漢家深厚之辭論議規模畀鄭國討論之事載稽人望有簡朕心是用峻陟𤨏闈亟頒名命爾其深維事任益罄忠規逺追批勅之風毋墮回天之力尚觀來效有溢前聞可謝祖信太常少卿勅具官某朕惟多故以来禮文缺廢無所更索肆命儒臣考昔據經講求叅訂庶乎一代之典垂絶而僅存無甚恧焉爾問學淵源見謂博洽志節砥礪稱於薦紳頃為耳目天官已效謀猷之益曲臺之貳其選甚髙僉曰汝宜抑朕所属勉攄藴藉蒐補舊聞踵事増華則爲稱職可王利用監察御史勅具官某御史一員爲朕耳目之官而六察分掌列曹之事糾其稽偽慢命者以吿於上而誅賞之其任盖亦匪輕爾强識博聞度越流輩執誼堅固恥於自售退然如不能傳曰人有不爲也而後可以有爲朕有虞於爾矣其思所以稱焉可侯公達准差齎詔撫諭陜西先與改合入官勅具官某朕惟關隴久隔王靈爰降詔音往宣至意爾以才選倍道疾驅錫以恩綸俾更秩序於汝厚矣亦思報乎可黃熟轉一官勅具官某日者盗犯南安有嬰城固守之勞第賞進階往其祗服可李彌遜除徽猷閣直學士知漳州勅甌閩一方被山帯海其地狹隘險阻其俗趨利剽輕其人多文學藝能之士朕選擇賢能爲之師帥庻幾風化之美不易其宜而隂有革焉具官某氣邃識明行義甚修被遇先朝踐更試用朕召從外服置在近班西掖代言多潤色論思之益地官分職有阜財足國之方引疾執章遽求補郡辭情懇到挽留莫獲眷是漳浦有魚鹽之饒民裕而安于今爲烈爰錫左符之命仍升延閣之華朕輟侍從之良俾之均佚其自為計若䟱而于逺民則厚矣體兹至訓益􅅷爾猷可袁柟除大理評事填見闕勅具官某廷尉設属責任惟均爾以才稱叅與讞决惟明克允古有成言往究厥心以佐而長可左從政郎李棠充東京留守司幹辦官先次循兩資勅具官某朕眷中都久更戎壘留鑰之重属于近臣惟時乃僚序進官秩以寵其行爾其勉哉可莫淵等軍中過犯降官勅具官某爾等服在戎行自貽厥咎姑從薄罰以戒弗䖍其自今勉之可曽統殿中侍御史勅具官某朕於逺近之臣不能周知其才問其所主與為所主而已主於風憲之地實寄耳目義均一體必出自擇不以遷次髙下為重輕焉爾行師古人學有家法頃由簡拔更踐華要謀猷之益亦既稔聞朕思見老成召從外服俾再居言路益廣聪明惟吏之無良政之多纇紀綱未盡振舉仁賢不肖未盡襲情此耳目之臣當任其責而朕之所圗于爾者也可不勉哉可謝祖信改除殿中侍御史勅具官某爾學慕古人識通今事頃由簡㧞更踐華要亦既稔聞生之竒論召從外服俾列舊班輟自曲臺再居言路益觀藴藉廣朕聪明上下詞同殿中侍御史曽統周聿權刑部侍郎勅書曰伯夷降典折民惟刑士制百姓於刑之中以教祗徳盖禮刑之官相為後先刑辟之説匪用為威用以弼教是亦教焉而巳嗚呼使四方司政典獄之吏皆知此道其庻幾不失忠厚以稱朕心具官某端亮有守忠實不浮鈎貫六經兼通三史官在廷尉頗閱嵗時平恕之稱孚於朕聼是用擢爾攝司㓂貳卿接武法從有榮耀焉惟爾念死者不得復生益究乃心省閲成牘無爽古義可為汝嘉可曽統改除左諫議大夫勅漢諫大夫秩八百石與掌論議至國朝始制從班居内禁朕心之地上廣聪明俾補遺闕于人主莫親焉非但肅正官邪執持風裁而已疇咨列位我得其人具官某行義之修不越壇宇忠節之勵凛如氷霜多見異書明習故事是其能任獻替之責引君於當道者也雖然朕之望爾若是其至爾将何以増其所未能救其所既先使朕日聞其過劘切浸潤知自求之益而不得已焉豈不休哉可周葵太常少卿勅具官某朕念邉境肅清民物綏靖宜公朝典禮之事増重于觀瞻顧曲臺論議之臣不輕於付畀爾文偹體要學通天人頓被簡知薦居華要召從外服命典奉常益觀博物之能垂訓責成之意制度多缺冀賈誼之有陳儀注復尊頼叔孫之知變尚思稱職無愧前聞可朱勝非知湖州勅朕増隆輔郡任不敢輕眷懐弼臣起以自近庻得股肱之托有同心膂之親具官某道際聖賢學通今古體方重而任大事抱純誠而經逺圖方時多虞惟爾一徳才幹十樞之運力扶天歩之艱入吿謀猷有舟楫濟川之利不動聲氣措宗社覆盂之安辭功名而弗居寄山林而均佚粤從得請亦既淹時爰錫命于家庭俾就臨於方靣眷惟苕霅望最江吴魯公之名節尚存謝傅之風流未冺矧孝思不逺時得近于松楸而仁政所加愛不殊於桑梓茍愁歎消於田里則潤澤及于京師其服訓辭勉思報塞可吴革除直龍圖閣京畿都轉運使兼開封少尹勅具官某朕慨念中都久更戎壘王畿千里行旅蕭然遺黎凋殘今其餘幾比遣忠信之常往任保釐之托宣道至意摩手拊之至于觀風問俗之使寄朕耳目豈可緩哉爾以通才敏識揚厯中外所臨有聲是用付以輸将之職并貳尹事河圖之峻庸示寵私尚須爾成嗣有褒典可張柄除授直祕閣京畿提刑兼提舉大内不去勅具官某上同詞爾以通才敏識所臨有稱輟自望郎俾持外憲并省視宫闈之事寓直中祕以寵其行尚湏爾成嗣有褒典可趙開復右文殿修撰除都大主管成都府利州熙河蘭廓秦鳯等路茶事兼提舉陜西等路買馬監牧公事填見闕勅具官某摘山市駿通畨漢之利肇自元豐置司設監搃領之任其選甚髙軍興以來秦蜀道阻􅅷遷之政無復存焉爾才術之優見於已試心計之妙不减古人肆命爾復領是事爾惟整肅綱條時其出納與夫除蓐置廐絜泉美薦勿替於昔則以谷量馬将在于中國論撰之職用勸爾功尚其勉之可苕溪集卷三十七
