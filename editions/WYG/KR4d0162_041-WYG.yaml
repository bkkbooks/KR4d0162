body:
  text: 苕溪集卷四十一宋劉一止撰外制單孝忠昨權提舉河東常平日因賊圍太原守禦城䧟死節報國追贈五官與兩子恩澤勅具官某昨者㓂犯太原爾以部使者厲兵扞格與城俱亡報國以身英風可想得其死矣復何憾焉錫以命書畀官五等并録其子尚其鍳哉可鄭剛中充陜西宣諭司叅謀官李若虛叅議官勅具官某朕惟關陜之民思見漢官閱日既久肆命近弼往諭至懐惟時官僚實出遴選爾智識之明議論之偉從容册府李若虛云從容省户譽處甚休其為朕行往佐而長進官一等庸示寵私可江少虞等充宣諭司属官勅具官某朕念三秦父老思漢謳吟為日久矣肆命近弼布宣王猷諭道徳意一時僚属考擇異能爾等咸以才稱見謂通敏進階之典用寵其行尚其勉之可王晞韓穆平曹雲葉光宋有黄汝礪並充准偹差遣勅具官某弼臣將命自擇從行進秩之榮為爾光寵可簽書樞宻院事樓炤封贈三代并妻曽祖贈職方員外郎關可特贈正奉大夫勅朕敷求哲人與之共政既進服大任推本其先寵逮三代盖國之典也具官某曽祖贈職方員外郎某秉志純篤行義甚修含光韜華初則未耀蓄積之慶益於後人是生聞孫惇大敏明用勱相我家以宏賁爾宗兹朕陞爾位秩於正三品俾吿幽泉没而有靈服此休命可曽祖母永昌縣太君吴氏可特贈恩平郡夫人勅人之為善在隱約幽閑之中知自信而巳不知有他日之報也譬彼服田我度我荒既臻於成乃富厥藏雖欲謝之其可得乎具官某曽祖母永昌縣太君吴氏言行無疵禮儀有度克相君子肇開慶基有嘉曽孫為朕哲輔圖任之始用錫渙恩正位小君疏封大郡光靈未冺尚克鑒兹可祖贈金紫光禄大夫定國可特贈太子太保勅士有率義蹈禮以律其身强識博聞以昌其業而位不稱徳實浮於名流澤之長乃在後嗣較其所得孰寡孰多具官某祖贈金紫光禄大夫某儒學起家休有聞譽飲水厲志清畏人知然職不越州縣禄不過下大夫再世而昌自逺有耀惟時聞孫作我良弼碩大之慶於兹鼎来朕於是知為善之報弗克躬享固未為不幸也東宫之孤秩視二品吿於幽隧用慰爾靈可祖母華原郡夫人郎氏特贈永寧郡夫人勅為善之報不差毫髪而耳目所及則有逺近故議者惑焉具官某祖母華原郡夫人郎氏婉娩肅恭動合禮法流慶之逺在其賢孫登用之初國有彛典疏封大郡申錫寵章嗚呼亦足以少慰矣可祖母宜人葛氏可特贈徳陽郡夫人勅女子之行在於幽閨所不得聞也逮其積累之厚天亦必隂報之慶之所鍾再世乃大豈非䟱而不失者乎具官某祖母宜人葛氏冲静儉勤不越壼則啟相後裔秉執事樞爰䟽大郡之封肇正小君之號吿爾私廟以為閭里之榮不亦休哉可父見任右通議大夫致仕居明可特封右通奉大夫致仕勅朕惟前代盛王靡不尊徳尚齒以為風化之原故於耆艾之英上大夫之貴去位而家居者則肅然慕之見於言色况其有子位列弼臣為朕倚毗者乎具官某父右通議大夫致仕某修身為君子之儒賦政得古人之秘潔亷厲操有若冰霜公恕臨民具有矩範桂冠神武自樂邱園亦既久矣爾子某以忠恪輔朕秉執事樞謀謨之良悉由義訓逮兹圖任之始敢後褒崇之恩申錫賛書進階一列惟爾偹福鮮其比焉可母碩人范氏可特贈碩人勅人子之於親皆欲極報崇之典然出身事主遇合實難非其志行之修自致通顯未有無所恨焉者也具官某母贈碩人范氏淑順祗肅表於宗門克相其夫不愆禮義遺澤所逮有此哲人既進位於樞庭益侈大於厥家申錫愍章為爾光寵神靈如在其克欽承可母碩人歐陽氏可特贈碩人勅朕惟明倫善俗孝為之本因心廣愛政之所先顧所與二三大臣共圖風化未嘗不加意於斯焉至于褒崇其親在典禮所當然者朕其敢有愛乎哉具官某母碩人歐陽氏婦順母慈儀於宗黨徳行之闕而彌芳是生寳臣克輔國家獨不得遂偕老之闕南陔之養朕心憫焉申錫命書吿於幽扃用侈爾闕子之榮亦昭我得賢之慶可妻淑人林氏可特贈宜春郡夫人勅朕登進尊賢儀刑百辟觀厥身修之懿議其内助之由故鵲巢之風有裨政化而象服之美宜畀徳人倘其命之不淑事終顯榮顧豈得無恨哉具官某妻淑人林氏禀質恵和出於巨族作配君子率義不違雖志行日修而壽禄小靳䟽封名郡正號魚軒豈但舉褒崇之章庻幾増伉儷之重淑靈不冺歆此異恩可李棠特改合入官勅具官某爾留都之属以職入覲敷奏所聞有嘉其勤縣進秩序雖然朕之恩汝亦數矣其思所以報焉可李孝恭充樞宻府提舉一行錢粮事務先轉一官勅具官某弼臣將命逺通奈關惟爾從行實以才選進官一等是用勸勞可吕頥浩除少傅依前鎮南軍節度使成國公致仕勅昔太公九十秉旄仗鉞猶未吿老盖古之大臣出将入相以天下之重自任者身雖老而志愈篤不以退為髙不以大夫引年之禮自例也若其不幸嬰於疾疚以筋力為請則又焉能强之哉具官某輔朕初載遭時多虞憂勤百為終始一節屢即齋壇之拜再登鼎鉉之司位與年髙功惟徳稱適故疆之未復惟元帥之是謀方資衞社之忠遽上乞骸之䟽察其誠悃匪出偽為朕不敢以官職之事煩焉進秩一等擁節歸榮其近藥物專精神以自輔俾爾壽域尚有後渥可武功大夫黄仕成修武郎白彦忠秉義郎崔佺自川陜前來行在投下機密文字各與優異推恩仕成與遙郡刺史白彦忠崔佺轉兩官勅具官某朕惟關隴久隔王靈逮兹音驛之通盡襲漢官之舊爾馳驅長道入奏囊封有嘉其勤錫以書命陞刺列郡是為異恩益勵爾忠以圖稱塞可白彦忠崔佺文特進官秩路允廸除知應天府兼充南京留守勅閼伯之墟肇興王業留鑰之重属於大臣粤自多虞遺黎久隔及兹十稔輿地始歸簡求慈惠之師布宣寛大之澤具官某學探聖賢之藴識窮事物之幾被遇兩朝嘗膺寵任逮朕初政冄秉事樞志已淡于功名身自安于閒曠眷爾土鄉之舊頗更戎壘之餘桑梓相望閭里未改惟風俗之既稔度教條之易孚其體至懐勉恢治具可陳淵陳確除監察御史勅具官某御史列職皆耳目之官非胸腹有治具足以廣朕聪明者弗以授也爾淵論議堅正學有家法爾確執義退黙蓄養邃深朕得於所聞審矣文昌六属政事出焉糾其稽違慢命者以吿於上而賞罰之爾之職也尚其勉之可苕溪集卷四十一
