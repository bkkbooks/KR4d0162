body:
  text: 苕溪集巻二十宋劉一止撰啟謝人薦自代啟分安闒茸之中老將何用名在薦論之域初不自期拜貺若驚循躬知愧竊謂以先達之後汲引後進既舉世之所罕聞以盛徳之餘退託不能又羣情之所大駭攷之於古殆見其難執不願於求知體莫隆於舉代惟九官受命而必遜盖百僚已徳而相師秦漢以來典型僅在郭丹見推於郡守獨薦鄉人而行盧毓親奉於詔音必如卿者乃可馬總賴韓子以増光於後鍾皓進陳實而見稱於時狂若嵇康何乃著書而求絶辨如蔡澤抑難騁説以自媒要須得人乃稱兹寵如某者少而不競長乃甚愚在已所安則自信而不疑於世共慕則却走而弗顧貧屢遭於鬼笑命獨與於仇謀及此衰頽始從禄仕權竒俶儻已摧耗於百憂勃窣􅀈姍尚經營於一飽夫何交路忽玷誤知此盖伏遇某官識足以照事物之機學足以窮古今之藴以筆舌為人才之羽翼以胷腹為吾道之渭涇謀猷皆契於聖𠂻用舍不違於公議故憐孤寡特為吹嘘遂令枯朽不華之姿復有激昂思奮之意念祈奚之舉類雖曰必行冀公叔之同升則愚豈敢庶殫尺寸少報生成寄湖州太守葛司成啟摳衣曩嵗嘗從館下之招竊芘治封又幸里門之邇尺牘不通於記室刺字未勒於閽人愧動心顔神馳旌棨伏惟鈴齋虚暇神物掖持坐迎有永之年膺受鼎來之福恭以某官學貫百家之奥才絶千人之英國論以為指南吾道之所寄命蜚聲華旦濶歩要津蒙上聖非常之知在漢庭諸公之右衆皆側目叵堪袁盎之居中帝獨虛懐更試蕭公之為政出奉藩宣之寄益攄藴藉之竒老吏畏其神明雅俗安其豈弟然而詞頒中禁有懐仲舒之古風議下廣廷欲問崔琳之今事寧乆煩於剖竹行復慶於賜環某念逺掃門無階望履擬蜀郡中和之作獨恨於匪才聞南陽父母之歌實動於鄉徳嵗序云晚霜威益嚴顧隆善衛之矜式副具瞻之禱謝鄉人王提刑薦舉啟棲遲下吏拙亦宜然叨竊薦書望不及此省躬無取拜貺自疑伏念某志以道窮才與命稱侵尋且老逼孔融過二之年貧悴無營有伯龍十一之誚承乏斆學之域委心吏隠之間博士不治昔者尚嗤於弟子廣文獨冷於今益愧於諸公顧俛黙以何求獨􅀈姍而就食夫何汲引乃逮妄庸此盖伏遇某官材絶一時智周萬務執謙光而自牧有盛徳而不居羽翼滯淹主張氣類祜甫公舉未嘗以親舊為嫌郭丹義風顧獨薦鄉里之士某敢不激昂思奮砥礪弗渝雖未圖報徳之階要不辱受知之地謝翟内翰薦舉啟頃以孤生獲從下吏於左右乏半辭之助居職業無一日之長獨鄉者慕用之誠盖不圖見顧之重薦論誤及跼蹐靡容惟士之適時猶女之從聘一遇知巳殆將終身雖云待禮而後行常恐失身而晚悔豈聘者實重其選抑從者亦擇所歸古道悠哉斯言已矣伏念某學陋而聞寡志大而術疎及此衰年始縻寸禄間闗自笑慷慨受知在古人以為甚難而晚進豈容驟致此盖伏遇某官三代豪傑一時宗師國論以為指南吾道之所寄命攟收氣類振挽滯淹何期流落之餘乃得依歸之地正使自擇寧復有加某敢不益勵宿心仰酬謬眷仕纔如此或未慙君子之歸巧固有之不敢貽門下之辱謝館職啟給札鑾坡初乏治安之䇿濫巾天禄蔚為遲暮之容聞命自疑循躬知幸竊以東壁圖書之府上列經躔道家蓬萊之山内藏秘録開百王盛衰之緒為四海風化之原雖復喪亂日尋艱難代有未見中祕之文多闕不聞外史之職弗修踵事増華於今為盛祖宗分三館以居豪傑有為之士闢四庫以儲古今未見之書切近禁嚴維容嘯諾使其胷次揚㩁吞太史氏之九流筆下淵源備國師公之七略故於採用皆本作成两禁侍臣歩武先於借路一時名輩事契擬於通家氣習尚傳風流可想惟選除之甚重則名實之加優如某者少有獨學之愚長無兼人之器術業荒於不試精爽耗於多憂流落以來侵尋且老不圖未至獲並俊游討簡編於煨燼之餘繼人物於風塵之後自云無補其忍饕榮兹盖伏遇某官識洞㡬㣲氣涵英特謂蕭相收先秦之圖籍實佐開基而蒙榖獻舊楚之典型有同存國參稽故實協賛謀猷要扶文物之顛乃見規模之逺肆令冗𤨏辱在品題某敢不盡廣舊聞勉規來効領五經之儲校雖曰世官補三箧之散亡終慙前喆冀稍殫於嵗月用仰報於生成過此以還未知所措除直顯謨閣謝宰執啟閤連中禁藏列聖之寳章職逮外官盖本朝之秘選不圖枯槁忽被光華聞命自疑循躬知懼伏念某以鋤耰固陋之質躐臺省清近之班寵既厚而不辭量已踰而莫覺粤從廢黜自卜隠淪更時阽危身獨安於丘壑在已進退義敢怠於君親而况閲嵗者三拜恩已再復簉名於内閤俾増重於外臺有何勞能得此殊異兹盖伏遇某官恢垂絶僅存之直道建乆安不㧞之宏規力何啻於囬天心但知於許國若就深於滄海雖不擇流顧快意於屠門豈必得肉仰愧生成之施孰為稱塞之階茍未死亡尚收寸尺提㸃浙東刑獄謝啟卧疾漳濵乆忘嵗月拜恩粤部遽見吏民荷宸扆之矜憐試廟堂之記録事非意出愧與懼并伏念某鼯技易窮蠧書何益一罹罪籍四易嵗星慣從樵牧之遊不作軒裳之夢孰云枯槁更被光華念一道之平反繫幾人之休戚矧復圖闕荒政於不任責未可以見塞兹盖伏遇某官徳全忠厚明燭幽遐哀庻獄之無辜憫一夫之失所故兹固陋亦與使令某敢不益廣所聞自鞭其惰勉副責成之意庶為報徳之階過此以還未知所措責授宫祠謝啟乆矣論思之謬嘖有煩言㷀然衰病之餘自貽伊戚仰承威命殆是寛恩伏念某智識昏庸技能么麽曩膺謬眷辱在近班故時論無所短長於世故都不通曉粗知慕大君子之義欲自託不肖者之身罪斥七年尚煩記録召還期嵗寝冒寵榮豈志願之敢期抑夢寐所不及屬者明詔有位旁捜異能而乃昧唯善舉類之方失事君以人之道揆其重負合置嚴科止削籍於甘泉仍奉祠於真館兹盖伏遇某官懋格天之鴻業挺許國之精忠善不近名清而容物刑兹無赦率循作罰之公罪疑惟輕上廣好生之徳重惟疵賤乆玷陶鎔特屈刑章俾從薄責念孔戣之宜去初不悟於引年歎韓子之慙歸終莫伸於報徳捫心自訟沒齒何云再任宫祠謝啟受恩知過拜命増慙不圖有盡之年再籍無功之禄深惟疵賤乆玷甄陶智實昧於行藏學靡過於藴奥貪寵冐沒不思竒器之格言投老窮空却恨儒冠之左計謂鬢絲之堪織指泌水以樂饑迹其自謀率皆類此一昨去國三嵗奉祠敢懐平進以求伸但恐終更而絶食忱辭上逹私願弗違既許便安仍沾俸稍兹盖伏遇某官行已盡聖賢之道與人存忠厚之規獨運平衡曲成舊物某敢不求全晚節加勵宿心雖云報徳之無階亦欲沒身而靡悔致仕除敷文閣待制謝啟涣恩驟至成命莫囘拜賜逡巡省躬怵惕伏念某曩膺識㧞出自寒㣲初無寸長服在近列惟踐更之既乆曽効見之靡聞病且不支老當以退不圖得謝乃更増華方寓直於書林遽躐升於從槖湔摩昬𤯝誦綸告之溫慈扶掖拘攣服腰鐶之煥麗閭里賛喜親舊改容顧惟何人有此僥倖兹盖伏遇某官量涵海嶽誠貫幽明有周公成王家之忠邁伊尹格皇天之徳功髙不伐位重益謙謂才能皆可陶鎔雖疵賤亦歸覆育重惟無似特受深知始終保全委曲成就叨踰已甚懼弱植之弗勝報稱謂何獨此心之不昩皇太后慶夀八十詔長吏致禮加賜羊酒粟帛謝啟藩侯下賁布宣寛大之書里巷驚傳創見榮華之錫夫何殊異逮此龍鍾伏念某受才不長聞道最晚壮也之武尚不如人老也楚丘遂多㤀事既乞身而知止固絶望於饕榮屬長樂之禮成偕髙年而澤被至於越匪頒之常式優侍從之舊臣撫已自慙幾人得此兹盖伏遇某官仁深覆育道格邇遐問畆丘之年謬承稱美憫伏生之老姑使授書豈徒加寵於一夫殆欲垂芳於千載捫心懐感投足知歸苕溪集巻二十
