body:
  text: 苕溪集巻十一宋劉一止撰狀與越帥議討杭賊狀某竊聞杭州兵士閉城門奪守帥殺監司縱火大掠繼聞閣下遣卒徒數輩入賊招諭曉以禍福且令出降使者再往返賊辭卑屈而未决彼自以罪大不宜遽出入竊大府子女玉帛之欲未厭於其心彼非不知吾帥治吾州如古人御軍士有恩信勞來衣食之甚厚也盖勢窮力屈而後降耳日者又聞閣下以為賊不足平方将發屬郡之兵自将往討絶江濟師某竊疑之或曰信也或曰兵家固有先聲後實此殆為先聲者耶或曰閣下謀府靚深非吾徒所能料也然不然未可知也且賊奪守帥殺監司變之大者閣下受朝廷之寄當一面之重討之宜也頋未知所以討之之䇿安出耳自軍律廢弛吾州之兵與屬郡之兵其舊存者驕肆狠悖猶杭之兵也然今日之勢在彼為死士在我為驕卒彼一以當我百若新募之兵又率皆田野之人未嘗閱習姑使帶弓劍執旗纛以守郛郭縶犬豕而蒙以虎豹之皮一露爪足彼則咍之矣又杭起自江而濟有二道曰西興曰漁浦率皆背水未見其有異也夫两軍相拒於平原敵向水我背水且不可况背水而攻人之城哉此兵家所謂危道也某愚見以謂莫若招衢婺温台等州之民居山谷間號為土豪者假以官稱誘以厚賞使募鎗杖手擇精鋭数千選將統之取道由富陽以進並山遵陸而無背水之窘又檄浙西諸郡兵尅日俱集民出其左浙西兵出其右賊勢窮迫必靣縛出降藉令不如所欲在吾州固未有患也某愚陋誠重守帥之出譬如將百萬錢與人博必三復投之若悉舉而大投有不勝則無繼矣兵家顧豈有必勝之理哉方今國威未振民卒幸亂旁近竊發者非一吾州之氓以帥為命今舉一路之兵自將以徃不顧其後以我之百當彼之一而又履兵家之危道誠恐非徒不足以靖亂抑有不可知者昔魏遣太子申自將攻齊過外黄外黄徐子勸太子還既而曰彼勸太子戰攻欲啜汁者衆太子雖欲還不得矣伏望閤下熟計而審處之無為欲啜汁之人所詿誤也某越職妄議罪在不貸然今日之事非常事也輙冐昧以獻無任懐懼之至劄子論僥倖之門不塞某嘗聞朝廷之患在僥倖之門不塞僥倖之門不塞由至公之路未開好惡以是屢移綱紀為之浸弛數十年來姦憸顯行蠧弊百出職此之由所頼以救世者在大賢君子居上而力持之如其持之不力則至公之路必不開僥倖之門必不塞抑恐有以召之也其請言一二事祖宗以來人材進用非功徳盛大才能超異未有遽至顯要者大抵由外以及内更歴既熟且須以嵗月之乆始見選除今也内為省郎外為監司有未歴二數考者僥倖之徒殚竭日力奔走求合不復知分守之可安不曰有以召之乎入仕之初必由銓選其來乆矣今也後進少年僅得一官即以㕘部為辱夤縁請托求為王官次則辟舉往往得之求而不得其路自塞求而得之何病而不求不曰有以召之乎中外百職初無異才今朝廷之士入而不出服職在外者雖有異能顯効不見召用間有召者則羣起而詆之恐其妨已進也两途既分向之樂事勸功者且化為茍簡矣不曰有以召之乎親䘮而奪情從仕者盖士之所不忍而朝廷非軍興搶攘且其人才實足以當重寄者不輕為此舉也異時雖迪功郎之㣲亦起復為州縣官甚者有親䘮未絶而先期求起復今此風未盡革也特假從軍之名以為出仕之地耳故士之無恥者不復安於執䘮不曰有以召之乎事之可言非特此數者而已某竊謂救時之弊莫先於至公行此一言疑若不難且其事若迂緩非所當急也然而理有必至者公道行則好惡明好惡明則賞罰當賞罰當則吏各盡其能而賢者樂出為用賢者樂出為用則内治舉而外侮銷矣在今之日恢至公之道而力持之豈無望於大賢君子也哉然以此屬相公者非特某也干冐鈞嚴無任恐懼之至論増立嶽祠之弊某竊惟親民之任祖宗以來實重其選故於選人改官親御便殿臨軒閲實然後授之利害在民不敢輕也伏見近者朝廷増立主管嶽廟之格又有額外特差所以矜恤流寓及乆於銓曹而不得調者徳已厚矣然選人未仕志在便私往往求之在今日固未有患更一再任夤縁請託薦舉及格則改官親民矣且所謂主管嶽廟者名為出官實不任職親民之任其可使未嘗任職者為之乎誠恐遺患乎他日之民甚大有不得不慮也某愚意欲望朝廷詳酌令吏部立格應選人自出身以來未曽歴州縣官終滿一任者雖考第滿之薦舉及格並不許改官其京官出身開陞親民資序者准此不惟有以仰副聖主憂民惻怛之意亦所以成就人才稍令更歴習熟見聞他日任使有大於親民者要自此始也論移易縣令某伏覩紹興五年三月二十四日指揮江南東路漕臣申請契勘本路知縣内有庸懦不可倚仗之人縁别無罪犯難以按黜欲乞許於縣丞及監當幕職官内諸司公共選有風力才幹之人两易其任各不理違闕奉聖㫖依又紹興六年六月七日臣竂上言欲乞申敕帥守監司今後縣令之庸懦不才者依法移易之此殆以在外之職號為最難且切於民之利害者莫如縣令故假監司之權得以察其能否而易置之甚盛徳也然某之愚見以為尚有可議者人才有能有不能事任有劇有易能者處其易不能者治其劇則稱職者鮮縣令之才既不多得則莫若移易而不能治劇者亦未為棄才又無罪可書遽加以庸懦不才之名則是無用於世茍蒙此羞雖易以他職其尚肯復自淬勵以求稱職耶自古聖賢未嘗敢以通才望人特曰因任而已謂之因任則隨其才之短長而審處之彼善於此可也故自元符以來立法止曰知縣有繁簡雖易監司察令之能否許隨宜對换而不以惡名加人非特出於忠厚抑利害之實不在於此欲望朝廷更賜詳酌遇有移易許止言某人長於某事宜處某職乞相對换其餘依紹興五年三月二十四日指揮庶㡬人人感奮以赴事功民受實徳某愚陋僣言無任恐懼之至論財用某嘗觀唐史稱劉晏斂不及民而用度足初未之信及考其所以致之之術大抵籠商賈之利而歸之公上以供貲用故科斂不及於民且山澤之利在商賈乆矣當天下太平無事時固未嘗較官取之薄商賈得之厚以其利厚故奔走之而不以為勞不幸有軍興之後用度日滋將取之於民則民力有時而弊且仁君之所不忍不然又不知計之所出當是時也豈可坐視商賈獲甚厚之息而不自為計耶晏之領漕事也常募善走者置遞相望探報四方物價低昂雖逺方不數日皆達使司食貸輕重之權悉在掌握又於諸道置知院官每旬月具白州縣雨雪豐歉之狀豐則貴糴歉則賤糶咸以榖易雜貨供官用及於豐處賣之應民之急公務交裕其用𣙜鹽法不但轉鬻商人而已又官自運載於乏鹽州縣鬻之官獲其利而民不乏謂之常平鹽事類此者不一是以正元之間雖遭變故而國用不匱户口蕃息由朝廷能盡晏之才使得專制故其效如此某以為今日之事莫若選擇近臣之通曉財利者於瀕江要便處置司聴其自辟官屬專制國用倣晏之意逺近移易貿遷有無悉從便宜勿拘之法得盡其智能庶㡬利入之源浸廣有以佐軍需而寛民力伏望朝廷詳酌施行論私販茶鹽某竊見私販茶鹽者皆不逞之人平時賤買貴賣於鄉村往往家至户到不容其不受而畏法者稍不從必懐私憾他日或敗置於有司乃妄通豪民及素所讎者儻或不能為獄吏者必諷其為之盖利豪民之赴獄而有所求索也及已斷罪追納賞錢或無所出則又妄均攤於平人所至官司雖知其詐例皆容之恬不為怪重使良民被害欲乞自今後因茶鹽干連無實狀之人不許留禁止令知在供證其犯人果無財産可以充賞不得亂有均攤止監鄰保備還所賞獄吏絶於覬望罪不及於無辜且鄰保者必加互察不容其私矣伏望朝廷詳酌施行上殿劄子臣竊惟天下之事下合人心上合天意中合大道者惟有一言曰公而已矣老子曰容乃公公乃王王乃天天乃道盖混而為一非容不能公三公之稱謂其容而能公也王訓大王者之稱謂其公而能大也則是公不可不與王同徳王不可不與天同道此天下之至理也臣竊觀陛下自臨御以來於天下之事未嘗容心於其間大臣以為賢則進之臺諫以為否則退之與政事之因革羣臣皆以為可則審察其言而罷行之可謂至公而無私契天合道者也然而身為三公不知與王公徳者非一日矣已所好者與之雖愆於理而害於事者弗非也已所惡者奪之雖才有堪於用者弗取也議有當於人心者弗行也夫如是則政事安得無疵纇民安得不受其患哉惟公也故賢者願立於王之朝而不肖者退聴而革心道徳所以一風俗所以同上無粃政下無幸民内治之所以舉逺人之所以服夫所謂公者一言而已矣見於利害能如此此其故可不審耶臣愚欲望陛下詔執政大臣諌官御史與百執事咸體上心剗除弊習宏開正路終始惟一則治道之隆三王可四五帝可六天下廓廓乎其無事矣取進止又臣竊惟為政之要莫切於救弊事之弊者固非一端而尤以人材為急自古人主所與共天下之治者未嘗不屬公卿大夫士必得真材實能列於庶位徧為吾用猶懼有闕比嵗以來乃或不然舉所謂材能者皆斥而去之事孰與濟人才淪落莫甚斯時迄今垂二十年稿死寂寞之濵者不可勝數矣其幸而未擠於溝􅊤者於今亦無幾人可勝慨歎昔人或以十年不調白首為郎尚痛恨其不遇方之斯時猶未為失其所也臣以衰晚誤膺簡召自揆庸虛豈有深謀秘畫可以仰裨日新之政惟有振滯潦之失説願以為陛下深詔大臣搜舉向來擯斥委棄不用之士取其尤者越次㧞擢必皆仰戴㤙徳益輸忠藎於以共成治道實非小補惟陛下留神財幸取進止苕溪集巻十一
