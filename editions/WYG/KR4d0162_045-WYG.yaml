body:
  text: 苕溪集卷四十五宋劉一止撰外制胡交修除兵部尚書兼權翰林學士勅朕惟自昔聖哲之王所以戡難定功敉寧方夏豈特神靈威武所變化莫敢侮予抑亦訓誥誓命之恢洪不匿厥指故于簡在文武之懿列於侍從之班未嘗不當饋興嗟想見其人而用以自助者也具官某噐周而用博學茂而辭雄早以重名偏儀要路粤自禁林之近旋居常伯之尊守道不回孤忠自信朕慨念典刑之老乂安湖海之游爰錫賛書併還舊物搃司戎之政令兼視草之雍容事絶前聞兹從近比庻幾一舉而美具焉頗牧在於禁中燕許擅其手筆惟爾得位惟朕有臣豈不休哉可譚知柔除大理少卿勅具官某朕哀矜庻獄明審用刑與其殺不辜寧失不經爾宜知之熟矣其亦識朕遷序勸功之意乎爾中外踐更智識通敏俾貳廷尉益究厥能傳曰刑者侀也侀者成也一成而不可變故君子盡心焉朕之訓言於是乎在可趙不退轉右奉議郎左廸功郎趙善時循資詞同上勅具官某國家以三嵗之舉網羅羣彦爾宗子之秀刻意藝文與寒畯等遂膺賜第朕心嘉焉躐進官聫以為爾寵抑以為爾曹之勸可陳良能母李氏年九十以上特封太孺人勅李氏朕歛時五福敷錫萬方存勞百年被以恩禮爾積行閨壼克享上壽朕心嘉焉錫之命書以榮其老抑以為年髙徳卲者之勸可吏部員外郎向宗厚通理知州資序合陞郎中勑具官某尚書列曹於今為重非秩視郡守則皆員外置也爾出入中外多所踐更砥節礪名休有譽處再居省戶正位中郎益懋爾猷以稱兹寵可向宗厚除浙西提刑勅具官某爾昔以尚書郎出刺浙右忠厚明察身正而令行民安而俗不偷朕因任羣才無間中外兹復命汝往司刑憲乘軺之寵仍異固封雖曰外臺實在轂下爾毋以不得居中為恨焉益勵厥修以俟寵擢可京畿都轉運使司属官李誾之等循轉官資勅具官某朕簡求漕臣經理畿甸凡其僚属聼以名聞爾等獲在選中以才自奮進官一等以寵其行尚勉之哉可晁謙之除右司郎中陳正同除樞宻院檢詳勅具官某中臺萬化之原右府本兵之地其属皆一時妙選而省觀出納以佐其長則有縂司其凡者焉爾謙之才髙識明見於屢試爾正同志行粹美克世其家夫邦國之政疆埸之事爾悉關决而罷行之其責重矣盍思所以稱是哉可賀允中吏部郎官劉景真倉部郎官姜師仲刑部郎官許忻吏部郎官陳膏工部郎官勅具官某文昌郎吏分掌天下之事雖任有劇易位有等差而選用之艱爾等宜知之矣亦無所以致此與遷叙之意乎志節清厲如允中行義堅正如景真師仲忻已邃於聞譽膏也敏於吏能不如是朕不以輕授也詩曰靖共爾位好是正直爾等居其位則思所以稱焉守此兩言而已可逄汝霖利州路運副徐天民廣東運判趙不凡淮東提鹽陳正由福建提舉茶事勅具官某郡邑之賦山澤之利以佐大農部使者縂其政令稽其出入多寡之數以吿於上賞勉而罰偷其事重矣爾等皆以才選分任一道軺車之出逺而有光其思所以稱焉可林待聘除中書舍人勅代言之重自昔所難眷予復古之初將開右文之化與司名命允頼雋人具官某識茂而明學通以博頃更簡㧞備見猷為豈惟優世叔之討論抑亦妙君房之言語輟自柱史進居掖垣雍容清切之班焜耀寵靈之渥嗚呼予欲徳意志慮追三盤五誥之風予欲號令文章新四方萬里之聼攄爾素藴毋羞前聞可周綱除權吏部侍郎勅自昔銓選有任人任法之殊非予奪不公則賢愚同滯得失相混未知孰賢惟我國朝循用唐制著為資格以為利人而病法孰若因舊而法存遴簡官曹典司其事檢察吏欺而已具官某藴有用之學負能為之才凡所踐更皆有可紀刃毎施於盤錯操不易於風霜比自近藩入專宰属雖稍聞於論議殊未究于設施攝貳天官進班法從兹為異數庸示眷私服我訓辭職思其稱無使居中之譽减於治郡之時可蘇擕除太常少卿勅具官某朕惟艱難以来制度多闕豈惟思得博洽之士蒐補異聞而敷錫萬方存勞百年被以祖宗舊典亦欲訪之故家庻幾文物之盛無所愧焉爾志行得於心誠學問由於世濟更閱浸久論議有餘往貳典臺莫如爾可永懐先正凛然風烈之髙喜見後人尚有典刑之似勉修厥職以稱簡知可利州路運副鉤光祖落職放罷降一官勅具官某爾為漕臣搃司金穀出納之吝在所當先而法守蕩然擅行貨易成案來上朕何敢私褫職貶官以戒不敏可汪藻磨勘轉左太中大夫勅虞舜三載考績之法成周因之大計羣吏其詳莫得聞焉後世遵用以為序進之典務適厥中而已具官某法從之懿為今老成聲華􅗥絶於一時出處不愆於素履奉祠真秩閲日既多㑹課三銓進官一列雖非異數庸示不忘可李唐孺除直徽猷閣陜西路運副陳古除直徽猷閣秦鳯等路提㸃刑獄鮮于翰除直祕閣永興軍路提刑勅具官某秦隴之地暌隔生靈於今十稔朕懼夫刑政之纇有未盡更賦役之苛闕蠧尚在選任使者固將安之且寄朕耳目者也爾唐孺爾古爾翰材術之偉見於屢試分行一道省觀風謠求利疚之所以然悉以上聞俾朕之徳澤得以下究兹非耳目之任所當為哉爰升延閣之華式重軺車之寵往其祗服益懋厥猷可四川轉運副使陳逺猷除右文殿修撰張深除直徽猷閣並兼陜西路轉運副使專管熙秦兩路勅具官某書殿延閣寓直之名所以勸功而懋徳授受之際朕不敢私以爾逺猷智識之明爾深聲實之茂増隆寄委兹用序遷夫秦蜀之饒有無相足乖暌十稔始還其舊民物利疚兩地惟均爾等所宜知也轉輸之任其為朕并任之取諸濟而已尚勉之哉可張燾權吏部尚書勅天官位六卿之長尚書搃三銓之政資格既定古法寖亡而辨流品專予奪抑貪冒進賢能無所與焉朕思得端亮之臣冠於法從俾激濁揚清之㫖見於論議舉措之間而百吏凛然向風知所畏慕則銓綜之妙有不待法而存者顧不偉哉具官某宅心髙明飬氣剛大文足以起俗習之陋學足以探聖經之微閲時艱難引義忼慨有言必盡遇事不辭念裨益之居多亦廻翔之既久攝居常伯兹用序遷尚體訓辭益思砥礪惟爾得盡忠之譽則予有知人之明可苕溪集卷四十五
