body:
  text: 苕溪集卷五十一宋劉一止撰墓銘宋故左中大夫充敷文閣待制致仕毗陵張公墓志銘紹興二十一年二月十七日左中大夫充敷文閣待制致仕毗陵張公以疾終於私第之正寢既克葬公之弟和閣自狀公行實問銘於某謂公之雅故也某何敢辭按張氏之先出自廣陵唐末有名升仕清流令者卒葬於滁遂為滁人清流之孫訓仕楊行密官至太傅清河郡公生司農卿爰卿爰卿生大理司直廷傑皆仕于江南因家建業司直第四子先軫仕衛尉守丞徙居於吳實始為毗陵人蓋公之髙祖也公諱官字養正公曽大父諱處仁故為太常博士贈太子太保祖諱果故為郊社齋郎贈少傅父諱彥直贈太傅公自少嗜學貧無書假以寫讀強記絶人凡諸經及子往往成誦或暗疏之無一字脫遺自以先世為名進士登殊科不應無繼公每用是率勵諸弟崇寧間與鄉薦繼又以三舍法貢於太學試補內舍生明年以上舍成名於時兄弟同榜登科者三人郡守以為先此未有因表其里曰椿桂自是各以文學行義見知於時奕奕相踵東南士流咸曰人門之勝莫先張氏建炎初天子規圖中興寤寐以思冀得魁纍博洽之士翊贊廟謨公之弟諱守實參大政德望赫然進退為時重輕其議論志節特與公契合公時安於小官未嘗干進參政去位朝廷始録公次第選擢至登禁從士論賢之公自登科調越之剡縣簿任滿授滁州司工曹事未赴丁太傅憂免喪授蘄州某學教授公不鄙夷後舉訓導甚篤會省罷士類惜其去積考遷從政郎授信州司刑曹事到官二年丁母越國太夫人王氏喪服除造朝改宣教郎知杭州於潛縣未幾除兩浙提刑司幹辦公事建康帥雅知公欲羅致幕府公意不欲貽書謝焉其略曰非敢以拂袖為髙蓋亦知難而退其自信不茍類如此詔除國子監丞久之請祠主管亳州明道宫召為太常博士會有旨侍從官依故事薦十科時薦公者二人曰文章典麗可備著述一曰學問該博可備顧問疏奏召試三館公不就明年召對便殿公條奏三事大要言朝士輪對當驗之行事無徒取空言用人之道在於至誠勿二勿疑使正直日進邪佞日消與信賞必罰歸於忠厚論極鯁切上善之擢祕書郎引病請外知漳州未赴即召為尚書郎初至駕部後遷司勳時兵革初定功賞核實號為最難吏胥夤緣舞文為市類多阻格公為親閲功伐無復留難因陛對力陳其弊以為圖籍散逸止憑省記月異而嵗不同無所總括至乃捨法則用例引例則破法姦弊日滋甚非畫一之政也請自今以例為據者悉合上之朝廷稽其合於三尺者著為定制翌日除公祕書少監公以少監為儒士老成之選頃嘗為郎祕書今乃再主其榮多矣顧齒髮凋殘而被擢危坐讀未見書其自視何愧蕭德言耶尋遷起居郎未幾權尚書吏部侍郎銓總平允偽牒詭功一繩以法期年再間以文英殿修撰提舉江州太平觀還歸鄉邦築室數十楹為終焉之計名其寄傲之所曰足軒參政公建堂曰四老東西相望朝暮往來舉酒笑達公有詩敘其事流傳搢紳久之除敷文閣待制尋知湖州湖為股肱郡倚公為重俄又以疾請祠比還里第則疾且革矣享年七十有四諸孤以是年八月甲申合葬公與公之室令人王氏於武進縣延政鄉薛村之原男二人德成右承務郎監潭州南嶽廟用成將仕郎女二人適右迪功郎新監泰州如皋縣買納鹽場施廣夀女先公卒孫三人未名公自改秩積官至左朝奉大夫爵文安縣開國男食邑三百戶訃聞恤典贈左中大夫云公端亮剛介喜善疾惡出於天性平居不妄笑言處內及外待人若一或以為隘不容物而公終始未嘗變也與士大夫遊有愆於理者必面折之參政雖貴公與之議論亦未嘗少借故參政亦以莊見憚為文近雅配古作者然不自以為能雖嘗居論思之地不為不用而議者惜其用之晚且不久于其位也某為布衣時則從昆弟遊有年數矣參政在朝過相推挽將置之周行某老且憊分欲引去參政滋不悅間見公復道參政相與之情且以見勉其後某寢叨除用每念昆仲知遇之深今皆云亡不自知其隕涕也銘曰張自留侯源分流長赫奕四馳史牒騰芳有𣲖惟錫實始可考令於清流蓋唐宋造顯顯清河興於其躬屈迹淮南太傅顯榮司晨弟昆家於建業南唐是依不耀其烈爰及衛尉始居於吳奉常起家蔚為名儒奕奕流風以溢後人椿桂三傑一時響振大參嶽嶽為國蓍龜公獨退然不羞位卑亭涵蓄養自其素志正恐不免功名富貴親擢憲府俄二中祕讀未見書適與心起記史柱下遂長天官非道不陳所言必端既躋論思夫豈不遇有藴未攄亟以老去天不憗遺何恙弗瘳崇終隱卒寵數加優薛村之原歸於其邱德音不忘銘納諸幽宋故左朝散郎賜緋魚袋錢君墓志銘君諱觀復字知原平江常熟人於吳越王錢氏為疏屬忠肅王舉圖入朝君奕世為士不與恩澤侯之列獨賜田在常熟之李墓因家焉後徙居邑中曽祖訓祖仁貴隱德不仕父衍纍贈右朝議大夫君天資頴異自少小知務學一日大書榖梁子成童不就師之語于門朝議公驚喜招延名士教之讀書製文度越流輩年十七當赴舉會祖母李氏將葬君不就赴以歸或勉之則曰祖母恩我厚矣今不與執事後悔何及是夕夢有告以嵗若干當登科自是益自信不以毫髮非正干定命由郡學升辟雍政和九年以行葬兩優釋褐賜上舍及第授將仕郎調越州諸暨縣主簿巳而用釋褐第三名特恩改授從事郎溫州府學教授溫號多士君風勵程督學者知勸嵗終以教悉溢額循文林郎終吏過瑞安巨寇方臘猖獗道梗不通縣令王公濟君素所厚也往贊之講畫備禦悉自君出公濟信之不疑時旁郡邑皆焚剽流民歸瑞安相屬於道或議驅出境君曰孰為善境驅之適資寇並海有州徒流者數十輩居焉載糧就廩絶其航渡頃之流民自獻其能鍛冶兵械一新又募鑰杖手之趫捷果悍素有稱者用之賊沮敗不敢犯境公濟推君功第一君不自言輒止次調湖州司户曹事郡守治尚嚴察吏隂拱以觀不一啓口論當否事有愆於情法者君獨力爭初不謂然已而悔服同郡富人朱姓勔名者以附麗得官驟致通顯其力足以福禍人內外搢紳咸畏之以君登巍科為時聞人願以女歸君君不答同舍謂君盍俯就之當得美仕為親榮君曰吁是何言歟吾雖貧持菽水奉親親樂也有如假託非類以進豈吾親意也哉茍如子言適取辱何榮之有聞者韙之至是報罷莫測其由或曰此朱氏力也久之調楚州司户曹事到官七月丁朝議公喪君生理不給既服喪歸益困時郡縣計民稅輸錢官自貿絹取贏資甚厚縣尹憐君貧願以千縑歸君輸俾自收其贏君戄然謝之固窮如初服除調衢州軍事判官虜騎犯江浙衢當路衝君白郡守縱民老弱畢出户留一丁不留與留而殘弱不堪任者罪如軍法其後卒徒欲乘時為變顧城中金帛子女無可冀獲乃止以勞循儒林郎秩滿再除衢州州學教授未赴丁繼母恭人范氏憂服除改左通直郎除國子監丞尋改充諸王宫大小學教授滿嵗相繼除太常丞祕書郎尚書户部員外郎君仕州縣久諳練庶事居省户若素習吏不敢欺聲名赫然意且用矣俄以言罷主管台州崇道觀前後八年起知廣德軍始至訪民利害立罷行之地居髙陸嵗上供民輸建平倉由湖轉江入丹陽閘以達行在所道回逺復加斂為資費號水腳錢君亟請於朝寄廩湖之四安相距才五十里民不病勞循運河至國門不過五日費減大半或謂地産竹木官吏失譏察逸稅籍甚多君以細民肩荷手持冀十百以活妻子其忍扼取之且懼開端為後患雨暘小愆齋禱於神致禮甚恭雖歷旬月無倦色至民俗用巫覡語屠割埋瘞不合典常卜非神意者悉命禁絶嵗飢議發常平倉部使者屢抑君君手書諭屬邑振廩濟民且曰民命在朝夕吾能不獨任擅發之責乎旱益甚境內田十捐八九復請於朝願盡捐嵗租以活一方後卒如君言大抵君為政以愛利百姓為心惟恐弗及茍利民力行之不顧巳私類若此君在郡憂勞成疾比滿秩歸增劇以紹興二十四年十一月十二日終於家之正寢享年六十有五纍官至左朝散郎賜五品服娶徐氏故吏部尚書鐸之女封安人男四人曰侯左迪功郎新紹興府山隂縣尉曰佃左從政郎池州州學教授曰佖曰僴學進士僴後一嵗以哀毁卒女二人長適右迪功郎監潭州令同茶場陳大年次適左宣教郎新筠州州學教授徐廷獻諸孤以二十二年正月辛酉葬君于縣虞山之南距大父塋五百弓君有志節執義堅固不曲意求合以希薦引平居簡重臨危健決智略橫出皆契事機事親孝謹求所以順適其意者不少懈初朝議公嘗稱債於人至三百萬晚嵗資産耗無以償憂見於色君竊詣豫錢家以已名就易劵别示必償朝議意乃安其後豫錢家更兵火子孫散亡契驗不存君躬儉勤抑損妄費生理稍葺他日持六十萬錢歸郡人朱氏朱氏以不聞父祖遺言拒弗受君曰若不聞如吾知之何既而次第訪尋遍償之不負一錢人有急扣門不以事為解尤不喜修怨嘗有説君者加謗讟甚至君弗校異時其家凋零子若孫來歸率報禮之未嘗及前事嘗自謂出仕久狃習世故失其性真及奉祠纍年意泊如也惟老學不衰無頃刻廢書或探內典究死生性命之説自號正靜居士且名其所居之堂以諭諸子甚篤故侯佃遊太學為名士試選屢優朋類斂袵知不敵相繼登第鄉里榮之以為君操履之報君邃于經溢於文辭尢喜為詩有文集十五卷論語解二十卷藏於家前葬四月長子侯以余與君有一日之雅稔君出處細書造門以銘見屬辭情懇迫余老病神意昏耗屢謝不能侯曰先君治命且吾母朝夕冀也其忍辭銘曰君少之時敏而文勵且勤以發厥身仕更閲志剛決以昌其業任不過尚書郎官不登上大夫有蘊未輸孰使然歟命也吁太碩人傅氏墓志銘太碩人傅氏會稽山隂人故朝請大夫龍舒太守贈通議大夫吳興劉公某之室也政和八年七月九日卒於京師子太常丞安止之僦舍安止奉太碩人之喪歸吳興以某年某月某日葬於烏程縣澄靜鄉麻父山之原從龍舒之兆後二十三年其第三孫岑以戶部侍郎出奉祠尋守上饒岑於某為猶子貽書見屬曰大母之葬將二紀叔之所知也而隧未有銘不幸父兄相繼淪謝其存焉而事大母之日最久習其言動者在諸姪惟叔在諸孫惟岑岑老矣使一日先太母填溝壑而太母之遺懿不揚無以昭示後人則岑之恨豈有極哉每得書問無恙外必以為言某其敢辭按傅氏系出傅巖歷漢及唐世有聞人或居此地或居清河至太碩人之髙祖天台縣令鄴始著籍山隂曽大父仕弼為河南府澠池縣主簿大父霖贈尚書職方員外郎父瑩任朝奉郎守尚書屯田郎中贈某官屯田以篤行聞於時鄉里稱顔子其孫息有家法且勵於學多名卿才士大夫門之盛在東浙為右太碩人其第四女也天資孝謹自少小如成人屯田難其配龍舒伯父年十八誦詩作賦論議如賈生再上登巍科聲名籍籍先娶新昌石氏早亡屯田以太碩人歸焉太碩人之歸劉氏也事舅姑惟其所適恭其夫如賔嚴祭祀厚宗族睦姻黨恩妾御子其庶猶嫡子諸婦猶其母動靜有常率應儀法簮珥服飾非甚敝不改為勿殉時好平居言笑甚寡和豫之氣溢於顔間自始及終未嘗語誤羣從婦族居惟長伯姒是師太碩人有所曉譬未言而誠意巳喻聽者悅服閨房忿爭戾氣橫出望見太碩人在堂則屏息縮躬若無所容太碩人初無言也觀者竊嘆德人之有威若此龍舒仕官四紀囊無贏資鞠養孤甥至終其身既畢其嫁娶又先巳子官之太碩人贊其事而躬其役實甚勤凡今女子之行為可稱者皆優為之未易疏舉晚嵗閲佛典有得視世事若無心臨終不亂享年七十有八男四人長曰斂止任某官簽書淮陽軍判官廳公事持龍舒之喪以毁卒其後以其子贈通議大夫次太常丞安止也官朝請郎次嘉止修職郎福州羅源縣丞次祥止不仕女六人適搢紳郎處厚范正平竇誥吳塤袁敏孺陶櫎孫男嵩右迪功郎監潭州南嶽廟嶠左朝散大夫直徽猷閣提點洪州玉隆觀岑左朝散大夫降充徽猷閣待制知信州軍州事宗右迪功郎監潭州南嶽廟嶧右迪功郎新授明州録事參軍嶸左宣教郎太常寺主簿􆁈􅀢岯業進士孫女壻曰葉樗詹度葉宏中張由智沈邦逹吳居實居恭曽孫男坰瀼矼法瀹湍澗泌涑坦之洪曽孫女得壻者曰葉均葉先太碩人既葬十有餘年之間三男二長孫之亡諸孫之仕居中者三岑力學有雋才喜論事自結主眷始為從官嶠嘗仕太常少卿嶸亦稍稍為時用嗚呼太碩人之遺澤未有窮也銘曰傅出商岩望於北地厥後克世於今千祀爰著山隂自我髙祖冠冕彬彬有燁其英惟屯田公篤行純備家世矜嚴是則是似猗歟碩人實鍾其懿人所謂難我乃獨易我視舅姑如父如母察色承顔惟命可否我視厥子皆若已出慈愛均等何有庶嫡從婦族居伯姒是師誠意欵欵聽者悅隨鞠養孤甥輒先子官克相其夫悉義所安自昔婦德見於女史鮮克始終有是具美麻谷之岡時惟舊藏無使壤傷閟此銘章宋故從義郎密州兵馬都監纍贈右奉直大夫趙君權厝銘君諱不侮字彥恭太宗皇帝六世孫漢恭憲王元佐之糸元佐生密國公允言允言生南康郡正宗立是為君之曽祖祖仲淋贈安化軍節度使追封安陸侯父士顆贈安化軍節度使追封武當侯君以蔭授三班奉職歷宣州濟州永靜軍酒稅瀛帥張公近竒君之才越資格辟授瀛莫二州兵馬監押知桃花寨次調湖州兵馬監押密州都監宣和元年十月二十三日以疾終於官舍序遷至從義郎後以次子善經通朝籍遇郊禋贈君文階纍至奉直大夫君性沈厚孝謹不妄言笑好學善為詩章遇事通敏有志節可撼以氣初為祭酒官前致課入不登酒復敗惡部使者將按其罪叩門祈哀以親老為言君慨然許之為見使者請以身任其課更釀補償有不足繼以私財使者髙其義聽其去桃花寨地接近邊居因其土俗和輯訓練得士卒心湖郡通衢逼仄飛甍相壓郡守命居民撤去之君曰居民盜占非一日矣今盡徙恐不能制兼并徒使單弱受弊守悟議寢洎君終更人有委白金一篋結守舍者託附致京師君赴祖席詰朝得片紙於几上曰蒙公厚恩願效諸從者君愕然以告歸安丞王㠓勾得其姓名志歸之蓋嘗為重囚誣引賴君辨其枉得釋者也在密州時軍賊季進告其徒囊槖既盡得許其贓罪皆誅死君隂為末減上其狀後悉獲免或詰之則曰吾豈置人於死而覬上賞耶其執義慷慨忠恕亷潔類此者甚多初君旅殯河陽汜水之僧廬紹興九年河南地復始以喪歸明年閏六月朔權厝於臨安府歸安縣靈鳯鄉靈山之原享年四十有六配髙氏贈中書令諱化之之曽孫女封太恭人男三人長善結左承直郎江淮路招討使司幹辦公事後君十五年卒次善繼右朝散郎權知奉州軍州事次善約女三人長適右迪功郎薑協次適少傅寧逺軍節度使兼領殿前都指揮使職事恭國公楊存中封楊國夫人季適左朝奉大夫知嘉州軍州事郭世雄封宜人孫男八人汝􅀈汝飭汝劼汝勵汝勛汝敕汝功汝劭汝飭左修職郎新授平江府崑山縣主簿孫女二人君以儒雅自將所與交必一時聞人尤篤於教子延禮髦俊朝夕講肄故其子皆有能稱善結擢宣和六年進士第善繼在南都試選屢優文行可觀今為名太守下逮其孫汝飭亦勵世業弱冠登科女歸名臣上所眷遇位列九棘門户赫奕歆艷一時豈惟君之智識絶人效見若是抑持心忠厚之報不在其身在其子若孫也君權厝後若干年君之外孫任參議郎直祕閣主管佑神觀楊君偰狀君之行求銘於余曰吾母治命也其敢忘余心閔焉且嘗與善結為同僚而善繼從遊益相厚義不得辭銘曰義利之判分兩岐彼輕此重或使之得喪內怵心火馳嗟哉趙君儼自持赴急拯難初不辭棄賞却餽義且慈吾行四方任京師所見貴胄如君誰子孫砥礪敦詩書奕奕門戶生光輝植槐候報勿復疑隂功至行天所私徐氏安人墓志銘安人徐氏世莆陽人徙居吳郡故尚書户部員外郎同郡錢君觀後之室也時户部之亡也安人命長子俁來吳興以户部遺意屬銘於余葬未幾俁再至拜且泣曰天不悔禍吾母又棄諸孤俁不即死者以窀穸之故今克葬矣而銘未立顧憐我而深悲之且察吾母之素志而賜之以銘匪公其孰賴余心感焉不敢以老且病為辭安人諱溫字德柔曽祖真樞故不仕祖模贈正議大夫父鐸熙寧中廷對魁天下士仕至吏部尚書贈少師安人則少師之季女也生有令姿性識通敏母吳國夫人莫氏知其非凡女子也甚愛之重於擇對於時太師蔡魯公於少師為同里願得安人為子婦吳國辭焉私語其子吾女當妻士人終不與勢家子以茍名位爾等志之户部時為太學生以上舍兩優解褐名聲燁然蓋常拒勢家之求姻者或以安人聞乃自喜以為得所願兩家事適相契鄉里至今艷之安人之歸錢氏也事舅如父事姑如母宗族內外禮意周洽被服簡素如窶人子相夫必以義户部佐州郡有能稱旁近有疑訟久不決者往往委之吏牘堆几安人嘗戒左右毋得以他事關白俾之盡心或從旁贊決言動得理前所舅朝議之葬營奉久之不能其或勸纍甓代槨安人曰不然天或者見假生理未泯而追念今日之闕雖悔何及斥所御簮珥等鬻之以佐其費户部感服以為吾意亦及此而不言者恐汝難之也其後資費益窘安人意慮精密重以儉勤寸積銖纍十有餘年遂克成家歎曰吾有屋可居有田可業不啻足矣尚何求凡言利道者皆謝弗聽平居不妄費一錢至賔祭餽遺不敢少簡人以囏危見咨未嘗輒拒閨閫事井井秩秩不亟不徐而人自祗率喜釋氏學治鐘飯僧崇飾佛像費不可計閲貝葉書數千卷晚有得焉紹興二十六年六月十七日卒享年五十有九諸孤以其年十月壬申葬於虞山之西祔户部之兆禮也安人以户部升朝遇郊祀恩封至安人男四人曰俁左迪功郎曰佃從政郎皆太學名士相踵登第曰佖曰僴業進士舉僴先夫人十月卒女二人適右迪功郎監潭州合同茶場陳大年左宣教郎新筠州州學教授徐廷獻銘曰嗚呼安人志曷偉率德蹈義佐君子被服簡素心不耻肉視菜薺甘且美服勤於家嵗其幾髙門崢嶸雄我里郎君競秀名煌煒積金滿籯不足喜志業克就誰與比為善之慶有如此蒼山同穴不踰禮我諗之銘光女史苕溪集卷五十一
