body:
  text: 苕溪集卷三十五宋劉一止撰外制禮部侍郎曾開除寶文閣待制提舉江州太平觀敕侍從之臣朕所倚重雖出處之事各異而禮遇之意不殊具官某早以文學志行受知先朝亟登要路淹留江海積有嵗時朕眷求名賢服在近列庶幾論思之益共濟中興曽閲日之幾何乃抗章而别去辭情懇至慨莫得留寵之延閣之華俾即真祠之秩忘爾身之在外惟我后之告猷時乃之休抑朕所望可恭州壁山普澤廟神封威濟侯敕某神朕閔夫農夫之望嵗惴惴朝夕雨暘小愆籲天號呼若無所托命焉故於命祀之神有德於民一方是賴則惕然動容不愛褒崇之典以寵靈之且俾其民知所報事有永而無替也今有司以爾神聰明正直未嘗出其靈響惟水旱疾苦之事有謁必獲聞於朕聼是用欽嘉錫之侯封以答神貺其服我休命益相彼民毋俾嵗艱神亦與有飲食可右千牛衛將軍士滲依例合換武節郎敕具官某朕惇敘近屬列處環衛厚其廩秩而不煩以官職之事至有欲自見其才願出補吏者亦所不拒焉爾寅恭造朝閲嵗既久因其有諳易畀官序俾之從政其率義蹈憲毋或惰偷以速官謗則豫汝嘉可王倫除同簽書樞密院事迎請梓宫太后交割地界使仍賜同進士出身敕朕總攬羣工圖回萬務眷言宥密實秉樞機體隆參伍之聨位在凝丞之次亶惟用德亦以勸功具官某宇量坦夷機神敏悟出先王名賢之德有流風遺範之存事不擇難行不擇利奉萬里之使無以家為道二國之言皆如意出卓爾傾河之辨毅然叱馭之忠酈生憑軾以下齊城毛遂定盟而重趙國揆其成效布溢前聞朕念陵寢久荒梓宫未返東朝契濶星紀既周北道謳吟民心未改幸信書之來諗知永好之不渝爾其肅迓還轅就承故壤爰陟本兵之重仍兼賜第之榮惟既厥心毋乏吾事噫服文武之境朕將無愧於古人合晉楚之成爾乃增光於史册可藍公佐除宣州觀察使借保信軍節度使提舉萬壽觀充副使敕行人之選自古所難故叔向進子員於朝以為道二國之言無私周家遣使必曰周爰咨詢蓋惟忠信之人而後可用信乎其不可不審也具官某淹練敏明習於故事服在近密頗閲嵗時俾使殊鄰有嘉忠實是用命爾復為朕行今通好息兵既有成約輿地將復梓宫將還母后宗親指期可俟往從而長益殫厥勤肅迓還轅就成故壤陟爾亷車之峻以為行色之光服我茂恩尚圖來效可傅嗣延等二十九人從使出疆有官人轉官無官人補授白身先補承信郎進士先補上州文學有官人先轉三官敕具官某朕選任近弼出使殊鄰一時從行悉聼自擇惟川途之修邈念王事之馳驅錫以典恩超進官秩初補官人云俾霑命秩尚思黽勉以稱寵榮可和安大夫惠州刺史李安仁特落致仕發赴之行在供職敕具官某爾以和綏之術歷事纍朝績效著聞度越流輩雖告老得謝而精爽未衰其服故官益修爾職可南劔州沙縣民兵首領樂輝親獲凶賊余勝等七人特與轉一官敕具官某爾以智能率衆捍寇執俘獻馘嘗有顯勞懋賞進階以為爾寵可劉錫知鼎州敕鼎為湖湘望郡異時創殘行旅蕭然今流亡既歸田野加闢惟是存勞安集之政屬於守臣朕所遴擇具官某執憲蹈義飾以文雅頃侍殿岩識朕愛民之意剖分符竹往慰彼民惟既爾心無俟多訓可右承直郎楊抗特改次等合入官敕具官某乃者選任近列出使殊鄰載嘉體國之忠抑有乃僚之助稱功第賞爾實居先并敘舊勞俾更秩序尚圖後效以答茂恩可解潛罷軍職特除正仕承宣郎敕侍衛之臣朕所倚重雖出處之事各異而眷遇之意惟均具官某忠謹不浮沈深有斷屢著捍城之略夙推經逺之才召自遐方再司軍政忽露章而引去諒雅志之莫回勉徇其私以均勞佚留務之職式寵其行惟爾以勳業自期見謂慷慨尚觀他日益展壯猷可韓世良特與轉行左武大夫遙郡防禦使敕朕制橫列之官以待異能之士其選重矣茍非其人不以輕授具官某沈機服衆義勇冠軍屢立戰功不自矜伐典司軍政亦既淹時肆因慶賚之行陟此髙華之秩兼崇使號併示眷私爾其服我訓辭益殫夙夜要使旗常之績獨髙伯仲之間則豫汝嘉是曰報稱可藍公佐父安石特贈節度使敕朕用心廣愛御于家邦厚往飭終存乎禮典具官某禔身有裕率禮不違祗事宫闈浸更嵗月死而未泯尚克教忠爰申追錫之恩懋建節旄之重神靈如在庶或知榮可右承直郎陳楊上書可採特與改合一官敕具官某朕不愛爵賞以求至言茍可施行則若已出爾以孤外慷慨獻書論議詳明有當朕心錫以渙恩俾更秩序其益勉勵以稱所蒙可忠訓郎閣門看班祗侯藍師稷換授右承務郎敕具官某朕申遣信使逺適殊鄰被以寵光悉無所愛爾以從行之賞就易文階有榮耀焉其思稱此可將仕郎鍾離咸亨以昨充計議使屬官循一資合入修職郎敕具官某向是委任信使通好殊鄰休兵息民既有成約從行之賞朕何敢忘其服茂恩益思報稱可權同知閣門事何彥良特與落權同字除右武大夫敕爵賞之設用勸臣工凡官修其方吏宿其業所應褒進者朕無所愛焉具官某謹願恪恭服在近密更閲嵗月無改厥勤方將申九賔臚句之文候百辟會朝之禮簡求爾類無易舊人進秩橫階正多上閣益思稱職以答茂恩可苕溪集卷三十五
