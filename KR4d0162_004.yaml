body:
  text: 苕溪集卷四宋劉一止撰古詩南山有蹲鴟一首示里中諸豪南山有蹲鴟春田多鳬茈何必泌之水可以樂我飢六師擁行在閭巷屯虎貔民食尚可紓軍食星火移努力輸縣官無乏轅門炊所願將與士感此艱食時忠義發飫腹向敵爭先之驅逐狐鼠羣宇縣還清夷我輩死即休粒米不敢私聞杭州亂二首飢來命餉寒索衣官家養兵如養兒時平軍律久玩弛轅門笑歌驕莫隨往時金陵囚刺史今者杭城漕臣死稽天狂焰窮朝昏千丈紅霞炫江水鄰州之兵如此兵嗚呼此難何時平又縋城將母走者誰吾宗貴人丞相兒髙門潭潭深如海一朝赤腳踏路岐吁嗟身世何所有金帛滿家那得守衣冠自古皆賊仇玉石俱焚無好醜嗚呼安得貧富受用勢略齊無庸懸絶産禍機傅子駿右司見和雪句且有兩宫北狩之感復用韻二首萬里胡沙驚毳幕北望旄頭天際落向來官軍如路人受甲逡巡惟指鶴寧知竟屈鑾輅尊問天火令何當燉落雪如絮不我溫九閽夢想血面論又先生著書風撼幕詩成弄筆雲煙落舍傍種竹欲招鳳郭內有田才給鶴眼看雪片黏空尊寒齋芋火猶能燉怪我官冷何時溫我亦聊爾公弗論次韻方允迪祕監步月感懷一首伊昔苕水濵詩酒相迎送紅蕖三百頃天遣作妙供於今幾何時喜懼不同夢驚心風月夕怨笛有殘弄所嗟老侵尋不愧官冗從當時季孟間衆識長雛鳳寧知天一角復此樽酒共文章千古事習氣無乃重詩如朝陽鳴一一律吕中從逰二三駿蹀躞不受鞚阿威有家學落筆競豪縱傷時復懷舊一笑得再慟公等俱勉旃如我堪底用允迪以羊膏瀹茗飲吕景實景實有詩歎賞僕意未然輒次原韻精金不受釧叉辱瑞草何曽取膏腹乳花粥西名巳非薦以羊肪何太俗山林鐘鼎異天性難遣華腴偶窮獨森森正味苦且嚴玉質無瑕誰敢戮君家饌林多錯本讀罷流涎誑枯吻故令茗碗變腥膻逺想黃封雪花醖呼酪為奴逢彼怒自惜爭雄巧相妒我寧不飲信我説獨喜君詩有神助君不見穆家兄弟故可人概以骨鯁恐異趣將如京師和方時敏機宜十二辰歌一首羣兒鼠竊均有遇老矣自知牛後誤成功未解鬬兩虎援翰徒勞秃千免佩書丱首何龍鍾靈蛇光怪蟠心胸馬頭二千悲逺道羊角萬里無髙風秦歌嗚嗚楚猴舞一笑何如共雞黍謀身狗茍君勿嗤聊戲墨豬書韻語昔人論書云瘦為形枯肥為墨豬五十少公卿贈何子楚居士五十少公卿三十老舉子世間老與少不必較年齒我觀宦達人顔色自豐美癯者忽易腴變化一日耳人言老再少信是有此理我為老諸生流落踰二紀四十又過四淟涊百僚底説老巳十年何况真老矣壯氣摧幽憂髮白面目緇寧有再少時一衰乃如此何郎窮過我齒髮亦相似間居傲軒裳臞腹滿經史時時吐光焰麗句落忩几誰家肯終惠試此足千里空令坐窮獨閣户今掃軌宦達世共慕間曠我所喜丈夫生世間要自發竒偉富貴何足云功名半張紙古來傲世士良是窮乃止未有如子年慷慨隱㕓市我不愧公卿愧此少居士水村二首示友人浮花蕩漾青薲小緑柄欹垂剪刀草朝從港東暮港西採花擷草無盡期秋光有盡意無盡萬馬奔騰小作陳眼中未飽公莫回飢腸作惡如鳴雷又張公一生雲水客往嵗孤蹤寄苕霅故人刺史眼為青願為泛宅浮清泠當時鷗鳥難問迹尚有水村名泊宅碧蓑青笠寧在無令公仙去當傳余借居鸕鷀山中一首呈方允迪道蹤昆仲長松舞髙寒落澗㵼清泚笙簧響天上金石鳴地底雲容何潤澤下有隱君子樂此山水音清若變流徴怪我從何來塵土兩目眯冦戎在江滸薦食心未巳赤囊走邉報朝暮異憂喜安知隱人樂勝絶有如此古來成敗事不入山中耳願言晚相收置我巖壑裡酌泉得醒心茹水可不死况有載酒人半道同栗里屢從道蹤飲其所居在半道間山居作拆字詩一首寄江子我郎中比嘗以拆字語為戲然未有以為詩者請自今始日月明朝昏山風嵐自起石皮破拈壁古木枯不死可人何當來意若重千里永言詠黃鵠志士心未巳次韻鄭維心貽盧叔才一首朝行轉木末暮返循水涯生長山水間途窮自知歸萬緒更擾擾衆目何睽睽有若脫􅫓牛邂逅得此時坐念盧夫子與世真背馳讀書如董生三載圃不窺清詩見真情觀者豈得疵春風入閭巷爛熳百卉菲摩腹忽起行菜茹傷蕨薇平生經綸學無術取世資貧交可相覔叩門兩無疑富貴不汝求吾至君勿揮次韻維心謝沈尚書惠筆一首書生磨吻鉛刀銛君家手筆不退尖琢成秀句奪天巧平揖鮑謝奴髙錢郊寒島瘦復可哂漢風楚國真能兼胸中疾邪茹不吐但覺忿氣生虬髯叵堪陳夀書漢實毫端有口可得箝維心修三國志尚書昔侍金華講論議凛凛秋霜嚴曽將一字竊魯史尚書曽講春秋未用三語求阮瞻分召賜筆助清峭雕犀鏤象光出奩如吾朴遫豈足數半世翰墨徒心潛老去文章讀不入編帙散亂如投籤因君窮討默自愧僻魯成痼何時砭須要盡見君家書稿死不歎周南淹更從湘東覔金管賞激忠孝祛妍憸謝吳興守李端明致酒一首時寓德清孔愈廟邉溪水長石壁巖下飛泉香居士住此幾寒暑只見四山青又黃今年春雨摧麥芒六月稻穟乾欲僵煩公焦勞坐黃堂何不趣公歸贊襄為時開閣隂與陽不令此憂遺君王我君有如坐甑內口顧怫鬱不得驤公欲令我蘇肺腸白衣致酒甚沛湧瓶粟未空陶氏倉得酒且到王生鄉更招山前老漫郎謂沈次律渠家曲柄荷可觴大梅山法常禪師隱居餘姚南梅子真所棲有僧尋拄杖迷路至菴前問師住此多少時師云只見四山青又黃月出一首東峰髙如屏月出久未知竹影忽上窗淡臺時參差出入坐數息瞑久息愈遲舉目月在忩便覺心境移平生浪紛擾自省黠半癡嵗晚得此身終焉以為期山中有寒暄我不記四時樂此見有初非關未忘詩剡溪道上一水縈不斷千巖翠相扶孤篷載雪歸我昔見畫圖今年兩經行明晦自慘舒旱夏山若焦秋至潦溢途是中無故人王事當馳驅景物寄心賞隨愚便有餘不覺老季真乞歸尚狂踈官家賜間身用底一曲湖觀大龍湫一首峰頭鴈何在井底龍不出吐作玉虹流倒挂二千尺落澗勢初緩漸聼轉山急噀面飛雨過著衣晨霧濕造物等幻戲此地真絶特勿言王事勞遇勝得小立慙愧大尊者幾載面青壁山髙不礙見泉聲不妨寂次韻建安劉彥沖學士寄茶一首寒溪日潄枯腸潔自志窮愁漸陋劣故人不愛北苑春更遣清甘嚅吻頰只今相望如參商武夷孤絶雲蒼茫底事坐閲百鳥翔要偕玉川風兩腋髙飛令吾墜君傍賦程伯禹給事漫吾亭一首時伯禹至宣城道州固傷時晚嵗吾山溪彼物何曽爭我自分兩畦宣州絶代賢雅志蘇羣黎胸次包峥嶸不肯露角圭何從得漫名正恐亦偶題渺觀身世空萬境俱一齊浪云出處殊不悟東自西向來功名轍復入山水蹊公今持左符早晚朝金閨生賢出世間渠能絶攀躋要須了此心泛應忘髙低昔我蓋巳漫今我亦非迷獨居會稽官舍送僧逰龜溪因記寄聲弊廬老人年六十生理常刺促歸無一稜田此事亂心曲妻孥渺相望幼稚炯在目師今遇龜溪山水無盡緑石壁嚴寶坊泉甘宜杞菊但恐齋厨空眼飽不救腹並行山徑微草露濕人足師訪老人家門前有修竹酬王元渤舍人方智善學士求余作墨竹一首余所居似賢堂蓋先伯祖雜端為竹製名今竹與故榜皆亡因敘此意堂名似賢人似竹瘦節孤髙照崕谷百年人與竹俱化尚有諸孫來借宿家風愛竹餘底事至今十飯九不肉惟應説食誑枯腸更寫寒梢媚幽獨王郎散帶談清虛為竹造門顔不忸方英炯炯貌臞甚門倚江干千個緑兩家人物總風流石壁山前煙雨秋豈惟千首輕萬戶胸中世襲瀟灑侯我乃癡絶非畫絶憐此霜根貫金鐵短綃淡墨持似公更聽我詩聲激烈題等侯軒一首姚氏庵種竹萬個道人瓊公邀豫坐其傍余因名其軒曰等侯且為他日子孫封侯之讖云陸龜蒙詩云湖山自是清涼國初竹合封瀟灑侯蒼官與青士都封瀟灑侯萬個儼相持更比千戶優道人心安樂可念過不留延我聽風窗凄清韻天球傍瞻卧麟冡卿雲覆杯邱前峰鬱岧嶤落澗緣道周居然氣象異况乃世德修他日名可占子孫荷靈休訪石林葉少蘊觀文二首卿雲覆其上草木爭鮮新竹露先參差晴曦破蕭晨萬石紛拱揖靜默自主賔似中有老仙雲霞煥精神朝暮林壑間搜抉出怪珍風欹青篛笠雨墊烏角巾山靈指山謂此是夔龍身如何輕世纍蕭散與許真了知褎衣貴未若巖石親功名乃棄餘道德受咨詢我來追步趨且復結勝因劇談到羲皇愧此真天人又夔龍在邱壑神物發幽祕森然萬瓊瑰參錯分位置踞地猛獸伏拏空孤鳥厲先後相長雄突怒疑攫噬各以竒自列寧謂我獨嗜羊酪非不珍蓴羮有至味鄭公信骨鯁我但見嫵媚種竹被崕巒惡木不得地荃蘭偏九畹薉草慘無類造化初何心被物自殊志那知此巖傍閲世等如寄願言賦丹青逺近同一視次韻倪文舉芮國器扁舟見過溪上之作頡有兩玉人風流晉宋間况復子倪子妙思輕小山訪我相後先知我倦飛還僮僕怪主人羈縻如在間何曽得此客能使意緒寬從今望仙舟我門肯常關春風孔郎溪松下荆可班几上人名所乘舟曰釣月庵求詩為賦二首古德杖頭挑今師竿下取月滿體自如清光無處所又昔人釣忘餌今師亦忘鈎靜夜江不湍孤光送歸舟雙頭黃芍藥二首漢宫時世妝承恩嬌姊妹解道根蒂同如何心兩背又映立自亭亭吸飲風露饒不作恩與怨世間兒女妖龜溪左顧亭二首餘不溪上山映我杯中緑我醉狂欲歌潛蛟睡方熟又溪面寒無風澄瑩千丈緑我欲放輕舠霜鏡不敢觸苕溪集卷四
