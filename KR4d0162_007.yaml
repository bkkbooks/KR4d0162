  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0162_WYG_007-1a, image: WYG1132/WYG1132-0036a.png}
body:
  text: 苕溪集巻七宋劉一止撰絶句聞親征一首十萬貔貅同日出君王英武古無雙而今将士争豪甚為報天驕莫戯江賊臣劉豫挟敵騎犯兩淮天子親總六師出征賊騎摧衂宵遁鑾輿既還效杜拾遺作歡喜口號十二首祖宗先徳後刑誅八葉昇平振古無馴致小𦍑如許黠五兵雖惨亦時須二聞難君王敢自安鞭笞貔虎向江干英謀睿决知誰敵世祖周宣比並看三杖策初聞桑下謡氐𦍑酋長待來朝而今有酒須相樂前日憂思今日銷四将相同謀互往來一時肝膽絶嫌猜頗聞追騎三方出不遣淮壖疋馬回五天戮齊東老逆臣弄兵鼠子尚窺人乾坤整頓應須早賦與中原浩蕩春是日傳聞劉豫巳死六猛将心期箭有神争前知敵不知身聖恩令貸簽軍死汝是中朝箇裏人七胡兒驅馬意何忙淮海暄風炫日光心折關河歸不得而今底處是家鄉八六代金陵是帝州諸侯玉帛等山丘指揮大匠新宫闕早晚鳴鞭向石頭九逺人豈敢易江沲前日謀臣謬謂和為問奸諛羞死未較量今昔孰為多十紅旌白馬羽林兒絲鞚當胸短策垂歸導鳴鑾何太喜腰間金印阿誰知十一曉來鼔角動轅門便覺昇平氣象存他日两宫歸就養更看天子父兄尊十二東風九市遍開塲梅栁参差近玉堂應許侍臣俱入賀捧持春酒夀君王次韻徐立之朝議除夜無酒二首功名本是誤成蠅伎俩何勞更鏤氷竹屋紙忩風攄幙可憐挑盡讀書燈又平生豪氣忍難除尚憶咸陽五白呼詩似少陵惟欠酒可能客舍事全無次韻傅舍人咏褚邦直葫蘆山瓢枵腹謾如壺不學鴟夷肯借酤清夜玉堂誰伴宿此時一盞可能無次韻山僧善彬寄梅花苔封老樹槎牙甚何事春風亦與期千尺寒巖無暖氣不妨入眼見豐肌次韻江西李相君七詠蒼梧雲隔漫烟波露後誰憐泣女娥會道洗空千古恨石心今日奈渠何右雙蓮閣春院花香透白間夢餘風景似蕭閑只今是夢誰占夢却笑溈山問仰山右夢室種橘洲邉何似好離離丹實鬭鮮新千頭豈為封侯比留得芳香噀後人右橘亭公家愛竹傳聞舊要看凌冬色不浮日報平安何用許至今好事想風猷右竹亭薝蔔同林一等香芝蘭在室不知旁而今閱世如翻手㡳處交情有許長右蘭室閩嶺風塵旋埽空挽回春色到花叢長紅小白参差見便覺丹青入手中右花塢曲塘如磬何曽有坐想縈山更帶林花圃夜來春雨足漾舟應試一篙深右磬塘戯題法真師見南山齋一首看山終日自夷猶清净誰如此比丘莫指妙髙南向是徳雲還在別峯頭題敏上人隠齋一首水石菖蒲真活計芒鞵不借更竒哉借入聲山林本是君家物為闕喚去來訪梅瘦藤扶我到溪南梅蘂含羞未入看不是今年花事嬾北人移過許清寒訪石林二首行山不用瘦藤扶度石穿雲意自徐夜過西巖投宿處滿身風露竹扶踈又山澤形容忌太癯石林風範獨何如時時賔客傾家釀箇箇郎君讀父書過梅溪省妻父臧翊善墳感歎二首落磵悲泉不擬聞落平橋北路頭分揚雄舊宅今安在心折侯芭三尺墳寂寞松岡鎖暮烟平生忠信事茫然臧孫有後真虛語伯道無兒可問天和故人二首丁夘年九月二十二日夢中得之平生事業較粗疎晚嵗欣陪謝幼輿林下商量好消息不須嵇子謝交書又目前得巳便休休事業何曽有到頭客問函山孰為一月明風静好清秋此篇不記第二首覺後足之覺時已五鼔夢中他語皆語妙理題丁氏堂六言四首妙喜何曽斷取竺峰九日飛來乞與溪山暮宿都都濃翠成堆二杯觴競醉羣玉衣袂常沾翠嵐不怕峯前路滑石頭是我同叅三捴是胸中描出不妨怪怪竒竒鴈蕩龍湫髣髴鸞翔鳳舞參差四翠峰欲並眉嫵艷蘂難争臉紅昔日寒巖枯木何如此箇家風題徐次游通判小隠堂二首遮蔵得到中興日觴詠仍陪小隠仙曲徑畫欄春㡬許竹花人月四嬋娟又一時藥籠召參术何事全家傍翠微勿謂小山招不出太平須要隠人歸金陵人物風流自六朝故山圍國尚苕蕘只因王氣奔瑶闕噴作江聲萬里潮入靈隠寺石泉苔径午隂凉手擷山花辨色香度嶺穿松心未巳好閑反為愛山忙登看經樓示同逰昔逰曽共朱欄語斗換星移始再來料得當時樓外水有情應解作潮回宜興道中客懐無事只増愁遮眼殘書懶即休午醉忽驚如喚覺亂山無數滿船頭寄題葉叔眀盛圃熈春堂四首且為他日往逰之約堂前草木自争春堂上妖嬈花妬人年年嵗嵗春相似不信風光有故新二橋當忩檻月平鋪一色寒光玉不如橋下流泉來別壑經春緑盡可蔵魚三個儂傳得嘉榮唱天上偷來曲度新他時莫向樽前誤客似周郎解覷人四吹花嚼蕊橋邉路衣袖常沾草木馨更聴緑珠三弄笛為君一洗海風腥送吴興太守行十絶句人物中興第一流論才應作富民侯帝憐玉筍班中秀合付蘋花栁惲洲二海内文章說大門故宜生長此兒孫玉昆金友捴秀出厯塊過都不足論三人言此邦公所私教我子弟等文師大書深刻豈足紀願奏宣布中和詩四振廪巳責功及物輔藩千里實分憂爾身在外心王室咫尺應須入告猷五老奸屏氣舌敢出雅俗雍容歌樂康五日京兆何足數三年子産轉難忘六元豐應制規模在奕奕風流自一家詞劇清新過小庾情多兒女笑張華七燕寢風清晝漏長愧公延我讀書堂此日偶同元凱癖他年儻憶鄭公鄉八垂老何堪此別離感公情義獨心知故應他日汀洲泊獨立難忘捩擢時九雞皮鶴髮病龍鍾誤入林宗裁鑒中平生氣概今如此自對青銅惜此儂十且盡離筵酒一杯貴臣寧許我重陪他時翊賛昇平事賦與林下歌康哉太簡齋即事二首太簡老人家似客室中猶恨未空虛筋攣歩澁常須酒日入中昏始廢書又晚來人報雪遮門委巷蕭條郭似村自酌甕醅能軟飽借人布被得竒温寄題李徳修通判宣城隠舍二首仍次其韻官身寜為倦知還自憶青山對白間白間忩也忩間連逺岫盖謝宣城詩有月有風俱是客愛詩愛酒可能閒風月堂又性在東風浩蕩邉故将詩酒作春妍淵明好客妨何事卿去教知我欲眠秀野堂和何山捴老一擊軒二首掃洒閑庭無個事林間一擊是何聲自從當日知音後本地風光見太平又此地丹青畫不成本無聖解及凡情道人來往風煙外不是如來行處行題楊吉老知軍玉輝亭二首向來風月雄清地今日昇平将相家自啓忩扉放山入使君聊欲傲雲霞又清間寧有清如許買斷嵐烟入樽俎我來愁此玉輝寒要上峰頭呵佛祖送報寧曇老二絶句白雲到處有光輝江北江南一杖携妙喜風烟曽斷取羊仙今日合全提又王家宅似江家宅草木風烟各不知王謝争墩公案在問師一筆判歸誰報寧曇老受請将入院作兩絶自送之報寧在半山盖王荆公舊宅我名公字偶相同我屋公墩在眼中公去此墩當属我不應墩姓尚随公此荆公詩也公初罷相歸金陵有問公動静於過客者客戯答云余不知其詳但聞方與謝公争墩耳苕溪集巻七
