body:
  text: 苕溪集巻十四宋劉一止撰奏狀舉陳之淵自代狀任中書舍人日具位臣劉某蒙恩授前件職准令郎文侍從官授訖三日内舉官一員自代者右臣伏覩左從事郎充臨安府府學教授陳之淵學問淹通文辭贍蔚頃居太學試選屢優効官以來志節彌勵儻見録用必有可觀舉以代臣實允公議謹録奏聞伏候勅㫖舉吕廣問徐康狀任給事中日具位臣劉某准尚書省劄子奉聖㫖令行在侍從官各舉所知二人臣恭依聖上選舉到官具列於左須至奏聞者一左宣教郎吕廣問文行粹美論議髙明胷有所存實有治具流寓嵗乆守道安貧鮮見其比者嘗蒙朝廷召試館職不報尋出補外前後歴任職業甚修一右奉議郎提舉两浙西路茶鹽公事徐康性行冲粹學識淹通論辨古今悉有依據雖以蒙朝廷擢為使者用建所長未究施設右件二人實臣所知蒹採輿議儻蒙録用必有可觀伏望聖慈詳酌付外施行謹録奏聞伏望勅㫖應詔條具利害狀右臣伏覩今月二十七日手詔令中外侍從省臺寺監執事官監司守令等名實已見的確利害凡可以省費裕國强兵息民者條具以聞仍已詔大臣置司修政有言聞達悉付講求有以見陛下焦勞圖治宵旰靡遑仰師周宣所以内修政事外攘夷狄之意以惠天下甚盛徳也然臣謂修政之舉置司而講求之宜也何宜聞而乆未聞耶昔梅福以南昌尉上書乞假報傳主行在所條對急政四方之士固願効其所聞以為所不當緩如福者多矣及今始求之豈亦所謂急政者乎方今中原版蕩九廟播遷外憂猾夏之逺夷内有弄兵之羣㓂而又僣偽竊國之人反側自疑日夜謀我言政之急未有如今日者陛下詔臣等以省費裕國强兵息民之事固議者所當急乆矣然事不素講而求之於一朝夕之間所謂足國裕民者誠不知其方欲足國則民不裕欲裕民則國不足一旦用度有闕郡縣吏不過隂取於民以應公上之須陛下亦莫得而知之也所謂省費强兵之事亦然欲省費則兵不益欲益兵則費不省加又有烏合招來之冦存之則縻費廩食不足恃以為强汰之則無所歸日覆出為惡議者處此誠知其難也今日欲為陛下論之而不知所當先則為不知言陛下問修政於羣臣而不先期所自為則為不知政今日之事在陛下躬行者顧莫先於省費非謂天下之費必待陛下而省也以為不如是則不足以感人心而示好惡政之本不立也臣愚不肖待罪臺屬於兹有日矣竊聞陛下小心如成康儉徳如文景篤好書傳踰於聲色尚方服用簡樸無華與士庻之家等搢紳交歎以為聖慮宏逺不以一日奢靡快意為樂也然邇來議者頗謂嵗取左藏庫金帛之數不減全盛時有司告病縉紳惑焉豈陛下儉於一躬而賜予或未節耶且左右親近之人至無厭也不以禮法抑之将何時而巳仁宗皇帝嘗語侍臣曰左藏庫月供錢千二百緡此周王所謂供王之好用朕宫中無所費其令罷之當是時左右親近之人非不多也然而無所覬覦者知不可也又况其間畏義知耻與上同休戚者雖予之将辭焉其不然者皆貪得無厭不與上同休戚者也又何恤焉且陛下厚於及人而以身當天下之謗其無乃自為謀者疎邪臣願少抑賜予之費與所謂雜色供奉冗食無用之人稍鐫減之示好惡於天下則修政之本已立其事為之末乃可議耳夫修政之日無㣲而不當舉議将次第而行之莫若詔監司郡守縣令各至所部詢問父老講求一方之利害若曰孰利未興孰害未除孰民田有遺墾孰為知兵孰材武可用孰土豪可任使其當山川控扼㳂河瀕海之地則曰某地可守某地可戰某地可為寨柵廬舍某處可以積粟漕運各以方畧來上然後以其説深考而熟計之度其可者行焉間遣近臣巡按某地而核其實以為之賞罰黜陟則事無有不得其要領者今未嘗目見耳聞而獨使之汎然論天下之利害其有益於施行者無幾耳趙充國號為通知四夷事者且曰百聞不如一見臣願馳至金城圖上方畧况餘人哉乃若裕國省費强兵息民見於事為者則臣謂莫若求之民兵盖四者一事而已古者兵民為一故兵不可勝用而國不知費趙一國耳長平之戰四十萬人死其后亦不聞無兵秦男子十五以上悉驅之從軍則是民即兵也比年以來為民兵之説獻於上者多矣卒莫之行巡社之法既行而旋罷豈朝廷難之以為擾民耶是計之未熟而行之不得其要者也若臣之説則異於是陛下即行之不過下半紙檄以頒郡縣郡縣承天子詔㫖而告之民民則樂從之矣初無有甚難盖其説曰不募不籍不教不易其名不奪其業不係縻於官不程督以吏如是故民不擾而樂從凡縣鎮鄉社之民通使為之不欲者勿强並習兵器若弓弩戈矛槍挺刀牌等随其所習以今所謂保正長者總之曉以利害使各保其田桑廬舍境内有㓂悉聴捕逐其獲㓂之賞則有常格見於著令若遇大盗并力殺獲則聞於朝稱其事而旌賞之如効用之法其平居講習精於武藝者聴保正長推舉不以多少聞於州郡州郡按試之如所舉者為之旌别蠲其身丁及三犯杖聴贖彼固知保田桑廬舍之利而又有意外旌賞之寵無所係縻無所程督亦誰憚而不為哉今夫羣天下之士而試之有司次第薦送而官使之彼誠利於得官也挾䇿覔舉雖終老而不悔曷嘗募之使為科舉籍之使不得脱耶使民習兵無以異此為農為商不易其名不奪其業且将因詢暇時嘯其朋儔自相講習梃者擊戈矛者刺弓弩者馳射彼歸而求之有餘師又何必驅而教之為哉且山谷强悍之民初未嘗敎也而藝絶官軍者所至多有如曰必驅而教之使知坐作進退是猶博士先生緩帶徐歩升堂巍坐而談經坐諸生堂上擊鼓而進退之以為文物表儀化民成俗可也所謂學者豈真有待於是乎孔子曰不敎民戰是謂棄之而臣乃以鄉社之兵為不必教者非兵無事於教也以其勢與官軍不同非仰食公上者之所繫至衆一或擾之将不樂從藉令習業不精假之嵗月所得十一不巳多乎嗚呼兵之弊甚矣其患有不可勝言者在祖宗之時平居無事則竭天下之力以飬兵在今日國勢阽危則竭天下之力以飬亂今臣之説雖未能銷患於赫赫之際而能為陛下銷患於㝠㝠之中雖未能足國裕民於一朝夕之間而能為陛下足國裕民於三嵗之後且為乆逺無窮之利若以三嵗之後無救目前用置不講則是其弊終不可救也願陛下下臣章雜議若以為可則立為賞功勸勞之典㕘酌舊所著令損益而施行之此臣所不能知也或曰臣之説朝廷非不聞也不果行者懼民之知兵且為亂也臣曰不然强悍之民崛起山谷十百為羣輕犯縣鎮居民無逺近多寡望風奔走與異時敵人所至率以一歩卒聨十百人而驅之拱手屈膝以受箠擊莫敢與抗者非不顧其生也誠未嘗聞鬭戰擊刺之事耳僅有一能者則荷戈持挺出當之矣此臣所耳聞而目見者也借令一鄉社之民自起為盗則有他鄉之兵制之一縣鎮之民為盗則有他縣鎮之兵制之矧未必皆然即臣之念至熟悉矣雖然臣竊觀陛下詔大臣説宫屬置司講論以修政為名誠美矣顧所以稱是名者宜何如哉使一國之政如一家之政小大快心上下告語畢精窮思推忠盡誠罔有嫌隙不顧望陛下風㫖不迎合大臣論議惓惓焉閔閔焉惟恐一事之有遺䇿一物之有遁情則庻幾焉臻於有成可日月冀也如其好是美名而不克充其實且聚訟交訾若築室于道謀則非獨不可以日月冀抑論議有不出於至公者矣元豐餘例之舉崇寧講議之名事出權臣弊政充塞貽天下患害至今未艾也願陛下察焉臣愚無知識姑陳其槩以塞聖問伏惟留神幸察轉對奏狀紹興乙未具位臣劉某准御史臺牒五月一日視朝論當傳對今具已見須知奏聞者右臣竊惟義倉之法論始於隋増廣於唐而國朝因焉其意若曰古者三年耕必有一年之蓄九年耕必有三年之蓄國無三年之蓄則國非其國矣當其豐登粒米狼戾俾輸其餘以備凶荒未為過舉不幸有金穣水毁木饑火旱之變則用其私蓄固足以賑之社倉是也隋開皇間長孫平請令諸州百姓勸課因社共立義倉收穫之日各出粟麥藏焉社司職長檢校多少嵗或不登則發以賑之然立法猶未備也至唐貞觀間戴胄請自王公以下爰及衆庻計所墾田稼穡畆頃毎至秋熟以理勸課盡令出粟各於所在為立義倉國朝乾徳間天子哀嵗之不登而倉吏不以時出與民於是著發粟之制使不待詔令其後病吏之煩擾而民罹轉輸之困又罷之至仁宗皇帝始復舊制民到於今賴焉然而推行之意有未盡合於古者豈得不論且所謂義倉者取粟於民還以賑之固不可以不均今也置倉入粟正在州郡嵗饑散給而山澤僻逺之民往往不霑其利其力能赴州就食者盖亦鮮少而况所得不足償勞流離顛沛有不可勝言者此豈社倉之本意哉恭惟陛下天慈廣覆一視同仁凡政事繫赤子之利害者見於詔令丁寧熟復靡有不至而奉法之吏因習故常憚於改為使上之徳澤不克下究臣竊惜之臣愚以謂義倉之粟當於本縣鄉村多置倉窖自始入粟以及散給悉在其間大縣七八處小縣三四處逺近分布俾適厥中若未有倉窖則寄寺觀或大姓之家縣令總其凡以時檢校遇饑饉時丞簿尉等分行鄉村計口給厯次第支散旬一周之庻幾僻處之民均受其賜不復棄家流轉道路此利害之較然者也伏望聖慈下臣議更賜詳酌儻以為可斷而行之不勝厚幸謹録奏聞謹奏苕溪集巻十四
