body:
  text: 苕溪集卷三十九宋劉一止撰外制修武郎曲慶祖等差充陜西六路宣諭司幹辦官先次各轉一官敕具官某朕以全秦之地久隔王靈肆命近臣宣道至意爾為山西將種世濟忠孝其佐而長往殫厥勤序進一官以為爾寵可左承務郎程邁差充趙士㒟祗謁陵寢屬官先次轉一官敕具官某朕念陵寢泛掃久稽肆命宗英往祗厥事爾等咸以才選往佐其行序進一官以為爾寵可右朝議大夫直徽猷閣李弼孺可落職永不與堂除差遣敕具官某爾曩以愆尤事存白簡召從間散權試使令於汝厚矣遜夷急病古有格言就易辭難誰不樂此削籍內間以戒妄庸可張宦駕部郎中敕具官某文昌政事之本而郎官上應列宿其選甚髙非一時真才不以輕授爾問學該洽行義潔修召置周行專司輦乘輿馬之政事簡職要所以優賢尚其勉之可馬延之大理寺丞敕具官某刑者侀也一成而不變故君子盡心焉汝志行清修卓爾不羣肆命汝為廷尉之屬惟明克允無失厥中則豫汝嘉可宋輝復祕閣修撰除京西路轉運副使敕具官某畿甸之右都邑相望賦入浩繁雄視他路軍興以來政令廢格謳吟父老思見漢官必得慈惠明察之臣省觀風俗問所疾苦布宣德澤以慰斯民朕心庶幾焉以爾才任撥煩用罔不濟忠能體國事靡辭難復升論撰之華命總輸將之寄佇觀成績嗣有褒寵可郭浩除龍神衛四廂都指揮使陜西宣諭使敕朕眷惟秦隴久隔王靈通好殊鄰既有息兵之約可無膚使往宣問俗之恩具官某義勇冠軍精誠許國奮猶將種能襲世勞顧契濶以淹時豈懷歸之不欲今朕有命惟爾克將慰父老之謳吟道朝廷之德意俾皆諭指宛若親臨爰升環列之崇用侈軺車之寵是為異數毋或留行可樓照除兼侍讀敕朕長育英才置之華近將使左右前後罔匪正人從容帷幄之間紬繹聖賢之藴謂天下之樂無以加焉具官某該貫六經沈涵百氏淵源所自不愧古人仰惟祖宗垂裕後嗣具存謨訓奉以周旋爰資誦説之明以發見聞之蔽益者三友非汝而誰可蕭振兼侍講敕朕思得耆艾魁壘之士置諸左右考稽疑義敷繹古今究治亂之所以然如漢虎觀故事增其所未聞信其所已得顧黃卷中自有樂地不可忘也具官某養氣邃深植學淹貫周知事物之變盡見聖賢之書用以談經宜探藴奧勸講之任舍爾其誰尚思切摩之工以副簡求之意可趙鼎知泉州敕朕履運艱虞省躬祗懼默通上帝旋聞悔禍之期嘉與斯民共享消兵之福肆頒慶賚均逮臣工矧豫舊弼之賢敢後拜州之寵具官某器宇剛特謀猷靚深通達事機夙負敢為之略執持魁柄既更冉入之榮方注意以仰成遽露章而引去眷泉南之名郡實閩嶠之奧區分此顧憂莫如宿望噫朕任四方父母之責念慈惠之當先爾居千里師帥之隆宜德威之並立益恢治具無俟訓言可程邁磨勘轉左朝議大夫敕國朝稽堯舜考績之規參成周計吏之法雖黜陟誅賞不由此途而階秩序進三嵗聼遷一定而不易抑無所私焉具官某法從老成才德俱茂植立中外聞譽蔚然會課三銓就官一列兹亦知勞之賜豈惟閲日之勤往哉欽承毋墮乃力可李寀廣西提刑敕具官某御史出使布宣德澤亷察吏姦求民之瘼威聲所暨山嶽可搖爾頃以才稱旋見録用遣臨江右綏靖寇攘而乃督戰無謀亡失吏士肆命爾更使一道按刑嶠南察民之寃除其殘虐則惟爾職毋重愧焉可潘全合等轉官敕具官某爾等知仰王明奉琛效順有嘉其意序進厥官往其欽承益思自飭可朱敦儒除祕書郎敕具官某漢家得人之盛史氏所稱考之於事猶有恨焉廷有大議諸先生莫能言盜發境外見文人無可使豈亦儲飬之不豫哉朕自艱難以來首開册府以收衆俊庶幾人才足用比隆於古爾老於文學器度不浮丞郎位髙實治省事簡求其稱僉曰汝宜尚勵爾修以須採擢可吳彥璋除太府寺丞敕具官某太府掌貢賦之事受其貨賄之入以時出之丞視列卿之屬其任惟劇以爾才識精敏無施不可召自乘軺還歸班著往佐而長益𢡟乃猷可陳賔卿太常博士敕具官某列屬奉常為時遴選搜補禮文之缺導揚升降之儀以爾問學淹該論議不茍俾居厥次必有可觀尊爾所聞見之行事可張澄除徽猷閣直學士依舊知臨安府敕眷惟帥守視古諸侯德施於民禮有加地進律之賞效見於事史有增秩賜金之文匪惟勸功亦以久任且使斯民服習其政而知所畏慕者也具官某沈靜有斷疏通不浮敏以吏能被以儒雅惟警蹕之所駐類京邑之浩煩人所謂難爾獨甚暇採諸輿論益簡朕心躐升筵閣之華仍俾左符之重知勞而授有榮耀焉尚究乃心以圖稱塞可林叔豹除江東運判敕具官某使者之任寄朕耳目號稱外臺維持紀綱以肅所部若御史執法日臨其前姦欺屏息無敢蘖芽則雖四方萬里之逺朕可以無憂矣况於邇乎爾文學志行自輩古人攬轡澄清不待多訓轉輸之責邦計是資爾尚勉之江吳壤連朕聼不逺將于是觀政焉可苕溪集卷三十九
