body:
  text: 苕溪集巻二十二宋劉一止撰記縱雲臺記徳清盖吳興支邑而山水明麗清逺為他邑冠南朝以來曰沈氏者世有韙人或以文雄一時士雖少必秀於其額民貧而安力於農桑種藝漁樵之業鬭訟簡少巖居川觀吏或似隠故仕於此者樂焉縣治枕山山巋然特髙為百里之鎮問其名於長老則無所根據縉紳者不道舊有臺下直令舍相距僅百尺規制甚美松竹清閟之音桃杏妖冶之容與他名木秀蘤分列左右天欲雨雲氣習習生於歩武襟衱之間今大夫沈次仲與二客燕其上客詠韓吏部釋嶠孤雲縱以為臺名次仲喜以告余見屬為記次仲之臨是邑也閲五晦朔矣旦朝坐堂上受訴諜羣吏立兩廡屏息側睨次仲獨即民聴其事究所以然反復問詰其情畢得文書雖多必盡讀乃止律身嚴無毫髪私亦不受私吏退與竂佐休於臺上危坐劇談或随時觴豆舉酒相樂抑嘗語人仕吾非所愛也有不得志則棄去如傳舍人以其志篤而事勤謂若將窘而中實縱適然則客之名是臺有當於主人之心者豈以雲之逸為可羡固將仰之耶余邑寓而山棲者也朝見雲之出暮見雲之歸進退容與於太虛寥廓之中千態萬状不自知其然其於出處亦何心哉余觀雲於此山四年矣余年有盡而雲之朝出暮返變化容與之狀如余所見不知何時而已以其無心故能乆也雖然次仲方仕余方隠迹若不同而從容於事物之境愈乆而愈安則或仕或隠未始有異余燕坐内觀欲忘其心如此雲之出處未能也次仲勉乎哉余既告焉因為之書次仲名造處之縉雲人二客歸安沈文伯名長卿福唐陳仲乆名袒安名臺者文伯題其榜者仲乆皆竒士也紹興五年七月壬申郡人劉某行簡記湖州徳清縣城山妙香禪院記城山在邑之坤維距邑五里為溪流之區溪自天目餘杭而下者出其背並山分港旋繞而北趨於郡城是為苕水院北鄉居山之半自外及内階而升者幾二百級溪南北之山初散漫若不相即登級三之一却而望之則蒼顔秀壁明措列侍若趨若伏若絙曵䇿驅可攬而有舟檣往來水鳥浮沒悉出眺聴之下而委棄於榛藂茀草之間不知其幾年矣熈寧中天台僧曰了因者始結廬其上會嵗大疫收棄骸於道加葦衣篾給聚而焚者以數千計又乞食邑之人以蘇流亡於是邑人相與出財建轉輪藏増治堂廡初因藏心木未獲因夢神僧指前溪有沈木焉物色其處已乃得之因出入㕓間飲酒噉肉人莫見其異一夕見夢於邑令云天台化士告辭異日院僧以告盖因以坐逝今真身存焉然後以禪律相踵住持者數輩而轉輪藏施利之人未嘗有虚日用是加葦門序略備而簡陋褊迫不類藂林邑之人恨焉鄉老邑大夫訪求名徳為道俗所信慕者得今住持僧佛智大師道容容始至心隘之將盡撤其故易而新之時余以柱史得罪寓邑中過而問焉容指謂余於此累石常廣若干尺為大殿於地鑿山廓左序若干尺為齋包之容於此培土實澗壑若干尺廓右序為棲僧之堂為復舍為誦經寮浴室仰靣指曰山之椒為浮圖其下為臨眺之亭又為方丈寝室規制甚靡余怪其言之易也問工程出費之數幾何且安取之容笑而言曰佛氏子以精進廣大為心耐苦忍辱為行其徒謂之海衆其求募於人謂之十方凡所建立患志之不篤與狹劣而勿廣成不成則有數存焉工程費出之事弗預計也志於成而巳矣其意甚暇若不足為余老且病未嘗數出他日過之門徑既成殿址累石且數尋若砥礪然閲歲又過之則飛甍刻桷髙出木杪則殿宇之䆳像設之嚴無遺舉矣如是數年余再以罪去朝而歸訪山林凡容所謂鑿山培壑髙下建立無一物不如言者其衆二百餘人其崇飾之意未艾也嗚呼何其易且速耶患志之不篤與狹劣而勿廣則余既信其言矣然余所深怪者以其甚暇不怠若無心焉寧有情而然者哉於是知其昔所謂建功立事者非獨才志之難而優游暇豫無遑遽猝迫之狀為尤難故凡才智之士才之能優游暇豫者吾罕見之抑造物者之嗇與人也茍有是雖鉅細不同其必有所立是院之設固未足多也而於余心有感焉容見而屬為之記樂為之書始於建炎三年某月某甲子成於紹興十一年某月某甲子院初未有額興役之嵗訪安吉縣故賜額請於郡得之容遂為妙香第一代住持云某年某甲子吳興劉某記吳興郡學重繪三禮圖記國朝建除中天下初定詔儒臣參裁典禮而國子司業聶崇義者以唐相張鎰等六家所撰稽其詳略是非總為一書是曰三禮圖書成天子嘉之命國學圖於宣聖殿後之北軒其後懼其圮剥復易壁以板盖已有意乎禮樂之敎規模宏逺矣然當是時狃於故學士鮮知經且師道之廢實自前世未有傑然興起之者至明道景祐間海陵胡公先生與泰山孫明復徂徠石守道皆以所學敎授弟子而先生之徒最盛其在吳興往來郡學常數百輩自是天下之人始知尊徳而隆師士皆知仁義禮樂之説為足以誠身而格物其學問之成為時顯用翊賛治道見於嘉祐治平之間者不可概舉初郡學求先生乃以三禮儀物黜其於古無考而益其未見者圖之講堂遵故事也於是人人得窺三代文物之懿朝夕對之皆若素習閲嵗既乆有司不知故事至皆汚鏝學者痛心焉太守汝南公某以左史出奉相尋領是郡於其始至也見諸生於堂上而勞勉之又増飾􅓺宇被以丹艧而掌學開君某與歸安丞胡君某抉剔故壁得所謂三禮儀物繪事故存公命易而新之恍如神明頓還舊觀郡之士子周覽太息咸謂公之賜大矣學者將因是加習焉異時鳴珮執玉於朝廷之上討論故實禆補敎化茍不愧於前人賜豈不大哉公以闗君之請貽書屬某為之記且曰前太守秦公某初有意於是會召去不果今余幸卒成之某於鄉校為老諸生知其事宜悉所不應辭若先生之行義世次歴官見於國史與墓隧之文其闡學精識見於著書者固多其藏於家及士大夫手抄皆秘不出蒐索編次罔有逸遺俾鏤板而行於世則闗君之力也闗嗜學若饑渇行則誨人以先哲為師不拘時好嘗曰我先父學於先生敢有二事故於此致志云紹興十二年八月丙子郡人劉某記湖州報恩光孝禪寺新建觀音殿記湖州報恩光孝禪寺在郡治東北地勢亢爽土木雄勝門序殿舍齋宫宿廬規制井井他伽藍莫及盖陳永定中后家捨宅建焉初曰龍興後曰孝義至唐復為龍興吳越錢氏易為天寧以其女為比丘尼遂為尼宫凡一百年大朝崇寧二年始復為十方禪刹曰崇寧萬夀禪寺後又易崇寧為天寧紹興七年更賜今額恭為固改薦靈社也舊有觀音大士像在寺西偏兩楹之間郡人張氏病痿三年一夕夢白衣女子告曰若臂不舉耶吾亦若此若能拯我臂吾亦拯若臂且夀若矣張問所居則曰居天寧西廊翌日張輿掖詣寺得大士像如夢所睹瞻仰感涕察大士右臂為墜木所傷命工拯之張病随愈自是郡人歸心以疾痛苦見於求拯者日不下數十應感事迹不可疏舉而所處闇陋迮迫不副人意今道師居乆與其徒慧智寡衆出財謀建别殿奉安妙相而患棟幹之偉求之山林未易以日月冀或告之曰近郊曰寳溪者有故侯第今去弗居盍往圖之慧智亟往則其家已先見夢告於其主欣然許焉於是廊廟之前左建殿屋四楹前為複廊與旁两廡深明壮麗具妙荘嚴盖前住持經畫累嵗而不克成者道俗歡喜竦踊賛歎咸若有所依歸乆以其事求記於余以侈其成余曰吾聞觀音大士性相等空無刹不現身光互渉有感必通於諸衆生悲心不捨是故身為三十三應因事攝化利益見聞則我之身與子之身一為比丘一為居士俱在三十三應之内真源實濟視此大士為二為一為同為别以是思惟大士衆生體本圓成無二無别以無二無别故随衆生心想所感周徧無遺則是大士非但無我亦無我所而子獨以象設區宇為所依歸則利益衆生為有擇歟余曰不然大士身相無邉固無我所而彼信士心想鄉慕則有所矣我觀道俗至前攝衣俛傴炷香膜拜陳其疾痛苦死種種希求之狀誠意所教汗泚顔間言出肺肝感通夢寐初若一體我是以崇其嚮慕之所為之莊嚴以益其信心若彼信心一念囘光睹色明空入佛知見則知夫亡不起於座周徧十方在在處處無非道塲而此道塲實無所在利益衆生亦無受者如我所説為有擇歟為無擇歟如是問答亦無實義余曰是名實義是名大士悲心救物無二無别子言似矣是用識之始於某年某月某甲子成於某年某月某甲子後若干日太簡劉某居士記并説偈言我聞大士觀世音具大功徳妙荘嚴初從聞中入三昧聞空覺空空亦滅惟有一念悲衆生三十三應為説法法施無盡身無邊周徧十方河沙土毋陁羅臂如虛空云何示此疾痛縁以衆生痛我亦痛究觀起滅無處所偉哉寳殿嚴睟容清净絢麗光奪目惟導師乆善方便謂彼衆生心想殊要令睹想生實解入佛知見如諸掌在在處處皆道塲而此大士寳無在一一衆生蒙利益亦無受此利益者我知信施及見聞决定同證無上道湖州石塚村青蓮院記出城南行五十里少東有村曰石塚其梵刹曰青蓮唐大順二年始建乾寧中得額為報恩禪院至國朝治平二年賜今額環水為院四無居鄰盖棲心學道之境初若無路惟輕航短檝至焉粥魚齋鼓聞於傍近禺中而食則孤烟突起於雲水𣺌瀰之間望之鬱然余未及造也問諸道傍彼僧院者何如曰院不至崇大已而規制整整精麗明潔為可觀異時垣頽壁敗棟宇傾撓左右撑柱更閱嵗乆觀者悸心如將壓焉今院僧慈濟人師齊岳盡徹其故而一新之盛矣哉余同識岳是妙於醫者耶曰然岳自少習盧華之術通金匱石室之書以是濟人亦以自飬身余嘗頼之一日過余始詢其事岳曰吾受業自院既而遊方累年稍倦而歸視所謂受業之區幾為荒墟惕然動容寝不安席炷香自誓勉勵其術以所得貲財次第建立不敢有一毫之私是吾之發是心也以疾扣門者加衆吾潛心以思思則得之疾無重輕賦藥授方輙騐可期以時日又有知我之有是心者乃力而交助之市木於某鄉采石於某山有不受貲而願施者自紹興戊午距今十有九年而衆工釋用初營三門再嵗而辦齋厨次之厨成而二時清衆合食堂上僧舍鐘樓觀音大士殿又次之最後建轉輪寳藏極一時金碧之工燦爛陸離奪人眸子吹螺擊鼓鏗鍧於廡廊之下施利日至齋厨之費賴此以給布磚累甓内外前後繊悉備具余怪而問之是何成之易耶岳曰吾志於成矣然成之者非吾也意其有隂相焉何以云然吾之術不加於昔也而靈於人若此事既濟矣自今以往不自料吾之術復能靈於其身若此其易者乎以是知世之懐自利之私求得于人而偶得之以為吾能彼不能者妄也余聞其言而韙之岳求記於余余年七十有九病且昏豈復能文既賞其勤且有感於其言而為之書余於世間之見固未能超出也又欲於此警夫後之人可哂也已紹興二十六年五月丁夘記苕溪集巻二十二
