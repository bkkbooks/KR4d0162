body:
  text: 苕溪集卷一宋劉一止撰古賦秋郊賦寄友人紛吾欣此凛秋兮汨吾行此樂郊郤遊氛而懭悢兮斥萬里于澄霄日皓皓而逾厲子天逈逈而益髙潦水收而泓渟兮微風過而蕭條軼爽思以遐騖兮逝幽懷之逺飄神眐眐而直上兮意渺渺而獨超悼時運之不留兮嘉節物之見邀莽四野其無人兮兀平岡之岧嶤驚獨鶴之清唳兮咽殘蟬之三嗷燕如客而歸告兮鴈哀鳴以求曺相老農之就間兮晚霜鎌之在腰登禾黍于囷箱兮場圃晏乎其逍遙伐社鼓之坎坎兮挂杖頭之空瓢繄境會而情感兮傷志大而形么獨相羊以無匹兮起悵望而翹翹嗟佳人之何在兮倚翠袖而若招思夫君而不可見兮挽蓬首而屢搔嵗月駿駿而遂往兮悵此情之不自聊亦何憂之不臻兮緒軋軋其如繅總事業之無聞兮想富貴之不能徼將今世之舍旃兮蓋令名之勿劭力古人而願學兮泝千載而上交嗟人生之南北兮况截道之驚颷顧筋力能幾許兮茍比音頻年而逺徭曽一飽之不謀兮豈吾分之巳叨世種種其奚數兮信我行之每勞豈無林壑之舊遊兮方駕言其出遨䇿髙足于青冥兮昔嵗莫其同袍通舊籍于禁門兮幸新時之適遭諒從此以遐舉兮稅修梧以安巢彼出處固異宜兮奚獨緬想而心搖省定命之可安兮人何資於卜兆維南之山兮有䔩與肴維溪之水兮可以容舠既瀕我先君之幽宅兮復舍此而焉逃營庇身之三椽兮緝一把之蓋茅美秋月之如圭兮又春卉之窮妖飽松風於長夏兮拾東畦之墜樵宜上天之見貸兮賦此樂其特饒希吾髮兮崕澨散吾趾兮山椒庶無聲而無臭兮眷夀命於松喬三友齋賦并序余行年二十有四不知取友即家君遊息之會別為一小齋可方丈許當兀兀獨坐恨孤陋而寡偶也有一麈尾命曰白友一拳石曰碧友一琴曰黑友因名其齋云劉子三友白碧黑也各以色稱因其適也謂友伊何心莫逆也并我而四共兹室也不笑不言淡而默也不見其損亦不見其益也客有造余曰吾聞古聖賢之取友以人而不以物以德而不以色直諒多聞豈非德之人與今子友是不可則也余曰不然天地剖判萬物權輿適然有生若吸若噓寄一溫於全潮互出沒於太虛均形色其天性奚物我之差殊審如子言則既惑矣雖然請為子言之余觀世間爭名於朝爭利於途翕習沸渭駘蕩溫舒閭閻紛其森羅冠蓋儼其馳驅淨者易染清者易汙維是白友涅而不緇有於陵仲子之潔也髙下相形利害所怵信者可偽智者可愚勇者猶豫辨者呫嚅摧百錬於繞指回鼓瑟於吹竽維是碧友介然莫移有伯夷氏之特也至於鈎絃柱指函宮泛商寫天地之淳和雜古今之興亡或疏而越或嘽而緩或奮而厲或發而散國風雅頌和而質也騷人逐客忠而激也巍巍湯湯奔放而屼岌也促促刺刺切切眤眤怨斷而幽憶也余於是乎玩其聲而略其意寓於手而忘于心喜怒悲憤初無所隨俄而奏罷風恬籟寂反於無迹是黑友者其庶幾乎老聃氏之常德不忒也嗟乎余於三友雖以物取而人存其間雖以色命而在德罔棄蓋所謂若有德而不知其德者耶客俯焉而嘆爽然而自失出以告其徒曰吾得取友之術矣二三子何患乎無友苕溪集卷一
