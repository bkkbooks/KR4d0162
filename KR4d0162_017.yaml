body:
  text: 苕溪集卷十七宋劉一止撰表謝主管台州崇道觀表罷起居郎責授祇奉訓辭伏思適咎惟臣自取局地知慙臣某中謝伏念臣出自寒微誤膺簡拔以鋤耰固陋之質歷臺省清近之班自始及終不由他力從頂至踵皆出上恩而臣所更既多未有禆補欲初其議則竊自薄陋以為可用則無所短長仰帷聖德之方隆內懼史書之有闕臣之宜去誰不謂然不圖威命之行尚得祠官之奉兹蓋伏遇皇帝陛下遊心太古側席異聞作成士類而明試以功愛惜人材而濶略其過憐臣之罪以戇察臣之志靡他薄示譴呵止投間散省躬已辜固將安分之宜沒齒何言惟有負恩之愧臣無任謝除直顯謨閣表念咎洗心三移嵗律典州奉使再錫命書敢圖延閣之華又玷直廬之列逡巡拜賜局蹐自疑臣某中謝伏念臣曩昔無從遭逢特異遽由臺屬進直殿坳獨恃上聖之知不借遊談之助恩已隆而未報量既過而不辭固弱植之難安豈疾顛之敢悔夫何庸陋猶在記憐假之內閣之名以重外臺之寄寵光併及枯稿再春兹蓋伏遇皇帝陛下懋成湯之寬仁躬堯帝之神聖兼物衆智猥及臣愚而臣悵末路之難圖誓初心之不昧天髙地厚若為稱塞之階人微命輕會有縻捐之所謝提點刑獄浙東到任表不違顔於咫尺拜寵知慙送以禮而光華豈臣敢辱疾驅軺傳已見更新臣中謝伏念臣智昧知時學不適用誤竊聖人之眷嘗躋清近之班曽報主之不能乃蠧書而何益粵從去國寄江海以偷生自意此身與草木而皆腐孰云記録尚及孱微收五年間放之心總一道平反之寄豈獨庶獄之當審抑將荒政之是修任固匪輕責何以塞兹蓋伏遇皇帝陛下法堯言之清問躬舜德之好生憐臣寄孤雖功名之難幸謂臣朴拙尚豈弟之有餘臣敢不深體設施勉圖後效布宣寬詔願為慈惠之師銷折姦萌不愧安靜之吏庶收寸尺仰答生成謝除中書舍人表載筆殿坳初逺舊物演論詞掖遽錫贊書恍莫知其所從凛以榮而為懼臣中謝竊以自昔聖主建立非常之功必有能臣發揮難論之旨殆天所備不謀而同故煥乎謨訓誓命之文於斯為盛而粹然德意志慮之實罔不自孚矧今綱紀萬微鼓舞庶類堯年廣大商語丁寧是非得仲舒之古風熟崔琳之今事顧於述作曷副選綸伏念臣器窘而用微才疏而術陋自守朴學甘為臞儒精喪耗於幽憂藝業荒於不試敢圖遲暮之景猥受聖神之知頂踵皆出於睿恩踐歷每從於親擢至於升華法從接武近臣豈其平生有此過覬兹蓋伏遇皇帝陛下聰明稽古慈恕及人惟廣覽兼聽之是圖曽小善寸長之不棄况乎盛大德業比隆於乾坤昭回文章苐輝於奎璧而臣搜研末技綴緝諛聞以腐草之明而禆赫日之光以秋蟬之翼而增九鼎之重何能有補祇益自勞敢不勉竭孤忠誓堅晚節雖有慙於潤色庶無奭於告猷謝除給事中表寵錫自天懇辭無地祇拜莫回之命俯慙未報之恩驚懼交營周張失次臣中謝伏念臣少非特立老不自強謂當靜退之年無復進為之志不圖晚遇乃玷誤知持槖近班代言西掖正上聖作興之日躬萬幾總攬之勤與禁省之腹心而臣乏謨猷之益竊訓辭之手筆而臣無潤色之工思軋軋其如抽心搖搖而若失宜在黜幽之域更叨躐等之榮矧是東臺最為要地號人才進退之關鍵為王命出納之咽喉豈容迂疏膺此責任兹蓋伏遇皇帝陛下皇明廣被英斷獨成宏開復古之規克盡官人之美長材成厦未忘朴遫之蒹收衆駿在間尚意疲駑之可勉敢不激昻末路殫竭諛聞軀命幾何顧無益邱山之重飛鳴自誓庶少償烏鳥之私謝授提舉江州太平觀表罪大責輕感深涕殞臣中謝伏念臣淺聞單見極陋至愚受知殆閲於十年冒寵浸更於兩禁不量弱植濫據要津屬上聖之思賢戒邇臣而舉類而臣棲幽居之日久識中原之士希智實昧於是非迹遂成於乖繆揆其重負合置嚴辭正削從班俾安散地兹蓋伏遇皇帝陛下勵精政化加惠臣工若天地之含生心不私於與奪猶父母之怒子教終厚於譴呵遂以庸材蒙此善貸再念臣賦命蹇薄如出仇謀偶世濶疏率與禍會知非晚節既踰蘧氏之年受罰間身尚竊侏儒之飽念報恩之無所嗟視蔭其幾何惟有靦顔至於沒齒謝敘復祕閣修撰表毖祀告成湛恩旁洽不圖蕩宥逮及孤危既安祠館之遊仍俾書林之職兢慙在邑涕泗交頥臣中謝伏念臣少也湮微晚而遺遇學不通於今事志徒慕於古人以田野朴拙之姿與英俊峥嶸之列論思禁省近類腹心勸講露門號為親密禍實由於量溢天弗誘於臣𠂻上玷誤知自貽大戾顔忸怩而加厚神惝恍而靡寧追五十九年之非於今已後閲三百六旬之日遽許更新驚朽株之再春覺沉疴之去體兹蓋伏遇皇帝陛下躬乾坤之髙厚大德曰生並日月之清明容光必照哀矜舊物假借寵靈豈非削籍於丹書抑使增華於白首臣敢不捫心誓報擢髮知愆被銘骨之恩則如隔世有粉身之路不敢偷生謝再任宫祠表恩厚不資感深吹骨臣中謝伏念臣受性朴拙遭時休明曩膺禁省之驟遷實是聖神之樂育比其去國猶得奉祠而臣生理窮空孥纍猥衆瓶無餘粟不殊靖節之居甑有積塵幾類范丹之室屬三嵗之當罷悼一飽之無從忘已甚微仰天求裕詎意由𠂻之請遽叨從欲之仁脫困獸於觸籓濡窮鱗於涸轍圍門失喜少蘇併日之長飢摩腹起行便覺餘年之尚適兹蓋伏遇皇帝陛下德侔造化行通神明視覆載之間一均涵飬矧蓋帷之舊寧忍棄捐但獲便安仍占俸稍臣敢不循躬自幸投足知愆顧論報以無階獨此心之不昧又謝再任宫祠表祈哀得請瀆有愧於再三失喜拜恩威不殊於咫尺臣中謝伏念臣器薄而用窘智陋而術疏無昔日之聞知幸一日之遭遇冒居華要馴致愆尤自歎沉舟之迂但覺形容之異田園何有溝􅊤可期敢云廢籍之身又續祠官之食兹蓋伏遇皇帝陛下幽微之燭覆冒無私曽小善之不遺憫一夫之失所致兹孱瑣亦與生成臣敢不受德知歸循躬惟謹窮途易與庶寬妻子之飢啼晚節難工獨慕侏儒之飽死謝落職依舊宫祠表除敷文閣待制因除免語誤人微恩重罪大罰輕祇服訓辭復增感涕臣中謝伏念臣受才謭薄賦性凡庸更閲雖多報稱何有矧年齡之頽暮加疾疚之兢昏比奏封章懇辭誤寵荷再生之大賜念幾死以難酬昧於敘陳卒至乖謬魄由天奪戚乃自貽尚賴隆寬特從末減復俾祠官之秩仍沾廩稍之優委曲保全始終哀憫兹蓋伏遇皇帝陛下乾坤覆載父母生成舜德洽於民心堯言布於天下蒹容世類一本至仁遂令下愚蒙此蕃貸而臣視殘骸之巳病知來日之無多惟有銜恩至於結草謝再任宫祠表甫上由𠂻之請遽叨從欲之仁拜命以還循躬知戴臣中謝伏念臣曩以愚陋浸被使令報無塵露之微恩有丘山之重粵從去國猶獲奉祠逮其終更復伸前懇詎意衰殘之景仍沾俸稍之優顧臣何人得此厚幸兹蓋伏遇皇帝陛下睿謨天縱孝治日新規模宏啓於隆平德澤咸濡於動植有如么麼亦在記憐臣敢不仰體生成益知銘佩幸全家之飽暖樂化日之舒長未盡之年皆上所賜謝復祕閣修撰致仕表投老乞身既逹由𠂻之請疏恩出綍復叨遇主之榮感懼交懷周章失次臣中謝伏念臣受性愚暗逢時休明以田野固陋之安冒禁省論思之地報效何有踐歷已多粵從去國以來猶竊奉祠之秩及兹疾疚斗覺支離學無藝苑之工職在書林之列不圖得謝乃更增華兹蓋伏遇皇帝陛下天地之德曰生日月之光必照俯憐末路不忍棄遺始終保全委曲成就而臣迹居窮􅊤絶望修門納祿辭名期少延於喘息擊瓶拊缶尚同樂於升平謝除敷文閣待制表乞身故里已叨從欲之仁通籍甘泉更冒踰渥之寵自天錫命蹐地靡容臣中謝伏念臣逢時休明受性暗漏誤膺識拔薦被使令報無絲髮之微德有丘山之重辭榮納祿既逾七十之年窮思畢精莫辨三千之牘不量淺薄輒露悃誠採田夫野老之謡述帝德王功之盛乾坤之大日月之眀豈繪畫之所能顧迂愚其已甚敢云宏度俯鑒懦𠂻俾列職於近班以增華於末路得此殊遇繄臣何人兹蓋伏遇皇帝陛下躬聰明睿智之資藴廣大精微之學疏觀百王之法超視三代之隆總攬化樞激揚士類有如么麼亦在甄收驟頒渙汗之新垂記生成之舊而臣迹居窮􅊤望逺修門心未替於傾葵誓獨存於結草謝除敷文閣直學士表落致仕召赴行在懇辭至再除職依舊致仕祇承嚴召悵旅力之久愆加賁恩章許餘生之自佚仰拜自天之錫俯增蹐地之慙臣中謝伏念臣奮由寒鄉出迎盛旦以儒生之固陋塵法從之髙華悉出誤知不由他力粵從去國旋自乞身猶辱記其姓名俾復趨於表著而臣老隨年至形以病羸驅馳徒有於此心跪起懼乖於常度達忱誠之懇欵荷聰聽之矜從直內閣以躋榮駕安車而遄反縉紳改觀閭里生光惟初終被遇之過優雖頂踵縻捐而莫報兹蓋伏遇皇帝陛下仁深覆載明並照臨察臣曩嵗之遭逢粗存忠謹知臣今日之疲曵非敢懷安矧當聖政之新尤以人材為急凡在搜揚之數舉興奮勵之思獨臣數竒賦分至薄正周室任賢之日既自至於不能遇漢家好老之朝又阻陪於在列時哉難得命也奈何念虛受於寵靈曽莫酬於寸尺望雲注想永懷戀慕之誠擊壤成歌願述治安之樂苕溪集卷十七
