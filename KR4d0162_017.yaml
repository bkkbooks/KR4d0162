body:
  text: 苕溪集巻十七宋劉一止撰表謝主管台州崇道觀表罷起居郎責授祇奉訓辭伏思適咎惟臣自取跼地知慙臣某中謝伏念臣出自寒㣲誤膺簡㧞以鋤耰固陋之質歴臺省清近之班自始及終不由他力從頂至踵皆出上恩而臣所更既多未有禆補欲初其議則竊自薄陋以為可用則無所短長仰帷聖徳之方隆内懼史書之有闕臣之宜去誰不謂然不圖威命之行尚得祠官之奉兹盖伏遇皇帝陛下游心太古側席異聞作成士類而明試以功愛惜人材而濶略其過憐臣之罪以戇察臣之志靡他薄示譴呵止投閑散省躬已辜固將安分之宜沒齒何言惟有負恩之愧臣無任謝除直顯謨閣表念咎洗心三移嵗律典州奉使再錫命書敢圖延閣之華又玷直廬之列逡巡拜賜跼蹐自疑臣某中謝伏念臣曩昔無從遭逢特異遽由臺屬進直殿㘭獨恃上聖之知不借游談之助恩已隆而未報量既過而不辭固弱植之難安豈疾顛之敢悔夫何庸陋猶在記憐假之内閣之名以重外臺之寄寵光併及枯槁再春兹盖伏遇皇帝陛下懋成湯之寛仁躬堯帝之神聖兼物衆智猥及臣愚而臣悵末路之難圖誓初心之不昧天髙地厚若為稱塞之階人㣲命輕會有縻捐之所謝提㸃刑獄浙東到任表不違顔於咫尺拜寵知慙送以禮而光華豈臣敢辱疾驅軺傳已見更新臣中謝伏念臣智昩知時學不適用誤竊聖人之眷嘗躋清近之班曽報主之不能乃蠧書而何益粤從去國寄江海以偷生自意此身與草木而皆腐孰云記録尚及孱㣲收五年閑放之心總一道平反之寄豈獨庶獄之當審抑將荒政之是修任固匪輕責何以塞兹盖伏遇皇帝陛下法堯言之清問躬舜徳之好生憐臣寄孤雖功名之難幸謂臣樸拙尚豈弟之有餘臣敢不深體設施勉圖後效布宣寛詔願為慈惠之師銷折姦萌不愧安静之吏庶収寸尺仰答生成謝除中書舍人表載筆殿㘭初逺舊物演論詞掖遽錫賛書恍莫知其所從凛以榮而為懼臣中謝竊以自昔聖主建立非常之功必有能臣發揮難論之㫖殆天所備不謀而同故煥乎謨訓誓命之文於斯為盛而粹然徳意志慮之實㒺不自孚矧今綱紀萬㣲鼓舞庶類堯年廣大商語丁寧是非得仲舒之古風熟崔琳之今事顧於述作曷副選綸伏念臣器窘而用㣲才疎而術陋自守樸學甘為臞儒精䘮耗於幽憂藝業荒於不試敢圖遲暮之景猥受聖神之知頂踵皆出於睿恩踐歴毎從於親擢至於陞華法從接武近臣豈其平生有此過覬兹盖伏遇皇帝陛下聰明稽古慈恕及人惟廣覽兼聴之是圖曽小善寸長之不棄况乎盛大徳業比隆於乾坤昭囘文章苐輝於奎璧而臣捜研末技綴緝諛聞以腐草之明而禆赫日之光以秋蟬之翼而増九鼎之重何能有補祇益自勞敢不勉竭孤忠誓堅晚節雖有慙於潤色庶無奭於告猷謝除給事中表寵錫自天懇辭無地祇拜莫囘之命俯慙未報之恩驚懼交營周張失次臣中謝伏念臣少非特立老不自强謂當静退之年無復進為之志不圖晚遇乃玷誤知持槖近班代言西掖正上聖作興之日躬萬幾總攬之勤與禁省之腹心而臣乏謨猷之益竊訓辭之手筆而臣無潤色之工思軋軋其如抽心揺揺而若失宜在黜幽之域更叨躐等之榮矧是東臺最為要地號人才進退之闗鍵為王命出納之咽喉豈容迂疎膺此責任兹盖伏遇皇帝陛下皇明廣被英斷獨成宏開復古之規克盡官人之美長材成厦未㤀樸遫之蒹收衆駿在閑尚意疲駑之可勉敢不激昻末路殫竭諛聞軀命幾何顧無益邱山之重飛鳴自誓庶少償烏鳥之私謝授提舉江州太平觀表罪大責輕感深涕殞臣中謝伏念臣淺聞單見極陋至愚受知殆閲於十年冐寵浸更於两禁不量弱植濫據要津屬上聖之思賢戒邇臣而舉類而臣棲幽居之日乆識中原之士希智實昧於是非迹遂成於乖繆揆其重負合寘嚴辭正削從班俾安散地兹盖伏遇皇帝陛下勵精政化加惠臣工若天地之含生心不私於與奪猶父母之怒子教終厚於譴呵遂以庸材䝉此善貸再念臣賦命蹇薄如出仇謀偶世濶疎率與禍會知非晩節既踰蘧氏之年受罰閒身尚竊侏儒之飽念報㤙之無所嗟視䕃其幾何惟有靦顔至於沒齒謝叙復秘閣修撰表毖祀告成湛㤙旁洽不圖蕩宥逮及孤危既安祠館之游仍俾書林之職兢慙在邑涕泗交頥臣中謝伏念臣少也湮㣲晚而遺遇學不通於今事志徒慕於古人以田野樸拙之姿與英俊峥嶸之列論思禁省近類腹心勸講露門號為親宻祸實由於量溢天弗誘於臣𠂻上玷誤知自貽大戾顔忸怩而加厚神惝恍而靡寧追五十九年之非於今已後閲三百六旬之日遽許更新驚朽株之再春覺沉疴之去體兹盖伏遇皇帝陛下躬乾坤之髙厚大徳曰生並日月之清明容光必照哀矜舊物假借寵靈豈非削籍於丹書抑使増華於白首臣敢不捫心誓報擢髪知愆被銘骨之恩則如隔世有粉身之路不敢偷生謝再任宫祠表㤙厚不貲感深吹骨臣中謝伏念臣受性樸拙遭時休明曩膺禁省之驟遷實是聖神之樂育比其去國猶得奉祠而臣生理窮空孥累猥衆瓶無餘粟不殊靖節之居甑有積塵㡬類范丹之室屬三嵗之當罷悼一飽之無從忘已甚㣲仰天求裕詎意由𠂻之請遽叨從欲之仁脫困獸於觸籓濡窮鱗於涸轍圍門失喜少蘓併日之長饑摩腹起行便覺餘年之尚適兹盖伏遇皇帝陛下徳侔造化行通神明視覆載之間一均涵飬矧盖帷之舊寧忍棄捐但獲便安仍佔俸稍臣敢不循躬自幸投足知愆顧論報以無階獨此心之不昧又謝再任宫祠表祈哀得請凟有愧於再三失喜拜恩威不殊於咫尺臣中謝伏念臣器薄而用窘智陋而術疎無昔日之聞知幸一日之遭遇冐居華要馴致愆尤自歎沉舟之迂但覺形容之異田園何有溝􅊤可期敢云廢籍之身又續祠官之食兹盖伏遇皇帝陛下幽㣲之燭覆冐無私曽小善之不遺憫一夫之失所致兹孱𤨏亦與生成臣敢不受徳知歸循躬惟謹窮途易與庶寛妻子之饑啼晚節難工獨慕侏儒之飽死謝落職依舊宫祠表除敷文閣待制因除免語誤人㣲㤙重罪大罰輕祇服訓辭復増感涕臣中謝伏念臣受才謭薄賦性凡庸更閲雖多報稱何有矧年齡之頽暮加疾疚之兢昏比奏封章懇辭誤寵荷再生之大賜念幾死以難酬昧於叙陳卒至乖謬魄由天奪戚乃自貽尚頼隆寛特從末減復俾祠官之秩仍沾廩稍之優委曲保全始終哀憫兹盖伏遇皇帝陛下乾坤覆載父母生成舜徳洽於民心堯言布於天下蒹容世類一本至仁遂令下愚蒙此蕃貸而臣視殘骸之巳病知來日之無多惟有啣恩至於結草謝再任宫祠表甫上由𠂻之請遽叨從欲之仁拜命以還循躬知戴臣中謝伏念臣曩以愚陋浸被使令報無塵露之㣲恩有丘山之重粤從去國猶獲奉祠逮其終更復伸前懇詎意衰殘之景仍沾俸稍之優顧臣何人得此厚幸兹盖伏遇皇帝陛下睿謨天縱孝治日新規模宏啟於隆平徳澤咸濡於動植有如么麽亦在記憐臣敢不仰體生成益知銘佩幸全家之飽煖樂化日之舒長未盡之年皆上所賜謝復秘閣修撰致仕表投老乞身既逹由𠂻之請疏恩出綍復叨遇主之榮感懼交懐周章失次臣中謝伏念臣受性愚暗逢時休明以田野固陋之安冒禁省論思之地報効何有踐歴已多粤從去國以來猶竊奉祠之秩及兹疾疚斗覺支離學無藝苑之工職在書林之列不圖得謝乃更増華兹盖伏遇皇帝陛下天地之徳曰生日月之光必照俛憐末路不忍棄遺始終保全委曲成就而臣迹居窮􅊤絶望修門納禄辭名期少延於喘息擊瓶拊缶尚同樂於昇平謝除敷文閣待制表乞身故里已叨從欲之仁通籍甘泉更冐踰渥之寵自天錫命蹐地靡容臣中謝伏念臣逢時休明受性暗漏誤膺識㧞薦被使令報無絲髪之㣲徳有丘山之重辭榮納禄既逾七十之年窮思畢精莫辨三千之牘不量淺薄輙露悃誠採田夫野老之謡述帝徳王功之盛乾坤之大日月之眀豈繪畫之所能顧迂愚其已甚敢云宏度俛鑒懦𠂻俾列職於近班以増華於末路得此殊遇繄臣何人兹盖伏遇皇帝陛下躬聰明睿智之資藴廣大精㣲之學疏觀百王之法超視三代之隆總攬化樞激揚士類有如么麽亦在甄收驟頒渙汗之新垂記生成之舊而臣迹居窮􅊤望逺修門心未替於傾葵誓獨存於結草謝除敷文閣直學士表落致仕召赴行在懇辭至再除職依舊致仕祇承嚴召悵旅力之乆愆加賁恩章許餘生之自佚仰拜自天之錫俯増蹐地之慙臣中謝伏念臣奮由寒鄉出迎盛旦以儒生之固陋塵法從之髙華悉出誤知不由他力粤從去國旋自乞身猶辱記其姓名俾復趨於表著而臣老随年至形以病羸驅馳徒有於此心跪起懼乖於常度達忱誠之懇欵荷聰聴之矜從直内閣以躋榮駕安車而遄反縉紳改觀閭里生光惟初終被遇之過優雖頂踵縻捐而莫報兹盖伏遇皇帝陛下仁深覆載明並照臨察臣曩嵗之遭逢粗存忠謹知臣今日之疲曵非敢懐安矧當聖政之新尤以人材為急凡在捜揚之數舉興奮勵之思獨臣數竒賦分至薄正周室任賢之日既自至於不能遇漢家好老之朝又阻陪於在列時哉難得命也奈何念虛受於寵靈曽莫酬於寸尺望雲注想永懐戀慕之誠擊壌成歌願述治安之樂苕溪集巻十七
