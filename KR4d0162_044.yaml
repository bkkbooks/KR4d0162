body:
  text: 苕溪集卷四十四宋劉一止撰外制劉昉除禮部郎官張擴祠部郎官朱敦儒都官郎官勑具官某文昌政事之本分曹列屬其職雖異要其胸中皆有治具然後授之如昉才髙識明論議不茍如敦儒擴停涵蓄飬邃於學而妙於辭蓋一時之選禮刑之事爾等習焉母俟多訓可宋棐除江西運判蒲贄湖北運判曽律淮東提舉茶鹽敕具官某經費之重實在大農而賦租之入山海之利繫於邦國者惟部刺者是貴其選宜遴爾棐爾贄術業屢試綽有能稱兹用付以輸將之事爾律名家之子甚敏而文通貸之機實宜受任朕惟江湖淮海之區利孔所出蓋非一端所不欲聞也責爾等者經費而已可不懋哉可蔣汝翼特與補正左奉議郎依舊通判涇州府敕具官某爾係心王室悔罪而歸奔走鼎來叩閽自列朕念華夏本吾臣民洗滌舊汚被以新寵俾還厥職仍正官聫其深體於厚恩益自期於忠孝可忠訓郎董言管押馬綱稽留作過特降一官仍依衝替人例施行敕具官某爾以右牽之事稽留道途乃官其私事在必罰免官貶秩兹謂小懲其尚循省可劉才邵除祕書丞李百藥祕書郎敕具官某册府士之冀北追風汗血之駿在焉識者朝暮而取之無留良也爾等召自外服問以所知論議切至有當朕意丞郎之職其選甚髙往厲爾修以俟識拔可上殿人鄭邦哲與循兩資令還任敕具官某爾往從而長將命隴蜀選奏所聞通練明敏進階二等用答爾勤可左宣教郎任紳乞以所轉左奉議郎一官封母劉氏與封孺人敕具官某母劉氏朕因擴心之教惠於百辟不愛爵賞以風厲之矧其有子孝如閔顔且欲以官秩之寵易俾其親者乎惟爾修身與其教子不待言而信矣疏封之典其尚知榮可左承議郎鄭轂除御史臺主簿敕具官某御史府風憲所在其屬皆一時異選簿領鈎稽之職非他有司比也爾志行老成謹厚通敏俾居厥次公論謂宜尚勉之哉可邵溥磨勘轉左朝議大夫胡舜陟辭自具官某才識精敏論議激昻中外踐更休有譽處其餘上下詞同邵溥敕朕著考績之令校功數最一本至公雖侍從之臣禮遇有異而積日聼遷厥敘惟等具官某才識超詣論議有餘經學傳家典刑未泯奉祠均佚亦既淹時會課三銓就官一列雖非異數庸示眷懷可葛勝仲磨勘轉左正奉大夫敕上詞同邵溥具官某文學志行表於縉紳進退雍容不愆禮義奉祠均佚亦既淹時會課銓曹正秩三品優賢求舊庸示不忘可郭仲荀兼營田大使敕昔趙充國馳至金城圖上方略願罷騎兵為營田之䇿雖璽書詰責屢至不移於是知賢人君子之忠於謀國不顧其身有如此者魏置典農而中原富貴晉開汝潁而河汴委儲足國裕民兹為根本付委之任謂可非其人哉具官某頃以真才首膺異選往司管鑰綱紀舊都眷輿地之始歸慨田疇之未墾肆頒新渥崇建使旌爾惟深體朕心考稽事實俾規制一定功利可期無使營平專美有漢則豫汝嘉可劉無極除知大宗正丞敕具官某朕以司宗之職付之伯臣而置丞以文士由其政令以敦敘屬籍且教且治之爾無極學有本原語妙天下藴藉之懿無施不宜勉服厥官以須後渥可毛敦書除大理正丞敕具官某獄者人之司命而廷尉之事四方取則焉選於時才以爾為正蓋卿之亞非其旅也勉修厥職稱是寵休可向伯奮起復充河南府留守司參議官敕具官某朕念畿右重地久隔王靈肆命弼臣往司管鑰惟時僚佐選任實艱爾心計有餘屢更煩使起之苫塊要絰以從孝有移忠具存古訓勉祗厥事爾無恨焉可劉式章藴差充留守司官準備差遣先轉一官敕具官某上詞同前爾等咸以才猷權居幕府進官一等用寵其行尚勉之哉無忝朕命可陶愷除司農少卿敕具官某司農總倉廩委積之事受而尸之稽官吏宫掖賦粟鍾庾之數以時出焉任至劇也爾才識通敏心計有餘俾亞列卿公議惟允勉修厥職嗣有寵褒可梁喜分路催發回易錢稽違不往特降兩官敕具官某爾受檄以出閲嵗乃還事效蔑然惰偷失職褫官二等以示薄懲可謝祖信除徽猷閣待制知潭州敕長沙為一都會襟帶湖湘唇齒荆雍地廣物夥甲於他路帥守之責選任匪輕具官某學富而文雄才通而識敏論議之偉見於告猷究觀規模朕所倚辦兹用輟自禁近俾殿南服假以握符之重仍升次對之華服我茂恩益圖乃績無使智略不稱在前可范振除江西提刑敕具官某部使者之職寄朕耳目選用之際所不敢輕以爾振經學邃深文詞溫麗施于政事亦復絶人輟自望郎往司刑憲夫為朕廣好生之仁諭哀矜之旨使四方司政典獄欽恤明允民用不寃兹非俗吏之所能為也爾往懋哉毋棄朕命可曽楙改知信州敕朕以牧養之政寄之郡守慮百姓疾苦壅於上聞而上之德澤弗克下究嘗惕然憂未嘗恝然忘也共理之責顧不重哉具官某法從老成道廣器周功利及物隨所施用上饒為郡居四達之衝有山溪之勝土風俗習可問而知矧兄弟分符疆連壤接魯衛之化宜相後先朕於彼民可無憂矣可苕溪集卷四十四
