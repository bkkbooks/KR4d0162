body:
  text: 苕溪集卷三十四宋劉一止撰外制都虞侯郭永王金劉干等遇明堂大禮合該換授忠訓郎敕具官某爾等各在赤籍積日纍勞易畀官聫是為舊典往秪厥事以稱茂恩可成忠郎楊青軍中失火降一官敕具官某爾居師屯不戒于火自速咎戾其又奚言姑禠一官俾知循省可忠訓郎魏存謀要打劫降五官敕具官某爾為田官不能謹身容納匪人與通姦利貶秩五等是為寬恩可杜琳降官敕兵法曰令素行則人服令素不行則人不服一軍之中如身使臂臂使指上下內外罔敢差池一有不嚴則為亂階漸不可長具官某早以材武見推輩流命統偏師列屯以守而乃奉令不恪遣卒越疆規求錐刀旋至亡失大將言狀朕不敢私姑貶階官以戒來者是謂寬典其務省循可郎誠以妻父朱棄奉使未回恩澤補承信郎敕具官某信使出疆淹時未返惕然興念厚恤其家爾惟外姓膺此命秩其知自飭以稱寵榮可寇忠陳亡贈承信郎與一子恩澤敕具官某爾奮於行陳固敵是求令爾殞身朕實有愧寵以命秩並録其孤魂而有知歆此至意可顔魯公逺孫師與補右迪功郎敕具官某朕遭世中否思古興懷眷唐室之多賢壯平原之大節英風可想恨不與之同時遺像儼然至今猶有生氣訪求逺裔僅齒齊民肆加異恩寵以命秩録功臣之世朕無誚於周詩對前人之光爾尚存於家範可劉大中落職依舊宫祠敕含齒之類共知篤於愛親垂髫之童亦復羞稱不孝豈有居儀刑之重任為名教之罪人民罔具瞻朕有逸罰具官某頃由過聼擢在要津猥以小才遂當大用忘所生之天屬視厥父如路人炊煙不同寢疾弗問事皆有狀聞者寒心人誰無親誠所切齒覽彈章之沓至知公議之靡容其鐫祕殿之崇尚即真祠之舊噫始終之遇朕猶屈於彛章喜懼之年爾盍圖於改事可林子堯等補保義郎係從賊黨出首自新敕具官某慶賞之設非但勸善茍知過而自新則亦在所録焉蓋忠厚之至也爾頃陷非類晚而悔之轉敗為功審於自擇寵之命秩其尚知榮可殿前司托試到舊行門孫佐王節周宣李勝等武藝與換敦武郎敕具官某爾以虎士警衛周廬易畀官聨是惟舊典服此休命無放厥勤可王庶落職宫祠敕朕履兹艱虞靡敢寧處惟是二三執政任之不疑庶幾左右宅師用底於治脫或懷徇私之志無憂國之風論日以乖朕將安賴具官某曩更中外粗閲嵗時召自藩維服在近密授以樞機之柄俾參帷幄之籌所冀同寅以克有濟而乃大言惑衆小智飾姦既陳立異之辭旋有壞成之意倘謂和戎之非策則雖執義以何慚乃因知已之莫留始欲脫身而要譽第務死黨寧知有君顧已照其肺肝尚曲全於體貌假之異數出殿大邦屬公議之既喧匪私心之敢貸其鐫祕殿往即真祠噫才各有長爾豈無用任過其量朕則使然服此訓言毋忘循省可泗州兵馬鈐轄趙時奉命有勞轉一官敕具官某爾總戎之官厥職既修傳命越疆亦著勞效進秩一等以示寵褒可保義郎李全禦賊陳亡贈兩官敕具官某爾以小吏奮身抗賊死不返顧彼爵崇祿厚者能毋愧乎古語有之寧以義死不營幸生於爾見焉進官二等用錫愍章尚其不亡欽此至意可吳藹以妻父陳思恭陳亡恩澤補承信郎敕具官某朕憫夫忠義之士殞身矢石不得終於牖下也厚恤其家以及姻黨亦獲霑命秩其思所以稱之可賈進賊黨自首補承信郎史宣歸正轉承節郎換給付身詞云爾耻於從偽自擇其明有嘉其忠超進官秩申以書命其尚知榮敕具官某爾審於自擇轉敗為功可謂忠矣錫之命秩其尚知榮可武平縣丞宗誠彥平虔賊有勞循一次敕具官某鄰盜弄兵侵軼爾疆捍禦之勞達於朕聼進階一等以示寵褒可嘉州第四將官髙貺犯賊罪降一官衝替敕具官某爾不自飭陷於吏議罪涉已私勿可追已貶秩一等免所居官其自今戒哉可權南豐巡檢髙騰因本寨兵卒聶成等作亂勦殺淨盡轉一官敕具官某卒驕倡亂威不素行非一日之積也録爾倉猝弭亂之功而略其不素訓整之罪兹可謂厚矣進官一等其克欽承可忠翊郎李侁元係尚書省額外都事陳狀乞比換使臣出職吏部勘當申省狀內刮補添注舉發到官虛妄特降一官依衝替人例敕具官某銓曹天下之公不容以私凂爾不知畏以自速辜聊示薄懲且戒來者可苕溪集卷三十四
