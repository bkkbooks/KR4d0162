body:
  text: 苕溪集巻九宋劉一止撰䇿䇿問試館職䇿對天下之事形雖不同而其理則一所為異者患在不得其要茍得其要而持之若舉目而提其綱挈裘而振其領也夫何故原其所始要其所終歸而已矣是故有難易之說者其形也無難易之說者其理也世之說曰創業誠難守文不易而後之議者又以中興為尤難且天下草昧羣雄競逐攻破則降戰勝則取兹創業之誠難富貴則驕驕則淫淫則怠茲守文之不易中興之事則兼而有之此所以為尤難故曰有難易之說者其形也天之所以授人主者非以其人心之歸耶人心所在天命随之書曰天視自我民視天聼自我民聽又曰民之所欲天必從之然則理之所在在不失人心而已矣故曰無難易之說者其理也嘗謂天之廢興猶一身之安危其所以扶衰而已病者亦不異顧醫何如耳明者見形色於未病之先故為之也易昧者究脈絡於巳病之後故為之也難夫醫國亦然上有粃政下有幸民本末舛逆首尾衡決凡可以馴致敗亂者皆病也昔賈生當文帝治安之時痛哭流涕以為深憂其說以諸侯勢强為病腫夷狄嫚侮為病痱盖未形而見之然生自謂醫能治而上不使者顧元氣未大損也形脈病而元氣存則文帝不用賈生而生之說雖騐於後國終不亡如其不然生且望而去之矣又奚以痛哭流涕為哉故醫國者必視其元氣存亡多少為決所謂國之元氣則民心是矣夫謂之中興則國既病矣既絶而復蘓矣然先世之徳澤在於人心者豈遽亡耶故愚不敢以為甚難而不為者有可因之勢數也自昔所謂中興之君多矣然未甞無可因之勢周之宣王也漢之光武也唐之肅代也晉之元帝也此明問之所及也其一時将相在宣王時則有若仲山甫在光武時則有若鄧禹元帝則有王導肅代則有李郭君臣之間所以扶持顛危恢復大業顧其事不同而其勢則皆有所因何也三代而下享國之尤長者莫如周周自后稷始封於邰再傳至不窋而失其國公劉繼之改修其政去邰而國於豳又九傳而至太王獯鬻迫之去豳而國於岐文武繼之遂有天下又九傳而至厲王犬戎迫之失其大業宣王繼之内修政事外攘戎狄而周室中興焉三代如周無以加矣然失國者再失天下者一或迫於獯鬻或迫於犬戎然而不亡者豈世世修徳在人心者固耶故山甫之所以輔其君者雖不多見於經凡宣王之所以勞來安集其民與修政事攘夷狄之實盖山甫出将入相之力也漢紀二百而中絶然髙祖開基規模𢎞逺文景繼之以徳化民敦本節用輕徭薄斂所以結民心者厚矣當時未見其效也至强臣擅命國紀已絶天下之心猶惓惓焉思漢不忘則恵澤之入人心為何如哉光武之初百姓見司𨽻官屬且驩然相慶以為不意復見漢官威儀則是思漢之心既久而未忘也唐自髙祖起義兵既消羣盗太宗繼之修教化眀政刑以府衛養兵以口分世業授地以租調任民百姓安業為日久矣貞觀之治比隆成周又開元二十餘年之間天下熈洽外户不閉行粮不費則恵澤之在民心固深安史之亂雖生於所忽而肅宗以太子起靈武代宗以廣平王相繼靖難克復西京再安社稷當是之時功歸郭李不可訾也宰相如苗晉卿裴冕輩何能為哉然則宣王也光武也肅代也席祖宗之世徳而興者也若元帝則不然愍懐之難晉祚既絶元帝以瑯琊王渡江承孫氏累世之舊皓首淫虐失民而司馬氏之徳澤亦未有以結江左之心故愚以王導佐元帝之興為尤難然所恃以興者何也中原之毒方熾而人心易收也觀導等請用顧榮賀循等謂之以收人心則亦不可謂無所因矣嗚呼羯胡亂華生民塗炭導之佐元帝也宜若捕龍蛇格虎兕不得斯須暇也顧乃開設學校賔禮賢才措事業於雍容談笑之間其後謝安為相亦以雅量鎮之議者譏其以清談廢務浮文妨要終不為變此兩公者豈智識有不及耶意當是時中原方亂人心雖曰易收亦或易危未容以威猛勝慴之也然江左立國既不能與周漢並隆又不若肅代之能克復舊物豈其世徳之厚薄異耶故中興之功或繫之將李光弼郭子儀是也或出入将相之間山甫鄧禹是也然議者謂再造漢室禹為元勛豈耿賈吴祭之徒卒不敢與之齒耶自馮愔之叛禹之威望亦少損矣然而功不减焉何也關中天下之根本且漢之舊人心之所依歸者也蕭何任關中之寄以基帝業為時宗臣則禹之功獨髙者亦豈以關中之重為能佐佑中興耶洪惟我宋之興為民立極撥天下之亂而反之正人心樂推神器自至卜宅梁汴之間非有太行孟門羊膓伊闕以為塞非有洞庭彭蠡沔川漢水以為池立國百七十年無一日犬吠之驚其所恃以爲强且固者人心而已故祖宗以來所以恵養元元甚厚而徳澤滲灑在人膺肺間雖千萬年不忘也承平既久釁生邉隅逺人犯順躪蹂京邑於兹六年矣聖主憂勤夙夜圖回事功閱日既久未見赫然振起之象然有志之士願有獻於上者亦以人心未忘有可用之勢而巳今眀問以四代任人之方與其将相救時之得失孰可以為法於今且在當時有遺憾而可為後世鑒者頗使論之愚固論其略矣抑復深維天下之事所以不克濟者患在於不為而無患其甚難故聖人畏無難而不畏多難以其因難而能圖也又况禍福倚伏之理為未易料者昔吴王夫差既勝齊伍子胥曰天之所棄必驟近其小喜而逺其大憂使吴不得志於齊而以覺悟王心吴國猶世今天禄亟至是吴命之不常也未㡬吴果滅於越吴人侵楚入郢楚人大懼令尹子西獨喜曰乃今可為矣夫戰勝人所喜也而以為大憂䘮敗人所廢也而以為可為則是禍福倚伏之理果不可料而不可不為者也如其不為而俟天命之自回人事之自正敵國之自屈盜賊之自平庸有此理也哉愚願聖主與二三大臣蚤夜以思凡可以收人心而服之者悉舉而行之於此有二說焉人主憂勤寅畏天命側身修行罔敢暇逸然後能服人心宣王之事是也大臣至公黜陟眀允選用羣才皆從人望然後能服人心王導之事是也雖然用賢不可不盡去邪不可不力何則賢者之於君也以禮進以義合所言而從則将繼此以進其所未言所行而信則将繼此以勉其所當行茍有疑焉則亦已耳以鄧禹之智略而遇光武之君受任之間猶有所媿而况其他乎君子小人之不相容猶氷炭之不可同器而處也君子得位則斥小人小人得志則害君子此理之必然者也甞怪光弼之勛業若此而不肯離軍中君臣之間不能無疑代宗雖厚撫其母終不一至朝廷豈以讒邪之人為可畏耶光弼且然而况於餘人哉故曰用賢不可不盡去邪不可不力也然則在當時有遺恨而可為後世鑒者此歟嗚呼君子小人不可不先辨也君子陽也小人隂也猶人之身少壮則多陽非無隂也隂不能勝陽而反制於陽老耄則多隂非無陽也陽不能勝隂而反制於隂方天下盛時固多君子及其久也聽用原情之術不至浸淫至於衰小人者以類至而日勝以至於無君子則亡矣故善養生者求所以輔陽而消隂善醫國者求所以進君子而退小人顧中興豈難哉惟上之人勉焉若以為甚難而不為則愚不知也謹對平江試院問䇿問文者貫道之器道有升降故文有變革虞夏商周之文均於言道而體則三變曰渾渾也灝灝也噩噩也典謨訓誥誓命存焉可得而知其辨與自漢至魏辭人才子文體三變曰善為形似之言也長於情理之說也以氣質為體也詩賦紀傳書檄論賛存焉可得而知其辨與終唐之世文之變亦有三飾句繪章則王楊為之伯崇雅黜浮則燕許擅其宗嚅嚌道真涵泳聖涯則韓愈倡之栁宗元等和之今其文具在可考而知不識所謂文之變者其必因時而變歟因人而變歟抑時與人相待也且所工又有所拙所長必有所短其在一時孰得孰失孰强孰易孰同孰異書曰辭尚體要語曰辭達而巳矣虞夏商周之文雖不同皆不害為辭逹與體要歟漢魏及唐又何如哉顧必有能臻是者赫然與詩書表裏焉不誣也諸賢致力於斯文久矣試摭其實為有司論之無以漢魏而下為區區不足道也臨安類試所䇿問問盖聞為治之道必由於人才用才之術莫先於人望人望所在民心歸焉昔者晉悼公即位於朝始命百官而用趙武祁奚等六官之長皆民譽也晉國所以復霸元帝渡江王導勸用賀循顧榮輩以收人心羣才並至江左以之中興豈中興復霸之功必待是而後立且其人之事業果有異於人耶抑用此以為收人心之術也漢髙帝以馬上得天下所用皆豐沛故人鬻繒屠狗輕滑之徒有所不擇所過郡邑詢問賢豪及於麾下騎士甚者登壇拜大将而一軍皆驚惡在其為人望也哉至光武則小異其所與共起南陽者固多一時亭長縣吏及天下稍定以厚禮聘嚴光以三公起卓茂特見尊寵則又或以人望為重此其故何也或曰創業中興其事不侔顧理勢不得不然諸君講眀於人才之說宜有日矣今聖天子樂聞之併陳於篇以俟採擇苕溪集巻九
