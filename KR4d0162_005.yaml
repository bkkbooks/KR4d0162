body:
  text: 苕溪集卷五宋劉一止撰律詩七言次韻虞仲容詠雪一首十年九作窮途客慣見天花靣旋飄江上舞鷗如背我沙邉立鶴獨齊腰衣黏落片行呼酒船觸輕氷平渡橋誰識此時詩思亂緩歌黃竹想西瑶宿揚子江口一首客檣沙觜渺縱橫二紀風煙老此行待得江頭明月出却當船底暗潮生旅人夢冷無留想別浦帆歸有呼去聲聲斷念此生惟付酒為誰驚走撰瓶􅎆次韻朱賔老刪定月夜相訪一首一水相望十里餘扁舟夜載月明俱今君身為故人出我亦年來此客無夜久燈孤疑是夢樽空僕卧不成呼殘年會見干戈息共買嵌巖著老軀次韻宋希仲侍郎見貽一首今古宦逰長作客每逢佳處欲忘年頗將幻境觀塵世始信臞儒是列仙野色分橋山帶邑晚雲藏寺水黏天公身未屬煙波管莫向津頭買釣船睡足齋一首此地誰令著此翁角巾欹倒鬢如蓬興髙絶壁松聲外夢破寒花雀啅中睡債幾時償賽足書淫前日洗除空故人若問安心法一酌村酤薦晚菘摘星嶺一首籋磴緣梯興未窮青冥有路欲乘風朝雲暮雨在腳下井鉞參旗落手中比世此身長作客半癡半黠忽成翁枕拋偃蹇巔崕上一洗平生眼界空次韻鄭維心詠梅一首山路雪消梅半吐隔林光巳見踈明凍醪似蜜從誰賞斫句如氷得我驚卧樹照溪春思淨細香留客暮寒清胡塵未逺邉風急十載花前笑不成次韻林少瞻逰禹廟一首客裡杯觴不易逢越王宫好莫匆匆春容雨打風吹後山色朝來暮去中京國昔從秋序別齋厨猶憶飯時同清時更作他年約七塔三山夢巳通元日得雪三日立春斗柄御山晚直寅夜聞笳鼓又迎春尚欣窮臘酬三句更見嘉蔬繼五辛鳩杖多情扶我老琪花有意為誰新甲兵不用銀河洗始覺今年一笑真比過石壁訪王元渤舍人欲觀棊戰聞同魚軒出逰獨與戎琳二師對語久之明日元渤有詩見貽次韻奉酬緩緩逰春且莫催而今揮麈短轅回一百五日天氣近二十四畨花信來賭墅未容窺謝傅印心聊復探黃梅歸來索共梅花笑老眼如何得暫開次韻奉酬元渤見過奕棋小飲及觀館閣題名之作珠玉當年咳吐成元劉何自敢齊名夢回雲海西崑逮春到江村北渚明誰為少陵償酒債更憐侯喜得詩聲杯中賢聖君休問局上光隂我獨驚方欲相約為孔侯溪上之逰忽辱佳篇復次元韻山色溪煙淡墨成隔溪幽鳥自呼名未妨濁酒陪心賞更借清詩作眼明桃葉不關今夕恨松枝猶是古時聲扁舟醉後從漂兀到處應無寵辱驚次韻周秀實監丞嘉仲府判叔姪貽王元渤舍人二首詩中見反且恨不與奕棋之會不踏清門曉鼓朝山林真樂在朋曹烏衣賢胄風流逺赤壁諸郎氣義髙底事裁詩多態度也應索酒甚粗豪殘年我獨棋中影從此天刑儻遁逃又人言我老是頑仙坐隱紋枰不計年何用山㕓分小大直將壺嶠比方圎爭雄未羡七擒略見事常輸一著先好覔周郎雲水外紅渠千頃藕如船次韻鄭維心見貽一首身病何因到赤墀眼昏不復下書帷杯觴有限長羞澀故舊無多足別離對白抽黃餘習氣看朱成碧記當時看朱成碧醉中眼施粉太白樽前人此維心舊詩僕初相識時所見也江村投老俱牢落猶喜詩情似拾遺維心以僕假守毗陵與嘉禾南徐弟姪分符接壤作詩見貽次韻一首家風五字作長城四至何曽慕九卿問舍山林端欲老分符湖海尚叨榮北南二阮俱貧士大小兩馮慙頌聲獨羡書成鄭夫子會令千載意分明次韻萬廷老見貽一首時共語於梅花亭上梅花村上駐歸帆知有幽人住此菴誰遣疏香隨柁尾故憐春色在枝南溪前水落沙痕出門外山橫雪意酣詩似何郎情不淺更留會處後來談次韻王柱史題密印師竂一首巖下風清進竹涼道人身共翠梢長飢腸欲和春泉響鼻觀先參煮菜香何處人間有癡黠不將身外較間忙鄰家柱史哦詩夜未厭敲門月到墻留題呂宣義知命小園一首雖無萬竹等封侯半畝清隂趣自幽菘韭未能供早晚菊蘭聊欲記春秋歸來久巳同彭澤休去寧須問石頭短褐飄零嗟我老他年未往亦風流登學宫城墻眺望寄曽宏父寂寞無氊老鄭虔登臨此日意茫然雲開孔渚炊煙外春到西城戰血邉江草喚愁無畔岸官梅動興得清妍南風藻思傳家舊好寄東風御栁篇同諸曺泛舟城南曽守餉酒示詩次其韻十年溪渚夢經行更借風煙作眼明官身擬赴鷗鷺約小敵忽逢詩酒勍今者不樂愧幽子日後欲醉無麴生五馬會尋芳草路肯教緑葉便隂成題章右推砥齋一首今古時清罰亦清由來讞獄賴儒生將軍誤怪獄吏貴廷尉今稱天下平萬態詎容逃水鏡此心真欲似權衡公家世德髙門閥更看隂功踵令名題道場山一首雲亂修堂水不如妙香隨處滿空虛頭陀浩劫衣塵在回向此生心地初涉世情疏終簡懶愛山緣重費消除道人勸我發深省相對五更聽粥魚莫師文以訪弟調官巴川用周子醇韻作詩贈行三刀昔夢劍東州援筆今看峽倒流晚嵗拾遺長憶弟異鄉王粲忍登樓微官等是身懸寄平世何曽道阻修他日歸飛兩黃鵠伴儂苕渚共𢋫酬次韻邵子非見貽一首夢想丰神不記春相逢欲看夢中因安知晚嵗歸吳客却見當時入洛人僕崇寧間與子非同學校今始相識賦似文園真有氣詩非子建諒誰親會須剪燭西忩語莫怪床頭酒事頻從子非登月波樓戲用前韻并簡何子楚洗盞初嘗麴糵春一樽相屬是前因忽驚萬頃月波上相對九霄風露人十載京塵如夢破半生鷗鳥巳心親他時喚取何郎到要遣官梅動興頻寄燕山帥幕家姪季髙一首疇昔江湖自在身而今騎馬犯邉城寧無楚尾吳頭夢厯遍燕南趙北春壯士似渠終有遇衰年如我尚誰親屈州抑縣不伸里老此嶔崎可笑人禹廟一首苗山風馭日翩翩人道桐棺葬此巔今事獨聞鴉種麥故村不見鳥耘田逺憂邉塞清無日更望倉箱屢有年收攬封疆歸禹貢忍看兵氣汙山川謝會稽守翟內相臨學行鄉飲酒之禮清曉傳呼振戟衣泮林雲日炫旌旗風塵貼妥投戈後色笑雍容勸學時先世流芳今有繼聖𠂻圖舊正疇咨王褒願草得賢頌可但中和宣布詩次韻方允迪祕監會稽相遇懷吳興舊逰二首故山疇昔奉英逰老去功名失路頭江海一官如許冷田園三載不知秋謝公塘外千峰紫何楷廬邉一徑幽心折少陵存殁句恨無酒力破勞愁舊逰方時敏吳亦虛皆巳物故又鑑湖列嶂自天開雲色嵐光入酒杯忽遣同逰有陶謝故應交契擬陳雷他鄉日日典衣醉公事時時牽馬來要買扁舟窮勝絶共追樵徑晚風回檇李從允迪借居鸕鷀源上沈必先侍御有詩寵其行次韻并呈二公二首飄零暮景今如許慙愧髙人久卧廬好客兒童捴歡喜多情草木自扶疏百年夢幻真何有一壑風煙尚借居寄謝南臺溫御史此身休戚正關渠又向來多病更多憂命與誰謀出怨仇坐念甘泉方避暑不知楚澤又悲秋長蛇肆毒心猶在戰馬何時鞚暫休橫榻故人身衛主素書能復訊儂不再用韻呈允迪祕監江子我郎中二首二紀風埃長作客了知身世是蘧廬老來詩酒多無味亂後交親未肯踈曽見雄風追楚賦尚堪雌霓讀郊居願公先卜嵌巖隱秦利寧忘鄭國渠又異時畎畝不忘憂避俗今猶若避仇直指威聲曽震嶽封章義氣欲橫秋詩成故客知無敵酒盡慿誰為起謀嵗晚相逢山在眼從公腳厯頗能不次韻必先侍御和鄭維心憶梅并寄維心紫梅溪上春先到餘不沙邉草未芳五字真曽賦桑落四絃猶憶調楓香雪中孤艷應愁絶竹外斜枝不掩藏永望佳人在空谷此時幽獨未須傷再用韻寄沈次律學士溪上青雲覆短墻杖藜誰共掇幽芳忽驚候館梅花破想見山齋竹葉香倦客鬢絲今點染使君心事獨韜藏何當歸赴春盤約苦苣嘉蔬未足傷次韻維心賦次律見一亭二首次律自號柯田山人向來金埓與銅山可是無由未得間紙上功名追逸景鏡中心事迫摧顔溪雲慣作多時別隴月今迎一箇還始信柯田梨棗地不令榛棘有遺刪又循除春水漸淙淙心靜魔軍久巳降未省芳菲誰是伴不妨鶯燕自成雙眼中濁酒傾如海門外清溪欲擬江會見扶藜添一老共聽疏竹響風窗僕所借德清僧舍居有竹林流泉之勝恨未得見也次韻維心赴次律賞芍藥一首巖前紅藥媚深幽更為餘春一笑留疇昔鄒枚俱倦客而今陶謝得同逰真香雨裛來無盡妝艷風熏喜欲浮未羡木奴千户比主人原是醉鄉侯次韻維心贈葛魯卿待制求花栽一首此日寧無健步移春前行近看花時故園樂地今餘幾小縣風光客不知剩買名裁令亂眼却嫌芳思只撩詩屬公歸賦丹青手問圃尋農獨我宜盧叔才相過夜話戲成一首七年詩酒恨難同未省相看作麼容多病襄陽長瑟縮苦心冬夜更龍鍾巳知昔者非今者莫問渠儂勝我儂手剪西忩深夜燭細聼吳語話心胸寄雲門長老持公一首夢境清逰記昔曽而今雙鬢巳鬅鬙此生有分尋雲水到處逢人説葛藤紫芋波稜真在眼青鞋布襪未輸僧會投枯木堂中老只恐詩情罷不能次韻宋希仲貽故人虞仲容一首亂前交舊今餘幾道故傷時得涕零門外溪山無賴碧眼中鬚鬢可憐青十年持槖氣橫出三斗朝天心獨醒却喜元龍豪放在不妨下馬索銀瓶送希仲出守三衢一首臨別溪山眼重開秋風揚斾更悠哉平生氣槩今逾壯一郡清平欲挽回喪亂有誰談舊事論思此日要真才公行勿亟朝天路帝有甘泉密詔來次韻寄懷王元渤舍人一首倦飛鸞省戢修翎乞與雲山作卧屏醉裡書床堆束筍夢餘楸局見稀星君心儻似當時赤吾髮應無耐久青老去尚堪驅使在會持歸楫到溪亭林懿成檢正見貽次韻謝之林乃同年集英唱第偶追攀老著青衫獨汗顔富貴逼公那得謝雲泉招我久應間鸞臺著展經綸手鼇禁行趨供奉班黃髮故人空跂想應無春夢到林間將如會稽用允迪韻留別子我諸公一首對酒休悲落木秋霜花猶足當傳籌每憐別賦空多感晚信離騷併是憂盞底聖賢何足論眼中涇渭正爭流時危忍袖經綸手行見聘書如鶴頭送方務德提幹赴官浙西一首時同在鸕鷀源二十年前湖海舊而今人物粲琅玕文章自襲家風美骨相仍無容父寒會有忠誠能貫日不應漫浪懶為官他年鵷鷺行中見儻似鸕鷀源裏看次韻沈必先尚書見別一首翩翩旗尾破新晴頗似龍駒脫在坰再上封章辭雨露故令髙節煥丹青卿雲媚日懷仙隱白鷺迎舟宿晚汀預想山齋春酒熟可無殘夢到南屏次韻傅子駿右司見貽一首大斾華鑣晝掩扉松門沙步帶山圍循除漲水春來急釋嶠孤雲懶後歸試看青鞋緣磴道不妨野服坐苔磯應嗟客路風塵暗繞樹驚烏未得依次韻無言兄卜築二首求田問舍豈徒為晚悟前言不我欺地占玉杯初應卜門臨苕水宛分枝鄉關怪客歸何早聖主思賢降不遲磊落胸中三萬字不應無意拯時危又石枕方床緑浪藤清談散帶似懷氷蔬盤尚雜水中蟹肘翣莫揮瓜上蠅五斗為貧真世業一㕓歸隱豈人能冥鴻萬里今何慕應笑飢飛側翅鷹張仲宗判監別近三十年經由餘不訪余有詩次其韻亂前猶省當時事亂後渾如隔世人得見升平且歡喜莫將心念到亨屯銜杯儻辦中山醉覔句誰如小庾新三十年前癡半黠相逢終不忘天津次韻沈次律家並蒂芍藥一首習家池館酒如淮為破幽人一日齋前廡芳菲駢蒂萼後堂鶯燕嘯朋儕忽驚暗緑將成幄却喜雙紅欲綴叉草木會為門戶慶而今蘭玉巳當階次韻牧菴禪師持公見貽一首袖底摩尼直萬金半生空探九淵尋波離懴罪何名罪老可安心不見心碧澗寒泉流自古齋厨煮菜味常今牧菴巳斷人牛迹純白何妨黑半侵次韻鄭禹功見貽一首當年負笈京華客振臂論交法從班何武誦經來蜀郡士龍持論出雲間杯觴引滿風流甚嵗月驚心昨夢還短楫未妨相訪覔要看拄頰面西山次韻徐季山學正釋奠先聖之作闕里躬祠通古昔升平禮樂信光眀威儀復見周多士迂鄙何求漢兩生佩委霜侵裳繡冷庠開風振戟衣鳴使君肅穆神心格更看雍容佐國衡次韻吳興守到官見貽一首步武初辭玉筍中旌麾疑是到珠宫窗間巖岫爭如入筆下雲煙洗不空千里喜深車後雨一堂仁浹扇時風賔筵浪許陪真賞底用蹣跚一秃翁次韻吳興守雨中即事一首雨檻風簷欲墊巾護花常恐減青春融怡巳復生頳頰料峭真應恕老人睡鴨吹香空結篆逺峰攢碧似凝顰野棠泪濕愁如許半面徐妃不受勻次韻春日書懷二首居士而今有底忙生涯草草度年芳平林漸見蔫紅委野店初聞煮酒香尚有佳人來得得不甘春事去堂堂勝逰早晚追千騎更看揮戈駐日光又水面紅雲次第鋪東君未肯向人疏興髙碧嶂千尋外春在黃堂一笑餘只怕玉醅浮盞斚不嫌花片落襟裾公歸行侍甘泉宴留得新詩酒不如次韻吳興紀事一首懷紱初辭玉帝宫白蘋洲在亂雲中勸耕漢守宣恩詔賣劍吳儂襲古風花好未應慚洛浦酒香何羡過新豐他年圖畫賔筵勝錦瑟傍邉有病翁次韻九日四首九日佳名今古重鳳城秋色正眀樓厨供清釀香浮袂恩賜黃花憶滿頭魏帝九日以菊花一束賜鍾繇千里風煙殊未惡五亭吟嘯不應休眀年歸覲酬前賞倘念衰翁尚四愁二懷紱欣臨栁惲州據床寧羡庾公樓雲橫浦溆無重數花繞巖巒最上頭詩遣羊何聊共和語驚陶謝未知休自緣風物撩人意不為間情作許愁三蒲團趺坐冷知秋笳鼓聲傳出郡樓聲一作風閲世夢中知是夢説禪頭上更安頭邦君化得俱吟詠居士年應賦莫休只恐官梅能動興從梁江草喚人愁四向來風韻煩清秋氣壓元龍百尺樓倒載時時憶池上朝回日日醉江頭甘泉正念論思舊輔郡仍推譽望休勃窣媻姍老歸客賴公與酒得澆愁次韻雪中聼琵琶一首燕堂曽許陪真賞似識唐昌一樹花鶴骨松身公耐雪龜腸蟬腹我羞茶星弰萬點疏還密月帔千尋整復斜要趂回風看舞態莫令矯恨入琵琶題毗山吳約仲曠逺亭一首唐吳筠詩平湖曠以逺吳子及取以製名芮國器為之記山蓋吳筠舊隱當時語曰吳筠碑朴古竒稱其文辭之美也余未冠與約仲諸友讀書此山追思五十年前夢山􅐦平湖水次門白鷺未慙公子貴青松不屈大夫尊文辭朴凸推鼻祖標致孤髙到耳孫更喜新亭名意好吳郎清峻芮郎溫苕溪集卷五
