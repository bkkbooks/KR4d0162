body:
  text: 苕溪集卷十二宋劉一止撰劄子上殿論用君子小人之説臣聞天下之治衆君子成之而不足一小人敗之而有餘何者君子雖衆其道則孤小人雖寡其勢易蔓君子之憂在於天下國家小人之憂在於一身君子之於法度紀綱必欲正之故為之也難小人之於法度紀綱必欲亂之故為之也易自古聖賢之君未嘗不欲近君子而逺小人也小不加察而小人已至故立政之書曰繼自今立政其勿以憸人其惟吉士又曰時則勿有間之所謂間之者非君子小人並進也衆君子而一小人亦足以為間而敗政臣請以易之説明之夬之為卦以五陽決一隂陽為君子隂為小人故繫辭曰夬決也剛決柔也君子道長小人道憂也夫以五君子決一小人不曰小人道消而曰道憂何也蓋上下交而志同如泰之時然後小人之道不行若乃以五君子臨一小人徒能使之憂而已矣惟其有憂則將圖之無不至矣恭惟陛下躬天縱之聖懋日新之舉通達古今洞照治體日者好惡既明黜陟既允矣臣猶以是為言者誠以事之幾微小不加察則小人者乘間伺隙而入其害至於敗政不可不懼也臣以一介之賤驟對清光謂天下事尤急於君子小人之説故首用為獻伏惟留神幸察取進止論人主不憚改為臣竊觀自古人主處非常之時建非常之業謀無遺䇿事靡不濟者無他焉機變敏速不憚改為而已臣請以漢髙帝之事言之始髙帝聽酈生撓楚之計封六國後且將刻印付之聞張良之説旋悟其非亟命銷印羣臣勸都雒陽議既定矣聞婁敬之説即日徙都何其易改耶處非常之時建非常之業不得不如此也方今盜起中原四郊多壘軍旅薦興國用耗竭可謂處非常之時矣陛下所與羣臣早夜圖維者無非安朝廷定社稷弭難銷兵足國裕民之事可謂建非常之業矣然而機事之來間不容髮謀不能皆密也知其疏則改之舉不能皆當也知其非則改之機變敏速正在此耳臣伏覩陛下近降詔旨以謂承中否之運不啻創業之難自非陛下既知其難聰明宏達思慮至到惡能知其難若此哉臣謂陛下既知其難則當以前古創業之君如漢髙帝者為法凡羣臣論議於前陛下固當審思然知其可用則敏而行之無憚改作如是乃可以濟功如其循習拘攣若可若否則雖平居間暇且猶不可况今日之事哉伏惟留神財幸取進止論人主力行果斷臣聞之書曰非知之艱行之惟艱又曰為治者不在多言顧力行如何耳蓋自古有為之君未嘗不慨然欲聞天下之言而求其利害之實也既聞之則安之乃不果於行者往往皆然此無他疑似之論有以惑之且不能自克故也恭惟陛下憫宿蠧之未除念頽綱之不振政煩民困用廣財殫申詔大臣置司講究凡不可於民而害於政者皆罷行之德意至渥也然曽未聞有所施行臣之私憂過計顧恐有以疑似之説欺陛下之聽者曰茍如此將失人心矣臣故欲為陛下言之夫所謂失人心者懼刑政之苛虐賦役之猥多失百姓之心也懼好惡之不公賞罰之不明且失士君子之心也若皆無是則所失者小人之心耳失小人之心而得百姓士君子之心又何病焉臣願陛下當今日之政宜審知其利害所當罷行者斷自聖心勿二勿疑庶幾速見成效而事之委靡不振者伏惟留神幸察取進止論尚書六曹及百司法令之弊臣愚不自揣蒙恩擢置臺察之司伏見尚書六曹下逮百司比所用法令初無畫一之論類以人吏省記便為與奪蓋法令具在姦吏猶得侮之今乃一切聽其省記顧欺弊何所不有欲與則陳與例欲奪則陳奪例或與或奪在於其頰其患可勝言哉陛下聖明灼見此弊嘗降處分令左右司郎官以其省記之文刋定頒行然左右司職事號為最煩竊恐於此不能專一無由速得成書臣愚伏望聖慈持降睿旨改送詳定一司敕令所立限刋定鏤板頒降內吏部條法最為急務乞責近限先次施行庶幾杜絶姦吏弄法受賄之弊天下幸甚取進止論令監司守臣各舉所知臣竊惟在外之官賦政煩劇深察民隱莫急於縣令總按羣吏風動列城莫要於監司二者不可不擇明矣臣謂朝廷有選擇之名無選擇之實何也陛下聖德隆寬憂民深切頃降詔旨令內外侍從官各舉材堪縣令者二人謂縣令不可不擇也然臣嘗得其所舉之目而詢求之十不得一二又除用監司率以他才有殊不曉政事者如此尚可恃以為治乎臣故曰有選擇之名無選擇之實也臣愚欲望出自聖斷令諸路監司列郡守臣各舉所知曽任縣令民所便安有顯效者一二人條具以聞無其人則闕之遇監司有闕者擇所舉之人拔而用之以示褒寵其誤者坐以欺君罔上之罰天下豈有能為縣令而不能為監司者乎審如此可謂兩得之矣陛下垂意人材自小官識擢任用者多矣獨未聞拔一循吏而驟用之此疏逺之臣所以不加勸也黃霸以治郡有稱入為三公今以良縣令為監司不亦可乎伏惟聖慈特賜詳酌施行取進止論選擇州縣之吏臣竊謂州縣之官莫難於縣令而治獄次之此兩者蓋不可不擇而朝廷求所以選擇之名而未得者有年於兹矣銓曹注擬按格而授初無豫奪之法又員額至多雖欲選擇有所不能恭惟陛下自即位以來為民擇吏之詔固已屢下而司政典獄或非其人未有以仰副憂勤惻怛之意臣竊惟之伏見知溫州章誼奏請於所屬官吏擇其能者易置縣令已蒙俞允臣謂此舉誠得選擇之道具要而易行惟是典獄之官未聞有以移易為請者刑憲所加非所宜忽臣愚欲望聖慈更賜詳酌明降指揮今列郡通知應縣令治獄之官並許以所屬幕職州縣令官以下選擇移易各不理為違闕其請俸自有等若州郡所謂供給應移易之人聽從多給如或郡守有挾私意妄加移易者聽監司紏察以聞庶幾吏知嚮方民受實德無蠧政濫刑之害取進止乞令縣丞兼治獄事臣竊惟治獄之官號為難能責任專一俾得究心猶不能保其不為姦吏所移而况任之不專者乎縣獄是也獄之初情實在於縣自縣而達之州雖有異同要之以縣獄所鞫為祖利害不輕今所謂縣令者旦朝受牒訴暮夜省案牘牒訴之多或至數百少者不下數十案牘之繁堆几溢格其間名為強敏者隨事剖決不至滯淹已不可多得儻復責其餘力足辦獄事訊鞠得情吏不敢欺民不被害誠恐百人之中未必有一也郡之獄事則有兩院治獄之官若某當追若某當訊若某當被五木率具撿以稟郡守曰可則行至縣則不然令既不暇專察佐官雖名通簽終以嫌疑不敢侵預其追呼訊鞠具名以稟悉出吏手故其事與州郡不同臣恭惟陛下躬好生之德視民如傷寬詔屢下未嘗不以哀矜庶獄為言如此利害較然明白而人莫敢以縣邑專置獄官為請者誠恐增員太多故也臣愚見以為縣獄之事宜專委丞如州郡兩院之官日入治獄凡追呼枷訊等事丞先以稟令然後得行其餘悉如舊制則丞無侵預之嫌令有同心之助相為可否其得必多借使為丞者未必皆能其事不猶愈乎付之黠吏之手乎伏望聖慈特賜詳酌施行取進止論重監司之選臣竊惟設官分職內外小大各有體統輕重之勢失之毫釐則名已不正矣况其實乎國朝以來諸路監司之官於秩雖卑而責任則重總按一道紏察其姦而督其稽違莫敢不肅者以郡守之官其秩亦卑得相臨制之道也方今輿地未復州郡數少侍從加多前日號為最小郡壘往往以處侍從而以庶官臨之輕重之勢於是倒置漢制部刺史秩六百石今監司是也而郡太守乃二千石故何武翟方進論之以為春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相凖失位次之序其事類今日臣愚以為在今之日宜增重監司之任轉運使副至提點刑獄並以曽任侍從官為之提舉茶鹽市舶等並以曽任左右司郎中以上為之庶幾輕重相凖得位次之序而况輕重之柄實在朝廷以為重則重以為輕則輕而亦何常之有伏望聖慈下臣議更賜詳酌施行取進止論斷罪囚臣契勘州縣凡禁勘大辟公事除深僻幽隱處行劫或謀殺外其餘殺人自有一時知見之人自合一面研窮根勘務盡情實其間却有豪強有力之家殺人公事意在變易情節囑託官司或賄承勘胥吏多以知證通説未明為由以乘差官體究而所差官亦止是一到地頭呼集鄰社保甲詢問供折而已然因此得變易情節出入人罪又况豪右之家所居鄉村宗族姻親佃客之屬常居其半宛轉為姦符合供證致使失實臣愚以行下所屬州縣約束應今後承勘大辟公事並責令當職官先將犯人根問一時知見之人追取照勘以驗囚辭即不得輒差官體究闕深恐州縣不得切遵依欲望聖慈特降睿旨立法施行取進止乞令侍從臺諌舉縣令臣聞刺史入為三公郎官出宰百里守令之任在古甚重其體惟灼灼朝廷循襲故常漫不加擇惟郡守間蒙選除外縣令法擬悉歸銓曹臣竊以謂近民之官縣令為最豈得若此而况今日中外多故軍旅薦興安民保疆其事不一為縣令者非但如前日出入阡陌勸督農桑謹期會簿書而已茍非其人為患滋大唐太宗嘗詔內外五品以上舉任縣令者於是官得其人民無愁歎漢馮野王上書願試守長安令宣帝竒其志然終不以與之蓋遴選如此臣愚以謂莫若倣古之意令侍從臺諫各舉所知可充縣令者若干人上之朝廷左右司置籍以備選用然後命監司守臣察縣令之不職者汰之以所籍姓名隨闕除授假以五品之服任滿稱職有進秩升等之賞其治行尤異者不次拔擢使之歆艷則人人激昂以赴事功舉當者有重賞舉謬者有薄罰庶幾近民之官拔十得五有以仰副陛下仁民愛物之意取進止上殿劄子臣竊惟陛下側身修行克自抑畏布德行惠賴及四方自即位至今星紀一周天始悔禍夷狄革心歸我輿圖休兵息民既有成約中興之功未有髙焉者也然而智者於此竊有懼焉何也懼朝廷有一朝之喜而忘憂畏也而况經理之初事亦各種未易槩舉若軍儲民食之有無可防邊境之備禦既不可預計而逆度亦未可悉舉而並行是必知其所謂而復圖之傳曰廊廟之材非一木之枝帝王之功非一士之略則儲蓄人才以備任用豈得不為先乎矧陛下已降數令加惠所復郡縣之民將有以大慰其心蠲稅相寬戍徒固理之所不免然則經費所出實在乎牧民御衆之官顧安得不擇使智使愚使功使過在兹時矣臣愚欲望聖慈特除明詔令內外侍從監司守臣各舉所知才堪任劇忠不辭難者不限員數咸以名聞命有司籍記之以次除用其有以瑕纇坐廢與異時僥幸冒進之徒茍有才能亦在所舉觀其後效如有顯勞隨事旌擢若不改悔復為姦利則終身廢之庶幾人人知勸以赴事功有以助成經理之政取進止論禁戢私酒臣契勘禁戢私酒及販外界酒入禁地之法率計勝鬪私罪立賞近因官吏申陳增立告賞比之紹興法殆及數倍內有一經告賞以犯人所居舍屋什物並沒官臣竊觀著令有立定笞杖徒流四等罪賞量所犯大小以為重輕此不易之理也今以犯人所居舍屋什物沒官不分輕重此何理哉遂致州縣行法之際有所不忍名為增嚴其實廢法臣愚見欲將造販私酒及販外來官酒入禁地之人如所犯正係笞杖罪只依舊法賞格追賞若罪至徒流即行舍屋什物沒官指揮庶幾法意人情皆得允當且使可行伏望聖慈詳酌取進止苕溪集卷十二
