body:
  text: 苕溪集卷六宋劉一止撰五言律詩冬至汴下早行有感一首刺促驚時節侵尋念物華半生多客裏今日又天涯曉月看眉嫵飛雲亂眼花窮途隨物感不必是思家和族兄無言題能仁寺當雲軒一首緑樹新回合斜忩舊邃深壺觴如栗里嵗月似山隂半世懷清隱何年得此心借床眠不熟酒力橫相侵次韻袁審淵道舊思歸四首兼簡虞仲容季澤寂寞襄陽老南山憶弊廬病來惟喜酒歎罷每捐書道路風塵暗關河信息疏逢人説沙漠不忍問何如二十載溪亭舊揮毫見古風相如今病渴東野尚鳴窮眼界闕鄉物風流憶乃翁一闕如夢斷歸思渺千峰頃嵗審淵侍尊公官吳興以溪亭為官舍居焉僕數從尊公奕棋三城郭如村步官身等俗間對棋論小墅拄頰望西山異縣故交重間心幽事關猶餘少年意不計晚途艱四虞氏隋唐後當時尺五天風煙鼻祖宅翰墨耳孫賢笻屐容相躡杯觴得共傳濟時吾老矣看著祖生鞭次韻江子我雪句一首頭白髙山早千林一夜花雪深烏鬼嶼風亂白鷗沙刺促傷時事飄零念嵗華天今洗兵馬勿復問浮槎梅山一首伊昔市門隱山今尚姓梅危言關社稷仙迹混蒿萊此事諸亡者斯人安在哉傷今更懷古老憶獨悲哀送太學舊同舍及第歸鄉一首輦轂當年別簪裳末路同江湖人巳老家國恨何窮山有傷心碧塵無沒馬紅舉鞭還送客落日泪痕中次韻子我得俸一首祠官資薄俸肥遁要清貧載酒久無客乞醯惟有鄰廣文寧厭肉方朔漫長身莫遣陳萇到先生甑尚塵冥冥寒食雨冥冥寒食雨客意向誰親泉亂如爭壑花寒欲傍人生涯長刺促老氣尚輪囷不負年年債清詩新送春風氣東南異風氣東南異隂晴早晚間日光時透隙雲影半遮山掃徑殘紅盡開忩緑蔭還寄聲桑苧友幽興合相關緑暗山前路緑暗山前路柔桑宛宛垂稻秧分隴後蠺繭下山時白日繅車急中宵織婦悲老年官賦了不長一絇絲即事一首何物當門戶青松及我長佳山忘嵗月同汝過風霜北澗花應盡南榮草欲芳病來歡意少一醉未全忘覽鏡一首寄陳商彥祕丞契濶三年夢飄零一寸心青青今變雪種種盡齊簪覽鏡渾相似彈冠各不任論交如許酒清寄一杯深居士竂一首龍鍾居士相落魄宰官身長史風吹帽林宗雨墊巾安心惟壁觀乞米賴僧鄰曽並鴛行立當時夢不真次韻朱賔老過我對月小酌一首老人論舊事感慨思悠哉暗喜生眉宇新涼入酒杯竹風誰汝和簷月要人陪此客非凡客斯時得得來遣興一首杯業惟菘韭何因老骨強昨朝方住雪今日又加霜寂厯僧廊暮支離野步芳嵗時渾不省得酒是春陽次韻吳興守春日書懷一首百榼償春酒人言有別腸披風醒午醉擷蘂眷餘芳白日何曽短遊絲得許長向來情浩蕩今老夢微茫送徐叔鎮知縣罷官赴調一首劇論追前輩憂思獨在民雪霜吾嵗晚金玉子心真曽見除書舊行膺薦墨新君王問田叔長者更何人送鄒德章教授之官合淝二首晚色溪亭路風帆去莫遮交情寄桑落離恨渺天涯志行今誰及聲名莫謾誇淮人問規範説似道鄉家又古寺疏煙裏因依孰並逰歌行如短李邂逅得髯鄒皎月林塘夜青霜雉免秋從今兩相憶一酌酹儂不次韻賔老過會稽訪余同逰禹廟龍瑞宫晚歸二首十載江湖客重來霜鬢侵事如春晝夢山似故人心步屧攀嶄絶移舟出窈深他時林樾底歸去話登臨又禹穴徴前史龍門訪隱書相擕如故里失喜問吾廬此日登山屐他年下澤車端能從我老騰踐未應虛曽宏父將赴官都城示詩次韻自述并贈其行庾信多哀思年來方解愁低徊甘吏役骯髒豈人謀擔石終知飽私田詎敢求尚能吟玉案未忍算牙籌公子年方壯才名惜甚休聊持江氏筆來賦謝公樓慷慨思千里翺翔近十洲逢時寧有愧閲世自多憂客路塵沙暗春風草木柔公行欣入洛我老謝封留日月消書帙江湖落釣舟經綸公等事此意莫悠悠次韻江子我郎中社飲一首社醵遺風在田家禮數饒玉人疑解意孺子故來邀禦冦驚先饋庚桑懼見杓習鄉俱尚齒惇族悟疏苗未見雕戈靜方欣玉燭調山寒時作暝火老不成歊釃酒無留榼蒸豚發墮樵巒謳聲帶苦村若拍頻招野性踈鐘鼎官身脫市朝形隨石骨瘦心與澗花雕朔漠音塵斷氊裘意氣驕誰為今定逺空作老邉韶枉矢知天變雙桃驗服妖宣和宫女頭冠作雙桃相並謂文並桃冠人以桃音逃為今日之讖獻書慙痛哭避地獨無聊復古周宣治中興太白謡眀年及春社愁鬢雪應消次韻子我秋分一首山中秋巳半蓬蓽晏方開不聽夜蟲語烏知節物來紫珠猶卧穟青蘂未浮杯欲射寄書鴈非關烹不才苕溪集卷六
