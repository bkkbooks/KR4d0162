body:
  text: 苕溪集卷十三宋劉一止撰奏狀乞宫祠狀具位臣劉某右臣輒有愚懇上干天誅臣人材凡下無可録昨蒙陛下親擢置在臺察之聫臣黽勉夙宵欲圖報效惟識不敏既未有所逺立而福基淺薄舊有寒溫腳氣腹脅滿急之疾至是頻作齒髮寖衰不自支梧深恐虛縻廪粟上負使令伏望天慈矜憐除臣在外宫觀一次稍便醫藥犬馬之軀庶幾少間他日聖恩儻未棄捐誓畢餘年圖報萬一干冒天威臣無任激切屏營之至謹録奏聞伏候敕旨辭免除起居郎狀具位臣劉某右臣今月某日準尚書省劄子三省同奉聖旨除臣起居郎者聞命震驚罔知所措伏念臣才智庸下自叨親擢未有絲髮仰酬鴻造而驟加六察遷為二史近世以來罕有此例况記注之任言動是司比因時巡此典幾廢方陛下舉修故事遴簡史官宜得方正博洽之士以稱兹選臣獨何人乃敢冒據抑臣近緣多病嘗有丐間之請尚聞俞旨更蒙超授益非所安伏望聖慈曲賜矜察追寢成命遂臣前懇庶允公議所有恩命未敢祗受謹録奏聞伏候敕旨辭免再除起居郎狀自祕書少監再除此職右臣云云伏念臣賦性顓蒙受才凡下曩膺誤眷擢置近班進直螭坳退居鸞省貪寵冒沒忘已空疏量既過而不知悔且晚而何及間聞孤外閲嵗未多拂拭使令於臣已厚儻復冒已試罔功之貴犯求多不韙之愆豈定命之當安抑公朝之難幸伏望大明委照宏造曲成察其所陳出於非偽追還成命更選異能庶使臣愚獲免官謗所有恩命未敢祗受謹録奏聞伏候敕旨辭免中書舍人狀具位臣劉某右臣今月某日三省同奉聖旨除臣中書舍人日下供職者聞命震驚罔知所措竊以中書出號令之地舍人掌文宗之官非徒取於詞章抑預聞於政事職任甚重付委實難自非博極羣書通達國體言足以敷德意志慮之美文足以窮討論潤色之工則何以增煥皇猷式孚民聽伏念臣素出貧賤初無藝能遭遇聖眀猥叨識拔曽知恩而未報顧忍恥以自憐及此衰頽迄無裨補敢期過聽俾躐近班念么麼之勿勝懼癲隮之將及矧七年於外已絶望於修門而期月之間乃再膺於異數與其悔罪於煩言嘖至之後孰若投誠於成命未行之初伏望皇帝陛下隆天地育物之仁廓日月容光之照察臣愚悃匪出偽為追還渙汗之私曲遂循牆之請庶無進越以速愆尤所有恩命臣未敢祗受謹録奏聞伏候敕旨辭免第二狀具位臣劉某右臣先具奏乞追還新授臣中書舍人恩命準尚書省劄子三省同奉聖旨不允者伏念臣人品凡庸無長可録叨冒恩寵所更既多未有絲髮之補加又年齡衰邁智識昏昧文辭窘澀鞭䇿不前竊惟代言之職從古所重非得一時瓌瑋博洽之士未易稱塞而臣自蒙復召置在周行期月之間再叨遷擢臣獨何人乃能有此又臣故有寒溫重膇之疾每遇發作怔忡悸懼若有所失自度不能右論思獻納之列伏望皇帝陛下天地之量父母之慈特加矜憫察臣所陳非出偽飾追成命除臣小郡或宫觀差遣俾得安分飬疾不致物議犬馬之報期在異時所有新命臣未敢祗受謹録奏聞伏候敕旨辭免兼侍講狀具位臣劉某右臣今月某日準尚書省劄子三省同奉聖旨除臣兼侍講者聞命震驚罔知所圖伏念臣受質庸愚植學荒淺不圖么麼遭遇聖明擢自稠人置之詞掖過越分量愧心靦顔俾侍經幃豈其素望仰惟陛下稟聰明睿智之性有緝熙光明之學其臣莫及疏觀五帝之隆厥修乃來超視三王之懿而臣乃以固陋承乏露門自視歉然將焉稱此矧臣年齡頽暮志意凋零記憶疏濶得首遺尾如令冒處寧免譏嘲伏望聖慈察臣悃愊追還成命改授能臣庶穆公議臣無任瞻天望聖激切屏營之至謹録奏聞伏候敕旨辭免給事中狀具位臣劉某右臣今月某日準尚書省劄子三省同奉聖旨除臣給事中依舊蒹侍講者聞命震懼不知所圖伏念臣出自寒鄉本無學術遭遇上聖起於間廢之中曽未淹時遂參法從代言之選從古所難臣不自量謬當其任文辭骫骳不足以追深厚之風智識疏濶不足以效討論之益理應汰斥復玷序遷矧東臺號出納之司而給事以封駁為職處之失當有害政體則名器之重自臣而輕冒昧居之何施顔靦伏望天地之德猥賜曲成察臣忱辭追還誤寵則臣有知難之義朝無虛授之譏兩義俱安師言惟允所有告命未敢祗受謹録奏聞伏候敕旨辭免祕書少監狀具位臣劉某右今月十五日準尚書省劄子三省同奉聖旨劉某除祕書少監者選掄誤及恐懼靡遑伏念某人地凡下學問空疏去國七年自意此身終老岩穴敢圖誤恩復見收録矧中祕清華號為妙選宜得一時魁壘博洽之士為之領袖如某之陋豈堪冒居伏望鈞慈特賜敷奏追寢成命除某在外宫觀差遣一次庶於愚分得以稍安伏候指揮辭免修史狀契勘祕書省修纂文字於條長二不與止因紹興元年七月內祕書少監程俱申請有旨令修纂日厯蓋緣是時朝廷復置祕館之初未除著作别無修纂之官事出權宜本非舊制後來緣修實録因而又兼史館職事某竊惟一朝大典事體至重如某才識甚庸不通史學加以年齡遲暮記問荒疏儻或冒昧不辭必貽姍笑上纍朝廷寵任之意欲望鈞慈察臣固陋許令蠲免史館異日厯職事庶安愚分某無任懇到之至辭免除敷文閣待制狀致仕後再除具位臣劉某右臣今月某日準尚書省劄子三省同奉聖旨除臣敷文閣待制者聞命震驚罔知所措伏念臣性識暗陋人地卑凡叨冒以來無補絲髮中自知愧一時得謝歸老山林獲與田夫野老歌詠聖化不自揆度希慕前哲作為頌詩仰塵乙覽冒昧進越方懼嚴誅敢圖睿慈驟加寵靈俾參從槖天地父母恩重不資粉骨碎身何以稱塞然而次對之職位秩優隆豈臣么微所宜躐處伏望聖慈察臣諴悃追寢誤恩以安愚分臣無任祈天望聖激切屏營之至謹録奏聞伏候敕旨辭免召赴行在狀乙亥年具位臣劉某右奏令月某日準尚書省劄子十二月十二日三省同奉聖旨劉某可落致仕召赴行在臣聞命震驚罔知所措伏念臣才疏識陋無長可録遭遇聖明冒忝近班更踐既多及兹老病納祿里居獲與斯民歌詠德化在臣之分可謂過當不圖聖恩垂記疵賤猥加召命仰戴眷憐粉骨碎身不足報塞然臣行年七十有八疾病耗昏兩耳重聽兼曽因墜傷右腿筋攣拜跪不得於令纍年難以朝見伏望聖慈察臣愚悃匪出偽為特降睿旨追寢誤恩許臣依舊致仕庶安愚分所有召命不敢祗受謹録奏聞伏候敕旨再辭免狀具位臣劉某右準尚書省劄子十二月十二日三省同奉聖旨劉某可落致仕召赴行在臣尋具奏辭免召命許臣依舊致仕續準尚書省劄子十二月十九日三省同奉聖旨不允依正降指揮疾速前來赴行在所臣恭依上件指揮即時起離湖州於令月二十五日已至國門伏念臣違去闕庭十有六年祗承台命出於望外欣躍鼓舞願得瞻望清光不啻飢渴適臣曽因墜傷右足筋攣拜跪不得以手據地方能興起幾類僧道禮拜之狀不合儀則兼不能跨馬深恐有虧人臣之禮非若他疾可以自力臣不敢上欺君父伏望聖慈特賜矜察進寢誤恩允臣所乞庶幾不致失禮臣無任祈天懇聖激切屏營之至伏候敕旨十二月二十五日三省同奉聖旨劉某可除敷文閣直學士依舊致仕辭免除敷文閣直學士恩命不允批答敕某省所奏辭免新除敷文閣直學士恩命事具悉朕宵旰圖治寤寐求賢思得耆明端方之士承顧問而贊教化以卿鴻博之學足以通古今恬退之操足以厚風俗早膺識擢偹見猷為亟用召還冀聞儻論而卿再陳悃愊以疾引年朕深念乃誠閔勞以事既遂挂冠之請載升延閣之華夫西清峻秩儒者之至榮也用以加爾不惟為爾光寵抑示朕眷懷夀俊之意毋煩遜避宜即欽承所請宜不允故兹詔示想宜知悉春寒卿比平安好遣書指不多及苕溪集卷十三
