body:
  text: 苕溪集卷四十宋劉一止撰外制趙彬除左正議大夫徽猷閤直學士充環慶路經畧安撫使勅朕東廵吴㑹西顧陜關痛疆事之繹騷念逺臣之暌隔逮此輿圖之復始聞音驛之傳可無渙恩昭示至意具官某負絶羣之噐茂經逺之才身蹈險艱嵗月滋久心存丹赤始終不渝仰周室之中興幸漢官之復見封章首至誠悃昭然兹用歎嘉載頒寵賚搃一道兵民之寄叅五官英俊之游于爾有光豈予敢吝噫以安以治在威徳之並行惟孝惟忠見君親之兩重秪服明命益𢡟壯猷可劉昉除祠部郎官陶愷除金部郎官勅具官某朕簡求實能分任庻政爰重諸郎之選以清列宿之行爾等才識之優論議之懿見於已試甚有休聞兹錫賛書以爾昉治邦禮以爾愷治邦財尚勉之哉無忝朕命可王松改轉敦武郎勅具官某爾奮身戎行以勞見録并陞官秩是曰異恩益勵後圖無羞朕命可樓炤磨勘轉左朝奉大夫勅朕操八柄以馭臣用三載而考績爰定進階之典以為經久之規凡厥有官率由此道具官某識洞今古學通天人擢自時髦偏儀要路更兩禁腹心之重司内朝典册之嚴㑹課三銓頗念服勞之久進官一列兹惟錫命之新益𢡟猷為嗣有褒寵可樓炤除端明殿學士簽書樞宻院事勅天武地文所以妙生成之化左仁右義所以行威徳之權深惟撥亂之原實在本兵之地體隆参伍位亞疑丞敷求得人兹朕有命具官某惇大篤實疏通敏明學博古而通今氣絶羣而邁往蹈履聖賢之域從容禮義之間大册髙文悉出其手崇論宏議有補於時力佐中興功居大半蔽自朕志申錫賚書爰陞祕殿之華進貳樞廷之重併加徽數庸示寵私噫留公在朝已覺强藩之悔過干木為政豈止諸侯之息兵尚殫不貳之謀以永無窮之聞可陳桶除福建路轉運副使勅具官某朕惟在昔之君為官擇人非特量才授職而求其稱焉抑威畏所加一方之人素所服習而愛慕畏仰之則令行禁止朞月而已可也况於久乎爾文學行義照映朝紳鄕自近班出臨閩郡越數嵗矣民思之若父母然朕于是知因任之道莫此為先惟時將輸肆復命汝庻幾毋怠吾事且慰彼民爾往茂哉可吴表臣兼侍講勅朕承祖宗之貽訓紹金華之絶業爰開經幄燕見近臣維繹至言考質疑義庻㡬講習之學與子大夫共之以爾具官某行如古人學探聖域論議雅奥實獲我心是用陞爾勸講之官益廣舊聞非但舉行故事而已爾其𢡟哉可馮檝兼侍講勅天子之學謂之太學自致知格物誠意正心推而上之至于明明徳於天下非但離文析字分别異同類章句儒而已也以爾具官某行誼髙潔不替家風論議淵源率有師祖錫以賛書之寵俾参帷幄之榮惟爾敷繹所聞見之問辯庻㡬三道之要有開朕心豈不韙哉可崇奉几筵内人掌字邢念二轉典字紅霞帔岳不惜陳榮奴陳慶惜劉伴兒任嘉奴王大娘等並轉掌字勅掖庭之選必自良家女御之員實参内治爾等率義蹈憲温而有儀相予誠孝之思不失敬恭之指就陞秩序是用勸勞祗服寵榮尚圖稱塞可蔡年世任太平州通判修復官私圩田増収到租米七萬九千八百六十三石奉聖㫖轉一官勅具官某朕惟農天下之大本民所恃以養生者也故鄕者下營田之令督勸農之官且察其勤惰而賞罰加焉爾奉職恪䖍績效著見進階一等以示寵榮尚其勉旃服此明訓可宋輝改除應天府路轉運副使依舊權京畿都轉運使勅具官某朕惟興王之都郊圻千里自更戎壘田萊多荒今輿地之来歸想遺黎之鼓舞乃命膚使周爰咨諏爾簡易純誠濟以精敏荐膺試用厥聞甚休往敷及物之仁毋墮觀風之職至于將輸之事爾所習焉惟既厥心嗣有褒寵可李利用除河南府路轉運判官勅具官某畿右一道分𨽻陪都異時浩煩弊於兵賦既周星紀版圖復歸敷求忠信之良往布惠綏之政以爾性識警敏達於事機厲志激昻行不擇利兹用付以輸將之任爾其𢡟哉俾利疚日聞奸欺屛息桴鼓不鳴於閭里遺黎自勸於耕桑而公私無匱急之憂則予汝嘉是曰稱職可右通直郎權尚書刑部侍郎陜西宣諭使周幸磨勘轉右奉議郎勅朕以官職之事煩子大夫用之則以公待之則以恕故於三嵗進階之典茍無過咎則不棄焉而况宣力四方者乎具官某執義甚堅禔身有道服勤王事靡敢辭難再稽積日之勞乃應序選之格雖非異數庸示至懐尚體訓辭更思後效可經武大夫兼閤門宣賛舍人侍衞歩軍司統制軍馬武紏依赦書内指揮轉一官勅具官某爾有位於軍服勤既久肆因慶賚俾進官聨尚勉之哉無忘報稱可右武大夫魏俊換給付身勅具官某爾有位於軍服勤既久載稽功伐錫以命書尚體訓言更圖来效可謝祖信權吏部侍郎勅朕於虞書求知人任使之道而得兩言曰敷奏以言明試以功而已然後知言之足以觀人也審矣而况見之於行事者乎具官某學探古今之祕識窮事物之幾粤自簡知載為御史抱純誠而不貳嫉奸惡其如仇朕用嘉之擢登法從之聫授以天官之副非特以為寵也銓縂之任條目至煩弗究其原則予奪之公或亂於可否之似朕於此試功焉爾其𢡟哉可陳規知順昌府勅潁隂天下名郡異時牧守多名卿賢大夫善政流風猶有存者詔令暌隔一紀於兹今輿地之來歸想遺黎之鼓舞兼求慈惠之長往敷布濩之仁以爾具官某性本純誠才兼文武忠以許國説以使民錫之左符綏厥舊俗庻㡬底績有當朕心書曰不剛不柔厥徳允修爾其懋焉可廖剛磨勘轉左朝請郎常同轉左朝奉大夫勅朕承奕世之詒謀遵有虞之遺法克施庻政執兩端而用中以馭羣臣率三載而考績爰立序遷之典是為經久之規具官某具絶特超詣之才𢡟篤實深醇之學升華法從為時老成載稽積日之勤乃進應階之格雖非異數庸示不忘尚勵逺猷以須後效焉可晏敦復寳文閣直學士知衢州勅侍從之臣入則獻可替否效論思之益出則承流宣化躬捍城之勞盖其志在國家而不在於其身則朕之所以委任責成與待遇優禮之意亦示無有内外之間焉具官某養氣純全執義堅固粤從簡㧞黽勉事功旋居封駮之司再領銓衡之任果敢健决初無所私朕允兹耆艾之謀未覺歳時之久抗章引疾慨莫得留爰陞延閣之華仍俾左符之重衢當孔道股肱行朝爾見吏民宜敷惠澤俾民服朕化吏畏爾明則為稱職尚勉之哉可王師心大理寺丞勅具官某廷尉列属議法持平非忠恕明允之士弗以處也考擇之際僉曰汝能尚其勉之可苕溪集卷四十
