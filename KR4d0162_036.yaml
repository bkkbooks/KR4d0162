body:
  text: 苕溪集卷三十六宋劉一止撰外制郭仲荀除東京副留守兼節制軍馬敕諸侯朝於方嶽未忘巡狩之勤王略及於舊都實重居留之任肆頒明命庸示眷懷具官某賦性通明受材英特兼子房之智勇慕郤縠之詩書夷險屢更忠勤不替執干戈以衛國援枹鼓而忘身入侍殿巖載肅貔貅之衆出分帥閫每寬疆埸之憂建大將之節旄加二公之位號功髙不伐寵至益謙朕永念神州薦更戎壘悵遺民稔禍之久屬殊鄰修好之初故臣流落以焉歸行旅凋零而未集是用疇咨宿望申錫渙恩往司管籥之嚴仍總兵符之重惟爾拊厚疲瘵勞來散亡慰父老之謳吟消田里之愁歎俾知朕指有若親臨則豫汝嘉嗣有褒寵可張浚敘復左宣奉大夫提舉臨安府洞霄宫敕朕福威在巳操八柄以馭臣忠厚宅心不一眚而掩德矧惟舊弼嘗總百工可無投報之恩以示終始之遇具官某天姿英特謀府靚深奮身孤逺之中相朕艱危之際忠勤有偉勳伐未忘喪孟明殽陵之師事非意出分孔戩東都之務嵗已再更比通好於殊鄰既言歸於故壤肆均慶賚用慰遐邇稍還官秩之崇俾遂祠庭之佚朕心爾識報禮是圖可汪伯彥復觀文殿學士依舊宫祠敕上詞同張浚具官某器資方重德宇靚深早依日月之光乃際風雲之會相朕初載共濟多艱一德保躬自適隱岩之樂十年去國每動故老之思比通好於殊鄰既言歸於故壤肆均慶澤以慰遐邇申加祕殿之崇仍即祠庭之舊朕心爾識報禮是圖可趙瓘王升陳裕趙軏差充皇太后本殿準偹使換轉官請給依中節人例施行敕朕念東朝在道川陸阻修豈惟跋履之甚勤抑懼奉承之不肅爾等出自選擇超進官聨惟勤惟忠則為報稱可右修職郎新邵州録事參軍王健以叔倫奉使恩澤改舍入官敕具官某朕委任近弼逺使殊鄰寵賁所加惟其自請爾以猶子超進官聫服此茂恩其思報稱可進武林尉王用因軍功轉四資換授付身敕具官某爾服在戎行屢霑賞秩易俾書命於前有光益究乃心以圖所報可左修職郎潮州司理王晞韓權及推正平人蔡城等九人踈放賞轉兩資敕具官某朕哀矜庶獄之不辜屢降詔旨丁寧熟復俾四方司政典獄之官知所欽焉今爾以平反受賞朕所樂聞服此茂恩更圖來效可王銍進七朝國史列傳重加添補成書共二百一十五册特與轉一官敕具官某朕修廢典於風塵之後訪遺書於煨燼之餘既纍嵗矣顧中祕所得外有愧於士大夫之家而史氏闕文亦或未補朕心閔焉爾好古博雅自其先世屬辭比事度越輩流乃者裒集纍朝故實而附益以其所聞成書來上有嘉其勤序進官聫以為爾寵且以為多士之勸可明州觀察使入內侍省都知梁邦彥祗應大金人使有勞遙郡上轉一官敕朕嚴責實之政而以恕行之茍有勞能雖小不棄具官某機神敏悟多所踐更祗事宫闈見謂忠謹乃者授館鄰使事每肅然不見缺遺雖爾以禮法自間無所求取顧於褒賞出自朕心其服訓辭益思來效可陳永錫等二十七人各轉一官敕具官某上四句同前詞乃者授館鄰使爾等蒞事辦給罔有缺遺有嘉其勤序進官秩非特為爾之寵俾後之奉公有若爾者皆知勸焉可左儒林郎前知南劒州順昌縣江鈿獲賊改官敕具官某爵祿國之砥石所以厲世磨鈍而無所私焉今有司言汝有捍寇執俘之勞故於𢡟賞亦思所以稱此超進官秩是為汝榮其尚勉之可徽猷閣待制潼川府路宣撫使邵溥誤收試舉人降一官敕法者天下之公無間逺近茍戾於此朕不敢私具官某頃以時髦擢登禁路出總藩翰分國顧憂乃者試士禮闈弗懲其濫有司言狀咎當誰執貶秩一等以戒惰偷非特為爾識也服我明訓尚厲後圖可藍師夔除閣門宣贊舍人敕具官某上閣之職實相禮儀非性識通明不在此選爾聞見習熟度越輩流往祗厥官無忘報稱可梁偉陳靖並為閣門祗候落看班字敕具官某上四句同藍師夔爾巳試之效見推輩流其正厥官益思報稱可忠翊郎成道陳亡特贈兩官與一子恩澤石瑀同敕具官某死者人之所必不免也至於死義死職之臣則惕然愧之若不自勝懼其名之不揚也褒進官秩以録其孤使聞者哀而榮之嗚呼兹可以識朕心矣可武功大夫溫州刺史吳本降一官敕具官某爾所治郡旁連五溪盜竊肆行俗習相冒非成德素著未有能綏靖者也今部使者言爾治無善狀權移吏胥至於行旅居人起相撻擊兹可謂無政也已貶秩一等以戒惰偷服我寬恩尚圖來效可右承直郎侯公達換給付身敕具官某爾以儒服奮身戎行亦既疇勞與霑官秩載申書命益觀爾能尚勉之哉可右朝散大夫程昌禹敘元降一官趙開亦同皆曽任徽猷閣待制敕賞勉罰偷者繄國之典赦過宥罪者時豫之仁爾名在丹書事存白簡頗閲嵗時之久仍更蕩宥之恩補復故官俾從敘格服我明訓勵爾後圖可樓照除翰林學士敕自昔有道之世建立規模必有能言之臣發揮德意非特功名之會亦惟聲氣之求用能訓誥誓命之敷不匿厥指庶幾虞夏商周之盛復見於今念方疇咨莫如試可具官某養光大之氣好深湛之思強識博聞足以華國被文相德可用為儀繼東臺批敕之風擅西掖演綸之譽蔽自朕志兼直禁林當二國玉帛之往來正一時書詔之填委意坦明而肖體詞曲折而不煩義激武夫茂興元戡難之略人知聖主似建武中興之年遂拜為真固應錫命惟爾抱適用之器處可為之時豈徒潤色之工更賴告猷之益使朕小雅之政見稱復古則爾內相之任其用有辭可苕溪集卷三十六
