body:
  text: 苕溪集卷十宋劉一止撰講義下武經緯天地曰文文所以立德戡定禍亂曰武武所以濟功以武繼文者以功濟德也周家之興太王肇基王迹王季其勤王家文王克成厥勛非無功也以德為主武王於此將以昭三后之功顧必有聖德然後能集天命則功不期昭而昭矣大明之詩曰文王有明德故天復命武王此詩曰武王有聖德復受天命然則天命所在在兹德也所謂德者宜若在我而詩以謂天之復命武王乃自於文王之有明德何也蓋天方授周則世有哲王以相纘述克就大業豈人之所能為哉詩曰篤生武王保佑命爾燮伐大商推本言之則武王之能昭先人之功也抑天而已哲者知之加乎人主所為不如是不足以昭德塞違臨昭百官也先王以是造始後王以是續終故曰下武維周世有哲王也書曰兹商多先哲王在天所謂在天言其神也於三后言在天則知武王所以配之者以聖德而已惟武為足以繼三后之文惟聖為足以配在天之神故曰三后在天詩言命此文王于周于京則天為將命文王君天下於周京之地武王之作鎬京於是配行其德焉故曰王配于京夫孝者善繼人之志善述人之事曰世德作求者蓋作而求先王之欲善繼志者也曰昭哉嗣服善述事者也書曰其在四方用丕式見德老子曰常德不式為天下式君人者孰不欲天下之丕式哉上無以配天命則下無以立信於民下無以立信於民則欲其式之也難矣故曰永言配命成王之孚成王之孚下土之式孝子不過乎物所謂則者性之物則而已故曰永言孝思孝思維則曰媚茲一人則道足以媚上下曰應侯順德則德足以應民物易曰天之所助者順也人之所助者信也履信思乎順是以上天佑之武王所以得天人之助者以此而已夫然故百姓與能而天降之福焉非徒與之又將來賀非徒賀之又將奔走而佐助之曰昭兹來許則許其能昭先人之功焉百姓與能者也曰于萬斯年受天之祜天降之福者也曰受天之祜四方來賀非徒與之又將來賀者也曰于萬斯年不遐有佐非徒賀之又將奔走而佐助之者也孟子曰得道者多助失道者寡助多助之至天下順之况其近者乎寡助之至親戚畔之况其逺者乎嗚呼昭先人之功至於四方奔走而佐助之斯真有道矣驗於詩書以四方則無思不服以諸侯則不期而會鷹揚之師起於渭濵獻獒之貢及於西旅微盧彭濮稱戈而輔九夷八蠻通道而至侯衛駿奔而奉祀巢伯來朝而嚮方則其奔走來佐可知矣竊嘗原詩之意所以臻此有兩言焉哲見於外孝存諸內而已何以言之自昔創業守文之君未有不本於哲世有哲王非特周也酒誥曰在昔商先哲王迪畏天顯小民經德秉哲無逸曰自商王中宗及髙宗及祖甲及我周文王兹四人迪哲然則其來尚矣於此欲以昭先人之功顧非哲不能也中庸曰武王其逹孝矣乎又曰武王纘太王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟饗之子孫保之於是詩見焉然則得天與民顧非孝不能也不然是詩何以首言哲王屢言孝思也哉立政明王立政不惟其官惟其人則政之所由立也無他道焉得人而已是道也三代共之莫不皆然而周公於成王又告戒熟復若是其至者以用人之際不容於或失也國之強弱以之國之治亂以之國之興亡以之然則如之何亦曰審擇而已審擇之要必自近始王左右之臣其近者也所謂左右之臣者常伯也常任也凖人也綴衣也虎賁也常伯庶官之長所謂在位者也常任任事之臣所謂在我者也凖人非伯非任王所取以為凖者也綴衣則內侍之類皆舉矣虎賁則外衛之類皆舉矣是五者宜王之所尤審擇而周公之所當先告也故曰王左右常伯常任凖人綴衣虎賁抑嘗觀夏之事矣宅乃事宅乃牧宅乃凖所謂三宅者是也抑嘗觀湯之事矣用三有宅曰三有俊者是也以夏商之事為未至也又以文王武王克知三有宅心灼見三有俊心告焉所謂三宅者居常伯常任凖人之位而既用者也三俊者有常伯常任凖人之才而將用者也在夏之君則居之而安矣故曰宅乃事宅乃牧宅乃凖其商之君則用之而就其事稱之而就其才矣故曰用三有宅克即宅曰三有俊克即俊在周文武則又能克知灼見其心故曰克知三有宅心灼見三有俊心所謂強弱以茲者何曰古之人迪惟有夏乃有室大競則以無其人為不競也非強弱以之乎所謂治亂以兹者何曰其在商邑用協於厥邑則以無其人為不能協厥邑也非治亂以之者乎所謂興亡以之者何於文武曰以並受此丕丕基則以無其人為不足以共興起也非興亡以之者乎強弱也治亂也興亡也其因則人而其成則天得天在乎得民得民在乎得賢故夏之尊帝商之丕釐周之欽事皆以有是三宅三俊而得乎民得乎民蓋所以得天也非特左右之臣也自王庭以及乎都邑之臣自諸侯以及乎夷狄之官皆以得人為本自三宅至百司庶府王庭之官也自藝人至於尹伯都邑之官也司徒司馬司空亞旅諸侯之官也夷微盧蒸三亳阪尹夷狄之官也內之王庭外之都邑逺之諸侯又其逺之於夷狄皆得常事之士以充其任此文武所以並受大業之基也三代之政皆以得人為本則為成王以繼其後者當何如哉益求人以自輔而已故以庶言庶獄庶慎則戒之以思成德之彥於立政立事則戒之以其惟吉士又戒之以克用常人然後內足以相國家而成文武之業外足以詰戎兵而陟夏禹之迹也然既曰成德之彥矣既曰吉士矣又終之以繼自今立政其惟克用常人何也是篇語名官之意皆取其有常德焉曰常伯常任凖人則非有常德之人不可以居是選也常之為義大矣哉荀卿論曰天有常道矣地有常數矣君子有常體矣君子道其常小人計其功中庸曰庸德之行庸言之謹有所不足不敢不勉有餘不敢盡皆取諸常也恆卦之象曰雷風恆君子以立不易方至於不恆其德或承之羞則其失見於九三常有之次五曰天地之常君臣常也至於月不常臣失幸也則其咎見於次曲都人士謂有常以齊其民常武言有常以立武事語曰人而無恆不可以作巫醫緇衣曰人而無常不可以為卜筮然則取諸人以立政也其可以無常乎曰吉士曰常人其揆一也此篇曰庶常吉士臯陶謨曰彰厥有常吉哉則知吉士未始不有常德而常德所以為吉士焉耳雖然得常吉之士矣有一憸人間之則政亦無自立焉是書告戒尤詳於君子小人之際曰用憸人不訓於德是罔顯在厥世又曰其勿以憸人又曰時則勿有間之言憸人不容有也蓋君子小人並立於朝廷之上而小人者以其類至矣此無他君子之道剛小人之道柔君子未嘗謀小人小人必謀君子也夬之為卦以五陽決一隂故曰夬決也君子道長小人道憂也夫以五君子決一小人不曰小人道消者小人之道不得行焉非無小人也小人之道消也在泰之時上下交而志同雖有小人惡得行其道哉若乃君子乘小人釁則小人之道憂而已矣惟其有憂則將謀之雖以一小人之寡或能為衆君子之害正復有待焉耳此所以不容有也故曰勿有間之説命下自王曰來汝説以下髙宗以師道命傅説自説曰王人求多聞以下傅説以學告髙宗自王曰嗚呼説四海之內咸仰朕德以下髙宗知説所以教而更命之説拜稽首曰敢對揚天子之休命則傅説知髙宗所以命而終成之也君奭曰在武丁時則有若甘盤則髙宗嘗學於甘盤而不終其業矣無逸曰舊勞於外爰暨小人作其即位爰知小人之依則遁於荒逺而險阻艱難備嘗之矣其所以有望於傅説者蓋困而知學焉酒醴不能自發有以發之者麴糵也猶才不能自逹有待於逹之者歟羮不能自和有以和之者鹽梅也猶德不能自成有待於成之者歟曰交修豫罔豫棄豫惟克邁乃訓則許之以受教而不拒也説於是乎可以語學學之道莫先於求多聞求多聞所以學古也不通於古則處經事而不得其正蒞變事而不知其權亦惡能有所建立哉非特不足以建立抑將墜先王之緒而不克永久也故曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪説攸聞惟學則知道知道然後樂循禮故曰遜志學如不及猶恐失之故曰務時敏學自外至故曰厥修乃來至是則日知其所亡月無忘其所能故曰道積于厥躬不足則學有餘則教故曰惟斆學半記曰教學相長此斆學半之謂也始於學終於教學不可已也故曰念終始典于學積善在身猶日長加益而人不知故曰厥德修罔覺湯之於伊尹學焉而後臣之故不勞而王然則髙宗之務學可不以成湯伊尹之事為監乎則説當式克欽承以輔王之學非特克式欽承也又旁招俊乂列於庶位以成交修之志焉髙宗於是乎知識所以教而更命之所以更命之者先正保衡俾厥后惟堯舜憫一夫之不獲其自任以天下之重如此又其效至於佑我烈祖格於皇天則今安得有愧於是乎罔俾阿衡專美有商克紹乃辟於先王永綏民則非特説無愧於阿衡我亦無愧於先王矣是乃説所以教而欲成之之意也故曰敢對揚天子之休命竊嘗論之事不可以不師古茍師古不可以不務學茍務學不可以不隆師古之賢君所以能大過人者無踰於此三言者矣且君之於臣也豈特臣之而已哉有不得而臣者則友之費惠公曰吾於顔般則友之矣王順長息則事吾者也有不可得而友之者則事之子思曰古之人曰事之云乎豈曰友之云乎曰事者師焉而已矣經曰能自得師者王謂人莫已若者亡傳曰其君賢君而有師者王其君中君而有師者霸然則固不可以無師也黃帝學於務成禹學於西王國湯學於伊尹文王學於疇子斯武王學於郭叔周威公學於寧越齊小白學於管仲魏文侯學於子夏晉獻公學於祖朝燕昭王學於孫臏何必髙宗古之人皆然至於功德有逺近成就有大小所學有賢不賢則繫乎人而已然則固不可不學也嘗觀堯舜之為君禹臯陶之為臣都俞吁咈共濟於一堂之上宜必有甚髙難行之法度不可逮及之謀謨更新一時焜耀來世不然何以得聖君賢臣之名於霄壤間哉及考書之所載不稱其能作古而稱其能稽古曰若稽古帝堯曰若稽古帝舜曰若稽古大禹曰若稽古臯陶君臣之間皆稱稽古焉然後知雖聖帝賢臣未有不本於師古所謂學者學此也所謂教者教此者也詩曰不愆不忘率由舊章書曰無作聰明亂舊章然則事不可不師古明矣由得師以務學由務學以師古以至於建立無愧乎先王此髙宗之所以為賢君者也孟子曰大有為之君必有所不召之臣欲有謀焉則就之其尊德樂道不如是不足與有為也嗚呼所謂大有為之君蓋不世出然而無是君則已茍有是君未有無其臣焉此殆若符契之合故曰必有所不召之臣髙宗即位之初精誠感格夢賚良弼得説於傅巖置説於左右以版築之賤位冡宰以人臣之卑處師道君任之而不疑臣居之而無畏此非有神契默會惡能臻於是哉文王之得臧丈人髙宗之得傅説原其遇合蓋有異於人矣宜其相得之深無所疑畏焉然説之始對髙宗曰疇敢不祇若王之休命者彼以臣之事責我也卒曰敢對揚天子之休命者彼以師道望我也謂之對揚則若與為敵焉有道之士處辭受之間無可茍也且當其任不辭其責有是實不辭其名孟子之於齊王且將以師道自居也而况有髙宗之君乎湯之於伊尹學焉而後臣髙宗之於説臣焉而後學其事雖殊然其成功一也苕溪集卷十
