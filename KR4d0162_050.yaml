body:
  text: 苕溪集巻五十宋劉一止撰墓銘宋故太孺人朱氏墓誌銘太孺人朱氏吳興烏程人故宣教郎同郡范君賁之室也朱吳興名族仕為秘書丞未老而休官以經術教授弟子號鄉先生諱臨者太孺人之大父也以文章論議受知裕陵為中書舍人諱服者太孺人之世父也太孺人之考諱形與諸季皆以學問名於鄉稍不偶輙棄去廬於先生墓之傍曰玲瓏山薙草植木畦田圃桑以業其家以樂其身終焉太孺人自幼承家範蹈壼則惟儉惟勤米鹽靡宻布帛紡績之類習聞而熟見之人或聞之能焉人以是律范氏之家益勤弗懈食不二羮胾非有賔客外姻不御綺縠義所當為惟恐居後宣教君二妹在室太孺人始至斥奩槖與之為求良配俾克成家已而宣教君登進士第太孺人從之官勉之奉公不以家事絲髪稍累其心不幸宣教君早世以其喪歸綱紀内外小大秩秩春秋之事無闕焉太孺人生一男二女初長女議擇配未决太孺人曰吾異時嘗一見沈秀才其人當貴議無以易此盖先樞宻沈公與求也未幾沈公遊太學取巍科為名進士旋遇真主歴三院御史中執法吏部尚書遂參大政知樞宻院事言聴諫行為時名臣於是鄉黨偉太孺人之識以為竒男子不過也男曰桐太孺人勵之以學寒暑不廢嘗曰吾自奉薄陋有良士益友可以輔吾兒者日擊鮮躬調芼以進不敢有所憚桐嗜學不得志於科舉乆之沈氏甥固請以先公遺澤奏封太孺人并桐補官任右迪功郎前監浙西安撫司囘易庫幼女適右文林郎嚴州桐廬縣丞王棣孫男二曰好徳好問孫女三太孺人以紹興十五年六月十三日卒於正寢享年七十有二以其年九月十八日塟於烏程縣澄靜鄉大正塢祔宣教君之域太孺人性明果臨終不亂後事皆自處畫桐奉治命惟謹方當棄時色憂懼如死灰晝夜不解帶者閲月余毎見而憐之既𦵏以銘見屬且閔閔焉懼其母之懿不傳也余其忍辭銘曰惟婦徳先儉勤自厥初襲清芬律而家裕乃身中嵗婺茹苦辛乆彌勵志克振尚遺澤溢後人宋故孺人錢氏墓誌銘孺人錢氏湖州烏程人曽祖文友祖宗澤父詠皆隠徳不仕孺人適同郡右承事郎致仕沈君巽之以其子長卿仕通朝籍遇宗祀霈恩與其夫俱受封長卿奉孺人之官江左比還里舍而孺人遽得疾卒實紹興十二年七月癸夘也享年六十有五以十四年三月庚申塟於歸安縣廣固鄉因山之原初閭里未知教子弟為學也孺人諳長卿頴異相其夫督教之不憚寒暑既授之書且約以禮義言動小愆與肄業弗勤則痛懲之俾悔伏乃已凡就學親師友負笈遊亰師貲費雖廣不少靳未幾長卿馳聲太學登進士甲科於是里人始榮之而歎孺人之識非凡女子比也始王氏娣亡承事君弟妹皆幼稚孺人身任之愛育如已出及長為營婚姻異時生理嘗中㣲孺人出奩槖佐治之或告之曰獨不為子女地耶且沈氏殖産固在也孺人曰不然吾失奩槖而使吾夫兄弟保故業無貿田宅之羞與私已財而速圯其家計孰逺邇聞者韙之性嚴簡治壼内事率有軌則勇於為義不見所難嫁孤女之無歸者五人鄰家有急悉其力周之有賴以脱難者遇妾媵有恩媵生女欲不舉孺人疾走拯之垂溺且責䕶視愛均諸子雖族黨不見其有嫡庶之異疾既革聞長卿乞以所應遷秩易五品服章寵賁其母朝廷從之命書且至强起笑語曰吾平生無幾求今有子起家恩再及親志願畢矣男六人長卿左通直郎前差充两浙西路提舉常平司主管官靜覺為浮屠武卿幹蠱次卿清卿墨卿業進士女四人長適王擇友次吳洋次徐樵次方迪功郎新授嚴州分水縣尉兼主簿倪稱孫男三符簡䇿餘未名孫女四尚幼長卿有志節甚敏而文嘗召試館職其言頗右善類雖不偶人以為直執孺人喪盡禮將負土以塟衰服造余門纍然深墨拜且泣曰吾母𦵏有日墓隧之文古人所重長卿不敢易也敢以累子余謝不敏然不得辭銘曰女子之行如蘭在室雖馨莫聞有偉其積不有巳私以裕我家字孤恤鄰厥志則遐人孰無兒不曰有子天豈我私我躬受祉澤其鼎來子又有孫刋此銘詩訓於里門宋故魏國太夫人向氏墓誌銘故和衆輔國功臣太傅䕶國鎮安保靜軍節度使楊國公贈太師謚武僖劉公諱某之室曰向氏以紹興二十一年十二月四日薨於賜第之正寢明年五月十九日塟錢塘之排山合祔於太師公之域其子堯佐以書抵一止曰吾母既塟矣隧未有銘敢以為請一止昔者嘗侍太師燕席且從向氏伯仲游稔夫人懿行矧一代名將相之家聲實昭人於紀述無愧所不敢辭惟向氏其先河内人後家於開封自漢晉以來屢有聞人然未克光大至我朝秦文簡公諱某始相真宗皇帝翊贊太平功徳甚盛流澤演迤溢於孫子是生欽聖憲肅皇后夫人文簡五世孫欽聖之姪孫也以故定國軍節度觀察留後追封秦王謚康懿諱經者為大王父以故檢校少保保平軍節度使開府儀同三司充中太一宫使漢東都王贈太師諱宗囘者為王父以故朝議大夫通判河中府諱子章者為考夫人生十二嵗以后恩封濟陽郡君朝議以其有異相擇所宜適時太師從父魯公鎮西陲居幕府中年少英特資貌粹温甚武且文朝議一見偉之以夫人歸焉劉氏族大且顯皇姑葛氏性嚴介有家法不以色假諸婦夫人若寠人子執禮益恭姑特賢之太師父子以威名雄陜右國家倚之隠如長城其後遭時多艱執戈衛社多立竒績仕通顯夫人勉以忠孝不絶於口毎言國恩舉手加額者三故太師禮之如賔賴之如良友朋每奉命專征不顧其家内外數百口合屯營部曲室家無慮數千萬繄夫人是賴建炎中敵入江浙太師以御管副使鎮江州留家江西時㓂盜四起摽掠旁近部曲惶踐少自安夫人勞之曰爾等無恐㓂至我躬見之彼知吾家必不敢肆暴也而㓂至知太師營旋即散去紹興三年太師軍他陽明年大敵窺江詔全師控烏家渡敵退䇿勲上以夫人能相其夫綏靖部曲致士卒無返顧効死克敵加封魏國夫人仍月賜湯沐貲如内職太師三辭不獲命嘗入見上面諭曰夫人相家子又欽聖近屬非他人比繼稱賀慈寧宫太后顧曰夫人習氣不凡柔嘉可則一時命婦咸歆艶之凡疏封者十晉康秦楚潤蜀等皆所封之地晚以二子登朝籍進封魏國太夫人享年六十有三夫人端懿淑茂寡笑與言不見慍喜壼政甚修中外井井相春秋之事視滌濯羞簠簋齋荘待旦御族黨信且厚有疾病不克扶持與貧不能嫁娶喪𦵏者斥貲財與之所賴以濟者甚衆視妾媵若巳子疑妬之念不萌於胷中忿恚之色不形於顔貌薫然慈仁有犯已者初若不聞人自愧服平居勵其子以學俾從賢士游且曰賢者非禮意不辱雖有甚費不靳也故其子咸有可觀文行彬彬好古惇雅縉紳稱焉奉夫人孝謹嵗時勝賞方舟安輿頥指辦具人謂夫人雖不登上夀而雍容閒居之樂無所恨焉男四人曰克臣武徳郎閤門宣贊舍人早卒曰堯佐右承議郎直敷文閣賜紫金魚袋曰堯仁右宣議郎直敷文閣賜紫金魚袋曰堯勛右宣議郎早卒曰球右承務郎女四人寧國軍承宣使浙東路副都總管滿温卿右承議郎通判筠州軍州事吳希祥右承議郎宗正丞張宗元其婿也其一未嫁銘曰向望河内名人間出自我文簡始大赫奕流澤演迤於後有溢是生明徳光儷宸極國有父母家有壼則侃侃夫人是訓是式歸嬪鉅公曰惟太師太師奕代鎮於西陲智畧縱横且文且武隠如長城實固吾圉逮時艱虞執戈衛主凜然向敵身先其旅聞命引道寘家江滸盜發四旁小大惴懼屯營室家我則恩之効死固守㒺敢叛擕克相君子懋以忠赤寅奉其先蘋藻是職侈泰矜夸不見於色斥其餘帑拯難扶疾以詢其子必時名儒文行彬彬左琴右書水有方舟陸有安輿嵗時勝賞欵欵舒舒湯沐之封十更名國始終哀榮孰與倫匹排山幾㡬將相之阡過者下車銘在墓前宋故左中奉大夫致仕文安縣開國男食邑三百戶王公墓誌銘建炎三年閏八月某日甲子故左中奉大夫致仕王公以疾終於里居以其年十月某日甲子𦵏於義烏縉不鄉謙小之原後十四年其子鑄以右承事郎知湖州徳清縣事適相從游一日出里人右宣義郎宗君士之狀見屬曰先大夫𦵏有年矣隧未有銘敢累子將表諸墓左且曰先大夫辱與賢叔父為僚相好也是以敢訴初叔父為嚴陵監都實佐公治某繫官於越不及從也他日問公於叔父叔父曰王公長者也某竊嘆今世稱長者率未必有實漢文帝問曰叔公知天下長者乎公長者宜知之叔所稱獨故雲中守孟舒一人而已審如是非勇於為義不顧巳私不可以言長者長者豈易言哉又他日聞之搢紳公之守南康也故諫議大夫陳公瓘在焉陳公居諌垣時詆斥奸臣逆疏其惡章累十上其後怨家當國貶居是邦公慕義交驩情禮備至陳公謂其有前軰長者之風與為姻家陳公然諾重于一世所為得此稱抑有自乎然則吾叔父非易言也公諱某字慶長世為婺之義烏人曽祖某祖某父某皆不仕父以公貴累贈宣奉大夫母宗氏劉氏贈太碩人公劉出也少警悟强記憶從鄉老先生學為文章志甚篤弱冠失怙恃家無擔石之儲徒歩入京師為太學生益勤弗懈及維聖元年進士第調台州仙居縣尉再調越州郯縣主簿陞洪州武寧令用薦改宣徳郎權宗學博士知泰州海陵縣事控置東南兩路茶鹽司屬官提轄諸道進奏院通判筠州知南康軍秩滿知觀州未赴移知嚴州上疏乞解郡紱除提舉西京嵩山崇福宫尋請老終焉階自軍徳郎序遷及更八寳赦恩進奏院職事辦給賞典淵聖今皇帝登極大霈凡十轉至中奉大夫爵文安縣開國男食邑三百户仙居豪右争四水之利至十五年不决公一見得情争者語塞武寧於豫章為劇訟牒堆几公始至隨事剖决民不敢欺發奸摘伏輔以教化曽未閲嵗能聲赫然溢於江表郡守部使者交牘列奏其在海寧亦猶武寧也會有㫖濬汴縣令躬部役夫至所分地公慮事量功分盡占授凡板幹畚築之具土物逺近之程皆出素定不勞而辦一時嘆服政和間朝廷遣七路茶鹽使因命訪察荆湖南北使者未入境欲盡削兩路監司以立威以其事訊公公曰不然詔使之行患在不知民之疾苦不患威之不立也有如風聞失實奈物論何使者服其言為止嚴陵巨㓂發於山谷聲震江浙郡方調民築城公謂役大未易遽辦亟命罷之集兵民據要害以折賊衝賊亦不至逆賊苖傅持兵一夕入境公遣人迎謂曰是城無見糧非汝宜守及檄境内迎候官軍賊懼遁去初賊薄城居民震擾卒徒有謀為内應者公宻伺得之盡寘之法或謂謀未露宜在貸減公曰幸未露乃能得之不然悔可追耶已而盡得其謀人始服公之决嚴並出為田賦租薄少軍儲仰於鄰郡至是官軍討賊徃來相踵比及凱旋宴犒拊循靡不周盡民吏不知費出所自公既得請奉祠還歸里間遽得疾不起享年七十有五妻溫氏累封至今男二人長曰鑄次曰儔右從政郎嚴州司法㕘軍皆能世其家以孝謹稱女四人其適進士路衛右朝奉郎新提舉兩浙東路茶鹽公事虞流右從事郎監紹興府都税務方鑄者皆先公卒幼適右承奉郎主管台州崇道觀郭知訓孫男五人曰寧曰紹祖曰光祖曰興祖曰勤禮寧右迪功郎新授邵武軍建寧縣主簿紹祖右登仕郎而勤禮將仕郎孫女四人適進士宗開右迪功郎監潭州南嶽廟陳永思其餘尚幼公慈祥樂易出自天性平居循禮言動有常至臨事婉盡皆出人意表義所當為惟恐居後於仕進澹然故人之在要路者未嘗一通私書又性至孝自念起家窮約禄不逮親以為終身之恨自初仕至老未嘗釋念友于其弟甚篤鄉黨稱焉令人温氏楚之山陽人有賢行善相其夫不越壼則家故窮躬履勤儉分少絶甘以及親屬之不能自給者甚者至斥簪珥無所愛惜公既葬七年而令人殁於儔之官舍實紹興七年正月某甲子也夀七十有五明年八月某甲子從公并合葬云銘曰公始居約强學業文以克厥家其艱其勤一行作吏益勵其器意獨在民且敎且治潜伏之奸一見情得甲是乙非争者語塞勅使載詠搏擊示威公曰孰光問民瘡痍㓂難薄城視若無物我謀既臧談笑却敵勇於為義不見所難謂公長者斯名不刋夀七十五官上大夫五馬來歸有耀其閭維公至行訓於里門恬淡家聲考謹是論維子若孫奉承勿惰我諗之銘以表墓左宋故左朝散郎通判安肅軍林君墓誌銘君諱某字無惑福州長溪人曽祖仁珙祖昱父雄皆隠徳不仕父以君通朝籍累贈承議郎君自幼童知好學刻意鑚研礪志寒暑飢渇乆之自以聞見不偉慨然出求師時太守蔡公襄大開學校延四方豪英而鄉先生陳公烈起處士為學官士類益集君往從焉先生毎日夜聞君誦書䇿勵羣弟子必以君為言且相器重元愷初為太學生十年聲名日彰司業朱公服覽其藝文以為有栁栁州氣骨又喜其荘重有常處以職事曰勉之為餘子矜式累試春官輙不利至元祐六年始登進士第授溫州瑞安尉未赴相繼丁内外艱服除調臨江軍司法㕘軍議法平允為老吏所服再調邵武軍司戶㕘軍皆兼學官移建州松溪令政治不煩悉出愷悌嵗旱飛蝗被旁邑獨不入松溪境邑人徳之欲以聞部使者君謝止之曰使我得名如他邑何終更士民遮道不得去者累日尋授泉州晉江丞再授建州甌寧令甌寧負郭當道路之衝民剽悍健訟最於一路食且朝造郡守使者歸聴民訟未竟或當食放匕箸出迓客無虚日君不自以為勞事益精密夜秉燭省案牘不一以諉吏威信並行盜為出境囹圄屢空使者交薦之御史中丞吳公執中以君治行聞于朝不果召巳而用薦改宣敎郎知湖州歸安縣君為歸安甚暇且教且治之民不忍犯嵗潦民流有聖㫖賑濟君擇地為茇合區處之適溫凉燥濕之宜視食飲淹速之節所全活甚衆使者上其事減考功格三年轉奉議郎再轉承議郎權宗子博士以年髙請補外除通判安肅軍待次京師聞大将開邉君曰此胎禍也吾不應及其難亟買舟還鄉築室於故園與親舊賔客舉酒相樂論者髙之轉朝奉郎賜五品服遇淵聖皇帝登極恩遷朝散郎以某年某月某甲子終於新居享年七十有一以某年某月某甲子𦵏於長松比明宗佛寺之旁盖君所自卜娶同邑周氏有賢行先君十五年卒男二人曰聲曰仰三女長適右迪功郎王旁次未嫁與子聲皆早亡幼適鄉貢進士周直亮孫一人曰同仰今為右修職郎袁州宜春縣尉君孝于親義于鄉黨天姿粹然金玉人也鈎貫經術善屬文於詞賦詩章尤工後輩從君學者皆有軌則有文集若干巻藏於家其待人一本於誠所治三邑去皆見思嘗語仰曰吾居官無以踰人獨小大之獄必以情有不安者蚤暮以思未嘗敢忘於心吾老尚何求以是遺汝耳在歸安時余以邑子見君君相遇甚厚因獲與仰遊仰訪余於里間民吏驚曰是長官兒耶我輩不之識也盖始出而從吾遊其審慎而畏謹毎若此使余心愧焉仰嗜學能文仰父既𦵏君若干年復見余於會稽則論議益富文益工其後以書抵余求為君銘所不得辭銘曰正而樸匪礱匪斵安且舒惟仁是居獄政慈祥有苾其芳以遺其子天其勿忘宋故聞人府君墓誌銘余曩以柱史失職罪黜寓家徳清暇日浮扁舟訪川巖於鄰邑中流遇風命拽舟傍林墅暮夜不得所棲問亭傳曰無有獨酒壚在焉問主壚為誰曰聞人君長者也余得假宿訪主人曰適他墅矣質明將興則奴奉匜在戶外余沃盥僅畢君出迎有禮貌自言昨暮無他適盖窺公於屏間識公非塵凡人也固欲飯余具甚設自是識君率間嵗一相過坐客有及求田事因余以囊無金謝之君竊聴若不聞閲數日持劵來曰鄉公與客語田事尋物色其處以緡錢千為公得之余驚謝不敢留者七八君曰他日以直歸我未晚也如是十餘年僅能償半余刺促不自安君無半辭及之一日扶羸過余曰吾得疾且病故來取别乆之出筆札相授曰向所負巳折劵懼吾子若孫不察吾意或相督取余曰自吾居里間雖甚困不貸人一錢所見士大夫有急叩人門雖甚薄少不可得今君捐數十萬錢不取如棄涕唾授受之際不應如是之輕君以筆札抵案徑不返顧余愧其意每從人言之知君者皆云聞人君樂善好義辭氣質直不為表暴意所欲必為之類此頗衆然非余意也念終當償之又三嵗而君卒其子頎袖書來乞銘余固欲表其事不復辭且使後人知君所為槩可見也君諱譽字聲甫世居湖州之武康曽大父永大父億父濟君未嘗業儒而舉動不愆於禮義奉親孝謹承顔順㫖生事死𦵏無毫髪可恨鄉里稱焉振貧恤孤不見所難自幼至老屬意浮屠氏之學以精進布施為實行建殿閣嚴像設者不一數誦内典飯緇流不可以數計名山橋梁應剏與通衢經術並巖隂及應布甎雖綿亘甚逺皆獨任之行路受其賜平時多從方外有道者遊晚嵗若有得臨終索湯沐炷香斂念語旁觀曰聞人某有道行與否在今日矣實紹興二十三年八月戊寅也享年七十有三以其年十一月壬寅𦵏於所居之南二十里崇仁鄉南岳山之原從先君之兆室李氏男二人頎泰州助教早卒順從信使出疆補官轉承節郎女三人適邑人姚惇施良佐孫男六良貴良臣良翰良心良器良才銘曰川可囘石可泐惟兹銘詔罔極宋故右朝請大夫鄭君墓表君諱某字某五代祖昱為湖州長興令子孫家焉因是為長興人曽祖某故任睦州遂安令祖某父某皆不仕君以其子績仕班朝籍累封右朝散郎紹興十一年十一月二十七日卒享年八十有五明年三月丙申𦵏於歸安縣開化里後十年贈至右朝請大夫績語余曰先君幼失怙恃嶷然自立力學不倦夢有所授乃自晦棄科舉獨玩意浮屠氏之學讀其書甚廣中年有得心意融釋視死生如昨夢平時邃於天文地理卜筮之説一日語人曰吾生丁酉月日時皆火屬合嵗在辛酉火以類至其死矣白難之年也繼得疾屏藥謝醫炷香沃盥曰明日入辛酉吾終於此矣復戒績曰𦵏用山地之險也有甚吉必有甚凶吾以是得夷坦之地為安我𦵏從汝母之旁善矣且我自卜也績奉治命惟謹獨隧者之銘未立私心恧焉顧疇昔官學相追其言可信於後世者十不一二存今不子求而求之誰固將以表諸墓也既而聞之鄉老曰君學道堅决若與物無心而事所當為靡不周盡律身儉勤教子孫甚力遇宗族鄉黨甚信且厚居長興時有宅一區田一頃在歸安之璉市僅足了伏臘即徙焉捐其先居之産悉以與族人其後貲稍裕葬族黨親故者十數與隆寒苦雪閭里之不能衣食者持薪米繒絮往周之一飯之徳必報其人雖亡見其子若孫則如其人焉性實剛介朋友或愆於義必面折無隠情故所至皆親重之余是以益知君為長者配朱氏與君俱學道志行堅確前君若干年無疾坐逝男二人績右朝奉大夫新函浙東路安撫司㕘議官道如祝髮為僧住臨安府天井山普應襌院孫一人嗣執業進士曽孫三人膺胥脩余不及識君而從績游有年數矣績脩潔博習時輩所推既登科名聞諸公嘗被選擢自中都官出為部使者及佐師間其進未已也余既得君善行而績見屬意甚厚不敢以固陋辭姑叙所聞以詔後人云宋故左朝請大夫致仕張府君墓誌銘君諱旬字述功其先居吳郡後徙青墩鎮遂為秀人逮君之考復卜築湖之烏墩曽大父叔和大父宗祐晦迹不仕考育以君叙封至朝散郎致仕累贈右正議大夫母丁氏追封碩人君自少頴異不肯碌碌嘗語人曰家以儒為名未有顯者吾甚恨焉折節讀書遊學親師友不憚寒暑掌教者偉其文毎掲示諸生而以為軌則故同學者皆自知不敵已而薦名鄉書為第一登崇寧五年進士第授將仕郎調婺州蘭溪縣尉大觀中用八寳赦恩轉登仕郎終更用薦陞通仕郎乃授杭州錢塘丞府郎部使者以文字知君薦書交相上改京秩知嚴州桐廬縣吏戴諒者為奸隠欺税租君具按治得實事上聞與賞格時户部辟監麥科下第一界君以道逺不便親養丐監越州鹽倉司遇淵聖皇帝及今皇帝踐祚遷二官授簽書寧國軍節度判官㕔公事於考功格應賜緋衣銀魚君以親老侍養無㡬日自列於朝願以身章賁其親有㫖從之未赴寧國間丁父憂免喪監行在所諸司糧料院將之官君自念禄不逮親欲出疏乞閑再更宫祠會有㫖侍從官各薦賢能君在薦中除知南劍州尋易徽州任滿造朝除知嚴陵俄得肺疾乞以郡易奉祠踰年請老以疾終於家實紹興二十三年十二月六日也享年七十有三自改京秩九遷至左朝請大夫君妙年初仕於吏道已若素習遇事精敏老吏竦服在蘭溪時民有甲乙争田中水溝者甲曰田有溝舊矣乙曰劵有塍耳寧後溝耶訟乆不决君呼耆老問之水溝異名謂何曰俗謂之甽又問曰中徑田俗謂之塍君取劵熟視曰我得之矣易甽為塍是殆匿溝為已有也争者語塞杭為會府往來多要人寺僧義聞假權要勢占民産官吏拱黙不敢决君官小無所顧望一繩以法聞者韙之桐廬縣劇政率以猛君獨本以恩信追科不煩而事悉辦給民健訟相侵漁尺度不明君未嘗委官吏按視曰是徒為紛紛擾民爾命圖狀來上反覆問詰往往情露民甚愛君比其去也遮道借留不減古人至繪像祠之其治徽亦然奉行寛詔謂徳意不下逮為承流宣化者之罪或言郡經費不足君曰郡經費出於民而有藝極者也民賦輸無爽而用不足是必有弊欺不歸公上者弊在吏胥乆之盡得鄰郡狴犴有㽜繫不决部刺史悉以委君渙然盡釋皆自以為不寃初除嚴州民相賀曰是嘗為桐廬矣惠且及我也君蚤失母事父孝謹毎仕以親養為急不汲汲於進父死將𦵏日者以嵗庚申君生之年也盍避之君斥去曰吾豈以拘忌私已之説易吾意耶律身嚴家政肅小大井井平居未嘗廢書為文粹美自其少時有集三十巻藏於家課子弟學朝暮諄諄故親族與計偕取髙第者相踵於時晚嵗手抄釋氏典殆百巻神情恬悦若有得焉以明年正月丙申葬於湖州長興肆惟新鄉龍潭塢之原娶濮氏封宜人子庇右迪功郎前監潭州南嶽廟孫男女六人顔將仕郎頒頃頔女尚幼君歴任乆既官其子孫又以明堂赦與致仕恩及其兄弟之子二人曰席曰庻云前事之月庻以其弟康之狀求君銘始得盡其平生且恨施用之未既也銘其可辭哉銘曰君生弱齡秉志自强謂家世儒厥問不揚折節讀書藝業益勵隆師尚友以開後繼奕葉有光自君起第粤初筮仕宛若素習健决力行老吏惴慄深年之訟一訊語塞奸貪婪攘或怙權貴官吏拱黙罔敢有異君雖位卑了不顧忌桐廬之政恩信並立追科不煩民用寧壹豪强兼并尺度晦匿君曰委吏是益蟊賊命圖來上反覆問詰彼民愛君於今不忘嵗時奉嘗有如桐鄉君之治獄豈弟舒舒僚吏以苦經費是圖君曰此民不足賦輸弊豈在民弊在吏胥抉摘蔽欺謹所應入曽未㡬時用度有溢帷君孝友出自天性仕每便親不急於進暨服親喪志乃不競既乆得疾請老於朝尚期季年燕居逍遙迹君行能與名與位小見於時用則未既龍潭之原卜云其臧納銘墓中以永厥藏宋故永嘉郡夫人髙氏墓誌銘夫人髙氏世為南徐人故中奉大夫安吉縣開國男致仕贈右光禄大夫閻公騤之室也夫人曽祖亮祖傳不仕父仲華以文著於鄉閭晚乃得官為承事郎以其子述贈官至光禄大夫以儒名家諸女皆知書甚難于得對金陵閻氏昆弟有聲學校既以長女妻其兄而安吉公益有聞於時又以夫人歸焉已而相踵登上第歴通顯夫人莊靜淑懿自少小不為戲劇女工之餘獨玩意筆硯間泛觀六經諸子識其大指既歸閻氏以不逮事姑為恨舅年髙奉食飲藥物不少懈至中饋佐烝嘗敦睦夫黨上下肅雍舅賢之以戒其諸女為矜式安吉仕典刑獄閲文書毎至夜分求所以平反者夫人坐其旁贊曰審思之無忽也士之從安吉游者相與論道古今夫人竊聴屏間輙為之題目輕重無小失安吉仕四方以亷節稱自謂得内助為多平居不植産族聚浸廣仰食者衆洎為杭治中得圭田之租即以付族長俾置田鄉里次第給之視兄弟之子逾巳子時其嫁娶皆夫人共成之外民有不能自存至鬻其妻者夫人聞之垂泣斥首飾得千萬錢解所御裳衣遣往贖歸之初安吉遇郊祀既官其次兄之子又欲及長兄之孫未能也公既下世夫人命以遷表恩奉承治命無得有異夫人重然諾不耻貧不謀利樂聞人之善喜周人之急為人之所甚難類若此建炎四年六月十八日以疾卒於建康之溧陽享年七十有七以其年九月十日葬上元縣幕府山之原祔安吉域也夫人初封永和縣君改封令人後以子彦昭贈永嘉郡夫人生二男彦昭其長也今為右朝請大夫兩浙路轉運判官次子早亡女四人得婿者三曰奉議郎林彭年從政郎胡璉從事郎薛懌孫果將仕郎早世晃右從事郎真州録事㕘軍昴右迪功郎監真州造船塲晟將仕郎孫女與曽孫各四人曽孫曰一徳世徳好徳彦昭以才能見推士類既為浙部使者以書扺某曰吾母之葬屬時艱虞墓隧之銘未立私情刺促若無所容敢以奉累余異時固聞之矣使者孝行如古人承顔順色無毫髪可恨故夫人晚嵗神情安舒益知有子之福余與使者相從首尾通四十載余冒居瑣闥旋以罪黜使者時為尚書郎獨一再出郊坰見存甚厚且以相警俾逺後悔其後皆如使者言余心徳之弗忘也惟是老病昏塞執筆眩然懼無以發揚太夫人遺懿而慰使者哀惻惓惓之心既又自念荒陋之文何敢有愛於人之母况親戚故舊且稔其家範若是具悉者耶乃不辭而為之銘銘曰噫夫人資淑溫相君子節義敦厚宗親一以恩曷由然好詩書中篤實行有餘蘭生深林孰幽不芳閨門之懿孰隠不揚孰施者多而報以寡謂余不信視今來者苕溪集巻五十
