body:
  text: 苕溪集卷二十六宋劉一止撰祝文疏語春祭諸廟祝文季春謹時春物既陽日直夫久戴勝降桑農夫力田婦服懿筐神貺以時適兹雨暘守土為民敢替厥祥于以吿䖍牲肥酒香秋祭諸廟祝文惟時仲秋百物順成秀且實其實離離黍稷嶷嶷将穫積雨暘小愆民則怨咨吏當責若其成功吏亦何有繫神徳春秋祈報著于禮典守土職神其鑒兹修惠我民毋爽忒自今以往釃酒炰羔燕此佚豈惟我民神亦庻㡬有飲食冬祀赦祭諸廟祝文展采崇壇秉圭奠璧風雲奔走各以其職皇帝曰嘻惟時幽眀交相厥事同我慶成昭天漏泉沛澤均被賜命有邦稱秩羣祀天子萬年宣室受釐亦惟爾神永有依歸赦祭諸廟文皇帝以正陽之月復正大位肆赦多方稱秩羣祀我守土臣用祗祓以吿嗚呼天惟祚宋若周邦卜世卜年以永無斁惟神各率廼職用奠方隅弭難消兵毋有不庭為君民憂則神之有主民有報事尚勉哉皇帝登極赦祭諸廟文皇帝摠師靖難勤勞王家功大徳備念􅔦數之有在審謳歌之已歸廼以五月朔旦登受大寳天地交感日月揚光赦令既頒澤及幽顯逺近臣吏下逮黎元扶老擕幼手足蹈舞或至感泣願少須臾無死以觀中興豈惟臣民神亦永有依歸各率廼職用勱相我國家其無斁車駕廵幸祭山川文皇帝南廵諸侯寵綏呉越寛政毁關薄歛已責徳意甚厚於是命有司修柴望謹故事也惟山川之靈各率廼職用先後奔走勱相我王家妥安爾封疆則爾神亦有光寵誕皇子赦祭諸廟文皇帝詔承丕緒卜年以永九廟儲休是生元嗣配天其澤敷錫萬邦賜命守臣稱秩羣祀用祗祓以吿越州修城祭廟文郡介居江湖之間環水為城山瀑暴集衝墊圮剥閱日滋久襟抱虧䟱無所蔽障某承乏帥事甫見吏民問所先務咸曰無城何以保民慮事量功所不敢後凡板榦畚築之具土物逺近之宜分授有司㳙日剏始惟神其相兹役使工不勞病期不愆素以迄有成惟神之休敢不知謝重修吿成觀奉安聖像祝香文伏以㑹稽鎮山陽明洞府昔聞䆳館上奉髙真既圮剥而弗圖懼欽崇之靡稱是用新絳闕通明之殿嚴紫清睟穆之容爰擇吉辰具陳妙供臣有愚悃仰冀降衷两宫蒙塵念絶幕之既久嗣聖既政曽奠枕之未遑外虞猾夏之逺夷内有弄兵之宻㓂非穹蒼之悔祸豈人力之能謀伏願眷我家邦錫時祉福回鑾並駕見二聖之重懽弭難消兵衍一人之有慶代太守謁廟文某服天子命以有民社維日乙已臨視印章越三日丁未用祗見于羣祀惟是愚暗拙䟱無補事功以為大懼仰惟先聖先師寔寵靈之俾安厥我某亦不敢忘所學祭句芒文故事立春出土牛耕以于耕之早晚惟帝布令神實相之尚左右民俾以為阜歳儺祭文太隂神刺史啣天子命有民社将壽民無妖凶惟時季冬日歴虛危陽鬱未伸強隂負時百鬼憑依幸時不虞躁戾隂肆跳踉上下嘘氣為疹使人寒燠求食嘔泄不知愧恥刺史不得不為民憂是用考稽禮典索室驅疫旁磔于四門之外擊戈揚楯廹逐以出屏之遐陬惟神卒相此民其毋惠姦刺史将究聖天子涵養吹噓與物為春之徳天寧節祝上皇回鑾䟽語朔漢飛沙逺想鳴鑾之節首冬在候俛臨誕聖之朝惟是舊臣敢忘善頌太上道君皇帝伏願明神薦祉鄰敵革心佇龍旂早晚之還副蘭殿晨昏之慕胡地風霜念属車之逺狩漢家歴數當嗣聖之中興緬懐孝飬之勤爰罄誕彌之禱道君皇帝伏願夀隆箕翼福固山河慶萬里之遄歸儼百靈之森衞嵗星屡易尚勤絶域之遊誕節俛臨益動故臣之感惟時中外敢罄禱祈道君皇帝伏願壽與天齊福侔川至儼百靈之警衞慶萬里之遄歸徽宗皇帝顯肅皇后大祥就法慧寺修水陸道塲并齋僧䟽語仙遊已邈永逺率土之瞻依祥祭甫臨難抑舊臣之悲慕有嚴法㑹祗誦秘文用自竭于丹誠庻少資于㝠祐徽宗皇帝顯肅皇后伏願圖成妙果超證上乘至彼帝鄉居先王之左右永兹世祚燕後嗣之子孫天中節祝聖䟽語九廟儲休三靈錫羡篤生上聖用啟中興占誕彌厥月之祥罄億萬斯年之祝皇帝陛下伏願乾坤共久箕翼比隆上恬下嬉燕周家之禮樂東漸西被奠禹貢之山川宗廟儲休克相纉承之始人神交慶属當震夙之辰爰假妙因仰伸善頌皇帝陛下伏願丕承帝眷誕保皇圖率土底寧歸謳歌于四裔後天難老卜歴數于萬年天祚宋徳将底于中興福孕宗祊篤生于上聖采天保六章之義罄華封三祝之勤皇帝陛下伏願鞏固山河比隆箕翼乃文乃武益光並受之丕基得壽得名克纉無疆之大厯苕溪集卷二十六
