body:
  text: 苕溪集卷五十三宋劉一止撰樂章洞仙歌細風輕霧鎖山城清曉冷蘂疏枝為誰好對斜橋孤驛流水濺濺無限意清影徘徊自照何郎空立馬惱亂餘香綺思憑花更娟妙腸斷處天涯路逺音稀行人怨角聲吹老嘆客裏經春又三年向月地雲階負伊多少夜行船一頃疏梅開半就折芳條嫩香沾袖今夜何郎樽前疑怪花共那人俱瘦測測輕寒吹散酒髙城近怕聽更漏可惜漢橋月明風露長是在人歸後念奴嬌和曽宏父九日見貽江邊故國望南雲縹眇連山修木逺憶淵明束帶見鄉里兒曹何辱世味醺人折腰從事俯仰何時足可憐菊下醉吟誰共徴逐我愛九日佳名飄然歸思想當年邱谷夢繞籬邊猶眷戀滿把清樽餘馥援筆洪都如君英妙滿坐芳傾屬月臺揮袖叫雲聲斷橫玉又故山秋晚歎蕭蕭華髮霜林同色崖谷題詩追舊賞往往蒼苔緣壁二士權竒一翁衰病努力攀笻屐佛香吹過了知境是空寂别後風月佳時拄頥何事想東林遙碧小砑蠻箋驚秀句天巧何曽雕刻倚馬宏才凌雲逸氣路覺丹霄直三千牘就看君歸奏文石又和陳元載中秋小集燕臺暮集對秋容凄緊松隂羃羃徙倚欄邊臨翠壑千頃風煙橫出坐待氷輪天空雲散一色如蒼璧姮娥有意為誰來赴今夕身世如許飄流佳時輕過乃他年空憶我輩情鍾端未愧昔日蘭亭陳迹坐上何人驪歌凄斷話别還應惜有心紅燭替人珠淚頻滴又中秋後一夕泊舟城外水煙收盡望汀蘋千頃銀光如羃霜鏡無痕清夜久惟有驚魚跳出月在林中我疑天公歡飲仍如璧姮娥應為後期償賽今夕遙想當日同盟山齋孤諷有新詩相憶聚散難常空悵望萍梗飄流蹤迹明月明年此身此夜知與誰同惜參橫河側短篷清露時滴踏莎行遊鳯凰臺二水中分三山半落風雲氣象通寥廓少年懷古有新詩清愁不是傷春作六代豪華一時燕樂從教雨打風吹却與君擕酒近欄杆月明滿地天無幕虞美人族兄無言赴召浪花雲葉交加舞身近青冥路天知此客解騎鯨今夜一江明月送行行從今直上鰲峯去應記經行處莫將險語亂江聲却怕月中髙臥彩虹驚江城子送王元渤舍人將赴吉州日作此以獻之秋香巖下著樽罍少徘徊莫停杯來嵗花時相望兩悠哉看取修眉縈度曲真個淚界香腮船頭擊鼓月帆開曉風催首應回景物撩人詩思不勝裁會有江山凄惋句憑過雁寄儂來臨江仙餞别王景源赴臨江軍栁外雙旌斜照日匆匆去意難留大江滂畔老諸侯舉觴仍氣槩覓句更風流遲暮不堪容易别溪聲為寫離愁自從今日轉船頭他時扶杖叟獨立向滄洲又和王元渤韻落日西風原上好笛聲誰奏伊涼緩尋山徑掇幽芳平生真自許江海老潛郎最愛杯中浮蟻閙鵝兒破殼嬌黃使君醉裏是家鄉更追修禊帖一詠一傳觴雪月交光正五雲飛伏縞練纎裳亂空交舞拂石歸來向玉階微步欲喚氷娥暫憑風使為掃氛驅霧漸見停輪人間未識髙宜真侣千里無塵地連天逈倦客西來路迷江樹故國煙深想溪橋何處雲鬢分行翠眉縈曲對夜寒樽爼清影徘徊端應坐有風流能賦望海潮垂楊深院啼鶯清晝東風細繞簷牙野色亂春嬌雲捧日燕翻蝶舞交加溫詔下天涯早畫船飛楫疊鼓鳴撾共挽旌幢緩留絲竹醉韶華江都自古豪誇正迷樓隨絮月館吹花玉扆眷深金甌望重何人暗草黃麻歸接堤沙宴上林風月紫闕煙霞鳯檢飛來便將春色到朝家醉蓬萊秀城元夕正官橋栁潤候館梅開暮雲凄冽澤國春歸是曉燈時節吹綻紅渠挽低星斗共水光澄徹霜瓦樓臺參差似與蓬萊相接千騎遨遊萬家嬉笑簾捲東風弄粧成列慢舞樽前看輕盈回雪來嵗今宵舞韶聲裏對六鰲雙闕鳯檢飛來玉驄去踏青門華月望明河贈路侍郎使髙麗華旌耀日報天上使星初辭金闕許國精忠試此日傅巖濟川舟楫向來雞林外况傳詠篇章雄絶問人地真是唐朝第一未論勳業鯨液霽雲千疊望仙馭縹眇神山明滅萬里勤勞也等是壯年繡衣持節丈夫功名事未肯向樽前傷輕别有飛棹歸侍宸遊宴賞太平風月驀山溪葉左丞生日卿雲衍苒翠璧天開就移下小方壺照初日嘉林濯秀君恩暫許邱壑憩夔龍開徑竹續巖花小試丹青手聲名德業漢代誰居右紅斾碧油幢想今古山中未有霜松手種應待茯苓生齋釀熟玉泉香還上萱堂夀生查子城頭長短更水調髙低唱别酒不盈斟淚灑風煙上明年二月時更向城隂望只有舊歌辭傳作風流樣清平樂相望吳楚逺信無憑據欲倩春風吹泪去化作愁雲恨雨春應已到三吳楚江日夜東徂惟有價流魚亦不知尺素來無青玉案小山遮斷藍橋路恨短夢難飛去長記修眉索曲度約花開檻映風招袖總是憐渠處闕暮猶有多情舊時句極目髙樓千尺許竹枝三唱為君凄斷東日西邊雨夢橫塘浪痕經雨鬢影吹寒曉來無限蕭瑟野色分橋剪不斷溪山風物船繫朱藤路迷煙寺逺鷗浮沒聽疏鐘斷鼓似近運過驚心事傷爵客新醅旋壓鵝黃拚清愁在眼酒病縈骨繡閣嬌慵爭解説短村傳憶念誰俾塗鴉維髻嚼蕊吹花弄秋色恨對南雲此時悽斷有何人知得西河山驛晚行人乍停征轡白沙翠竹鎖柴門亂峯相倚一番急雨洗天回掃雲風定還起斷崖樹愁無際念凄斷誰與寄雙魚尺素難委遙知洞戶隔煙忩簟橫秋水淡花明玉不勝寒緑樽初試氷蟻小歡細酌任歌醉撲流螢應卜心事誰寄天涯憔悴對今宵皓月明河千里夢越空城疏煙裏眼兒媚度嵗經年兩看承誰信有輕分從前穩過如今方悔不會溫存眼前無限經行地何處不銷魂多應為你不看風月睡過黃昏水調歌頭和季恭發尚書泊舟嚴陵千古嚴陵瀨清夜月荒涼水明沙淨波靣一葉弄孤光北望旄頭天際殺氣遙昏楚甸雲樹失青蒼愁絶未歸客衰鬢點吳霜聽江邊鳴寶瑟想英皇騎鯨仙裔髙韻清絶勝風篁醉入無何境界却笑昔人底事逺慕白雲鄉不見咸陽道煙草茂陵荒又縹眇青溪畔山翠欲黏天縱雲臺上攬風招月自何年新舊今逢二妙人地一時清絶髙並兩峯寒歌在煙霏外人在去留間著方床容老子醉時眠一樽相屬髙會何意此時圓况是古今難遇人月竹花俱妙曽見句中傳不向今宵醉忍負此嬋娟鷓鴣天巖下秋隂引興長坐中初識令君香攬將風月歸詩藪乞得溪山作醉鄉憐我老子傳觴吳霜點鬢又何妨只應銀燭交紅夜羞對雙歌髮彩光木蘭花桂香臺上秋風嫋鴨緑溪前離思渺一巵芳醑細深傾聽盡陽關須醉倒政成早晚成溫詔莫戀江城歌吹繞明年身到鳯池邊重看春波生故沼浣溪沙午夜明蟾冷浸溪姮娥應有辟寒犀桂巖仍在曲闌西襭蕊攀條情未已經邱尋壑想招擕不應癡馬惜鄣泥點綘唇洞戶香凝晏間特地風煙好靚粧娟妙玉雪光相照認是桃源緑水紅雲繞真曽到漾舟人老應被桃花笑又雲鬢分行照人明艷新粧就御香忩牖細酌鵝兒酒鐡撥深弦一試春風手龍仙奏綘霄聲透不許人間有臨江仙臺上風光濃欲滴傍欄芳桂隂成亂山相對長官清琢詩能句好舉酒見心傾團扇不應秋後棄幾年仁惠風行渭城栁色若為情一樽松竹底三唱和秋聲驀山溪王家人地奕奕爭髙秀金紫照青春想當日烏衣巷口聲名氣概今見兩朱幡詩似錦酒如澠屬意風光厚釀泉石壁未減南陽夀清興與誰同探梅蕚溪橋驛候東風御栁應是此韓翃歸步穩赤墀邊肯記幽棲否念奴嬌小舟漂兀犯溪煙深入無窮寒碧路繞蓮塘渾亂眼千頃朱朱白白聞説髙情尋盟鷗鷺愛此風標客掀髯一笑頓忘身世形迹我愛古邑風流碧峯爭秀時相持如掖製錦才雄應未怕百里文書堆積吏散庭空舉觴邀月引興何妨劇却憐宣子杖頭才挂錢百栁梢青栁行煙暮常記岸幘風流張緒酒興詩情而今移向那邊佳處使君自樂蕭間未肯副巖廊虛佇不念寒忩老人幽夢追尋無據鵲橋仙春風真個取將花去酬我青隂滿院名園清晝漏籖遲未肯負酒朋歌伴使君情在暮雲合處臥看碧峯峩辨向來魂夢幾曽真休怨斷樓髙不見浣溪沙曽向蓬萊得姓名坐中省識是飛瓊琵琶翻作步虛聲一自當時收撥後世間絃索不堪聽夢回悽斷月隴明點絳唇和王元渤舍人見遺嵗月飄流故人相望如箕斗畔愁千首詩骨能清瘦昔日鵾絃同看春風手君知否袖痕别後猶有臨岐酒又山色新涼夜堂爽氣侵南斗為誰驤首月冷氷娥瘦八萬二千雕琢瓊瑶手君知否待君歸後雙照杯中酒望海潮東郊人報春風消息先歸御栁宫梅殘雪戀枝輕隂閣雨鬱蔥瑞氣佳哉清曉九門開聽舜韶聲舉迤邐天街雙闕連雲六鰲橫海駕峯來華燈競簇樓臺正豐年共樂歡意徘徊簾捲弄粧塵香趂馬輕寒細入人懷爭持鳯􅓅回看一天星斗移下蓬萊是處歌謡太平聲入萬年杯青玉案馬頭雙鵲飛來喜暗凝望音書至一掬離懷千萬事緑忩深夜短箋封就應也尋人寄春風鬢畔疏梅蕊映粧艷清如洗苦恨眼邊長憶記楚宫行路倚橋攀驛供盡梅花淚喜遷鶯曉光催角聽宿鳥未驚鄰雞先覺迤邐煙村馬嘶人起殘月尚穿林薄淚痕帶霜微凝酒力衝寒猶弱嘆倦客悄不禁重染風塵京洛追念人别後心事萬重難覓孤雁托翠幌嬌深曲屏香暖爭念嵗寒飄泊怨月恨花煩腦不是不曽經著這情味望一成消滅新來還惡踏沙行淡月精神疏梅風韻粉香融臉胭脂潤袖痕猶帶玉虬煙六朝窄樣裁宫錦眉黛分愁眼波傳信酒闌畫燭交紅影有期無定却嗔人索強我早諧伊性浣溪沙莫問新歡與舊愁淺顰微笑總風流眼波橫注楚江秋十字街頭家住處心腸四散幾時休攬風招月是朱樓苕溪集卷五十三
