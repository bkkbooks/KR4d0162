body:
  text: 苕溪集巻五十三宋劉一止撰樂章洞仙歌細風輕霧鏁山城清曉冷蘂疎枝為誰好對斜橋孤驛流水濺濺無限意清影徘徊自照何郎空立馬惱亂餘香綺思凴花更娟妙腸斷處天涯路逺音稀行人怨角聲吹老嘆客裏經春又三年向月地雲堦負伊多少夜行船一頃疎梅開半就折芳條嫩香沾袖今夜何郎樽前疑怪花共那人俱瘦測測輕寒吹散酒髙城近怕聴更漏可惜漢橋月明風露長是在人歸後念奴嬌和曽宏父九日見貽江邊故國望南雲縹緲連山修木逺憶淵明束帶見鄉里兒曹何辱世味醺人折腰從事俯仰何時足可憐菊下醉吟誰共徴逐我愛九日佳名飄然歸思想當年邱谷夢繞籬邊猶眷戀滿把清樽餘馥援筆洪都如君英妙滿坐芳傾屬月臺揮袖叫雲聲斷横玉又故山秋晚歎蕭蕭華髪霜林同色崖谷題詩追舊賞往往蒼苔縁壁二士權竒一翁衰病努力攀笻屐佛香吹過了知境是空寂别後風月佳時拄頥何事想東林遙碧小砑蠻牋驚秀句天巧何曽雕刻倚馬宏才凌雲逸氣路覺丹霄直三千牘就看君歸奏文石又和陳元載中秋小集燕臺暮集對秋容凄𦂳松隂羃羃徙倚欄邊臨翠壑千頃風烟横出坐待氷輪天空雲散一色如蒼璧姮娥有意為誰來赴今夕身世如許飄流佳時輕過乃他年空憶我輩情鍾端未愧昔日蘭亭陳迹坐上何人驪歌凄斷話别還應惜有心紅燭替人珠淚頻滴又中秋後一夕泊舟城外水烟收盡望汀蘋千頃銀光如羃霜鏡無痕清夜乆惟有驚魚跳出月在林中我疑天公歡飲仍如璧姮娥應為後期償賽今夕遥想當日同盟山齋孤諷有新詩相憶聚散難常空悵望萍梗飄流蹤跡明月明年此身此夜知與誰同惜參横河側短篷清露時滴踏莎行遊鳯凰臺二水中分三山半落風雲氣象通寥廓少年懐古有新詩清愁不是傷春作六代豪華一時燕樂從教雨打風吹却與君擕酒近欄杆月明滿地天無幕虞美人族兄無言赴召浪花雲葉交加舞身近青冥路天知此客解騎鯨今夜一江明月送行行從今直上鰲峯去應記經行處莫將險語亂江聲却怕月中髙臥彩虹驚江城子送王元渤舍人將赴吉州日作此以獻之秋香巖下着樽罍少徘徊莫停杯來嵗花時相望兩悠哉看取修眉縈度曲真個淚界香腮船頭擊鼔月帆開曉風催首應回景物撩人詩思不勝裁會有江山凄惋句凴過雁寄儂來臨江仙餞别王景源赴臨江軍栁外雙旌斜照日怱怱去意難留大江滂畔老諸侯舉觴仍氣槩覓句更風流遲暮不堪容易别溪聲為寫離愁自從今日轉船頭他時扶杖叟獨立向滄洲又和王元渤韻落日西風原上好笛聲誰奏伊凉緩尋山徑掇幽芳平生真自許江海老潛郎最愛杯中浮蟻閙鵝兒破殻嬌黄使君醉裏是家鄉更追修禊帖一詠一傳觴雪月交光正五雲飛伏縞練纎裳亂空交舞拂石歸來向玉階㣲歩欲喚氷娥暫凴風使為掃氛驅霧漸見停輪人間未識髙宜真侣千里無塵地連天逈倦客西來路迷江樹故國烟深想溪橋何處雲鬢分行翠眉縈曲對夜寒樽爼清影徘徊端應坐有風流能賦望海潮垂楊深院啼鶯清晝東風細繞簷牙野色亂春嬌雲捧日燕翻蝶舞交加溫詔下天涯早畫船飛檝疊鼓鳴撾共挽旌幢緩留絲竹醉韶華江都自古豪誇正迷樓隨絮月館吹花玉扆眷深金甌望重何人暗草黄麻歸接堤沙宴上林風月紫闕烟霞鳯檢飛來便將春色到朝家醉蓬萊秀城元夕正官橋栁潤候館梅開暮雲凄冽澤國春歸是曉燈時節吹綻紅渠挽低星斗共水光澄澈霜瓦樓臺參差似與蓬萊相接千騎遨遊萬家嬉笑簾捲東風弄粧成列慢舞樽前看輕盈回雪來嵗今宵舞韶聲裏對六鰲雙闕鳯檢飛來玉驄去踏青門華月望明河贈路侍郎使髙麗華旌耀日報天上使星初辭金闕許國精忠試此日傅巖濟川舟楫向來鷄林外况傳詠篇章雄絶問人地真是唐朝第一未論勲業鯨液霽雲千疊望仙馭縹緲神山明滅萬里勤勞也等是壮年繡衣持節丈夫功名事未肯向樽前傷輕别有飛棹歸侍宸遊宴賞太平風月驀山溪葉左丞生日卿雲衍苒翠璧天開就移下小方壺照初日嘉林濯秀君恩暫許邱壑憩䕫龍開徑竹續巖花小試丹青手聲名徳業漢代誰居右紅斾碧油幢想今古山中未有霜松手種應待茯苓生齋釀熟玉泉香還上萱堂夀生查子城頭長短更水調髙低唱别酒不盈斟淚洒風烟上明年二月時更向城隂望只有舊歌辭傳作風流様清平樂相望吳楚逺信無凴據欲倩春風吹泪去化作愁雲恨雨春應已到三吳楚江日夜東徂惟有价流魚亦不知尺素來無青玉案小山遮斷藍橋路恨短夢難飛去長記修眉索曲度約花開檻映風招袖總是憐渠處闕暮猶有多情舊時句極目髙樓千尺許竹枝三唱為君凄斷東日西邊雨夢横塘浪痕經雨鬢影吹寒曉來無限蕭瑟野色分橋剪不斷溪山風物船繫朱藤路迷烟寺逺鷗浮沒聴疎鐘斷鼓似近運過驚心事傷爵客新醅旋壓鵝黄拚清愁在眼酒病縈骨繡閣嬌慵争解説短村傳憶念誰俾塗鴉維髻嚼蕊吹花弄秋色恨對南雲此時悽斷有何人知得西河山驛晚行人乍停征轡白沙翠竹鏁柴門亂峯相倚一番急雨洗天回掃雲風定還起斷崖樹愁無際念凄斷誰與寄雙魚尺素難委遥知洞戶隔烟忩簟横秋水淡花明玉不勝寒緑樽初試氷蟻小歡細酌任歌醉撲流螢應卜心事誰寄天涯憔悴對今宵皓月明河千里夢越空城疎烟裏眼兒媚度嵗經年兩看承誰信有輕分從前穏過如今方悔不會溫存眼前無限經行地何處不銷魂多應為你不看風月睡過黄昏水調歌頭和季恭發尚書泊舟嚴陵千古嚴陵瀨清夜月荒凉水明沙浄波靣一葉弄孤光北望旄頭天際殺氣遥昏楚甸雲樹失青蒼愁絶未歸客衰鬢㸃吳霜聴江邊鳴寳瑟想英皇騎鯨仙裔髙韻清絶勝風篁醉入無何境界却笑昔人底事逺慕白雲鄉不見咸陽道烟草茂陵荒又縹緲青溪畔山翠欲黏天縱雲臺上攬風招月自何年新舊今逢二妙人地一時清絶髙並兩峯寒歌在烟霏外人在去留間着方床容老子醉時眠一樽相屬髙會何意此時圓况是古今難遇人月竹花俱妙曽見句中傳不向今宵醉忍負此嬋娟鷓鴣天巖下秋隂引興長坐中初識令君香攬將風月歸詩藪乞得溪山作醉鄉憐我老子傳觴吳霜㸃鬢又何妨只應銀燭交紅夜羞對雙歌髪彩光木蘭花桂香臺上秋風嫋鴨緑溪前離思渺一巵芳醑細深傾聴盡陽闗須醉倒政成早晚成溫詔莫戀江城歌吹繞明年身到鳯池邊重看春波生故沼浣溪沙午夜明蟾冷浸溪姮娥應有辟寒犀桂巖仍在曲闌西襭蕋攀條情未已經邱尋壑想招擕不應癡馬惜鄣泥㸃綘唇洞戶香凝晏間特地風烟好靚粧娟妙玉雪光相照認是桃源緑水紅雲遶真曽到漾舟人老應被桃花笑又雲鬢分行照人明艶新粧就御香忩牖細酌鵝兒酒鐡撥深弦一試春風手龍仙奏綘霄聲透不許人間有臨江仙臺上風光濃欲滴傍欄芳桂隂成亂山相對長官清琢詩能句好舉酒見心傾團扇不應秋後棄幾年仁惠風行渭城栁色若為情一樽松竹底三唱和秋聲驀山溪王家人地奕奕争髙秀金紫照青春想當日烏衣巷口聲名氣概今見兩朱旛詩似錦酒如澠屬意風光厚釀泉石壁未減南陽夀清興與誰同探梅蕚溪橋驛候東風御栁應是此韓翃歸歩穏赤墀邊肯記幽棲否念奴嬌小舟漂兀犯溪烟深入無窮寒碧路繞蓮塘渾亂眼千頃朱朱白白聞説髙情尋盟鷗鷺愛此風標客掀髯一笑頓忘身世形迹我愛古邑風流碧峯争秀時相持如掖製錦才雄應未怕百里文書堆積吏散庭空舉觴邀月引興何妨劇却憐宣子杖頭纔掛錢百栁梢青栁行烟暮常記岸幘風流張緒酒興詩情而今移向那邊佳處使君自樂蕭閑未肯副巖廊虚佇不念寒忩老人幽夢追尋無據鵲橋仙春風真個取將花去酬我青隂滿院名園清晝漏籖遲未肯負酒朋歌伴使君情在暮雲合處臥看碧峯峩弁向來魂夢幾曽真休怨斷樓髙不見浣溪沙曽向蓬萊得姓名坐中省識是飛瓊琵琶翻作歩虛聲一自當時收撥後世間絃索不堪聴夢回悽斷月隴明㸃絳唇和王元渤舍人見遺嵗月飄流故人相望如箕斗畔愁千首詩骨能清瘦昔日鵾絃同看春風手君知否袖痕别後猶有臨岐酒又山色新凉夜堂爽氣侵南斗為誰驤首月冷氷娥瘦八萬二千雕琢瓊瑶手君知否待君歸後雙照杯中酒望海潮東郊人報春風消息先歸御栁宫梅殘雪戀枝輕隂閣雨鬱葱瑞氣佳哉清曉九門開聴舜韶聲舉迤邐天街雙闕連雲六鰲横海駕峯來華燈競簇樓臺正豐年共樂歡意徘徊簾捲弄粧塵香趂馬輕寒細入人懐争持鳯􅓅回看一天星斗移下蓬萊是處歌謡太平聲入萬年杯青玉案馬頭雙鵲飛來喜暗凝望音書至一掬離懐千萬事緑忩深夜短牋封就應也尋人寄春風鬢畔疎梅蕊映粧艶清如洗苦恨眼邊長憶記楚宫行路倚橋攀驛供盡梅花淚喜遷鶯曉光催角聴宿鳥未驚鄰雞先覺迤邐烟村馬嘶人起殘月尚穿林薄淚痕帶霜㣲凝酒力衝寒猶弱嘆倦客悄不禁重染風塵京洛追念人别後心事萬重難覓孤雁托翠幌嬌深曲屏香暖争念嵗寒飄泊怨月恨花煩腦不是不曽經着這情味望一成消滅新來還惡踏沙行淡月精神疎梅風韻粉香融臉胭脂潤袖痕猶帶玉虬烟六朝窄様裁宫錦眉黛分愁眼波傳信酒䦨畫燭交紅影有期無定却嗔人索強我早諧伊性浣溪沙莫問新歡與舊愁淺顰㣲笑總風流眼波横注楚江秋十字街頭家住處心腸四散幾時休攬風招月是朱樓苕溪集巻五十三
