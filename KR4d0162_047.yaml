body:
  text: 苕溪集巻四十七宋劉一止撰外制林積仁廣東運副劉景真淮西運判沈禹卿江西提鹽勅具官某丁口田賦之入㩁山煮海之利以佐人農部使者實司其責故於選任未嘗敢輕爾等皆以才稱屢更試用分行一道往究厥能至於問俗觀風禁姦戢暴亦爾等所宜也可不懋哉可右迪功郎于定逺管押廣南市舶司乳香至行在與循一資勅具官某有司以舶商之貨歸於朝廷馳驅迢途視惟謹進階一列用答爾勤可晁謙之權戶部侍郎勅朕惟艱難以來費出日廣金榖之問朝廷是憂豈無精敏之才任此盈虛之責疇咨在位我得其人具官某謀府靚深器資宏逺洊更煩使綽有能名兹從宰士之聨攝貳版曹之政進班侍從寵絶等夷往盡乃心務揚厥職惟心計之妙接武於孔桑而錢流之稱抗行於晏巽斯為稱職不愧異恩可梁汝嘉寳文閣直學士提舉江州太平觀勅朕於近臣視同一體謂出處之事雖異而勞逸之任宜均曲軫其私率歸於厚具官某平由簡㧞洊試劇煩識洞照於幾㣲才毎優於盤錯再復版曹之貳旋躋常伯之聨方須經乆之圖遽上乞閒之疏西清通籍真館奉祠欽予從欲之仁適爾會心之樂往思其稱無替厥終可曹偉明自陜西諸路節制司差赴行在陛對特改合入官勅具官某爾保心王室悔罪却歸賜對使朝敷奏有序超陞官秩併滌舊汙祗服訓辭無忘報塞可程邁就陞徽猷閣直學士知饒州勅鄱陽古郡控江帶湖民物阜饒甲于一道屬者嵗饑艱食農夫皆病師帥之任求所以惻怛憂民如朕心者付之則庻幾焉具官某法從老成志行堅正政術之敏為時吏師是用異畀左符就陞内閣輟自近甸往綏逺民爾其振廪勸分薄斂已責荒政所急罔有遺逸長材固異於侏儒利刃不辭於盤錯欽予成命益懋乃猷可游損金部郎官勅具官某文昌列屬匪賢不居而職金總財用之出入其事為重以爾損名卿之子行義甚修俾服厥官公議惟允尚思砥礪以稱茂恩可祝師龍太府寺丞勅具官某太府之職出納邦財丞於其間事任惟劇爾才能小異達於聴聞往服厥官以佐爾長可蘇符禮部侍郎勅朕惟先王備禮通於天地和樂格於祖考制作之妙必既其實不於其文後世禮樂之意既亡而鐘鼓玉帛之末尚多闕焉况其實乎祝史於是揖遜其間其君以為迂濶於是則所謂宗伯之職盖亦名存而已具官其學有家法行如古人迴翔禁省之嚴備罄討論之益李揆第一豈惟推重於中朝張鷟無雙頗亦見詢於異域春官之貳名實具宜爾其引義據經斟酌損益使一代之典復出於搶攘之餘則朕復古之功於是乎在可不勉哉可胡士特除寳文閣學士川陜宣撫副使諸路並聽節制勅三秦天下兵勁之地全蜀坤維斗絶之區並列師屯宏開幕府以壮山河之勢以張貔虎之威不有重人孰膺異選具官某疏通英特篤厚粹深學博古而達今氣絶羣而邁往雍容持槖有獻可替否之風慷慨從戎有扶顛持危之志資實兼於文武身毎繫於重輕一昨蔽自朕心出當閫寄方畧􅗥超於前古精神重折於遐衝兹錫贊書益隆眷委正齋壇之寵數儼上將之威容井鉞參旗制兩地兵戎之命雲章金畫冠五閣英俊之游乆矣疇咨莫如汝可噫謀晉國之帥盖難其人顧重廷之臣無出其右祗服明訓適觀壯猷可賜樓炤辭免恩命不允詔勅樓炤省所奏乞辭免新除翰林學士恩命具悉翰墨之林儒者以為極任文章之職他才不可得兼昔有成言朕所遴選嚴助在漢稱淮南諭意之辭陸贄居唐見山東揮涕之詔豈特討論修飾之有頼抑亦理亂安危之是資卿以卓越之才淵源之學儀於要路綽有令名頃自東臺既兼北戶當疆場盈寧之始屬書詔填委之時文殆類於天成意悉如於朕出爰正為真之命屬於已試之良衆謂當然予猶恨晚而乃過形遜避殊咈眷懐况大號之巳行奚小亷之足尚所請宜不允故兹詔示想宜知悉賜李綱辭免知潭州不允詔承命益恭傳嘉考父聞詔引道史稱汾陽朕思見古人置食三歎故於任用之際未嘗不加省焉卿氣節之髙議論之偉以身殉國畧見於前其自視宜在考父汾陽之間抑朕以是望卿湖湘帥藩徒得召重而封章再至退託不能似未亮于至懷亦少違於素志兹朕所以惑也卿其深體訓言亟祗厥服無使始終之義有愧前聞則朕亦與有知人之稱豈不韙哉所請宜不允賜李綱再辭免知潭州允詔朕軫念逺民且以湖湘帥閫之重簡求宿望往鎮臨之卿許國之忠不擇地而安有自來矣兹覽來疏至於再三是何辭之力也重違卿意且復以真祠之禄從所便安抑不失朕體貌之意焉所請宜不允賜張浚辭免知福州不允詔勅張浚省所劄子奏辭免資政殿大學士福建路安撫大使兼知福州恩命事具悉卿出入將相許國以身閲歴多艱忠勤不替朕方與民休息宣布惠慈増重帥垣載疇宿望矧甌閩雄勝卿所經行觀覽山川固嘗周知民隠雍容樽俎足以消弭姦萌分朕顧憂非卿孰可往兹厥服無事小亷所請宜不允賜張浚再辭免知福州不允詔勅張浚云云具悉朕惟長樂為今名區分閫之嚴盖疇宿望卿以出將入相之器席經文緯武之才分朕顧憂僉言惟允矧山川勝麗未減昔游飾版輿以奉親慿熊軾以問俗為卿擇地無以加焉兹薦覽於來章似未孚於至意往其祗服勿復有辭所請宜不允賜新除禮部侍郎蘇符辭免恩命不允詔勅蘇符省所奏辭免禮部侍郎恩命事具悉朕於六卿之貳必求望人共理之司尤為異選卿宏才偉識博物洽聞言必據經事皆守古論思之省禆益居多至於蒐補闕文參稽舊典宜卿之所樂聞也卿不知禮當誰知之其思承命之恭毋事循牆之避所請宜不允故兹詔示想宜知悉賜新除工部侍郎李誼辭免恩命不允詔勅李誼省所奏辭免工部侍郎恩命事具悉卿秉心端慤植學粹醇往在諫垣著直諒多聞之益繼居詞掖見深厚爾雅之風譽處之休迴翔乆矣朕所深知而熟察也六卿之貳選任則優非予敢私實有公議往祗成命勿復多云所請宜不允故兹詔示想宜知悉苕溪集巻四十七
