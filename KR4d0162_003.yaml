body:
  text: 苕溪集卷三宋劉一止撰古詩宋景文公之孫景雲得玉龜印有忠孝侯印四字示詩次其韻寶器藏家寧亂出漢爵通侯二千石懸知忠孝萃公門寸印便應輕尺璧虎頭飛去通神畫未免誑欺涉嘲罵餘不左顧非偶然渭水得璜天或者公門次第生輝光一一詞鋒如劍鋩龜玉正憐俱在手莫放柙中蒼兕吼舍弟出家作詩貽之在家情意疏出家終不惡不有清淨緣云何脫徽索我昔志婚宦謂足世味樂顛倒十年間如蠺竟自縛業巳無奈何勸汝莫莫莫一漚非全潮起滅皆妄作當知自身浮流浪恐非託伎倆百不好攝念乃初學如病求真醫安心是良藥和巒嶅二子寒食少天色五字霧雨昏不醒東風曉能酸我食日不足寧憂三日寒去年今日時桃李半狼藉能隨里門兒買餳作寒食人言二月時霏雨生樹杪天色何時光要向寒食少江南舟軋鴉江北馬連翩經春不能賞誰云不關天春風未渠尖花草有矜色酴醿會傾城牡丹欲傾國太守生辰四首以受天百祿為韻漢城欲回春梅栁詫先受江北迎兩轓江南試春酒得州古云樂渠閣大如斗要對嵗寒姿一笑閲好醜二朱轓世功名地接韋杜天勤勞三十載始著榮途鞭淹速會有時用舍何其賢或者相棄除天公賜長年三杯觴誰聖賢翰墨自主客一醉迎春風麗思發幽賾河東豈無賦諷一或勸百願公攄梗概早晚煥簡册四長松倚青壁千嵗身不老下顧蓬艾姿生意何草草願言雨露甘餘潤及枯稿耿耿心有憐得廕苦不早夜起觀雪一首寒空夜作山林聲打忩窸窣飢鼠行褰帷忽怪窗淡白開門雪飛縱復橫天上瑞花開又落庭下疏梅初破萼忍寒耐苦發孤妍似與老人甘落莫遙憐國難何時清嗣皇求衣天未明長蛇封豕欲薦食執筆固陋慙書生皇天悔禍今可卜乞與江湖比嵗熟莫言此雪不樂飢便是天公真雨粟待潮浙江口寄左與言大夫葉元亮學士兼簡吳似之一首今日江頭雪欲作濤怒風豪兩噴薄青鞋黃帽湖海人獨立沙邉如病鶴間身不待君賜與擬向風煙佳處著如何寸祿晚見招踉蹡欲前還欲却翩翩西湖兩公子胸次崢嶸飽邱壑糟床夜注喜相投自發清吟侑觴酌我來一笑豈易得十載湖山負佳約間關百態成底事毛髮星星巳非昨人間俯仰變古今總是潮生與潮落會須乞取此身健在眼好山俱著腳頗聞神方能却老肯輔衰殘殊不惡因聲更約吳太史石鼎他年煮仙藥與言元亮時見授胎息之方煉丹藥送樓伴張吏部還朝一首中臺縹眇神仙居退朝往往聨颷輿追隨五城十二樓鞭鸞笞鳳相嬉娛一一氣貌清而腴下哂山澤皆臞儒虛堂夜直冷不寐博極天上人間書云取小雅大雅詩賡續二典竄禹謨塵凡豈得追步趨夢境欲到猶趦趄望即何事飛軺車東浮江淮絶句吳天令賤子得所圖邂逅實始迎郊墟公不鄙我置坐隅假以色笑安且舒乃知仙風自恢廓不邀我敬憐其愚從容自喜吐傑句屏息側聽仍嗟吁朱絃疏越清廟奏一唱三歎音有餘何劉沈謝氣力短郊島輩行不足奴惟公妙年擅場屋一日聲價騰八區諸公貴人交薦達帝以見晚驚嚴徐要津巳復更步武簪筆會直承明廬頗聞細書問良苦便覺風信催旋艫公歸儻辨報明主物色士類供時須班公騶僕我不如山林鐘鼎端異途何王之門曵長裾半生鼓瑟從吹竽逝將爭席朋樵漁正恐不免飢見驅間關老矣尚耿耿所覬肝膽從公輸他時門下有此客終夜彈劍非無魚雪夜一首呈傅舍人朔風無端卷人幕短檠滉漾吹花落怪來覔句如斫氷門外雪花如舞鶴老妻自起傾殘樽麒麟活火紅燉燉憑君為喚詩腸溫他日有酒不足論憶山中一首示巒嶅二子用前韻世路欹危如燕幕未厭山中昔牢落春前擷韭秋擷菘有客有客鷴與鶴瓦甌鐵杓文石樽枯樵發火勢易燉得酒徑就山僧溫聽風聽雨取次論次韻方允迪袐監九日登髙一首九日意蕭條病卧如漳濵紅萸起自插黃菊兹及辰身落芹藻間心與鴻鴈親想見龍山逰嘲謔落帽人春塢瀛洲客共此溪港鄰白髮俱許長清愁浩無垠四年京華別前事寧忍詢國恥久未雪憤切此逐臣革路何時還今誰呌穹旻駕言寫心憂一洗衣上塵扁舟羡鴟夷舉酒憶季真目極樵徑風便擬從採薪但恐嵌巖中不著功名身報國君尚強我拙甘長貧水車一首村田髙仰對低窊咫尺溪流有等差我欲浸灌均兩涯天公不遣雷鞭車老龍下飲骨節瘦引水上泥聲呷呀初疑蹙踏動地軸風輪共轉相鈎加嗟我婦子腳不停日走百里不離家緑芒刺水秧初芽雪浪翻壠何時花農家作勞無別想兩耳未厭長嘔啞殘年我亦冀一飽謂此鼓吹勝聞蛙和雲門行持長老十二時辰歌呈同逰二三子虛堂怖鬼鼠窸窣牀上門牛由蟻窟將軍見虎箭羽沒免起鶻落不待咄初心學道如龍頭習疑玩久蛇尾收雲門倒跨一木馬追風相羊踏九州諸賢巧思生棘猴碧雞談辨不肯休煩師放出索湖狗騎豬南穿聲喧啾從謝仲謙乞貓一首昔人蟻動疑鬭牛我家奔鼠如馬羣穿牀撼席不得寐囓噬編簡連帨帉主人瓶粟常挂壁每飯不肉如廣文誰令作意肆姦孽自怨釜鬵無餘葷居家得貓自拯溺恩育幾嵗忘其勤仲謙云水中得棄貓拯救久之乃復活屋頭但怪鼠迹絶不知下有飛將軍他時生因願聘取青海龍種豈足云歸來堂上看俘馘買魚貫栁酬䇿勛次韻曽宏父見貽一首東巡屬車何大勤鐵馬風趨過吳下周宣自有中興日天厭氊庭尚須暇所興吳越天有年汙邪委地連山前與君步屧探禹穴感時興物俱惘然一官寓目家傳久暮景差池亦何有遮藏要見太平時狐死何曽忘邱首二禽言婆餅焦遊子飢遊子飢泣路岐耕牛殺盡飽狂虜桑下老農心更苦又泥滑滑風蕭蕭煙雨昏獨木橋軋鴉鳴櫓逆風搖行子終嵗事逺徭使我心悸不得邀和胡浚明村中好客稀五字併作青山為郭雲當門疏煙細雨梅花村門前落澗㵼寒溜滚滚似是通河源隱居二士清而通談道不愧將無同何人載酒問竒字糟牀夜注時一中天驥權竒嗟欲老家有龍駒頭尺好孫郎並舍真可人散亂書籤共探討只今干戈迷所適我亦間關暫投迹君家鳥雀不驚人應怪蒼黃如此客謀身巳拙知遁肥邂逅得此良亦稀化雲所願四方逐念絶側翅隨人飛送吳興太守盧給事赴兵部侍郎召四首以邦家之光為韻東風催行艫旌旗轉修扛千騎如登仙我心豈得降嗣學初元年德意孚萬邦不戰屈逺人威聲疾奔瀧眷言帷幄舊分符隔濤江尚書古司戎名實尚能雙折衝要從容談笑空酒缸帝曰汝遄歸謀國資敦龎無庸斗大州洪鐘受微撞二汀洲初楫迎紅紫爛朝霞及兹理旋艫緑隂巳籠沙使君如東君來去不戀家獨持五色筆摛辭燦芳華明年鳳凰池春風浩無涯須公賦丹青去路不可遮三公來臨我邦天意若見私從容坐席間風化巳四馳民曰吾二天士曰得我師庶幾少淹留子弟公教之如何去不顧公豈要我思不見溪上山旦暮發妍姿及兹有行色風日含悽悲公亦何負渠欠渠百篇詩四西雍拜顏色振鷺俱分行繡衣浙江濵再上君子堂首尾二十載持槖侍眀光厭看南朝山易綰吳興章煌煌朱兩轓照我梓與桑怪我衫始青憐我髮巳蒼頗復見勞苦感慨激中腸向來官如泥葡萄換西涼剪來但鳴悲坐閲百鳥翔公為世良師醫國有禁方頗聞藥籠中臭味久已嘗小草在逺志未用出聲妨採掇公弗疑結根稔風霜張倅生辰作質龜相鶴二詩為夀神龜異生稟懷抱黑與白蹣跚守叢蓍逰戲引蓮葉青雲覆其上文字書左脅千年愈堅瘦腹背類璆鐵有如盛德士秉志厲霜雪不求赫赫名羞作翕翕熱行藏關理亂閲世自明哲時哉此唐虞負圖追往諜又黃鶴初出胎骨格巳驚衆翩翩謝囂塵颯爽自神縱朝飛出芝田夕飲下雲夢寧知風霜質乃係世輕重有如賢達人胸腹抱空洞觀時自隱顯豈待吹噓送會看九臯鳴一一律呂中閲嵗千六百羣飛接鸞鳳千六百年飲而不食與鸞鳳同羣見相鶴經曽宏父將遊吳興示所和葉內相八首次其韻太守亦和故并及之蘋洲景物最惱客無賴山色只供愁短棹從渠係煙雨春容併作水南頭二並山微徑自曲折野人種花無數溪太傅風流猶可想樓船皓齒合招擕三謝家溪亭花鎖碎尚憶故嵗春未闌覔得小航衝雨去溫紅飛處忍朝寒四佳君覔句自超絶一作逸江邉烏桕能絶人我疑祕思有天巧滉漾胸中百頃春五官間亦復一笑適理楫及此春日晴追吟乃得伯宏父便覺侯喜無詩聲六老來文字讀不入抽思軋軋如涸泉從君敢作入社客正恐釜豆相泣煎七有懷玉堂前學士典册汗漫真全潮子向白雲深處覔面山溪館帶長橋八翰林久袖經綸手筆力遊戲吞山川要試臯夔致君術不應牢落著幽禪苕溪集卷三
