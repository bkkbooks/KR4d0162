body:
  text: 苕溪集巻二宋劉一止撰古詩小齋即事二首憐琴為絃直愛棋因局方未用較得失那能記宫商我老世愈疎一拙萬事妨惟此二物随不係有興亡又旱夏甘雨零坐見草木長天憐官窮隘乞與風颷爽四簷溜通池激激聴微響雖非山林間故作山林想道中雜興五首瀕春欲生妍梅蕚先媚好寧辭犯霜雪漸擬蘇百草耿耿甘獨待餘恩及枯槁二姚黄花中君芍藥乃近侍我嘗品江梅真是花御史不見雪霜中烱烱但孤峙三晴風掃頑雲白日光在地雲翳無㡬何聚散等懸寄所以寸草心各各抱根蒂四麥頭漸青青麥田何井井黄雲被原野衆草昏未醒方知天壤間春風有畦畛五長亭連短亭隻堠復雙堠居然送行客厯厯記奔走十里同五里先後無好醜識舟亭一首渺𣺌歸帆江北渚脉脉相望那得語舟中賈客嬋娟女朝樂瀟湘暮荆楚我欲招之問計然浮名唾去如飄烟買魚沽酒嘯儔侣槌鼓弄笛凋殘年過新開湖呈無言兄御史整整斜斜村舍居十十五五沙中鳬潛魚釣影水深淺髙栁着行烟有無天濶雲低過平楚巳覺淮音近吴語淮南米賤好留儂正恐不歸心更苦腰鎌一首腰鎌行稻區引挽親刈熟黄雲卧千頃彌望極平陸潦水秋未收褰裳聴滿足為士復兼農自身仍當僕書年賀豐稔天事誠委曲辛苦豈敢辭幸此卒嵗蓄歸來妻孥笑風日緇面目未覺城市朦生理係斗斛少年事筆耕初不辨穜稑讀書舌本燥得食僅半菽人言清有餘自哂瘦如竹虚名真畫餅逸景等轉燭今我更百態漸巳不諱俗杯水重萬言嚢錢踰滿腹却嗤祖士少未免懐愧恧客來詎相訪底用身障簏無言兄以銀壺作粥糜頗極其妙舟居夜饑頃刻可辦戯作此詩少年愛酒不廢沽滑稽鴟夷每随車春禽似是知我意日日勸我提葫蘆侵尋老境筋力異宿昔百嗜今一無羇窮未免走四方是口時賴薄粥餬憐君巧作此瓢壺善為口計真不疎上盖下豐腹胍􅞷昔人以腹大者為胍􅞷上孤下都空洞可置升米餘釜湯外沸如隔膜氣塞不作聲盧胡須臾巳復成淖糜勻滑不減傾醍醐篷忩夜饑急星火咄嗟而辦功可書山僧歙鉢未足詫考父古鼎非時須我聞壺中有髙隠日月或類蓬萊居神仙有無事恍惚山澤形貌常多臞不如一飽睡清熟個中便是真華胥盧駿元憲使寄示會稽競秀閣識舟亭二詩為各賦一首葱籠秀擁秦山落盡日春風吹嶺脚朝來領略到忩几誰遣虚空出阿閣南臺御史去天近身與孤雲生兩角古語孤雲兩角去天一握胸中摸索千丈絃更恐并呑有衡霍海門山邉初落潮西興渡口浪痕髙𣺌𣺌目亂翻雲濤心識不語迎歸橈江亭晩日風蕭騷軋啞鳴櫓相向揺平頭鴈落沙沒腰舟人底䖏尋青招天長道中作饑來驅我去二首寄呈劉盧二御史初在錢塘與二公相別而西饑來驅我去去去復何之西風迎馬頭背日霜林披十年京洛塵衣弊因改為豈惟衣日化面目亦巳緇功名誤少小辛苦道老黧追惟中自驚恍聲失旦鷄安得如虚空萬境俱一齊我心無去來我馬随東西又饑來驅我去去去復何如我饑亦何慙所歎為此軀眀發著征衫薄暮投郊墟烟林號怒風牛背立饑烏境惡夢多悸愁孤鬱難舒念初別鄉邦短檝穿菰蘆眼中兩御史烱烱氷在壺清游失追攀負此山繞湖我行日巳西回首風牽裾兩公飫文章筆端吐新腴願言繼殘膏兹腸正空虛拱州道中二首城樓百尺兀相望帝作東輔拱神州當日隋家漕渠栁至今春在末梢頭又栁條眀媚欲變色便想春思浩無涯行人牽挽不忍斷云此生意方萌芽家姪季髙作詩止酒戯賦二首淵明出從仕務亦計林田一朝倦束帶唾棄如飄烟無酒每從人兹事若可憐醉來便逐客卿去我欲眠了知此賢胸醒醉皆超然胡為遽止酒而作止酒篇此身役萬物不使一物偏有偏即是累任性皆非圓我樽可忘酒我琴故無絃擕琴玩空樽惟我樂也天又淵明賦止酒止酒未嘗止今朝詩固云從此真止矣我觀他日詩說酒特未巳必飲誠有累必止亦非理無如作病何聊用忘憂耳得失定相半随過無彼此何為我阿咸深拒堅壁壘子言故多師烏有與亡是獨此止酒詩字字如信史恐子昧圎通未究真止義嘗觀諸世間一一等幻戯死生尚云爾何乃較醒醉操瓢起相從無為乏我事方時敏寄和詩復用韻報之并簡季髙理前止酒之語季髙嘗夢蕭相國戒勿飲酒疇昔城南隅蓮葉秋田田從公觴玉醪醉墨看雲烟我乃世背馳公獨肯顧憐追思十年夢僅熟一覺眠念當老扁舟生理師計然不意菰蘆中復見瓊瑶篇筆力如置陣彌縫認先偏從容歩武間左右方若圎大如清廟音三歎聞疏絃安得化為雲追逐飛上天又阮籍劉伯倫嗜酒不知止顛狂欲求名此計真陋矣酒中有何好正自未能巳愁來得暫驅洞若適妙理我豈沈酣徒公亦聊爾耳世間寄夢間未悟彼易此阿髙志得殊家學自中壘嗷嗷求獨醒今昨較非是無心窮酒聖有意造詩史自言古鄼侯告戒存密義逡巡若神授恍惚類兒戯不須更論酒春夢本如醉我知昴星精不管太白事次韻趙端直貽何子楚卜居山間二絶句賀老晚乞一曲湖絶勝叔平千頭奴端直自是功名人未用早計此索居又後堂彈絲嬌不止知有性靈雙婢子歌詞自製清如水却怪驚塵暗中起次韻子楚秀才何郎卜築呑江湖下瞰培塿皆僕奴山川勝絶本相假正復此士堪此居子楚卜居富陽山下瞰九江又何郎歸與直至止所恨扁舟欠西子山髙日長貪睡美不有江聲誰喚起贈道人王生一首夜來清商入梧桐䇿䇿不巳鳴霜風故烟一碧萬烟樹惨淡巳有傷秋容嗟哉造物本何意安得永賴長養功獨我冷眼閱榮悴心與日出清霜融子奚不來助我喜甕頭春風生麴米人間有酒誰不醉知其天者我與子我身雖無雙羽翰欲将夢到三神山借爾八尺龍鬚席蘧然一覺俱飛還家弟元成將叅部來取別是夕忽夢與元成跨馬並行隠隠聞車轂聲如在道途覺而作詩并以贈行荒凉半畆居風烟夜沈沈安得清夢間尚有車轂音自我客京華半世厯崎嶔日月不相貸鬢有微霜侵騎馬着青衫兹事巳不任如何棲遲中心跡猶差参夢境通前生染習良巳深嵗月不可磨愈厲如精金富貴豈足道大是功名心勉哉子馳驅壮志方在今勿學嬾似儂膏肓恐難鍼次韻寄酬無言兄頒政二首鳳不出丹穴姬孔歎且思忽來乃為時不計身安危采色炫世服鳴聲漏天機髙梧寄孤巢俯仰反自悲矧復鷃雀儔妬喘如筒吹我知盛名下憂惙甚井眉寵辱更事耳何異秦晉饑生身寄世間寧免相貸資公乎豈人謀天特相兹時奈何不自量徑欲力撼之如我實助喜良是昔所期蜀牋氷不如忽枉灑蘭辭三復重太息無術可肉飛安着筆如椽空改生民詩又自公之出矣豈不旦夕思人情劇險艱太行未足危十年江湖心鷗鳥識忘機却來鵷鷺行方寸交喜悲晚被天語溫習如和風吹凡公宿昔交誰不勝兩眉如我故陸沈筆耕遇比音頻饑胸腹抱介介何以取世資時哉今唐虞不出斯無時苕之水洋洋我饑實樂之如何磊落人頗復誤見期誰能叩人門受彼在亡辭吸飲風露寒身輕令孤飛明時自嗟拙敢賦衡門詩與家姪季髙夜語用毛内相韻儒生習氣非偶然出入文史東西家掃除凈盡如宿草春風一夕巳復芽子方妙年有竒氣我巳種種成蒼華文章百巧坐一窮無地可學東陵𤓰嚅嚌山色呑湖光凜凛尚可驅百邪子昔自云有仙骨夢騎青螭籋飛霞要與李杜髙頡頏下視餘子窘可嗟寒燈夜語耿不寐自覺氷雪生齒牙頗言室有法喜妻幸是元無翁可撾何如從吾巢雲巔共訪葛洪學丹砂贈別歸安周縣丞二首自我居里間連墻絶未去非我敢杜門客實莫我顧頽然坐空廬習懶巳成痼惟有一束書遮眼慰遲暮周郎來何許文字得我怖淵源笑鯢桓采色隠豹霧追随古汀洲山色入幽歩詩文互徴逐酒鸞及時具如我衆棄餘君意獨何慕入蘭室知芳逐臭無乃誤君亦忘機人足跡亂鷗鷺堂前種白蓮心境涵淨土觀空本無說目物自吐露往來忘時節相對兩如寓屈指說去官始憶三年住囅然同一笑嵗月真脫免我不記前三更問末後句又庭前百个竹眼見三隕籜不知如許久巳復東行槖君初先住想晚去亦不惡官身等出家随牒即行脚笑傲雲烟間何適非至樂嗟我獨奈何生理自窘縳四十三年非醖造此大錯從今便上上萬事付莫莫張公留衣鉢緑蓑與青篛會當老扁舟相與同啐啄更看後五日放過前一着宿溪口一首溪聲來天邉風水共豪縱夜氣劇奔馬侵曉不能控書生有情癡詠雪寧忽凍胡為枕寒流故遣不成夢賦建安林尚能家追逺堂一首履霜存永慕風樹寄悲惋古來孝子心百嵗常輾轉雞豚逮親存適意寧一臠他時轂千乗泣涕顔有靦生世茍如此豈得但理遣所以奉嘗事自竭詎不勉尚能七閩秀器識頗凝逺求官自束髮捧檄恨晼晚歸懐追養勤作堂近山巘欲招九原魂髣髴此息偃牛羊家自腯菘韭傍可剪春秋及時禮情物兩俱腆遂令里間兒歎詫知禮典孰先如此堂孰孝如此悃從今大爾門至行神所戩苕溪集巻二
