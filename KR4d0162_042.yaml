body:
  text: 苕溪集卷四十二宋劉一止撰外制孟庾除知河南府兼充西京留守勅入聞機政参帷幄之籌出殿方維居牧伯之任我圖舊徳用錫寵章具官某氣禀天全識周世變履險挺不渝之操事君懐盡瘁之忠更踐居多聲華益茂頃辭輔郡均佚真祠眷言西雒之雄實戾神州之右留鑰之寄属於大臣帥閫之嚴兹惟重地當風塵之初靖念條教之未孚資爾老成為朕卧䕶噫吏以循良為稱職政以平易而近民拊摩凋瘵之餘宣布惠綏之實祗若休命遹觀厥成可武功大夫李懐軍中探報有功特除遥郡刺史勅具官某鄕者疆事繹騷爾謹候人之職功宜受賞久乃未伸郡刺之榮是為異典往其祗服益勵後圖可臨汝軍等處差來投進表章等兵郭思温成謹龔宥各轉一官仍支賜錢若干勅具官某爾等奉章詣闕䟦履甚勤進秩賜金以為爾寵可鄭鬲除宗正寺丞勅具官某司宗之臣搃攬名籍佐朕惇叙之政凡其僚属使任惟均爾智識敏明聞於朕聼俾居厥次以觀汝能尚其勉之可俞俟知揚州勅具官某廣陵斗牛之樞地控淮海為一都㑹自昔守臣有連率之重以爾屢試煩劇才具有餘吏畏其明民懐其惠肆以命汝盖不惟其官惟其人之意也爾其布宣徳澤拊其凋瘵使一方安爾之政則為稱塞可蔣璨兩浙運副梁澤民江西運判米友仁浙西提舉茶鹽鄭僑年江東提舉茶鹽王榕江西提舉茶鹽勅具官某朕經理中原費出尚廣惟是四方賦租之入山澤之利以佐大農部使者實縂其事故於選任之際所不敢輕爾璨通練明敏聞於朕聼爾澤民莅事不茍屢試有稱其為朕服輸将之勤勿愆于素爾友仁爾僑年爾榕實業之茂咸有可觀通貨阜財惟爾之責其秪若于訓懋乃職守罔曰弗克惟既厥心書之戒也今朕亦云可李櫂磨勘轉左朝散大夫進封開國伯加食邑三百户勅朕頒爵制禄以為天下之公黜幽陟明以為人才之勤由左右侍從之列暨中外大小之臣稽厥嵗成俾從序進具官某學探聖域才擅國華薦更内禁之嚴旋位六官之長辭榮丹陛均佚殊庭属㑹課以知勞宜懋官而錫命仍加徽猷庸示眷懐毋怠爾修以須後渥可趙霈知平江府勅姑蘓望於東南壯哉郡也地廣民衆股肱王所共理之責其選實艱非左右侍從之臣有慈惠明察之譽朕弗以付之具官某學問邃深才識通敏歴諫省腹心之任佐中臺政事之司名實具孚未忘簡記剖分符竹益試爾能川陸相望朕聼不逺庻㡬治效朞月有聞尚勉之㢤可朱彪御史臺檢法官勅具官某御史列属從長官自擇於令中舊矣以爾志尚清髙才力强敏見於表薦人無間言欽厥攸忠以佐爾長可朱澣吏部郎官賀允中倉部郎官邵相户部郎官錢葉兵部郎官勅具官某文昌列属居治教政事禮刑之職以佐其長而施行焉區别户分責任惟等以爾澣才識超詣已試有聞爾允中亷静無營遇事勇决爾相有當官之譽爾葉有行義之稱錫以賛書各事其事書不云乎功崇惟志業廣惟勤爾往懋哉毋棄朕命可崔佺自川陜至行在投下機密文字忠義逺來理宜優異特轉兩官張挽叚庭珪詞云爾奉章詣闕䟦履良勞序進一官以為爾寵勅具官某爾奉章詣闕備見忠勤躐進官聫錫以書命於爾厚矣其尚勉之可劉觀知瀘州勅瀘川望於劔南壤地沃衍控臨蠻徼委寄之重選任惟艱具官某文有古風學通今事頃委六官之貳仍更兩禁之嚴氣節凛然聲華籍甚我圖守帥僉曰汝宜惟爾習於土風知民利疚布宣惠澤綏靖邉隅行乎勉之毋墮乃力可草上席益特贈五官依條與致仕遺表恩澤詞勅生而有位於朝死則追賁其第此人臣之哀榮有國之彛典也而况服在朕列為朕股肱者哉具官某學足以濟時文足以華國識足以見形於未兆辯足以應變於無窮唾手而取功名俛首而拾富貴迴翔要路被遇先朝属朕多艱入参機政智畧輻凑風采想聞繼出鎮於坤維旋遭罹於家禍孰云去位遽殁元身以彼其才何適不偶而天嗇之年弗與位稱朕心悼焉於是知命有所制人力之不足恃也賜頒異數超進文階流澤及其裔孫愍册光于厚夜英魂如在尚克鑒兹可𣙜貨務都茶場監管馮延之等推賞轉官勅具官某爾等職事吿辦應於賞格進官一等是用勸勞尚勵厥修以須後渥可岳州通判王觀國失收搃制錢特降一官勅具官某郡縣羡財佐國經費凡其出納盖有司存爾為州事其實掌斯事而漫不加省至於逸遺使至以聞咎將誰執褫官一等姑罸其偷服我寛恩毋忘自訟可閭丘沂權吏部侍郎勅吏部銓叙人品激濁揚清古之制也今也一切從事於法無所變更察吏之欺而已然吏固不易察也具官某學行純茂智識明敏粤自臺僚進居宰属揚於厥職守道不回爰錫賛書俾参禁路小宰之事爾則優為惟公足以服人惟明足以見事而予奪之制不得以疑似見欺尚勉之哉無替朕命可陳槖權刑部侍郎勅惟我祖宗以聖繼聖好生之徳無愧有虞肆朕纂成惟刑之恤故於四方具獄來上未嘗不惕然動容懼其濫及無辜以傷列聖之徳然則小司㓂之任詎可非其人哉具官某學通而明氣邃而剛居家有曽閔之孝為吏有龔黄之政朕聞之審矣居於宰士閲日既多攝貳秋官僉言惟允其體朕至訓益究乃心無使聲稱减於治郡可王次翁中書舍人勅代言之任古所謂難非以文辭之難也賞善之言煖然似春罰惡之言揫焉似秋俾朕心腹腎腸一見於訓告誓命之間讀之者感於中而動於色知其悉出於忠厚而無所私也於是為至難具官某學博而有原志剛而不惑純茂篤寔逺師古人爾代予言天下不以為欺矣矧其辭之工耶西掖邃嚴進班法從論思之益抑有望焉可林待聘起居郎勅具官某柱史之職實記言動魏謩之善對褚遂良之守官朕想聞其風矣庻幾其有繼焉爾志行修潔論議激昻更歴險夷執義深固召從外服俾貳列卿雖譽處之甚休念猷為之未究載頒書命進直殿坳勉追古人以稱朕意可程克俊起居舍人勅具官某古之盛王設敢諫之鼓立誹謗之木與夫近臣盡規瞽史教誨猶以為未至也而命柱史之官記其言動且用以自警焉嗚呼豈特為文具而已哉爾問學邃深行義純固薦更𨕖任稍見設施進直螭坳退居鸞省儒者之遇寵莫加焉爾究乃心職思其稱無使直筆之譽有愧前聞可曹國彦改正授承節郎勅具官某爾奮身行陳嘗有顯勞載錫命書俾更秩序尚思黽勉以稱所蒙可觧尅換給武徳大夫王信同勅具官某爾以舊勞既沾賞格申以書命其益知榮可右儒林郎張綱省劄差往海州及東平府幹事回特與改承奉郎勅具官某爾曩者銜命馳驅曽無廢事有嘉勤恪超進官聨祗服異恩宜思報塞可苕溪集卷四十二
