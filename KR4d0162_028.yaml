body:
  text: 苕溪集卷二十八宋劉一止撰啟狀致語答髙麗先状二伏承茂膺朝選入覲天津効梯山航海之勤有就日望雲之喜郊坰迎勞行修授館之儀牋翰輸情有愧執謙之厚眷言欣悚罔既敷陳又伏承遡鯨波而修貢趨鳯闕以觀光亦既勤勞有嘉忠恪行展班荆之勞遽蒙枉牘之私感愧惟深名言罔既謝土物状二貢篚星陳方謹多儀之享餘珍波及不圖私好之隆靖言此心惟徳其物感銘滋厚敷叙奚殫又華旌暫弭式覩於清規方物再陳更煩於私餽輸情良厚永好敢忘愧佩之誠名言罔既回旦望啟二季秋謹時肅霜在候恭惟某官逺修方貢備著賢勞宜神物之隂扶擁福祉以来集未遑修慶先辱枉緘感愧之私名言靡究又斗當建戍節謹授衣恭惟某官享上惟忠宅心以道宜百神之交相茂多福以来綏曽修慶之未遑遽貽書之猥及眷言感愧罔既敷宣回髙麗使先状二伏審抗旌修貢将覲於日邉飛鷁候途已臨於浙右行展郊坰之勞仍瞻原隰之華修問未遑占書猥及眷言感愧罔既敷陳又伏承泛雪海之浩茫欣兹入覲想天津之壮麗行矣觀光辱函牘之過勤知舟師之在望即諧瞻晤良極忻愉謝髙麗使副土物狀二稱贄鼎来僅展行艫之勞輸情良厚更分貢篚之餘既用拜嘉敢忘佩徳又畫鷁經行幸清規之獲展殊珍問遺豈私好之難期仰被牋牘之勤抑認情文之盡逡廵拜貺欣愧交懐答贈物狀二竊以適程子之驩心贈之束帛酬季札之嘉惠獻以紵衣輙陳薄儀用答厚意有少土物具在别牋又竊以惠好猥加感深贈帯物儀甚厚愧匪報瑶有少土毛具在别紙回使副不赴排宴状二授館方初瞻風是幸我有㫖酒冀陪揮麈之歡客歌驪駒莫遂攀轅之願枉華牋而敦喻佩謙徳之彌光感愧惟深敷宣罔既又飭厨傳以稱客盖列辟之常儀銜杯酒以接歡實鄙人之私願䆳蒙誨諭仰認勤誠諒温詔之趣行及需雲而稱壽挽留莫遂悵怏何勝代貢土物状侯邦嵗聘既遵典禮之常天子時廵爰襲祖宗之舊辱在守土敢廢多儀前件物三壤所宜九賦攸出莫備充庭之實用伸旬日之誠代㑹髙麗國信樂語鳯檢十行往賁三韓之國鯨波萬里少勞一葦之航恭惟國信某官驚代人豪柱天賢業處漢廷諸公之右受上聖非常之知眷彼遐方夙殫臣節肆奉光華之命往宣問勞之恩念將聳異域之榮觀顧必極中朝之妙選二三子莫出孰為安魯之謀第一人肯来自足増唐之氣而况間文武之安否傳白傅之篇章雖曰賢勞實資重望仗平生之忠信席大國之威靈渉雲海之浩茫望神山之咫尺一何壯也不亦快哉知府某官喜接行艫宏開雅宴願盡舉觴之禮少延揮麈之歡某不揆荒蕪上獻口號令聞說清臺入夜觀文星今合照三韓頗知禮樂尊周室更遣威儀識漢官海若驅龍迎瑞節飛廉隨鷁借輕翰歸来玉殿承新渥凖擬黃麻仔細看代送京西運使樂語華旌耀日莫留使者之登車綺席臨流遽見主人之送客矧知舊郡仍是故鄉願桃李之在人甚多豈楊栁之攀條無贈恭惟某官珪璋瑞噐嶽凟英資曩膺宸扆之簡求出搃東南之大計規模宏逺聲實著聞得請真祠久遂優洊之樂觀風近甸更欣将命之榮共知行斾之西飛正是鋒車之便路佇叅密命入踐禁途知府某官久奉勝遊曲投雅好繁絃九奏重増南浦之傷别酒一樽願盡陽關之唱某等叨居樂部獲侍台墀不揆荒蕪上獻口號願盡離筵三百杯星軺西去幾時逥銅駞栁外飛華節金谷花邉望使臺富國倉箱歸善計濟川舟楫頼宏才公行勿亟朝天路帝有甘泉密詔来代㑹使相上冡回致語牙璋前辱聳里閈之旁觀綵䌫徐牽指日邉之歸路縉紳共仰出處兼榮恭惟某官霖雨聖時股肱國體紹復先王之大業鋪張對天之宏休鸞省倦遊楓宸予吿都門供帳寧論疏傅之歸鄉宫錦賜袍特寵元忠之拜掃方體望之本朝之意須鄭公上冡之還從舟楫以戒途擁節旄而就第入搃均衡之重求綏槐鼎之榮知府某官喜接台光宏開雅宴願盡舉觴之禮少延揮麈之歡某等不揆荒蕪上獻口號勲髙一品重朝班暫擁麾幢耀里間疏傅莫誇供帳寵魏公今賜錦袍還畫船即赴青門召田里休營緑野閒直待汾陽書考滿始應几杖傲湖山代秀守請交代致語樓船飛下暫遣北闕之星辰瑞節初臨増煥南州之風景歡聲在路和氣生春恭惟知府某官川嶽英姿珪璋粹質繡衣持斧薦更使驛之光華錦帳握蘭夙著丹墀之聞望謂持荷之下逺始剖竹以均勞特借經行少勞坐鎮一方濡槁共知甘雨之隨車千里噓枯已覺仁風之在扇知府某官恭迎旌斾喜接清光情深契濶之私義重夜承之契願盡舉觴之禮少延揮麈之歡某等不揆荒蕪上獻口號樓船疊鼓破烟輕欣見兒童竹馬迎錦帳握蘭乘寵眷繡衣持斧茂威聲共知甘雨隨車到已覺仁風逐扇行自是玉皇香案吏肯容蕭散寄江城聖節勾隊雲霄在望遥瞻北極之尊劍佩相磨共罄南山之祝宜命蹁躚之侣少資和合之容緩引笙簧舞重入隊問隊命侣嘯傳有翩若驚鴻之態整衣搖珮豈暮為行雨之人来近台階盡言爾志放隊回雪輕盈既呈於楚舞行雲流轉宜返於巫陽再拜台階相將好去女童隊心致語某聞里祉開祥當良月先春之候華封獻祝卜後天難老之期並舞簮裳遥瞻魏闕恭惟皇帝陛下聰明元后博大真人已昭極治之功宜享無疆之厯廣成子千二百嵗未足誇多天皇氏萬八千年於兹為盛卿雲紛郁化日舒長共殫祝聖之勤均錫在公之酒星陳樽爼鼎沸金絲某等獲侍台階欣逢盛㑹願綴容於六佾庻共樂於千齡未敢自專伏候台㫖代請越帥致語師徒取道共知元帥之行父老出郊争覩藩侯之至可無樽爼少駐旌旄恭惟某官節厲氷霜量涵江海臨難得仁者之勇接人皆有徳之言更惠愛於六州歴光華於五閤惟兹舊治實戴殊恩孤城獨存頼魯公忠義之力雅俗未改服劉寛孝弟之規故應清夢之餘尚記甘棠之舊當年追餞見攀轅卧轍之悲今日約行有分閫建牙之喜某官甫迎舟艦欣望光塵十乗啟行難留於去傳一觴為壽少盡於羣情云樓船十里駐郊坰老㓜扶持夾道迎卧轍攀轅曽結戀建牙分閫喜經行樽前歌舞皆親按眼界風烟特地明要看山公歸倒載莫辭芳醑絤深傾苕溪集卷二十八
