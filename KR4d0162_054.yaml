body:
  text: 苕溪集卷五十四宋劉一止撰閣學劉公行狀曽祖臚贈尚書刑部侍郎祖逢太子中允贈左光祿大夫父撫贈右太中大夫母王氏贈太碩人公諱一止字行簡湖州歸安人曽大父而降世以儒學名家伯祖述以直道清節事神宗為知雜御史疏新法得罪者也御史之子握年十八登進士第至龍舒守見公尚幼趨於前命賦詩操牘立就語竒出舒州喜且嘆曰此異童子吾宗其興乎未冠試太學屢先於多士聲稱籍甚丁內外艱跣哭就道見者為之感動家貧力葬無違禮有司欲請以公應八行選公曰行者士之常也謝不就宣和之三年始獲奏名禮部唱第廷中少年朋遊多已貴且顯至公名莫不舉笏相慶公視之泊如也監秀州都酒務人皆唁公宜在文字之職公不卑其官事以辦給長吏知公名未始以常僚待之秩滿遷為越州州學教授時翟汝文知州事翟公早入翰林於流輩鮮所稱許得公歡甚間出所為文屬公以定其藁至以詫客曰頗曽見人物如此乎公既代去避地於姚江有傅嵩卿來攝郡政書禮數公即勸傅公起義師以赴國家之難至稱劉琨祖逖同寢之事語甚激烈傅公感慨流涕會李參政邴得祠過郡見公留語終日密薦公人物議論宜在朝廷蓋不使公知之建炎四年為詳定一司敕令所刪定官紹興改元召試館職因對䇿極言當世之務略曰天下事不克濟者患在不為不患其難聖人不畏多難以因難而能圖爾昔吳王夫差既勝齊而子胥以為憂曰是吳命之不長也未幾果滅於越吳人侵楚及郢楚人大懼而令尹子西獨善曰乃今可為矣而楚以不亡是禍福倚伏果不可不為也如其不為而俟天命自回人事自正敵國自屈盜賊自平有此理哉上覽之稱善且諭近臣劉某所對剴切知治道乃欲驟用公而執政者不懌焉因除祕書省校書郎考試兩浙類試進士公語同列科舉方變欲文學之外通時務爾凡言涉浮靡者盡黜之既皆患無其人公袖出一軸曰是宜為首及啓號乃九成也九成以行誼推重鄉里餘多一時聞人衆始厭然服矣是年冬遷監察御史上疏論君子小人用否之辨以謂天下之治衆君子成之不足一小人敗之有餘君子雖衆道則孤小人雖寡勢易蔓且引易五陽決一隂其卦為決而繫辭則曰君子道長小人道憂也夫以五君子臨一小人不曰道消而曰道憂者蓋上下交而志同如泰之時然後小人之道不行若徒能而使之憂則將圖之而無所不至矣朝廷行事無一定之議公又上疏言陛下憫宿蠧未除念紀綱不振政煩民困用廣財殫置司講究德至渥也曽未聞有所施行恐以疑似之説欺陛下曰如此將失人心矣夫所謂失人心者刑政之苛賦役之多則失百姓之心好惡不公賞罰不明則失士君子之心若無則所失者小人之心耳失小人心而得百姓士君子之心何病焉願審其利害當罷行者斷自聖𠂻勿二勿疑則事之委靡不振者悉舉矣上覽奏嘉納時庶事草創有司法令類以人吏省記而吏生因緣欲與則以與例進欲奪則以奪例陳公曰法令具在姦吏猶得侮之今一切聽其省記欺弊可勝言願以省記之文送敕令所定而頒焉公雖未嘗任其責而論事不一方手詔詢中外利害命大臣修政之日公即具言宣王內修政事者修其所謂攘夷狄之政而已如緩其所急先後倒置何修為哉今不過簿書獄訟與官吏遷除土木營建之務未見所當急也又言人才進用太遽而仕者或不由銓選朝廷之士久而不出在外者雖有異能不見召用執親喪非軍事至起復為州縣官皆僥幸之門不塞而至公之路不開爾又請選近臣曉財利者倣唐劉晏法瀕江置司自辟官吏以制國用鄉村皆置義倉以備凶荒增重監司自轉運副使至提點刑獄並以曽任侍從官為之及令侍從臺諫各舉所知當是時雖中丞侍御史有論必咨公而後決明年秋遷起居郎奏事上前上迎語曰卿乃朕所親擢也自六察遷二史祖宗朝有幾公謝臣不足以知舊典尚記宣和間張徴李稅與臣實同顧臣何以當此公既荷上知其在臺察巳刺口論事至是因靣對極陳堂吏宦官之蠧執政植私黨無憂國心翌日遂罷為主管台州崇道觀寓德清傳舍杜門却掃自放於山水而詩文益清健閲三年召為尚書祠部員外郎奉神主於溫州未行改權發於袁州又改浙東路提點刑獄公事加直顯謨閣公盡心庶獄每行部其株連久繫獄者釋遣動數百十人守令至盱眙而民或畫像以祠公然悍強冒法者未嘗故縱越有巨姓怙富橫甚致仇人於死賂二三逹官求以為受顧覬末減公治之愈急屬吏咸恐公不顧卒刑於市一路始服公之平會攝帥事即奏疏比年帥臣權稍輕屬郡莫相統攝調兵則不遣移食則自占今既罷管內安撫矣則諸郡有得便宜指揮者亦宜聽帥司節制以章前日之弊秩滿除權發遣常州未赴召入祕書為少監既賜對上曰知卿久外無為卿言者公頓首謝居兩月復為起居郎遂遷中書舍人兼侍講賜服三品時九年正月也會莫某將校出身除起居郎公即亟上奏將以太府丞驟綴從班前此未有道路籍籍以為將上書助和議而巳臣之誤恩與將同制臣若不言人必謂臣自為地而不忠乞併與臣罷之疏入不報九月遷給事中仍兼侍講徐偉達除知池州偉達嘗事張邦昌為郎者也公言邦昌僣逆凡仕偽之人皆知諱其官稱惟偉達至今自謂郎中豈稍有亷耻者一郡既足惜且無以示好惡於天下遂罷偉達吕杭以大臣子除貼職添差浙東提舉茶鹽王存等非老病而罷從軍從軍與差遣公皆謂不可至貴近之請尤論執不避其下雖小事必爭之孟忠厚乞試河南一郡公奏后族業文如忠厚不可多得此例一開有出忠厚下者何以禦之汪伯彥知宣州入覲詔以元帥府舊臣特依見任執政給俸公曰伯彥誤國之罪天下共知節度使俸借減尚不薄况州供給圭田之厚以郡守而依執政殆與異時非待制而視待制非兩府而視兩府者類矣上皆為罷之武仲王仲寶等押扈衛人馬依康履例給科厯公亦奏科厯非參選不可給一二年來始以給竒功者履等非竒功而仲寶又其屬也廖剛時為中丞謂其僚曰臺當有言皆為劉公先矣我等獨無愧乎公居瑣闥僅百許日繳奏未巳用事者始忌公因誣公薦士失實又罷為提舉江州太平觀久之除祕閣修撰十五年冬除敷文閣待制議者希用事意謂公辭免有譏誚遂中格併奪修撰二十三年上疏請老始復祕閣修撰致仕九月奏除敷文閣待制二十五年用事者死上更媺庶政即起公赴行在公聞命不敢固辭杖而造朝至國門辭曰臣老且憊念竭力以報陛下然足嘗跌而傷拜伏不能如儀惟陛下貸而歸之上雖思公之賢渴欲見公而亮其無隱遂進公敷文閣直學士致仕以歸紹興三十年十二月初四日以疾終於家享年八十有二明年正月丁酉葬於烏程縣登靜鄉趙村後塢山之原官至左朝奉郎爵至長興縣開國伯食邑至八百户訃聞贈左朝散大夫娶臧氏同郡記室參軍詢之女勤儉有禮節閫內巨細未嘗憂公而勸公以遊學及公既達不以為喜既退不以為戚先公十年卒封碩人男二人巒右宣教郎主管台州崇道觀嶅右承務郎淮南東路提舉常平司幹辦公事孫男九人簡符筥筌篆範䇿籍笈得官者五人餘業進士孫女三人適張頴周楠而一尚幼公少敏悟七嵗能屬文既長博極羣書至佛老星厯方伎之説莫不窮析要妙為文章推本經術出入韓栁不效世俗纎巧刻琢雖演迤宏博而關鍵嚴備鄉人士大夫葬其父祖得公志墓乃以為榮其為制誥明白有體麗而不俳雖書詔填委一日數十倚馬輒辦嘗曰人君訓告賞善罰惡辭也豈過情溢美怒鄰罵坐之為哉故公在詞掖數月人爭傳誦顔魯公孫特命官公當制偉甚上歎賞不已至手書之其為詩髙處陵轢鮑謝下者猶足眇視溫李寄意深逺自成一家吕舍人本中陳參政與義皆號能詩得公詩驚曰此詩不是人間來也石林葉公夢得與公平生交其論當世人物以公為第一流至公詩亦曰世間久無此作矣有類藳五十卷藏於家公儀矩整秀樂易長者聞人有小善至單詞隻句可取率稱道不容口後進經公指授其為文必可觀然公於文蓋無所不能於學無所不通自少馳聲場屋年逾四十始得一第暮年僅掌書命曽不得正玉堂為學士其雍容獻替已不勝忌克擯廢於祠宫者十有七年及上欲用公而公已老矣嗚呼使公而蚤得用用而不為憸人間之既間而歸不病而至於復用則其所立詎止是哉公文章之餘筆法甚工而樂府亦盡其妙京師市人鬻者紙為之貴而公實沖淡寡欲遊戲翰墨自布衣至登法從不蓄聲色雖飲食奉飬未之少異間居不妄營一錢客謂公宜有以遺子孫公誦疏廣之言以對退而誨其子曰吾平生通塞聽於自然惟機械不生故方寸自有樂地年逾八十抽思作文不減少日臨終之秋預戒其家疾既革無一語謬蓋達於性命如此元吉兄弟久從公遊荷公之愛為深故知公行事為詳因泣而次之謹狀紹興三十二年四月某日甲子右通直郎司農寺主簿賜緋魚袋韓元吉狀苕溪集卷五十四
