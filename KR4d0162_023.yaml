body:
  text: 苕溪集卷二十三宋劉一止撰記戒諭詔建章宫記漢武帝以乾封五年親祠后土於渤海還以柏梁臺災闕甘泉宫方士言粵俗有火災復起屋必以大用闕此建章宫之所為作也宫之制度張千門立萬户張華能為晉武陳之後世莫得聞焉見於史者臺則神明通天樓則井幹闕則銅鳯祈風壁門池則泰液亭曰商中殿曰駘蕩曰馺婆曰枍詣闕之髙踰二十丈臺與樓之髙至五十丈池中又為蓬萊方丈瀛洲壺梁象海中神仙龜魚之屬班固賦云順隂陽而開闔觀東為祈風西為商中則集名義或然餘可概見宫室之盛自三代以來未之有也武帝承文景之後侈心生於富饒鴆毒起於晏安內巡行天下外甘心夷狄開玉門通西域牂牁越嶲大宛安息之役連年不已殊方異物四面而至於是營千門萬户之宫以饗四方賔客誇酒池肉林之富陳巴俞都盧漫衍魚龍角抵之戲以觀視之用度既乏𣙜鹽稅酒算及舟車民力殫屈盜賊蜂起繡衣持斧之使出焉嗚呼征輸之煩力役之苦未有如斯時者矣愚雖欲侈其宫闕壯麗之容而駭嘆之有不忍也髙帝七年蕭何營未央宫帝怪其過度何曰天下方未定故可因以就宫室非令壯麗亡以重威且亡令後世有以加也於時項氏雖滅黠將劇賊未盡誅鋤乃欲於此就宫室何哉意者搶攘之時勞苦之事民所更習且未知歸怨之所若天下既定乃始為之怨有歸矣自始皇起驪山阿房之役後世靡於見聞厥成告以茅屋采椽之事且未之信不若極其壯麗以為永久之傳不然異日必有改為之者是不欲以土木奢靡勞民召怨之過遺後人嗚呼何之慮誠深矣僅閲四世而建章作其所以遺後人者果安在乎是故三代受命之君未嘗不以儉德詔天下其後不免有瓊臺瑶室之興而况以奢靡示之哉使其子孫而賢則露臺百金之費有所不忍如其不然後世復有如武帝者雖處以千門萬户之宫其心未必厭也如何者蓋深於慮而淺於識故并論之以為古今鑒云謹記雲臺功臣記擬詞科題永平中顯宗追感前世功臣用麒麟閣故事圖畫二十八將於南宫雲臺以示不忘其外又有王常季通竇融卓茂合三十二人卓茂以德餘皆以功皆能以功名始終者也甚矣功名之難全也豈惟其全之難抑其全之者為尤難何也髙祖一見黥布以為淮南王一見韓信以為上將軍一見彭越以為丞相其後皆連城十數南靣稱孤所與髙祖清羣盜滅項氏而成帝業者大抵皆三人之功其英謀偉略非後世所能跂及史臣曰勢疑則隙生力侔則亂起嫌疑之勢既成讒間之禍必至當是時雖欲圖全蓋已晚矣矧自負功大志意易驕光武深鑒乎此天下始定以三公起卓茂以厚禮聘嚴光異時功臣率不以任職至於封爵錫土不過大縣數四所加特進奉朝請而已嫌疑讒間何從而生非但如此中興之將二十有八其數乃多於髙祖創業之時後世無能識其意者以傳考之惟鄧禹寇恂當腹心之任略比蕭張耿弇賈復受爪牙之託略比信布而此四人者好學有識故委寄特重其餘僅立一二功或一節可觀無卓越積纍之勤可以自負然後知光武多任將帥而分遣之殆不使功髙而難制驕肆而禍及其所以保全之實在其始前世之將雖有裂地封王之貴而葅戮隨之雖有髙世驚人之略而終為叛逆求為列侯奉朝請以終其身生受恩寵歿有顯榮而又能使後世之君思念之不忘至繪形像如雲臺之臣其可得乎嗚呼功名之難全而全之者為尤難豈不信哉故并論之以為後世之鑒且以見雲臺功臣之榮非得君如光武未易致也謹記擬戒諭監司按察姦貪之吏詔朕惟設官置吏本以為民朕為天下父母吏亦為民之父母顧所以子惠斯民俾無歎息愁恨之聲者其理則均然而比年以來屈法受賄賊害善良達於聽聞者甚衆豈朕所以設官為民之意哉嗚呼朕之憂民至矣爾部使者宜知之曽不能為朕察害民之吏而悉陳之豈狃習故常安於茍簡弗加之意耶抑收長者之稱沽遊士之譽為詭竊進取計也昔岑熙為魏郡太守民歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之夫興民之利而除其害者古之吏也今吾吏乃不能而反為之枳棘蟊賊爾部使者又勿稍禁將誰使伐之且遏之歟其自今加察焉害民之吏悉以上聞朕所不貸亦將以是為爾殿最有不然者厥罪惟鈞朕不敢有佚罰其勉之哉其念之哉擬戒諭守令勸課農桑詔朕惟周家之興先王先公致王業之艱難見於七月之詩者非有甚髙難行之説不可逮及之事考其旨不過占日星雪霜之候欽授民時必作事厚生凡農桑衣食之務致力焉而已然後知聖人之化與所以立國者莫大於敦本周官六遂之所教皆以稼穡種藝為先而不耕不蠶者俾之出征且勸罰其勤惰當是時家給人足而頌聲興朕甚慕之粵自臨御以來屢下敦本裕民之詔意者郡守縣令最為近民顧必能體朕之誠出入阡陌躬行勸課使倚市門者轉而緣南畝且將廪有餘粟篚有餘帛樂其業而懷其生施之久矣而效未之見其無乃急其所緩緩其所急忽逺略而求近功竊虛譽而規進取弗克以民為意耶其自今勉之爾誠有愛民之心則凡見於施行者皆勸課之實不然則委詔令挂牆屋為虛文而已也昔齊威王親政召即墨大夫而語之曰自子之居即墨也毁言日至然吾使人視即墨田野闢民人給是子不事吾左右求譽也封之萬家召阿大夫問之曰自子之守阿譽言日至然使人視阿田野不闢民貧苦是子厚幣吾左右以求譽也是日烹阿大夫而齊國震懼不敢飾非嗚呼朕獨不能為威王之事哉顧告戒不得不預亦惟爾識朕意焉擬戒諭內外從官舉薦遺才詔朕惟致治之本莫先得人故自臨御以來虛心聽覽側席異聞庶幾魁壘絶特超羣邁往之士為時而出圖惟事功勱相我國家以輯寧爾多方於兹既久未有聞焉豈朕之誠意有所未盡耶將狷介媢疾之徒無憂國之風者或抑厭而不揚也其令內外從官採訪山林不求聞達文武材能之士具以名聞朕將以禮招聘期於必至傳曰上臣事君以人又曰進賢受上賞爾其體事君之言朕不敢愛進賢之賞無使君臣之間有愧古人則豫汝嘉苕溪集卷二十三
