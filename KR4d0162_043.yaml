body:
  text: 苕溪集卷四十三宋劉一止撰外制范璿王鉌左司郎官潘特諫魏良臣右司郎官勅具官某文昌政事之本分曹設屬序於左右宰士縂其凡彌綸闕軼以佐其長以吿於上而予奪罷行之其任顧不重耶爾璿静黙邃深惟義之守爾鉌安恬樂易遇事必為爾特諫行顧其言有長者之譽爾良臣才周於事有健敏之稱或以序遷或由選擢周官有云以倡九牧阜成兆民盖六卿之責也爾則與焉其思以稱此無羞朕命可周綱檢正晁謙之檢詳勅具官某二省基王命之地右府本兵柄之嚴爰建属僚縂司出納庻幾習熟聞見為大用之階爾綱守道不違持心近厚敭歴中外藹然休聲凡政令之事爾其審觀無使頗僻爾謙之名卿之胄學有家法徊翔省寺見謂明敏凡疆埸之謀戰多之賞爾悉關决以協事功其各究乃心職思其稱朕於此觀能焉可周葵殿中侍御史勅具官某治疾以苦口之藥疾已而藥可捐治身以苦口之言身修而言有味君子以是知言之不可忘也爾頃以文行為朕識擢既居御史知無不言言皆有益比其去也朕心思焉兹用詔除復畀言路上有仳政朕所樂聞吏之多奸惟爾勿貸但朕以治已之道治人君子進為小人退聼天下蒙福其庻幾乎可何鑄監察御史勅具官某御史三院共縂憲綱而六察糾政令之稽遲以佐朝廷之賞罰其選惟遴爾執義蹈禮藴藉深厚見之事業必有可觀肆朕命爾為耳目之官往其懋哉尚有後渥可韓珉江東運判勅具官某江左地重勢臨三吴師屯列營取給漕食爾謹身奉法恪勤勿懈輸將之職公論謂宜至於省察吏姦訪求民瘼此部使者所當自任毋煩訓言可周三畏大理卿勅具官某昔者謂廷尉天下平特以持平之難也天下之寃至於廷尉而不得伸則控吿無所矣夫豈容於不平爾迴翔諫寺有年於兹議法不私處心近厚人無間言是用正位九卿以旌爾勤嗚呼張釋之于定國何人哉爾其盡心奚遜之有可向宗厚吏部郎中勅具官某時廵以來典籍散逸選曹品式幾亡勤守雖有憶之文稍從編次而予奪之例出入尚多以爾執徳清夷宅心堅正踐更中外譽處甚休我圖老成俾還省戶夫豈特重三銓之寄亦庻幾清列宿之行益懋爾猷毋俟多訓可李迨京畿都轉運使勅朕慨念舊都中更戎壘封圻千里田野蕭然比命邇臣往司管籥可無膚使省觀民風具官某才足以應時須智足以周事變薦膺選任名實具孚朕簡求侍從之良増重轉輸之寄布宣至意有若親臨歛薄施豐惟其僅足嗚呼爾無以鍼砭為逺惟拊摩之是先爾無以斧柯為功惟萌芽之是察勉修厥職以副朕心可環慶帥臣趙彬遣敦武郎張允弼進本路圖籍等特與轉兩資勅具官某爾奉章詣闕䟦履修塗有嘉其勤進秩二等服此光寵益勵厥修可趙令衿福建提刑勅具官某法弊於吏所從來久楚漢之法非亡也而或為之上下其手輕重其心則雖曰法存不已廢乎爾宗胄之良見謂清審出入中外多所踐更攬轡一方其為朕察其所由然者一切以柱後惠文彈治之俾民自以為不寃則為稱職爾其毋怠可王述監永通監日欺隱官物累年不行送納特降一官衝替勅具官某爾受郡國羡財入於泉府乃敢稽違不以時上原情議法罪其可迯貶秩免官茲亦恕矣可吴偉明除直秘閣應天府路提刑勅具官某梁宋之區封圻千里創殘十稔版籍始歸比命邇臣往司留鑰可無膚使省觀民風以爾静正寡言循良近古輟從治郡易畀列臺考之于詩盖忠信之人是任授之以職惟刑辟之事是專刑乃期于無刑訟必使之無訟何以臻此爾其懋焉庻幾慈惠之風不辱闕華之命可陳逺猷除四川轉運副使勅具官某全蜀之饒弊於兵賦兹有年矣朕心憫焉簡求忠厚之臣往任轉輸之寄爾通才識變敏識絶人更踐煩劇厥有聞譽輟從帥幕就畀使軺饋師牧民悉惟汝責通融之妙其必有方非朕所能知也知汝責而已尚其勉之可曽楙知潭州勅長沙居湘川之奥人豐土闢南通嶠嶺唇齒荆雍分閫之任朕不敢輕具官某篤寔純明䟽通將畧名徳之懿表于縉紳早辭法從之班久袖經綸之手時方謀帥允属老成兹朕付爾荆湖一都㑹之雄封疆数千里之廣惟所節度有兵有民勉思其艱以圖其易威徳兩濟時乃之休可仇愈除寳文閣直學士陜西都轉運使勅朕惟三秦之地雄視九州臨遣漕臣自昔任重矧兹王畧始及舊疆必求忠信之稱往布惠綏之實具官某才能卓偉問學淹該識毎洞於幾㣲刄可施於盤錯眷關隴乖暌之久属干戈蹂躪之餘餽師牧民觀風問俗澄清攬轡非汝孰宜陞内閣之崇資增使華之重寄送之以禮式勉其行嗚呼爾惟参术之是施勿攻以毒爾惟稂莠之是去勿剪其良服我訓言益思其稱可向子諲轉一官致仕勅樂于進為則以逢時是幸安於静退則以得去為榮鐘鼎山林各存志慕朕又烏能必以官職之事累之哉具官某修潔博習甚敏而文勵行砥名自殊肺腑閲歴多故勤勞百為頃辭法從之班出領輔藩之重浩然請老去不待年結社香山豈特棲心於澹泊角巾東路殆將卒歳以優游賢哉大夫自此逺矣進官一等用寵其行服我訓辭益綏壽祉可吕頥浩贈太傅勅砥節礪行者為臣之能事追往厚終者有國之大經矧惟耆艾之英實受股肱之託可無愍册以寄予哀具官某氣禀純全學探藴奥通出將入相之略有經文緯武之才慷慨百為周旋三紀衮衣赤舄再登揆路之崇玉節琱戈屢即齋壇之拜事書勲府名在史官辭富貴而勿居處山林而寄傲比欣入覲旋復戎行慕赤松之髙蹤返東䝉之舊隱僅踰浃日遽殞元身念一老之不遺固中心之是悼肆頒徽數正位上公惟誠意之可通尚光靈之未冺可苕溪集卷四十三
