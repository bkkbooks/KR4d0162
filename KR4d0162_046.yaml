body:
  text: 苕溪集卷四十六宋劉一止撰外制馬純江西運副敕具官某大江以西地稱沃壤賦租之入視他路為多而艱難以來使者數易鮮克勝其任者以爾逹練明敏智術甚優博識多聞論議衮衮兹用命爾往司漕計事無劇否惟才是須行爾所知則有餘地尚勉之哉可上殿鮮于參典改合入官敕具官某朕燕見臣工訪求民瘼雖隆寒盛暑不敢自暇庶幾廣覽兼聽有禆治道爾以孤逺入對殿中論議詳明有當朕意進更官秩是為異恩其勵爾修以圖稱塞可王利用成都府路提刑敕具官某御史出領外臺挈持憲綱以肅所部蓋纍朝故事示中外為一體也爾居三院分紏六曹守道不回見謂稱職夫刑辟不茍用也刑期無刑辟以止辟五禮之教存焉經不云乎士制百姓於刑之中以教祗德其體兹訓以圖厥中可王璧祕書省正字敕具官某以言取人尚矣朕又網羅博洽能文之士習為典章復其科目以别異之爾在選中既閲嵗矣禁林發䇿酬對衮衮亦復可觀夫道山藏書之府朕所以飬賢而待問爾往讀未見之書增其所聞揚摧古今令可施用無自畫焉可李維浙東提刑除直祕閣敕具官某朕於遣使授指未嘗不訓告煩悉而况刑獄之事乎漢景之詔曰獄人之大命死者不可復生言至切也爾學古入官為時望仰顧平昔講論必有得朕心之所同者與其殺不辜寧失不經不易此言矣寓直中祕以寵爾行往其懋哉可徐俯知信州敕入聞機政參帷幄之籌出鎮坤維居師帥之任我圖舊德兹錫贊書具官某道廣器固才雄識敏文章至於剛大之氣問學得於深湛之思粵自艱虞召還禁近屢罄謀猷之益旋登宥密之司謝公實賴於同憂汲黯固優於補過浩然辭位久矣奉祠觀鐘鼎猶山林豈特棲心於淡泊以翰墨為主客殆將卒嵗以優遊惟是上饒號稱名郡教條簡肅足以綏彼逺民巖壑覽觀足以休其暇日往欽成命毋或留行可曽幾廣西運副吕用中福建提舉茶事敕具官某閩嶠去朝廷逺郡縣之吏玩治病民視部使者能不能以為亷貪勤惰其來久矣爾幾文學志節出入數等爾用中識慮明審達於事情兹錫贊書分行一道耳目所及靡有逸遺使彼逺民不病於吏則為爾能轉之勤摘山之秩爾等所能習聞也成法在焉勉之而已可程克俊起居郎王鉌起居舍人敕具官某朕設左右程史之職簪筆殿坳言動必書實用自警非但率循故事而已選任之重異於庶官惟克俊鉌博物能言絶出倫類檢由識耀克俊次遷蔽自朕心式昭寵遇勉之無斁將觀爾能可隨龍慶國柔懿淑美保慈夫人吳氏上遺表特贈柔懿淑美端靖肅恭保慈夫人敕朕隆恩念舊追往厚終眷惟慈保之勳敢後哀榮之典慶國某夫人吳氏婉嬺淑美端莊裕和行悉中於壼彛言不踰於內則儀型禁掖居有令名擁佑眇躬至登大寶念艱虞之方靖固康樂之是圖庶安鐘鼎之榮遽覔壑舟之逺愍章雖寵顧莫寫於豫悲素號有加冀益昭於爾德惟光靈之未泯尚誠意之可通可祝師龍太府寺丞敕具官某太府之職出納邦財丞於其間事任惟劇爾才能小異達於聽聞往服厥官以佐爾長可故保慈夫人親屬孫女雍氏故男新婦陳氏並封孺人敕某氏眷惟保慈之德實佑朕躬奄其云亡中心是悼疏恩之典并及懿親祗服寵休毋忘所自可故保慈夫人本位官承節郎代手分蘇練特與轉兩官敕具官某眷惟保慈之德實佑朕躬奄其云亡中心是悼疏恩之典下及儲胥祗服寵休毋忘所自可范同除檢正敕具官某兩禁腹心之地帶轄萬務賦於中臺爰置屬僚總司其出以爾同學問淹貫志行卓偉更閲既久聲稱蔚然稽於羣言宜在兹選嗚呼命令之出實艱厥初毫釐之差繆以尋丈爾居其位職思其稱焉勉之毋忽可朱松吏部郎官張宦司勳郎官喻汝礪駕部郎官敕具官某中臺總天下之政列屬分曹序於左右既重其選旋以次遷將使明習憲章周知其故則朕儲蓄待問不為無人惟松與宦一時之望汝礪召自遐服敷表可觀兹錫贊書各事其事無使來效有愧朕言可陳昱大理寺丞敕具官某獄重事也人有智愚官有上下獄疑者讞至移廷尉則他無所控告矣今命爾往為之屬以觀厥能俾民自以為不寃則為稱職可楊邁知夔州敕具官某夔居楚蜀之間控臨三峽是為咽喉之地建牙分閫重於他邦爾邁敏識絶人通才識變更閲既久譽稱其實我圖帥守僉曰汝宜綏靖兵民布宣惠澤汝之職也往其懋哉可王次翁工部侍郎敕宫室器械之政營田山澤之令名在冬官職存事典惟時卿二選任匪輕具官某行稱其言識根於學頃自柱史擢居掖垣謀猷卑鄭國之討論制作得漢家之深厚回翔既久進秩是宜疇若豫咨莫如汝可往欽成命無替厥終可程克俊中書舍人敕柱史記言動之官中書基命令之地非一時之傑不與選掄而兩禁之嚴均為邃密兹錫贊書之寵序升法從之功具官某志行不羣論議守正履聖賢之閫閾咀典籍之英華發為文辭最宜訓詔服我新渥攄爾舊聞豫欲觀仲舒之古風見於有作豫欲問崔琳之今事益所未能勉追昔人以稱朕意可周葵起居郎敕左史載筆職在記動進直螭陛退居鸞臺是惟儒者一時之榮以爾葵執德清夷秉心端亮兩居御史風節凛然有藜藿不採之風見松柏後凋之操引以自近益觀厥猷我乃正心爾無曲筆庶幾終譽不愧前聞可李仲孺知廬州敕具官某合肥地控江淮為今重鎮搶攘之後民物尚繁必得一時通敏之才付以千里帥守之任爾器能宏博論議激昂奉使典州所臨底績易俾方面以究爾長詩曰不剛不柔敷政優優又曰豈弟君子神所勞矣服我明訓毋失厥中可苕溪集卷四十六
