body:
  text: 苕溪集卷二十五宋劉一止撰疏語祈晴疏語瀕海之郊水乏瀦積雨暘涉旬反覆旱溢乃春甲子連雨不止民之望秋自於兹始春澤既多其後則愆消息卷舒理有必然惟神相民憐此過計無使僣差以託嘉惠環湖作郡繚郭為田當三農舉趾之時抱百日連隂之雨顧斯民為可哀憫惟大士是真依歸爰起淨筵仰延瑞像廓山川之氛翳還日月之清明庶幾佛慈不違民願自冬徂春雪繼以雨實淋淫而未已惟墊潦之是虞安能致力於人為惟有投誠於天造願收隂慘覆以春溫民將有事於農吏亦獲逃其責庶殫薄效仰報為恩乃運在木飢既爽一年之蓄候當隂肅更被三日之霖耕夫共苦於沾寒穡事尚幾於薄少願廓山川之翳俾終場圃之功雨三日曰霖過則非福雪盈尺作瑞甚者為災婦子有號寒之聲衣褐無卒嵗之備惟民可憫願帝霽威秋稼方德我田既臧兹惟上帝之降康寧使成功之或爽風雲驅掃願即霽於隂威穜稑後先俾悉臻於堅好積潦十旬方拜時暘之賜疏苖千隴又懷垂稿之憂雖屢瀆以知慙念歸誠之有素慈雲廣覆願舒不盡之隂法雨滂流更借無邊之潤謝晴雨淫不止民懷墊潦之憂農事少愆吏受怨咨之責忱辭潛達嘉應巳彰卲惟神靈近薦影響念天地之大施雖曰難名效螻蟻之小勤庶云知報常寒為沴積潦是虞祗欵淨筵用伸微悃隨緣赴感若影響之於形聲反雨為暘蓋威神之所變化吏敢忘報民實知歸尚期無礙之慈終此有年之賜暑雨祈寒念羣情之多怨金穰水毁諒嵗事之可回職在近民責則歸已方冀忱辭之上達敢圖哲鑒之下臨莫報洪慈誓堅精意曩者積隂於兹再瀆惟大士其慈悲力度衆生以方便門僅同指顧之間忽若形聲之感伊何微報徒激懦𠂻淫雨不止穡事稍愆念小民寒暑之怨咨實司其職惟大士神靈所變化何有甚難甫露微誠遽蒙嘉惠仰戴生成之德敢忘報事之私乃者有淫潦之憂祀告羣祀神明顧答如響惟神惠民吏則知德其何敢不拜祈雨故嵗不登新田未墾曽無寸澤坐閲上春仰天地之垂慈有風雲之赴感國無六年之蓄曰急矧今民之方飢雨自三日以往為霖願濟時而僅足郡號瀕海壤地實腴而陂澤無瀦蓄之利雨暘過差民悉以告於吏吏持牲酒禱羣祀不則縮手無他力也今境內不雨僅閲兩旬河流日損舟楫告病農懷隱憂吏已罔知所出惟神明食此久矣曲折之狀宜知之詳其終惠之敢同以請謝雨以心為心不奪衆生之志願曰雨而雨了知大士之威神民用交欣吏慙莫報尚冀覺慈之無礙終令嵗事之有成曩者有旱暵之憂祗告於神應期而雨越二日復霽如初懼吏不知謝克不終受神貺嗚呼田壠拆矣禾不得滋以穗也井洫涓矣民不得酌以溉也神其思聞之乎敢涓辰往拜以謝以請祈雪郡境自秋閲冬甘澤甚愆河流告涸麥田龜拆民懼疫癘嵗云盡矣雪當應期是用祗見羣祠嗚呼匪惟民實依神神亦惟民之依其庶幾發盈尺之祥沛優渥之德也惟吏與民敢不知謝十旬旱鬼方疫癘之自虞一夕同雲識豐穰之有兆惟此及民之實何殊雨粟之功蓋知大士之普慈曲赴衆生之微感已拜先春之賜尚須盈尺之期謝雪海邦千里念甘澤之久愆帝闕九閽冀飛章之上達仰瀆蓋髙之聽自忘不測之誅豈意洪慈俯垂嘉應同雲驟合巳沾濡稿之恩尺瑞可期願卒有年之慶苕溪集卷二十五
