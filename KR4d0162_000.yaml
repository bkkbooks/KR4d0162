body:
  text: 苕溪集别集類三宋提要臣等謹案苕溪集五十五卷宋劉一止撰一止字行簡湖州歸安人宣和三年進士紹興初召試除祕書省校書郎厯給事中以敷文閣直學士致仕事迹具宋史本傳按陳振孫書録解題稱一止居瑣闥僅百餘日忤秦檜罷去間居十餘年後檜死復召仍力辭不起年八十二乃終蓋亦守正不阿之士其殁也韓元吉為作行狀稱其文章推本經術出入韓栁不效世俗纎巧刻琢雖淹迤宏博而關鍵嚴備其為詩寓意髙遠自成一家吕本中陳與義讀之曰語不自人間來也是其著作亦盛為當代所推矣行狀及宋史本傳皆稱非有齋類稿五十卷書録解題亦同此本前有曝書亭印記蓋朱彛尊家舊鈔題曰苕溪集不知何人所改又詩文共五十三卷末附行狀一卷誥詞一卷凡五十五卷數亦非其舊或後人掇拾遺篇增附其後因而更名歟乾隆四十四年九月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀
  hash: sha256:24859359b5d6e8e0147528f26b24e5a009653e88265635d73557a55662006583
