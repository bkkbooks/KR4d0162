body:
  text: 苕溪集巻五十二宋劉一止撰雜著趙陳都官墓芝亭石刻後某弱冠游太學從師左間得前輩制科進巻讀之其題曰太平有為䇿者盖賢良都官陳公之文也觀其極論天下民物利疚慷慨熟復鄙心慕焉今六十年矣尚能記其髣髴公以嘉祐四年召試賢良方正能直言極諫科自秘閣至廷對皆為第一十餘年始為越州山隂宰上書論青苖事忤時相一斥不復公自謫廢便無仕進意當是時詆新法得罪去朝者如中丞吕公諱誨殿中侍御錢公諱顗某伯祖雜端諱述同時出國門至南京飲酒三日而别且相戒不復出公官卑又早世士論悲之公之亡盖某始生之年獨幸與其孫商彦俱為太學生得公之文獨多商彦以文學馳聲庠序士類推服既仕宦不茍進懐抱怡然詔某曰我自得官應遷轉者並用考功格計嵗月而升未嘗僥倖一日恩賞中間嘗丞秘書為顯州之階已而補外其忠節之髙不辱其祖史臣稱魏謩挺挺有烈祖風余於商彦亦云芝亭之瑞前諸公論之詳矣兹不徒言紹興巳卯六月丙午劉某書宋故太宜人莫氏墓誌銘太宜人莫氏會稽餘姚人故贈右通直郎同邑胡君諱伋字浚明之室也曽祖某祖某父某皆隠晦不仕太宜人自少小知書浸長作詩論文如慧男子女工之事不學而能年三十始嫁與其夫以文字相磨切甚自樂也浚明負才氣謂富貴功名可以拾取初以鄉書試禮部不偶因肄業太學閲三嵗歸省其母宣夫人尋奉母命成婚于莫僅旬日復如京師太宜人不奪其志毎致書問無恙外必以母養勉之既又齟齬及慨然言歸闢館舍受鄉黨子弟之願學者躬自教授或衣食之太宜人實喜焉子二人曰沂曰汾方沂之在母也太宜人夫婦危坐相對多誦經史用古人胎教之説沂生而資性敏悟絶人督教之甚嚴汾慕好亦如其兄客過其門聞誦讀講演之聲嘆曰有是夫也有是婦也有是子也沂未弱冠試補太學為選首紹興五年中進士甲科自是奉親就養官舍二十八年以所為尚書師遇郊祀恩封太安人明年顯仁皇太后覃八十之慶加今封三十年五月晦以疾終享年八十有七時沂為尚書户司員外郎兼國史院編修官校中書門下省檢正諸房公事䕶喪既歸貽書乞銘於余將以其年十二月壬申𦵏於邑之翁湖之原祔浚明之兆建炎巳酉余嘗學會稽既終更聞㓂難越江浙未知避地之所外親或告余距縣三十里有胡氏世業儒兄弟好客急義有賢稱盍往依焉余舟楫至門皆出望余舟迎謂僕夫曰此教官劉姓者耶於是開其傍舍見授几飲食器用纎悉備具其至如歸余不自意恐懼流落中得此也已而見太宜人於堂上而余之室乃獲朝夕從太宜人㳺見其勤儉有家法奉祭祀睦姻族周人之急不少靳談人之善如已出其所居之軒名曰清淨悉足以為法每為余言之其後浚明以其妹歸余長子巒為姻家孫男七人振拱挺抑抗括掄孫女五人尚幼銘曰侃侃宜人行中軌則歸嬪儒家伉儷連璧朝暮見聞詩書禮易惟善之為曽靡有忒晚而就養既夀既秩夫豈人謀隂報其必家山相望墓木拱揖我諗之銘州里是式右二文乃先公八十三嵗時作嘗語子孫曰此文入石我不及見矣是年季冬捐館如前云故表於此巻孤巒泣血謹書苕溪集巻五十二
