body:
  text: 苕溪集卷十八宋劉一止撰表謝賜敕書表以下皆代作廟謨素定天討將行奉德意之丁寧增懦𠂻之激烈臣中謝恭惟皇帝陛下溫文恭儉邁古盛王威武神靈如我藝祖相上帝以遏亂略整六師以修我戎時巡山川躬勞將士申嚴列壁拱固四封充暴衣露蓋之難洗聖父哲兄之憤惟時有衆共識至情上念君親忍此勤苦誰非子弟能不慨嗟而臣攝令帥符屬當郡寄玉帛萬國莫參班瑞之榮梐枑再重徒劇搖旌之念道君皇帝升遐寧德皇后上仙慰表臣某言今月某日伏惟尚書省劄子奉聖旨何蘚奉使回得大金副元帥書某報道君皇帝久違和豫厭世升遐寧德皇后亦已上仙者訃來萬里悲動九躔惟時舊臣孰不哀隕臣誠哀誠痛頓首頓首恭以道君太上皇帝臨御二紀勤勞百為昭天漏泉德澤深厚移風易俗禮樂燦明悉本三王之仁不享五帝之夀寧德皇后母儀克備坤德無私謂當從革路以歸副寢門之問省禍遽若此天不可知伏惟皇帝陛下聖情難居孝思罔極冀免從於中制用俯慰於下民臣伏恨職守所拘不獲匍匐奔走闕庭臣無任哀摧哽塞之至謹奉表稱慰以聞臣某誠哀誠痛頓首頓首謹言賀皇太后還闕表天地合符宗祊降祉用錫一人之慶克諧二聖之歡臣中賀臣聞天下不足解憂聖德無加於孝矧慈顔之久隔在嬰慕以何勝皇帝陛下心存問寢之期目想回鑾之節中夜起坐或自攬於衣裘當食興懷致屢遺於七箸廣愛孚於逺邇精意通於幽明俾鄰國之改圖奉安輿而還闕大橫得兆不殊代邸之迎相見如初寧比城潁之樂羣情胥洽異議知慙故應擊壤之謡皆若見親之喜兹蓋皇帝陛下恩覃萬國道冠百王北伐南征威靈有赫東漸西被聲教無私眷求同德之臣益懋享天之實再興絶統成此大功今昔之所未聞書傳之所不載方將謹嵗時之溫凊備陸海之膳羞追十六載之艱虞事為既往衍億萬年之福祿樂未渠央臣望逺修門身居散吏奉觴稱夀莫陪漢殿之九賔向日傾心敢替封人之三祝車駕巡幸浙右起居表臣某言伏審車駕巡幸駐蹕浙右者興周宣北伐之師雷霆尚閉舉虞舜東巡之典嵗月靡差帝肯幸臨臣用鼓舞臣中謝恭惟皇帝陛下飾離明而普照體乾健以自強親駕戎車往綏楚甸增山川之震疊還宇縣之清夷賊氣不揚邊塵頓息惟神靈威武所變化信是優為雖險阻艱難之備嘗靡懷寧處念本根之攸重儼容衛以載旋班瑞諸侯時事既歸於宰旅占星東井王略行及於舊都臣叨奉使華屬在鄰境仰雲霄而路隔傾葵藿以心搖車駕駐蹕建康起居表展義時巡觀風都會六龍所指百神駿奔臣中謝恭惟皇帝陛下昧旦視朝齋居決政永念無疆之服克安有截之區乃眷建康久騰王氣龍蟠虎踞寧論割據之英雄地僻天開赫有中興之氣象逺阻淮浸近控江濤苑長洲而滄海陵既包吳分城方城而池漢水仍擁楚疆方將尋周瑜魯肅之師倚王導謝安之佐內殄冦警外威羌酋勝算可期成功有韙后來無罰已聞家室之寧時邁其邦終冀干戈之戢臣身縻藩服望逺天威莫參班瑞之榮徒切搖旌之念車駕駐蹕平江起居表展義楚疆壯古都之勝勢觀風吳會駐鳴蹕之清塵民物欣愈山川震疊臣中謝恭惟皇帝陛下受天明命興我有邦躬堯帝之聖神稟成湯之勇智念三年大聘既享備於多儀而五載一巡實遵行於故事儼漢官之容衛慰夏諺之歌謡方將整六師以修我戎相上帝以遏亂略仰威靈之頓邇覺藩翰以增雄臣猥以謭才誤當分閫萬國玉帛莫趨禹會之班千里舳艫想見摐揚之盛車駕巡幸越州逺迎奏表六龍在御萬騎前驅俾方嶽之各朝肆覲東后念室家之相慶奚獨後豫頒詔幸臨載途呼舞臣中謝恭惟皇帝陛下勵精庶士若昔大猷躬觀風問俗之勞振黜幽陟明之典眷此名郡實為奧區菲食卑宫欽念禹功之逺苦身焦思俯憐越霸之勤曩覽古以興懷見登堂而賦詠惟時金石既傳帝作之歌今我臣民果契天臨之寵山川改觀日月揚光臣猥以匪才辱在守土仰威靈之廣被知封略之再恢舞干羽於兩階將見逺夷之格執玉帛者萬國獲陪近侍之班心劇旌搖耳傾鳴蹕車駕駐蹕冬至日德音表法駕幸臨方仰威靈之近綸音下霈更深布濩之仁凡在生成咸知愛戴臣中謝竊以昊天其子實嘉時邁之勤吾王不遊曷慰夏諺之望蓋臣民均以為幸則德澤之所當宣如彼周王綏兆民於侯服考之漢代赦除死於汾隂踵事增嚴於今為盛恭惟皇帝陛下應天以實御衆以寬兢業萬幾所其無逸哀矜庶獄寧失不經命觀雲而必書用集迎長之福謂法雷而順動宜疏作解之恩德意周旋訓辭惻怛囹圄縲繫既蕩滌而一空田里賦輸所蠲除者億計已見室家之相慶庶幾弓矢之載櫜臣敢不推廣上恩務消民瘼嘉與懷生之類共生和氣之遊行在起居表臣某伏聞皇帝陛下若古昔之大猷稽祖宗之故事時巡方嶽寵綏江淮顧惟藩屏之臣頓覺威靈之近臣中謝恭惟皇帝陛下齋居決政昧旦視朝御衆以寬應天以實逺近祗德冦戎革心肆涓剛辰遵行曠典展義修禮駐蹕近旬山川震肅神物欣愈奔走後先罔不受職臣猥以守土不獲躬詣行在瞻望天日神爽飛馳百官謝賜春衣表自天錫命拜賜謹時凡在周行同深欣戴臣中謝恭惟皇帝陛下智臨九有道冒羣生文王積康田之功務求民隱夏后置黻冕之美特重禮容雖恭儉之獨持在匪頒而不廢子衣之安且吉並詫君恩舞雩之詠而歸則非臣志尚竭疲駑之力共酬覆露之仁謝賜厯日表祕䇿授時蓋以前於民用清臺告朔乃誕布於王正凡厥有邦共承大賜臣中謝恭惟皇帝陛下用夏厯數在舜璣衡備經天緯地之功驗合璧連珠之應嗤太初之三統陋元和之四分出治明堂親班月令惟此初常之典是為經久之規臣敢不祗奉成書克遵常憲協金穰之處用謹始於農祥導王氣之和益躋民於夀域苕溪集卷十八
